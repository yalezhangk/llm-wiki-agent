    "markdown": "---\ntitle: \"PIX 户内交流金属封闭开关设备 产品目录 V8\"\ntype: source\ntags: [pix, v8, smart-pix, air-insulated-switchgear, medium-voltage]\ndate: 2024-06-12\nsource_file: raw/MVE/PIX/PIX户内交流金属封闭开关设备 产品目录_V8-修改断路器参数表.docx\n---\n\n## Summary\n这份 V8 Word 目录是 [[PIX]] 中文综合目录的更新版，文件名标注“修改断路器参数表”，正文则把 PIX 重新组织为面向“数字化中压配电产品”的完整产品族目录。相对较早的中文 PDF，它显著补充了 7.2/12/24kV 主参数表、AFLR 内部电弧等级、Green Premium/PCCC/碳足迹认证、[[EcoStruxure]]/千里眼资产顾问、核电、海事、WMTS 电源切换和 [[SmartPIX]] 智能化解决方案。\n\n## Key Claims\n- PIX 系列中压 [[空气绝缘开关设备]] 适用于基础设施、电网与能源、重要负荷、工业、交通和海事等应用领域。\n- V8 主参数表按 GB/T 3906-2020 与 IEC 62271-200:2021 组织，额定电压覆盖 7.2kV、12kV 和 24kV。\n- 带断路器功能单元的额定电流覆盖 630A 到 4000A；7.2/12kV 还包括 5000A，12kV 发电机出口断路器柜可到 6300A。\n- 额定短时耐受电流 7.2kV 可到 50kA，12kV 可到 50kA/63kA，24kV 可到 40kA；主母线最大额定电流为 7.2kV 5000A、12kV 5000/6300A、24kV 4000A。\n- [[内部电弧防护]] 明确为 IAC AFLR：7.2/12kV 最大电弧故障电流 50kA、1s，24kV 为 40kA、1s。\n- 产品尺寸表把 7.2~12kV 柜宽组织为 550/650/800/1000/1200mm 等组合，24kV 主要为 800/1000mm。\n- V8 增强了绿色和数字化叙事：Green Premium、RoHS、REACh、PEP、EoLI、PCCC 产品认证、中国质量认证中心产品碳足迹认证，以及 [[EcoStruxure]] 平台。\n- [[SmartPIX]] 能力包括 PMB/PMB Easy、嵌入式无线测温、断路器特性监测、配柜监测、一键顺控、局放在线监测、剩余电寿命、视频监测、弧光保护和环境温湿度监测。\n\n## Key Quotes\n> \"抗内部电弧等级高达 AFLR 50 kA/1s\" — V8 开篇方案卖点\n\n> \"PIX开关设备依托于施耐德电气Ecostruxure平台，带来中低压一体化数字化体验\" — 绿色智能章节\n\n## Connections\n- [[PIX]] — 文档核心产品族对象。\n- [[SmartPIX]] — V8 新增/强化的 PIX 智能化解决方案。\n- [[空气绝缘开关设备]] — V8 明确 PIX 是中压空气绝缘开关设备。\n- [[金属封闭开关设备]] — V8 仍以户内交流金属封闭开关设备为标题口径。\n- [[内部电弧防护]] — V8 给出 IAC AFLR 50kA/1s 和 24kV 40kA/1s 的明确参数。\n- [[数字化中压运维]] — V8 把 PIX 接入 EcoStruxure、千里眼资产顾问、边缘控制和预测性维护叙事。\n- [[EcoStruxure]] — V8 把 Smart PIX、千里眼资产顾问和资产健康诊断纳入 EcoStruxure 架构。\n- [[温度智能监测]] — V8 强调自供电嵌入式无线测温技术。\n\n## Contradictions\n- V8 与早期中文 PIX PDF 不是直接冲突，而是更新版/更完整目录。关键更新包括 7.2kV 列、GB/T 3906-2020 与 IEC 62271-200:2021 标准口径、产品尺寸表和更完整的数字化/绿色/特殊应用叙事。\n- V8 与英文 17.5kV PIX 目录的口径仍不同：英文目录聚焦 17.5kV/50kA/4000A 国际版高性能柜，V8 聚焦中国中文综合目录的 7.2/12/24kV 产品族、认证和方案能力。\n",
    "preview": "## Summary 这份 V8 Word 目录是 [[PIX]] 中文综合目录的更新版，文件名标注“修改断路器参数表”，正文则把 PIX 重新组织为面向“数字化中压配电产品”的完整产品族目录。相对较早的中文 PDF，它显著补充了 7.2/12/24kV 主参数表、AFLR 内部电弧等级、Green Premium/PCCC/碳足迹认证、[[EcoStruxure]]/千里眼资产顾问、核电、海事、WMTS 电源切换和 [[SmartPI",

    "id": "sources/pix500-catalogue-armored-metal-enclosed-switchgear",
    "label": "PIX 500 铠装式金属封闭开关设备 产品目录",

    "markdown": "---\ntitle: \"PIX 500 铠装式金属封闭开关设备 产品目录\"\ntype: source\ntags: [pix500, pix, compact-switchgear, armored-switchgear, medium-voltage]\ndate: 2016-11-23\nsource_file: raw/MVE/PIX/PIX550 catalogue-铠装式金属封闭开关设备.pdf\n---\n\n## Summary\n这份来源页最初来自一个文件名包含 “PIX550” 的 PDF 副本，但正文标题和目录均为 [[PIX500]] 铠装式金属封闭开关设备。`2026-06-09` 又补入了一份正确命名为 `PIX500铠装式金属封闭开关设备_中文样本.pdf` 的同版副本，其 PDF 元数据日期为 `2016-11-23`，进一步确认本页应稳定归档为 [[PIX500]] 而非 [[PIX550]]。它介绍的是 [[PIX]] 产品家族中 500mm 柜宽的小型化空气绝缘中压开关柜分支，采用 [[HVX]] 固封式断路器和三工位开关，面向 12kV 三相交流单母线及单母线分段系统。\n\n## Key Claims\n- [[PIX500]] 是最新加入 PIX 产品家族的尺寸最小的 [[空气绝缘开关设备]]，适用于 12kV 三相交流单母线及单母线分段系统。\n- 设备柜宽 500mm，高 2250mm，深 1400mm，重量约 400kg~700kg；后背电缆进出线时柜深可为 1600mm。\n- 开关柜额定电压 12kV、额定频率 50Hz、额定电流 ≤1250A、额定短时耐受电流 ≤31.5kA/4s、额定峰值耐受电流 ≤80kA。\n- [[HVX]] 真空断路器参数为 12kV、额定电流 ≤1250A、额定短时耐受电流 ≤31.5kA/4s、额定短路开断电流 ≤31.5kA、机械寿命 30000 次。\n- PIX500 主回路采用固定联接，配置 HVX 固封式断路器和三工位开关；三工位开关具有工作、隔离、接地位置，状态可在柜前通过观察窗直接看到。\n- 柜体分为仪表室、母线室和电缆室三个独立隔室，隔室间防护等级 IP2X，母线室和电缆室上方设泄压装置。\n- 相比传统 XGN 配电站，目录宣称 PIX500 可减少 30% 配电室土建成本；柜前仅需 1m 维护通道，并可与其他 PIX 系列开关柜直接拼柜。\n- 正确命名的同版副本保留了 `2015` 财年公司介绍口径：`270 亿欧元` 销售额、全球 `16 万名` 员工、中国 `26000 名` 员工、`26` 家工厂、`8` 个物流中心、`5` 个分公司和 `40` 个办事处。\n\n## Key Quotes\n> \"PIX 500铠装式金属封闭开关设备...是最新加入PIX产品家族的尺寸最小的空气绝缘中压成套开关设备。\" — 产品定位\n\n> \"具有气体柜同样的产品结构及柜体尺寸，同时采用空气绝缘，无SF6气体带来的后顾之忧\" — 小型化与环保定位\n\n## Connections\n- [[PIX500]] — 文档核心产品对象。\n- [[PIX]] — PIX500 是 PIX 产品家族的 500mm 小型化分支，可与其他 PIX 系列开关柜直接拼柜。\n- [[PIX550]] — 同属 PIX 小型化分支，但 PIX550 是 550mm 中置式手车方案，PIX500 是 500mm 固定联接主回路 + 三工位开关方案。\n- [[HVX]] — PIX500 配置 HVX 固封式真空断路器。\n- [[空气绝缘开关设备]] — 文档明确 PIX500 是空气绝缘中压成套开关设备，并强调无 SF6。\n- [[金属封闭开关设备]] — 文档标题为铠装式金属封闭开关设备。\n- [[金属铠装开关设备]] — PIX500 采用金属铠装式设计，各功能隔室相对独立。\n- [[内部电弧防护]] — 文档强调母线室和电缆室泄压通道，以及柜间 6mm 空气层降低柜间电弧故障影响。\n\n## Contradictions\n- 现有来源页最初依据一个文件名包含 “PIX550” 的副本建立；`2026-06-09` 补入的正确命名副本 `PIX500铠装式金属封闭开关设备_中文样本.pdf` 与其正文内容同源，且元数据日期为 `2016-11-23`，因此本页继续按 [[PIX500]] 归档，并把日期口径更新为更明确的副本元数据。\n- 与 [[PIX550]] 不冲突：两者参数边界相近，均为 12kV、≤1250A、≤31.5kA 小型化分支，但 PIX550 柜宽 550mm、四隔室、中置式可抽出手车；PIX500 柜宽 500mm、三隔室、主回路固定联接并配置三工位开关。\n",

    "markdown": "---\ntitle: \"PIX550 中置式金属封闭开关设备 产品目录\"\ntype: source\ntags: [pix550, pix, compact-switchgear, metal-enclosed-switchgear, medium-voltage]\ndate: 2016-09-01\nsource_file: raw/MVE/PIX/PIX550 catalogue.pdf\n---\n\n## Summary\n这份目录介绍了 [[PIX550]] 中置式金属封闭开关设备，定位为 [[PIX]] 旗下尺寸最小、面向 12kV 三相交流 50Hz 单母线及单母线分段系统的成套配电设备。它补充了 PIX 产品族中的小型化分支：柜宽 550mm、额定电流不超过 1250A、短时耐受/短路开断能力不超过 31.5kA，主要用于商业及工业建筑、房地产、数据中心和其他有小型化需求的变电场所。`2026-06-09` 补入的 `raw/一次空气绝缘开关柜/PIX550.pdf` 与当前来源文件 `raw/MVE/PIX/PIX550 catalogue.pdf` 的 `SHA256` 完全一致，属于同一 PDF 的重命名副本，不构成新版本层。\n\n## Key Claims\n- [[PIX550]] 是 PIX 旗下尺寸最小的 12kV 中置式 [[金属封闭开关设备]]，配装施耐德电气 [[HVX]] 户内中压固封式真空断路器手车。\n- 外形尺寸为 550mm 宽、2250mm 高、1400mm 深，重量约 400kg~700kg。\n- PIX550 开关柜额定电压 12kV、额定频率 50Hz、额定电流 ≤1250A、额定短时耐受电流 ≤31.5kA/4s，外壳防护等级 IP4X，断路器室门打开时为 IP2X。\n- HVX 真空断路器参数为 12kV、1250A、额定短路开断电流 ≤31.5kA、额定短路电流持续时间 4s、机械寿命 30000 次。\n- 柜体由仪表室、断路器室、母线室和电缆室四个独立隔室组成，除仪表室外，其他三个高压室均设泄压通道。\n- 柜体可提供柜前维护选项，适合背靠背、面对面或靠墙安装，用于进一步减少占地面积。\n- 一次方案覆盖受电/馈电、联络、架空进线、电缆进线+PT、电压测量、母联、隔离、计量+联络等，且主母线电流最大可达 4000A。\n\n## Key Quotes\n> \"PIX550户内交流金属封闭开关设备...是PIX旗下尺寸最小的应用于12kV三相交流50Hz单母线及单母线分段系统的成套配电设备。\" — 产品定位\n\n> \"柜体宽度为550mm时，仅适用于1250A，31.5kA及以下参数，但不影响与其它参数及宽度的PIX直接拼柜。\" — 与 PIX 产品族的拼柜边界\n\n## Connections\n- [[PIX550]] — 文档核心产品对象。\n- [[PIX]] — PIX550 是 PIX 旗下小型化分支，并可与其他参数和宽度的 PIX 直接拼柜。\n- [[HVX]] — PIX550 配装 HVX 户内中压固封式真空断路器手车。\n- [[空气绝缘开关设备]] — PIX550 属于 PIX 空气绝缘中压开关柜路线。\n- [[金属封闭开关设备]] — 标题和正文均采用中置式/户内交流金属封闭开关设备口径。\n- [[金属铠装开关设备]] — 目录说明设备按 GB3906 和 IEC 62271-200 中的铠装式金属封闭开关设备设计。\n- [[内部电弧防护]] — 目录强调高压隔室泄压通道和柜间空气层，但未给出 IAC AFLR 数值。\n\n## Contradictions\n- 与 PIX 中文综合目录不存在冲突；PIX550 是 12kV、550mm、≤1250A、≤31.5kA 的小型化分支，而综合目录中的 PIX-12kV 可覆盖更高额定电流和 50kA，PIX-Gen 可达 6300A/63kA。\n- 与英文 PIX 50kA 目录也不存在直接冲突；英文目录聚焦 17.5kV/50kA/4000A 高性能柜，PIX550 聚焦 12kV 小型化场景。\n- `2026-06-09` 新补入的 `PIX550.pdf` 与现有 `PIX550 catalogue.pdf` 哈希一致：`89AC4FB1D05D96BC0134E866388859FBBA36C99968D857322791D03FA102F2DD`，因此按同版重命名副本处理，而非新增来源页。\n",
    "preview": "## Summary 这份目录介绍了 [[PIX550]] 中置式金属封闭开关设备，定位为 [[PIX]] 旗下尺寸最小、面向 12kV 三相交流 50Hz 单母线及单母线分段系统的成套配电设备。它补充了 PIX 产品族中的小型化分支：柜宽 550mm、额定电流不超过 1250A、短时耐受/短路开断能力不超过 31.5kA，主要用于商业及工业建筑、房地产、数据中心和其他有小型化需求的变电场所。`2026-06-09` 补入的 `raw/",

    "markdown": "---\ntitle: \"PMB Easy 主动运维智能单元 产品简介\"\ntype: source\ntags: [brochure, predictive-maintenance, edge-control]\nsources: []\nlast_updated: 2026-06-03\ndate: 2020-06-15\nsource_file: raw/MCP/PMB Easy样本.pdf\n---\n\n## Summary\n这份样本把 [[PMBEasy]] 从 Smart HVX 方案里的“配套单元”展开成一个独立产品，重点说明它作为 [[SmartHVX]] 站用级边缘控制方案的定位、应用场景、架构形态和硬件规格。相比前面的 Smart HVX 样本与单页方案总览，这份资料补充了 PMB Easy 的单机版/全站版差异、支持的监测对象、与 [[ZBRN32]]、[[Link150]]、[[BMM]] 的协同关系，以及 3.5 英寸、7 英寸、10.1 英寸三种具体型号和安装要求。\n\n## Key Claims\n- [[PMBEasy]] 是施耐德在 [[EcoStruxure]] Power 架构边缘控制层的核心产品，专为 [[SmartHVX]] 智能断路器设计。\n- PMB Easy 的主要能力包括触臂温度监测、配柜状态监测、分合闸线圈监测、储能电机监测以及整体健康趋势分析。\n- 文档明确区分单机版与全站版：单机版是一台 Smart HVX 配一台 PMB Easy，全站版则是一站多台断路器共用一台 PMB Easy。\n- PMB Easy 支持标准测温型和智能型两种 Smart HVX 应用场景，说明它不仅面向全功能智能型，也能服务于较轻量的温度监测方案。\n- 资料给出了具体物料号、屏幕尺寸、接口、电源和安装开孔尺寸，使 PMB Easy 从“方案概念”变成了可选型、可实施的设备。\n\n## Key Quotes\n> “PMB Easy 系列主动运维智能单元专为 Smart HVX 智能断路器而设计。” — 产品定位\n\n> “站室级集中监测，快捷切换不同设备，提高运维效率” — 全站版价值描述\n\n## Connections\n- [[PMBEasy]] — 文档核心对象，覆盖其架构、功能和设备参数。\n- [[SmartHVX]] — PMB Easy 的直接适配对象。\n- [[主动运维]] — PMB Easy 的价值主张围绕状态预警、趋势分析和资产管理展开。\n- [[EcoStruxure]] — PMB Easy 被定位在其边缘控制层。\n- [[ZBRN32]] — 温度监测接入链路中的数据接收器。\n- [[Link150]] — 接入链路中的智能网关。\n- [[BMM]] — 智能型场景中的断路器状态监测单元。\n- [[温度智能监测]] — PMB Easy 支持的基础监测场景。\n- [[配柜智能监测]] — PMB Easy 支持的状态监测场景之一。\n- [[二次元件智能监测]] — PMB Easy 支持的状态监测场景之一。\n\n## Contradictions\n- 与现有 Smart HVX 样本和方案总览总体一致，暂无直接冲突。\n- 这份文档把 PMB Easy 描述为更完整的独立设备，并补充了硬件型号与参数，属于对既有信息的细化而非修正。\n",
    "preview": "## Summary 这份样本把 [[PMBEasy]] 从 Smart HVX 方案里的“配套单元”展开成一个独立产品，重点说明它作为 [[SmartHVX]] 站用级边缘控制方案的定位、应用场景、架构形态和硬件规格。相比前面的 Smart HVX 样本与单页方案总览，这份资料补充了 PMB Easy 的单机版/全站版差异、支持的监测对象、与 [[ZBRN32]]、[[Link150]]、[[BMM]] 的协同关系，以及 3.5 英寸",

    "markdown": "---\ntitle: \"PMB Easy 主动运维智能单元 演示稿\"\ntype: source\ntags: [deck, predictive-maintenance, edge-control]\nsources: []\nlast_updated: 2026-06-03\ndate: 2019-12-01\nsource_file: raw/MCP/PMB Easy样本_Johnson_V1.0.pptx\n---\n\n## Summary\n这份演示稿是 [[PMBEasy]] 产品简介的幻灯片版本，核心内容与已导入的 PDF 样本高度一致，仍然围绕单机版/全站版、标准测温型/智能型场景、以及与 [[ZBRN32]]、[[Link150]]、[[BMM]] 的拓扑关系展开。相比 PDF，它更像一个销售或汇报材料，内容结构更短、更偏演示，但补充了 `2019.12` 的时间标记。\n\n## Key Claims\n- [[PMBEasy]] 依旧被定位为 [[SmartHVX]] 的主动运维智能单元，服务于站用级边缘控制场景。\n- 幻灯片确认了 PMB Easy 的五类核心监测对象：触臂温度、配柜状态、分合闸线圈、储能电机和整体健康趋势。\n- 单机版与全站版的部署方式、以及标准测温型与智能型的拓扑关系，与 PDF 样本保持一致。\n- 这份材料更适合作为已有 PMB Easy 知识的交叉印证，而不是新的独立知识来源。\n\n## Key Quotes\n> “PMB Easy主动运维智能单元” — 演示稿主题\n\n> “建议将PMB Easy设备安装在可打开的柜门，以便操作与后期维护。” — 安装建议\n\n## Connections\n- [[PMBEasy]] — 演示稿核心对象。\n- [[SmartHVX]] — PMB Easy 的适配对象。\n- [[主动运维]] — 演示稿继续强化的价值主张。\n- [[ZBRN32]] — 温度监测接入链路的前端设备。\n- [[Link150]] — 接入链路中的智能网关。\n- [[BMM]] — 智能型状态监测单元。\n\n## Contradictions\n- 与 [[pmb-easy-brochure]] 的主体内容高度一致，暂无直接冲突。\n- 这份演示稿更像对既有 PMB Easy 样本的压缩表达，新增信息有限。\n",
    "preview": "## Summary 这份演示稿是 [[PMBEasy]] 产品简介的幻灯片版本，核心内容与已导入的 PDF 样本高度一致，仍然围绕单机版/全站版、标准测温型/智能型场景、以及与 [[ZBRN32]]、[[Link150]]、[[BMM]] 的拓扑关系展开。相比 PDF，它更像一个销售或汇报材料，内容结构更短、更偏演示，但补充了 `2019.12` 的时间标记。 ## Key Claims",

    "label": "Premset 12 kV紧凑型模块化真空开关设备产品目录",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\premset-12kv-compact-modular-vacuum-switchgear-catalog-2018.md",
    "markdown": "---\ntitle: \"Premset 12 kV紧凑型模块化真空开关设备产品目录\"\ntype: source\ntags: [premset, medium-voltage, switchgear, solid-insulated, catalog]\ndate: 2018-10-01\nsource_file: raw/MVP/Premset/Premset 12 KV紧凑型模块化真空开关设备产品目录.pdf\n---\n\n## Summary\n这份 `SCDOC1738 / 2018.10` 中文目录把 [[Premset]] 从单纯安装对象补充为完整的 `12kV` 中压开关柜产品线。它的核心定位不是传统 [[气体绝缘开关柜]] 或典型 [[空气绝缘开关设备]]，而是“[[屏蔽式固体绝缘]]系统”：以相间绝缘与屏蔽来降低内部故障风险，同时用 `375mm` 标准宽度、`IP67` 主回路、`PM` 金属隔板、`LSC2A` 连续性和 `25kA x 1s A-FLR` 内燃弧防护构成紧凑型模块化真空开关设备方案。\n\n## Key Claims\n- [[Premset]] 被目录定义为 `12kV` 紧凑型模块化真空开关设备，封面副标题为“屏蔽式全绝缘系统”。\n- 主要功能单元包括进线/馈线、母线分段、母线提升、线路保护、母线 `PT` 柜，以及计量和测量单元；典型柜型包括 `D06H`、`D12H`、`I06T`、`I12H`、`G06`、`G12`、`M06S`、`M06A`、`M12S`、`M12A`。\n- 基础额定参数为 `12kV`、`50/60Hz`、母线电流 `630A / 1250A`，额定雷电冲击耐受电压 `75kV`，隔离断口间 `85kV`。\n- 额定短时耐受电流和持续时间给出 `20kA x 4s`、`25kA x 3s`、`25kA x 4s`、`31.5kA x 4s` 多种口径。\n- 断路器开断能力为 `E2` 级：`12kV 25kA 50次` 或 `12kV 31.5kA 30次`；容性电流开断能力为 `C2` 级 `12kV 25A`。\n- 机械寿命口径包括断路器 `M2级 10000次`、负荷开关 `10000次`、接地开关 `3000次`。\n- 目录强调所有具备 [[屏蔽式固体绝缘]] 的开关、断路器和计量单元宽度均为 `375mm`（`630A`），空气绝缘计量单元和进线计量单元为 `750mm` 宽；系统深度 `1135mm`，电缆联接高度 `700mm`。\n- 根据 `IEC 62271-200` 第2版和 `GB 3906-2006`，Premset 每个隔室都经过内燃弧测试，给出 `25kA x 1s A-FLR` 的四周防护口径，并记录 `20kA` 和 `25kA` 内燃弧型式试验。\n- 运行条件页给出 `PM` 金属隔板、`LSC2A` 运行连续性、外壳 `IP3X`、隔室之间 `IP2X`、主回路和所有高压部件 `IP67`（`M06A` 计量柜除外）、`IK07`。\n- 环境适应性口径包括 `5000m` 以下无需额外预防措施、`-25℃ ~ +40℃` 常规运行、可选到 `+65℃`，以及“浸水后可连续服务 `48小时`（仅限固体绝缘柜型）”。\n- 联接章节强调带 [[屏蔽式固体绝缘]] 技术（`2SIS`）的电缆与母线接口“完全免维护和免维修”，并通过通用扁平联接系统支持前下、后上、后下等多种布置。\n- 电缆测试章节说明无需操作主开关或拆除电缆接头即可直接测试主回路电缆，并提供专用测试设备与五防联锁逻辑。\n- 技术附录给出底部/顶部泄压两种内燃弧布置方式，以及 `≥100mm` 靠墙距离、最小电缆沟深度和柜体固定要求。\n\n## Key Quotes\n> \"Premset屏蔽式固体绝缘技术提供了相间的绝缘和屏蔽，因此显著降低了内部故障的风险\" — 技术路线定位\n\n> \"Premset，25 kA x 1 s A-FLR\" — 内燃弧防护口径\n\n## Connections\n- [[Premset]] — 文档核心产品对象。\n- [[屏蔽式固体绝缘]] — Premset 的核心绝缘与联接技术路线。\n- [[金属封闭开关设备]] — 目录引用 `IEC 62271-200` 和 `GB 3906-2006` 的交流金属封闭开关设备标准口径。\n- [[内部电弧防护]] — 目录给出 `25kA x 1s A-FLR`、顶部/底部泄压和靠墙安装条件。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 未发现与已入库 `PREMSET Installation instructions IP41 option` 的直接冲突；安装说明只补充 `IP41`、`C/C-MAX` 和排气方向，而本目录提供的是完整产品参数与技术路线，两者应并行理解。\n",
    "preview": "## Summary 这份 `SCDOC1738 / 2018.10` 中文目录把 [[Premset]] 从单纯安装对象补充为完整的 `12kV` 中压开关柜产品线。它的核心定位不是传统 [[气体绝缘开关柜]] 或典型 [[空气绝缘开关设备]]，而是“[[屏蔽式固体绝缘]]系统”：以相间绝缘与屏蔽来降低内部故障风险，同时用 `375mm` 标准宽度、`IP67` 主回路、`PM` 金属隔板、`LSC2A` 连续性和 `25kA x 1",

    "markdown": "---\ntitle: \"Premset 12kV紧凑型模块化真空开关设备产品目录 2020\"\ntype: source\ntags: [premset, medium-voltage, switchgear, solid-insulated, catalog]\ndate: 2020-06-01\nsource_file: raw/MVP/Premset/Premset 样本 2020.pdf\n---\n\n## Summary\n这份 `SCDOC1783 / 2020.06` 中文产品目录是当前 [[Premset]] 资料链中更新的一版正式样本。它延续 `2018.10` 目录对 [[屏蔽式固体绝缘]]、`12kV`、`630/1250A` 和 `25kA x 1s A-FLR` 的工程口径，同时明显加强了数字化配电自动化叙事，补入 `Easergy T300`、`SMD`、`Easergy P3/P5`、`Sepam`、`VIP 400/410`、`TH110-R`、`Flair 22D/23DM` 等当前施耐德命名体系下的在线监测与配网自动化配置。\n\n## Key Claims\n- 封面将 Premset 定义为“`12kV` 紧凑型模块化真空开关设备 / 屏蔽式全绝缘系统 / 产品目录”，末页文档号为 `SCDOC1783`，日期为 `2020.06`。\n- 目录延续 Premset 的核心参数口径：`12kV`、`50/60Hz`、`630A / 1250A`、`20kA x 4s`、`25kA x 3s`、`25kA x 4s`、`31.5kA x 4s`，以及断路器 `E2` 级 `25kA 50次` 或 `31.5kA 30次`。\n- 文档继续给出 `25kA x 1s A-FLR` 的内部电弧口径，并明确顶部或底部泄压两种实现方式、靠后墙至少 `100mm` 的安装边界，以及底部泄压所需的电缆沟条件。\n- 目录把 Premset 的智能化方案扩展成完整架构：通信网络可采用无线广播、`2G/4G`、光纤以太网，系统覆盖故障指示、智能电表、保护继电器、开关监控、综合管理单元和后备电源管理。\n- `Easergy T300` 被写成分布式模块化智能配电终端，支持 `IEC 60870-101/104`、`MODBUS` 和 `IEC 61850`，面向馈线自动化、负荷管理、资产管理和双电源/发电机/母联备投。\n- 智能设备清单补入 `SMD`、`Easergy P3/P5`、`Sepam`、`VIP 400/410`、`Flair 22D/23DM`、`SC110/150/160`、`HU250`、`PS100/PS50`、`TH110/TH110-R/CL110`、`VPIS`、`VD23`、`EcoStruxure Power Device` 和 `eSetup Easergy Pro`。\n- 目录比 `2018.10` 更清楚地解释了柜型编码：`I` 为负荷开关柜，`D` 为断路器柜，`G` 为直连或提升柜，`M` 为计量柜；`06` 代表 `630A`，`12` 代表 `1250A`，`T` 代表 `CIT` 机构，`H` 代表 `OCO` 机构；`M` 柜末位 `A` 代表空气绝缘，`S` 代表固体绝缘。\n- 结构页补充了嵌入式电流互感器、模块化母线系统、集成空气绝缘接地开关、前插电缆连接、内燃弧泄压通道、可选母线电压互感器 `LVPT`，以及无线无源温度传感器 `TH110-R`。\n- 环境与安装边界比 `2018.10` 更完整：总高度 `1550mm~2195mm`，`630A` 固体绝缘单元标准宽度 `375mm`，部分 `1250A` 与空气绝缘计量/进线计量单元为 `750mm`；系统深度 `910mm`、`1135mm` 或 `1251mm` 取决于是否带内燃弧通道和后进线方案。\n- 目录明确给出外壳防护等级 `IP4X`，并注明 `IP32~IP42` 可按配置定制；还补充 `IEC 62271-210 0.33g`、`ASCE 7-10 / IBC 2012 / CBC 2013 / ICC-ES AC156 等级3` 抗震口径，以及 `IEC 60068-2-52` 严酷等级 5、4 周期、28 天盐雾口径。\n- 文档延续并正式写出“浸水后可连续服务 `48小时`（仅限固体绝缘柜型）”“`5000m` 以下无需额外预防措施”“`5000m` 以上每升高 `1000m` 绝缘降容 `10%`”等特殊环境应用边界。\n- 目录补充了海事 `DNV-GL` 应用认证，以及商业楼宇、工业、配电网络、中低压环网、中压分布式电源、水务、管廊、电网核心供电区域等更细应用场景。\n\n## Key Quotes\n> \"屏蔽式全绝缘系统\" — 封面技术定位\n\n> \"支持 IEC 60870-101/104、MODBUS 和 IEC61850\" — `Easergy T300` 通信能力说明\n\n## Connections\n- [[Premset]] — 这份目录把 Premset 从 `2018` 的工程参数页进一步扩展到 `2020` 版智能化样本。\n- [[屏蔽式固体绝缘]] — 目录继续把 Premset 放在 `2SIS` / 屏蔽式全绝缘技术路线下。\n- [[数字化中压运维]] — `Easergy T300`、`SMD`、`Flair`、`TH110-R` 等配置把 Premset 明确接入施耐德数字化配电叙事。\n- [[内部电弧防护]] — 文档补充 `25kA x 1s A-FLR`、顶/底排弧和土建安装边界。\n- [[施耐德电气]] — 文档体现施耐德 `2020` 时点下的 Premset 产品命名体系与智能化能力矩阵。\n\n## Contradictions\n- 与 `2018.10` 的 [[Premset]] 目录没有直接冲突；`2020.06` 版延续了核心电气参数和 [[屏蔽式固体绝缘]] 路线，但明显强化了数字化与应用场景叙事，可视为更新版本而不是替代完全不同产品。\n- 与 `2012.06` 的 `Premset 产品手册` 相比，`2020.06` 版不再只是“智能电网就绪”的高层宣传，而是落到 `Easergy T300`、`SMD`、`TH110-R`、`Flair 22D/23DM` 等具体设备名和通信协议。\n",
    "preview": "## Summary 这份 `SCDOC1783 / 2020.06` 中文产品目录是当前 [[Premset]] 资料链中更新的一版正式样本。它延续 `2018.10` 目录对 [[屏蔽式固体绝缘]]、`12kV`、`630/1250A` 和 `25kA x 1s A-FLR` 的工程口径，同时明显加强了数字化配电自动化叙事，补入 `Easergy T300`、`SMD`、`Easergy P3/P5`、`Sepam`、`VIP 40",

  {
    "id": "sources/premset-ip41-option-installation-instructions-2017",

    "path": "wiki\\sources\\premset-ip41-option-installation-instructions-2017.md",
    "markdown": "---\ntitle: \"PREMSET Installation instructions IP41 option\"\ntype: source\ntags: [premset, installation, ip41, schneider-electric]\ndate: 2017-12-08\nsource_file: raw/MVP/Premset/PHA2386701_REV01_FAD_PREMSET-IP41(web).pdf\n---\n\n## Summary\n这份 `12` 页英文资料不是产品目录，而是 [[Premset]] 的 `IP41 option` 安装说明。它不提供额定电压、电流或绝缘路线参数，核心信息集中在 `C` / `C-MAX` 柜型、顶部/底部排气版本、`IP41` 附件包构成、装配步骤、柜列连续性处理和现场安全要求上。\n\n## Key Claims\n- 文档封面标题为 `PREMSET Installation instructions EN IP41 option`，封面写 `PHA2386701_REV00`，末页写 `PHA2386701 révision : 01`，文件名则含 `REV01`，说明当前来源存在版本标识差异。\n- `IP41` 选件覆盖四种配置：`C cabinet – Bottom Exhaust`、`C-MAX cabinet – Bottom Exhaust`、`C cabinet – Top Exhaust`、`C-MAX cabinet – Top Exhaust`。\n- 文档特别注明顶部排气配置 `Top Exhaust` 仅适用于 `Internal Arc outside the room version`。\n- 套件部件包括 `support assembly`、`horizontal roof`、`vertical roof`、`horizontal end-of-table banners`、`vertical end-of-table banners` 以及配套螺钉包和塑料铆钉。\n- 安装过程分为 `S0 Preliminary step`、`S1 Preparation before assembly`、`S2 Assembly`，并单独给出 `Continuity of switchboard` 步骤。\n- 拆下的自攻螺钉、`HM6x16 screws`、`CS washers` 和 `grooved flanged nuts` 在装配中会被重复利用，文档还明确要求所有拆下的螺钉回收。\n- 安全页要求使用符合 `NFPA 70E` 或 `CSA Z462` 的安全作业规范，只允许合格电气人员安装和维护，并在作业前切断电源、验电、恢复门盖后再送电。\n- 文档要求进行柜体停电/隔离操作时查阅操作手册 `P7M18009`。\n- 末页给出 Schneider Electric 服务中心支持范围，包括工程与技术支持、投运、培训、预防性与纠正性维护、改造和备件服务。\n\n## Key Quotes\n> \"Top Exhaust* *Nota : only for Internal Arc outside the room version\" — 顶部排气适用范围\n\n> \"Consult the Operating Manual P7M18009\" — 停电隔离参考手册\n\n## Connections\n- [[Premset]] — 文档核心产品对象。\n- [[施耐德电气]] — 文档发布与服务主体。\n- [[内部电弧防护]] — 顶部排气配置明确与 `Internal Arc outside the room version` 相关。\n\n## Contradictions\n- 当前未发现与现有 wiki 产品参数直接冲突；这份资料属于安装说明，信息边界显著窄于产品目录或标准，不应拿来推断 [[Premset]] 的完整额定参数。\n",
    "preview": "## Summary 这份 `12` 页英文资料不是产品目录，而是 [[Premset]] 的 `IP41 option` 安装说明。它不提供额定电压、电流或绝缘路线参数，核心信息集中在 `C` / `C-MAX` 柜型、顶部/底部排气版本、`IP41` 附件包构成、装配步骤、柜列连续性处理和现场安全要求上。 ## Key Claims",
    "group": 0,

  {
    "id": "sources/premset-product-brochure-2012",
    "label": "Premset 产品手册",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\premset-product-brochure-2012.md",
    "markdown": "---\ntitle: \"Premset 产品手册\"\ntype: source\ntags: [premset, medium-voltage, switchgear, solid-insulated, brochure]\ndate: 2012-06-01\nsource_file: raw/MVP/Premset/Premset 产品手册.pdf\n---\n\n## Summary\n这份 `2012.06` 的中文产品手册是当前 [[Premset]] 资料链中更早的一份市场与方案型资料。与 `2018.10` 工程目录相比，它更少强调完整功能单元表和工程序列，更突出 Premset 作为新一代中压配电技术的定位：通过 [[屏蔽式固体绝缘]]（`2SIS`）融合 `AIS` 与 `GIS` 经验，为智能电网、前置电缆联接、低维护、无 `SF6` 和紧凑化改造场景提供卖点叙事。\n\n## Key Claims\n- 手册把 Premset 描述为“中压配电领域的创新”，强调其在设计、安装和控制方面提升配网运行可靠性。\n- 文档明确写出 Premset 融合空气绝缘开关设备（`AIS`）和气体绝缘开关设备（`GIS`）的产品开发经验，形成固体绝缘并屏蔽技术 `2SIS`。\n- 智能电网相关叙事明显早于后续目录：资料强调馈线自动化、集成智能计量、监控资产管理、集成电源投切方案、本地控制、远程控制以及标准通信协议的智能电子设备架构。\n- 手册强调 `2SIS` 适用于所有功能单元，包括负荷开关或断路器单元、紧凑型计量单元和 `PT` 单元。\n- 资料把主回路与大气完全隔离、不含 `SF6`、降低内部燃弧风险、免维护和全寿命周期可靠运行作为核心卖点。\n- 模块化设计页强调统一柜体结构、即插即用附件与辅件、现场升级便利、系列紧凑型断路器功能单元，以及低压室/电缆测试/顶部母排连接/核心单元/底部母排连接/电缆隔室的模块划分。\n- 手册给出紧凑化口径：占地面积可减少 `50%`，标准电缆联接在前方对齐且高度 `700mm`，也可采用顶部-前方、底部-后方、顶部-后方等布置。\n- 手册宣称“使用寿命增加 `30%`”，原因是“不使用加压气体”，并强调产品使用寿命结束时更容易处理。\n- 安全页突出三工位一体开关，把开断、隔离和接地集成到统一的负荷开关或隔离断路器中，并说明电缆测试可从前方通过专用接地棒完成，无需进入电缆隔室。\n- 技术特点页给出一组较简化的参数口径：`12kV`、额定母排电流 `630A`、额定短路开断电流 `25kA`、额定峰值电流 `65kA`、`75/85kV` `BIL`、`42/48kV` 工频耐受、外壳 `IP3X`，以及尺寸 `375 x 1600 x 900 mm (1000mm)`。\n- 文档给出当时的施耐德全球规模宣传口径：全球 `110000` 员工、年销售额约 `200` 多亿欧元量级、每年 `4-5%` 销售收入用于研发、全球运行中压功能单元超过 `4000000`。\n\n## Key Quotes\n> \"结合空气绝缘开关设备（AIS）和气体绝缘开关设备（GIS）的产品开发经验，开发出固体绝缘并屏蔽技术（2SIS）\" — 技术来源定位\n\n> \"由于不含六氟化硫，所以不用担心气体泄漏的问题\" — 环保与运维卖点\n\n## Connections\n- [[Premset]] — 文档核心产品对象。\n- [[屏蔽式固体绝缘]] — 手册对 `2SIS` 技术来源、优点和适用单元给出更早的宣传口径。\n- [[数字化中压运维]] — 手册补充馈线自动化、智能计量、资产监控、本地/远程控制和智能电网就绪叙事。\n- [[内部电弧防护]] — 手册从“降低内部燃弧风险”和三工位一体安全操作角度补充 Premset 安全卖点。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 与 `2018.10` 的 [[Premset]] 工程目录不存在直接冲突；这份 `2012.06` 手册更偏市场和方案叙事，参数明显更简化，应与后续正式目录配合使用，而不是替代工程选型口径。\n",
    "preview": "## Summary 这份 `2012.06` 的中文产品手册是当前 [[Premset]] 资料链中更早的一份市场与方案型资料。与 `2018.10` 工程目录相比，它更少强调完整功能单元表和工程序列，更突出 Premset 作为新一代中压配电技术的定位：通过 [[屏蔽式固体绝缘]]（`2SIS`）融合 `AIS` 与 `GIS` 经验，为智能电网、前置电缆联接、低维护、无 `SF6` 和紧凑化改造场景提供卖点叙事。 ## Key C",

    "markdown": "---\ntitle: \"WS-G 交流气体绝缘金属封闭开关设备 企业标准\"\ntype: source\ntags: [standard, switchgear, gas-insulated, medium-voltage]\ndate: 2015-11-30\nsource_file: raw/MVE/WSG/Q320500KSGA09-2015 WSG (002)-企标.pdf\n---\n\n## Summary\n这份企业标准规定了 [[WSG]] 交流 [[气体绝缘开关柜]] 的制造、试验、检验、包装、运输、使用和存储要求。它把 WS-G 定义为用于接收和分配网络电能的户内 [[金属封闭开关设备]]，覆盖 50Hz、12kV~40.5kV 的单母线、双母线或母线分段系统，并给出关键额定参数、密封气室、内部电弧、型式试验、出厂试验和型号编制要求。\n\n## Key Claims\n- WS-G 适用于额定频率 50Hz、额定电压 12kV~40.5kV 的户内交流气体绝缘金属封闭开关设备。\n- 标准依据 GB 3906-2006 制定，并修改采用 IEC 62271-200:2003；同时引用 GB 1984、GB 1985、GB/T 11022、GB/T 12022、GB/T 13540、GB/T 20138 和 JB/T 8754-2007 等标准。\n- 开关柜主母线额定电流覆盖 630A、800A、1250A、1600A、2000A、2500A、3150A 和 4000A，馈线额定电流覆盖 630A~2500A。\n- 主回路额定短时耐受电流/持续时间覆盖 25/4、31.5/4、40/4 kA/s；40.5kV 等级还给出 25/4、31.5/4、40/3 kA/s 口径。\n- 充气箱防护等级为 IP65，开关柜防护等级为 IP4X、IP5X、IK07；运行连续性类别为 LSC2A。\n- 20℃相对压力下，SF6 额定充气压力按电压/电流段从 0.03MPa 到 0.06MPa；年漏气率要求不超过 0.1%。\n- 局部放电量要求为 `<20pC` 或 `<100pC`：主回路有支柱式电流互感器时执行 `<100pC`，其他方案执行 `<20pC`。\n- 开关柜配置真空断路器和具备隔离/接地功能的开关，且均具有人力操作和电动操作功能。\n- 母线隔室和断路器隔室均充 SF6，电缆隔室为可触及隔室，其他隔室为不可触及隔室。\n- 每一充气隔室应设置带温度补偿的 SF6 密度监视装置，具备低气压报警和最低功能压力报警；开关柜还应配置高压带电显示装置。\n- 内部电弧防护通过足够绝缘距离/绝缘覆层、可靠联锁、阻燃绝缘材料、压力释放装置和压力释放通道实现，内部电弧耐受能力可选 AFLR。\n- 型式试验强制项目包括绝缘、回路电阻、温升、短时/峰值耐受、防护等级、密封、EMC、断路器关合开断、机械操作、气室压力与气体状态、低温、内部电弧、局部放电和电缆试验回路绝缘等。\n- 每台开关柜出厂前必须完成规定的出厂试验，包括主回路绝缘、辅助/控制回路绝缘、主回路电阻、密封、设计和外观检查、局部放电、机械操作和接线正确性检查。\n- 附录给出通用型号 `WS-G□-□-□/□` 和国内型号 `KGN23-40.5(Z)(G)/T□-□(WS-G)`，并定义额定电压、电流、短路开断电流和双母线派生标志代码。\n\n## Key Quotes\n> \"本标准适用于WS-G交流气体绝缘金属封闭开关设备\" — 适用范围\n\n> \"每台开关柜必须进行全部项目的出厂试验\" — 出厂检验要求\n\n## Connections\n- [[WSG]] — 本标准的直接设备对象。\n- [[施耐德电气]] — 标准发布主体为施耐德开关(苏州)有限公司，属于施耐德中压开关设备资料链。\n- [[气体绝缘开关柜]] — WS-G 属于 SF6 气体绝缘柜路线，覆盖 12kV~40.5kV。\n- [[金属封闭开关设备]] — 标准依据 GB 3906/IEC 62271-200 的金属封闭开关设备框架组织。\n- [[气室监测]] — 标准明确每个充气隔室的 SF6 密度监视、低气压报警和最低功能压力报警。\n- [[内部电弧防护]] — 标准把压力释放、联锁和 AFL/AFLR 内部电弧耐受能力纳入设计与试验要求。\n- [[HVX]] — 标准要求配置真空断路器；它与既有 HVX 40.5kV 断路器资料形成柜体/断路器层面的互补。\n\n## Contradictions\n- 未发现与现有 wiki 的直接冲突。需要注意的是，WS-G 企业标准覆盖 12kV~40.5kV 和 4000A 主母线，而既有 [[GMA]] 页面主要来自产品目录，偏 12/24kV 紧凑一次配电口径；二者应视为不同产品/标准口径，不宜直接合并参数。\n",
    "preview": "## Summary 这份企业标准规定了 [[WSG]] 交流 [[气体绝缘开关柜]] 的制造、试验、检验、包装、运输、使用和存储要求。它把 WS-G 定义为用于接收和分配网络电能的户内 [[金属封闭开关设备]]，覆盖 50Hz、12kV~40.5kV 的单母线、双母线或母线分段系统，并给出关键额定参数、密封气室、内部电弧、型式试验、出厂试验和型号编制要求。 ## Key Claims",

  {
    "id": "sources/qavxm-031-2024-wsg-enterprise-standard",
    "label": "WS-G 交流气体绝缘金属封闭开关设备 企业标准 2024",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\qavxm-031-2024-wsg-enterprise-standard.md",
    "markdown": "---\ntitle: \"WS-G 交流气体绝缘金属封闭开关设备 企业标准 2024\"\ntype: source\ntags: [standard, switchgear, gas-insulated, medium-voltage]\ndate: 2024-07-01\nsource_file: raw/MVE/WSG/QAVXM 031-2024 WS-G 交流气体绝缘金属封闭开关设备 企业标准 20240626 2.pdf\n---\n\n## Summary\n这份 2024 年企业标准以 `Q/AVXM 031-2024` 编号发布，规定了 [[WSG]] 交流 [[气体绝缘开关柜]] 的制造、试验、检验、包装、运输、使用和存储要求。它延续了 WS-G 作为 50Hz、12kV~40.5kV 户内交流 [[金属封闭开关设备]] 的定位，但把标准体系更新到 GB/T 3906、GB/T 11022 等新版引用口径，并细化了 3150A、[[IDIS]] 压力阈值、零表压绝缘试验、电缆试验回路和出厂海拔试验要求。\n\n## Key Claims\n- 标准发布主体为施耐德电气(厦门)开关设备有限公司，发布日期为 2024-07-01，实施日期为 2024-07-21。\n- 本文件依据 GB/T 3906 制定，并修改采用 IEC 62271-200:2011；引用 GB/T 11022 时对应 IEC 62271-1:2017 口径。\n- WS-G 仍适用于额定频率 50Hz、额定电压 12kV~40.5kV 的单母线、双母线或母线分段系统。\n- 正常使用海拔不超过 1000m；特殊使用条件下海拔不超过 5500m。\n- 开关柜主母线额定电流和馈线额定电流均覆盖 630A、800A、1250A、1600A、2000A、2500A 和 3150A。\n- 开关柜主回路额定短时耐受电流/持续时间覆盖 25/4、31.5/4、40/4 kA/s；接地回路列出 21.8/2、27.4/2、34.8/2 kA/s。\n- 充气箱防护等级为 IP65，开关柜防护等级为 IP4X、IP5X、IK07；运行连续性类别为 LSC2A。\n- 20℃相对压力下，SF6 额定充气压力按电压/电流段为 0.03MPa、0.05MPa 或 0.06MPa；年漏气率要求不超过 0.1%。\n- 标准在低气压报警/最低功能压力条款中新增 [[IDIS]] 阈值注释，例如 0.015MPa、0.03MPa 和最低功能压力 0.01MPa 的 IDIS 口径。\n- 电缆试验回路的绝缘试验电压按 12kV、24kV 和 40.5kV 分别给出 AC 与 DC 组合试验要求。\n- 标准新增零表压绝缘试验条目，12kV、24kV、40.5kV 分别给出 5min 工频耐压和雷电冲击峰值口径。\n- 断路器和操动机构额定电流覆盖 630A~3150A；满容量开断次数为 31.5kA 下 50 次、40kA 下 30 次。\n- 断路器额定单个电容器组开断电流为 630A，并新增额定背对背电容器组开断电流 400A。\n- 隔离开关和接地开关额定电流覆盖 630A~3150A，母线转换电流开合能力为 1600A，表中标注试验电压为 10V。\n- 结构上延续真空断路器、隔离/接地功能开关、SF6 充气母线/断路器隔室、压力释放装置和带温度补偿的 SF6 密度监视装置。\n- 出厂试验要求中，对 2000m 以上至 5500m 海拔安装的开关柜，辅助/控制回路出厂工频耐压可采用 3.35kV/1s。\n- 附录 A 保留通用型号 `WS-G□-□-□/□`，额定电流代码最高到 `31` 即 3150A；附录 B 规定出厂断路器位于分位、弹簧未储能，三工位开关位于接地位。\n\n## Key Quotes\n> \"本文件适用于WS-G交流气体绝缘金属封闭开关设备\" — 适用范围\n\n> \"海拔不超过5500m\" — 特殊使用条件\n\n## Connections\n- [[WSG]] — 本标准更新了 WS-G/KGN23 的企业标准口径。\n- [[施耐德电气]] — 发布主体变为施耐德电气(厦门)开关设备有限公司。\n- [[气体绝缘开关柜]] — WS-G 继续属于 SF6 气体绝缘柜路线。\n- [[金属封闭开关设备]] — 标准依据 GB/T 3906 与 IEC 62271-200 组织。\n- [[气室监测]] — 新版标准将 [[IDIS]] 压力阈值写入低气压报警/最低功能压力注释。\n- [[内部电弧防护]] — 新版标准继续保留 AFL 内部电弧耐受能力和可选 AFLR。\n- [[IDIS]] — 2024 版标准第一次在 WS-G 企业标准页中明确出现 IDIS 低气压报警和最低功能压力注释。\n\n## Contradictions\n- 与 2015 版 [[WSG]] 企业标准相比，2024 版没有显式写明“代替”关系，但在发布主体、引用标准、特殊海拔、最高额定电流、温升试验电流、出厂耐压和部分开合能力参数上存在版本差异。后续引用 WS-G 参数时应优先标注标准版本，不能把 2015 版的 4000A 主母线口径和 2024 版的 3150A 口径混用。\n",
    "preview": "## Summary 这份 2024 年企业标准以 `Q/AVXM 031-2024` 编号发布，规定了 [[WSG]] 交流 [[气体绝缘开关柜]] 的制造、试验、检验、包装、运输、使用和存储要求。它延续了 WS-G 作为 50Hz、12kV~40.5kV 户内交流 [[金属封闭开关设备]] 的定位，但把标准体系更新到 GB/T 3906、GB/T 11022 等新版引用口径，并细化了 3150A、[[IDIS]] 压力阈值、零表压绝",

    "id": "sources/rm-airset-eco-gas-insulated-ring-main-unit-2020",

    "markdown": "---\ntitle: \"RM AirSeT环保气体绝缘环网柜\"\ntype: source\ntags: [rm-airset, ring-main-unit, gas-insulated, eco-gas, medium-voltage, catalog]\ndate: 2020-07-01\nsource_file: raw/MVP/RMAirSeT/RM AirSeT环保气体绝缘环网柜0728.pdf\n---\n\n## Summary\n这份 `2020.07` 中文资料把 [[RMAirSeT]] 定位为施耐德 RM 路线中的环保气体 [[气体绝缘开关柜]] / 环网柜分支。它不是 [[GMAirSeT]] 那种一次配电平台，也不能简单视作 [[RM6SeT]] 的改名版本；更稳妥的理解是施耐德在 `12kV` 二次配电 RMU 场景下并行布局的一条 `GWP < 1` 环保气体绝缘、真空灭弧路线。资料同时把 `Easergy T300`、`PMBOX`、`PD110`、`TH110-R`、`VT/LPVT`、`CT/LVCT` 等数字化配置直接写入产品叙事，说明环保气体路线也已经与主动运维和配网自动化结合。\n\n## Key Claims\n- [[RMAirSeT]] 面向 `12kV` 中压二次配电场景，采用环保气体绝缘和真空灭弧，封面强调 `GWP < 1`、全生命周期碳足迹降低和不燃。\n- 核心开断与操作结构包括三工位负荷开关、负荷开关-熔断器组合电器、`V/B` 真空断路器、接地开关和母线隔离，且提到 `SVI` 并联真空开断技术。\n- 功能单元体系明确写为 `C / F / V / B`，并补充 `PT`、计量柜和母联等扩展对象。\n- 柜列支持 `1~6` 功能单元自由组合，扩展代号为 `NE / LE / RE / DE`，显示它延续的是 RMU 平台化组合逻辑。\n- 技术参数页给出 `12kV`、`50Hz`、工频耐受 `42/48kV`、雷电冲击 `75/85kV`、额定短路开断电流 `20kA`、额定短时耐受 `20kA / 4s`、峰值耐受 `50kA`。\n- 内部电弧能力写为 `A-FLR 20kA 1s`，防护等级写为 `IP4X / IP67`。\n- 气体年泄漏率给为 `≤0.025%`，额定充气压力给为 `0.4 bar`，并配置气压表。\n- 额定电流与寿命口径包括：`C` 单元 `630A`、`F` 单元 `125A`、`V/B` 单元 `630A`；`C/F` 机械寿命 `5000` 次，`V/B` 机械寿命 `10000` 次，`V/B` 短路开断次数 `30` 次。\n- 文档给出 `O - 0.3s - CO - 180s - CO` 自动重合闸顺序，以及 `F` 单元 `1750A` 转移电流。\n- 典型尺寸显示单元柜约 `420mm x 850mm (780mm 可选) x 2000mm`，带 `350mm` 低压室；部分一二次融合/PT 柜为 `600mm x 850mm (780mm 可选) x 2000mm`。\n- 使用环境口径为 `-25℃ ~ +40℃`、湿度 `95% / 24h`、`90% / 1 month`、常规海拔 `1000m`，更高海拔需咨询施耐德。\n- 数字化章节直接列出 `Easergy T300`、`Modbus`、`HMI`、`PMBOX`、`PD110`、`TH110-R`、`VT/LPVT`、`CT/LVCT`，并围绕实时感知、状态监测、资产预警和预测性资产管理组织卖点。\n\n## Key Quotes\n> \"GWP < 1\" — 封面对环保气体路线的核心口径。\n\n> \"最多6功能单元，自由组合\" — 柜列组合能力概述。\n\n## Connections\n- [[RMAirSeT]] — 资料核心产品对象。\n- [[RM6]] — 同属施耐德 RM 路线，补出环保气体分支。\n- [[RM6SeT]] — 同属 RMU / GIS 路线，但不是同一目录对象。\n- [[GMAirSeT]] — 都属于施耐德环保气体路线，但一个偏二次配电 RMU，一个偏一次配电平台。\n- [[气体绝缘开关柜]] — 资料属于 `12kV` 环网柜 / GIS 路线。\n- [[数字化中压运维]] — `Easergy T300`、`PMBOX`、`PD110`、`TH110-R` 等配置把环保气体 RMU 纳入数字化运维叙事。\n- [[内部电弧防护]] — 技术参数明确给出 `A-FLR 20kA 1s`。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 与 [[GMAirSeT]] 不构成直接冲突；两者更适合视为施耐德环保气体路线在一次配电与二次配电环网柜上的不同平台。\n- 与 [[RM6SeT]] 也不应处理为简单新旧替代关系：[[RMAirSeT]] 这份 `2020.07` 资料强调 `12kV`、`C/F/V/B`、`NE/LE/RE/DE` 和环保气体 `GWP < 1`，更像 RM 路线中的平行技术分支。\n",
    "preview": "## Summary 这份 `2020.07` 中文资料把 [[RMAirSeT]] 定位为施耐德 RM 路线中的环保气体 [[气体绝缘开关柜]] / 环网柜分支。它不是 [[GMAirSeT]] 那种一次配电平台，也不能简单视作 [[RM6SeT]] 的改名版本；更稳妥的理解是施耐德在 `12kV` 二次配电 RMU 场景下并行布局的一条 `GWP < 1` 环保气体绝缘、真空灭弧路线。资料同时把 `Easergy T300`、`PM",

    "markdown": "---\ntitle: \"RM6 24 kV Medium Voltage Distribution Catalogue 2012\"\ntype: source\ntags: [rm6, ring-main-unit, gas-insulated, medium-voltage, catalog, schneider-electric]\ndate: 2012-04-27\nsource_file: raw/二次气体绝缘开关柜/RM6/RM6.pdf\n---\n\n## Summary\n这份 `76` 页英文正式目录把 [[RM6]] 明确写成 `24 kV` 中压配电用 `Ring Main Unit`，是当前知识库里 RM6 路线最早可确认的正式目录层。它不是现有 `2018` 中文演示稿的英文翻版，也不是同目录下另一份中文 PDF 的同版副本，而是带有 `AMTED398032EN / 05-2012` 尾标、覆盖工程边界、远方控制和安装连接的独立产品目录。\n\n## Key Claims\n- 封面写有 `RM6 24 kV Medium Voltage Distribution`、`Catalogue | 2012` 和 `Ring Main Unit`，PDF 元数据创建时间为 `2012-04-27`，尾标为 `AMTED398032EN / 05-2012`。\n- 目录结构覆盖 `Presentation`、`The RM6 range`、`Unit characteristics`、`Network remote control`、`Accessories`、`MV connection`、`Installation` 和 `Order form`，说明它是正式目录层而不是简报或手册。\n- 文档把 RM6 作为 `sealed pressure system` 路线来描述，强调带电主回路位于密封 `SF6` 气箱内，并保留环保回收与“寿命期内无需常规补气”的叙事。\n- 工程分类中给出 `PM class`，并把 continuity 口径区分为断路器/负荷开关 `LSC2B` 与熔断器组合 `LSC2A`。\n- 内部电弧能力写为 `A-FL up to 20 kA 1 s on request`；若配置 `LRU`，资料还给出 `AFLR 20 kA 1 s` 的扩展口径。\n- 主要功能体系已经形成较成熟骨架：`I / B / D / Q / IC / BC / O / Mt`，其中含 `630 A` 线路断路器、`200 A` 变压器馈线断路器、组合熔断器开关和中压计量单元。\n- `Network remote control` 章节已正式纳入 `Automatic transfer systems`、bus tie coupling、source changeover 和 generator override，不是到 `2018` 才首次出现。\n- 自动投切控制器明确写成 `Easergy T200 I`，并给出 `TR < 2 s`、`T1 100 ms~60 s`、`T2 5 s~300 s`、`T3 100 ms~3 s` 这组时序参数。\n- 附件与保护链路已经包含 `VPIS`、`VDS`、`Flair`、`VIP 40`、`VIP 400`、`Fusarc CF`、motorization 和 key locking，说明 RM6 早期正式目录就已具备较完整的继保与自动化生态。\n- 安装与连接部分补充了 wall mounting、带熔断器变电站 `1200 mm` 顶部空间、气体泄压到底部或后部，以及可分离电缆头和避雷器接入边界。\n- 目录还单列 `DNV` marine application 页面，说明 RM6 在 `2012` 正式目录中已存在海事应用口径。\n\n## Key Quotes\n> \"Ring Main Unit\" — 封面产品类型定义\n\n> \"Automatic transfer systems\" — 远方控制章节的正式主题\n\n## Connections\n- [[RM6]] — 当前知识库中 RM6 路线最早可确认的正式目录层\n- [[自动投切]] — `Automatic transfer systems` 与 `Easergy T200 I` 说明相关能力早于 `2018` 中文演示稿\n- [[气体绝缘开关柜]] — 体现 RM6 作为二次配电 GIS / RMU 的早期正式工程口径\n- [[施耐德电气]] — 作为施耐德 RMU 产品族的英文正式目录来源\n\n## Contradictions\n- 与 [[rm6-offer-presentation-life-is-on-201801update]] 不冲突；`2012` 目录偏正式工程与安装边界，`2018` 演示稿偏装机规模、Smart RMU 和中国市场场景化叙事。\n- 与同目录下另一份中文 `RM6SF6绝缘环网柜和紧凑性开关柜产品目录` 不是同版副本；两者哈希不同，应保留为不同时间层的 RM6 来源。\n",
    "preview": "## Summary 这份 `76` 页英文正式目录把 [[RM6]] 明确写成 `24 kV` 中压配电用 `Ring Main Unit`，是当前知识库里 RM6 路线最早可确认的正式目录层。它不是现有 `2018` 中文演示稿的英文翻版，也不是同目录下另一份中文 PDF 的同版副本，而是带有 `AMTED398032EN / 05-2012` 尾标、覆盖工程边界、远方控制和安装连接的独立产品目录。 ## Key Claims",
    "group": 2,
    "value": 15
  },
  {
    "id": "sources/rm6-o-cable-branch-box-brochure-2008",
    "label": "RM6-O 电缆分支箱 产品简介",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\rm6-o-cable-branch-box-brochure-2008.md",
    "markdown": "---\ntitle: \"RM6-O 电缆分支箱 产品简介\"\ntype: source\ntags: [rm6-o, cable-branch-box, gas-insulated, medium-voltage, schneider-electric, brochure]\ndate: 2008-12-10\nsource_file: raw/二次气体绝缘开关柜/RM6/RM6-O电缆分支箱.pdf\n---\n\n## Summary\n这份 `8` 页中文折页把 [[RM6O]] 明确写成施耐德 `3~24kV` 的 `SF6` 绝缘电缆分支箱，是当前知识库里 RM6 路线最早可确认的分支箱产品资料。它不是环网柜整柜目录，而是基于 `RM6-I` 与 `RM6-O` 模块、面向电缆分支与扩展出线场景的独立产品简介。\n\n## Key Claims\n- 封面写有 `RM6-O系列电缆分支箱` 与 `3至24kV`，PDF 元数据创建时间为 `2008-12-10`，尾标为 `SCDOC723-MV / 2008.12`。\n- 文档把 RM6-O 定位为替代配网架空线大量分支接线的一种经济、可靠、维护方便方案，并明确写为 `SF6` 绝缘电缆分支箱。\n- 正常环境条件按 `IEC60694` 的户内开关装置口径给出：环境温度 `-40℃~40℃`，海拔 `≤1000m`，高于 `1000m` 需咨询。\n- 电气参数覆盖 `12kV` 与 `24kV`：额定电流 `630A`，`12kV` 额定开断电流 `20/25kA`、短时耐受 `25kA`，`24kV` 额定开断电流 `20kA`、短时耐受 `20kA`，关合电流峰值分别到 `50/63kA` 与 `50kA`。\n- 结构上采用 `1~4` 个集成化紧凑功能单元和 `1` 个不锈钢 `SF6` 金属封闭气室，将 `RM6-I` 与 `RM6-O` 模块永久密封在额定压力 `1.2Bar` 的气室内。\n- 文档明确写出运行设计寿命超过 `30` 年，所有带电部件免维护，并满足 IEC 对 `sealed pressure system` 的定义。\n- 产品可做一进二出、三出或更多出线；出线较多时可通过主母线扩展附件扩展，但扩展后主母线额定电流不能超过 `630A`。\n- 每路进出线均可接双电缆，每路均配置电压指示器；还可选装 `Flair 22D` 电缆故障指示器、单孔或三孔底板。\n- 每路进线可选装电动操作和辅助接点，预留配网自动化接口；电缆出线与负荷开关之间可选装机械联锁以保障运行和检修安全。\n- 安装页补充了不可扩展、右扩展和双扩展外形尺寸，地面安装、靠墙安装、`260/520mm` 升高座，以及考虑内燃弧能力时向后部或下部泄压的土建边界。\n\n## Key Quotes\n> \"RM6-O系列电缆分支箱\" — 封面产品命名\n\n> \"所有的带电部件免维护，性能满足IEC标准中规定的“密封压力系统”的定义。\" — 结构特点页核心口径\n\n## Connections\n- [[RM6O]] — 资料核心产品对象\n- [[RM6]] — RM6 模块架构向电缆分支箱方向延伸的早期分支\n- [[电缆分支箱]] — 本资料引入的产品类别\n- [[施耐德电气]] — 资料所属厂商\n\n## Contradictions\n- 与 [[rm6-24kv-medium-voltage-distribution-catalog-2012]] 不冲突；这份 `2008.12` 折页偏电缆分支箱应用、扩展与土建安装边界，`2012` 目录偏 RMU 正式工程目录。\n- 与 [[rm6-offer-presentation-life-is-on-201801update]] 不冲突；`RM6-O` 不是整柜演示稿中的全部 RM6 平台，而是其中更早、偏分支箱的一条产品分支。\n",
    "preview": "## Summary 这份 `8` 页中文折页把 [[RM6O]] 明确写成施耐德 `3~24kV` 的 `SF6` 绝缘电缆分支箱，是当前知识库里 RM6 路线最早可确认的分支箱产品资料。它不是环网柜整柜目录，而是基于 `RM6-I` 与 `RM6-O` 模块、面向电缆分支与扩展出线场景的独立产品简介。 ## Key Claims",
    "group": 0,
    "value": 12
  },
  {
    "id": "sources/rm6-offer-presentation-life-is-on-201801update",
    "label": "RM6 12~24kV 气体绝缘环网柜",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\rm6-offer-presentation-life-is-on-201801update.md",
    "markdown": "---\ntitle: \"RM6 12~24kV 气体绝缘环网柜\"\ntype: source\ntags: [rm6, ring-main-unit, gas-insulated, medium-voltage, presentation]\ndate: 2018-05-09\nsource_file: raw/MVP/RM6/RM6 offer presentation_Life is ON_201801update.pptx\n---\n\n## Summary\n这份 `68` 页中文演示稿系统介绍了 [[RM6]] 作为施耐德 `12~24kV` [[气体绝缘开关柜]] / 环网柜产品线的定位、柜型、功能单元、安全边界和配网自动化扩展。它的独特价值不只在 `630A / 20kA` 这一基础参数口径，而在于把 `ATS`、`T200C`、`Easergy T300`、`Flair 22D/23DV`、`VD23`、`VPIS` 和 `Smart RMU` 组合成一条完整的中压二次配电自动化叙事。\n\n## Key Claims\n- 封面将 RM6 定义为 `12~24kV` 气体绝缘环网柜，文件元数据显示最后修改时间为 `2018-05-09`。\n- 演示稿称 RM6 已在全球 `50` 多个国家应用超过 `1,700,000` 个功能单元，并以“20 多年不断发展”强调其成熟度。\n- 主要技术参数给出两档基础口径：`12kV` / `24kV`，负荷开关、联络开关和电缆提升单元额定电流 `630A`，`Q`、`D` 变压器馈线保护单元额定电流 `200A`。\n- 绝缘水平为 `12kV` 对地工频 `42kV`、断口 `48kV`、冲击 `95/110kV`；`24kV` 对地工频 `65kV`、断口 `79kV`、冲击 `125/145kV`。\n- 防护等级为 `IP4X`；额定短时耐受电流及持续时间为 `12kV 20kA 4s`、`24kV 20kA 3s`；内部燃弧能力给出 `20kA 1s`。\n- 文档把 RM6 描述为全绝缘、紧凑型方案，强调中压带电部件位于不锈钢 `SF6` 气箱内，可触摸，年泄漏率 `<0.01%`，并引用 `IPX7 20kV` 水下通电 `30` 分钟的耐水试验口径。\n- 结构页给出密封气室、母线、主接地母线、机构和附件室、低压母线槽、安全防爆膜和电缆室等构成。\n- 安全相关卖点包括可视接地、动态模拟指示、天然联锁、防误操作、中压电缆测试和自供电保护断路器单元；另有“通过专用试验棒施加 `42kV 15分钟` 直流耐压试验”的操作口径。\n- 功能单元体系覆盖 `I / IC` 负荷开关与联络开关、`B / BC / D` 断路器单元、`Q` 熔断器组合电器、`Mt` 中压计量和 `O` 电缆提升。\n- 断路器单元强调 `630A` 联络和线路保护、`200A` 变压器馈线保护、自供电保护、重复开断、远程控制和通过嵌入式断路器实现“两步从合闸位到接地位”的操作简化。\n- 保护装置页给出 `VIP45`、`VIP400`、`VIP410` 和 `Sepam` 系列，其中 `VIP410` 支持双电源供电、灵敏接地保护、`Modbus RS485` 通信和远程控制。\n- 柜型页称 RM6 有 `58` 种标准柜型、`>30` 种紧凑不可扩展和紧凑可扩展选择，`1~5` 个功能单元可组合；另有 `2` 功能和 `3` 功能自由组合柜，配置数量可达 `600`。\n- 文档给出针对轨道交通的不可扩展共箱方案 `NE-IQI+T` 等，强调 PT 布置优化、柜宽不增加和现场安装工作量降低。\n- 附件与自动化页补入 `VD23` 终端电压检测、`VPIS/VDS`、`Flair 22D/23DV` 故障指示器、电流数字显示表、电操机构、程序锁、电缆室门连锁、进线/母联闭锁、电磁锁和压力开关。\n- `ATS` 章节给出双电源、发电机和母联自动投切场景，宣称投切时间 `<10s`，并强调 `RM6-NRM` 机械加电气双重联锁、现场手动优先、故障闭锁、`RS485` 与以太网三遥。\n- `T200C` 被写为双电源自动投切关键设备；`Smart RMU` 章节则把 RM6 扩展到 `Easergy T300`、低功耗电压/电流传感器、温湿度传感器、`TH110`、`wifi`、`Webserver`、`101/104`、`GPRS/2G/3G`、UHF 局放和移动运维体系。\n\n## Key Quotes\n> \"在全球各地的中压二次配电系统中应用有 1’700’000 多个功能单元的 RM6\" — 成熟度与装机量口径\n\n> \"保证供电高可靠性\" — `ATS` 自动投切章节的核心价值表述\n\n## Connections\n- [[RM6]] — 文档核心产品对象。\n- [[气体绝缘开关柜]] — RM6 属于施耐德 `12~24kV` 二次配电气体绝缘环网柜路线。\n- [[自动投切]] — 演示稿用较大篇幅展开 `ATS`、`RM6-NRM` 和 `T200C` 方案。\n- [[数字化中压运维]] — `Smart RMU`、`Easergy T300`、低功耗传感器、局放和移动运维构成数字化扩展层。\n- [[内部电弧防护]] — 文档给出 `20kA 1s` 内部燃弧能力、安全泄压阀门和操作联锁。\n- [[施耐德电气]] — RM6 所属公司与解决方案体系。\n\n## Contradictions\n- 与当前已入库的 [[FBX]] 路线没有直接冲突；二者都落在施耐德中压二次配电 [[气体绝缘开关柜]] 范围内，但 RM6 这份 `2018` 演示稿更突出环网柜、自动投切和 `Smart RMU` 叙事，而 FBX 资料更偏 `24kV` 及以下、`630A/20kA`、`FBX-C/FBX-E` 的目录化产品族表达。\n",
    "preview": "## Summary 这份 `68` 页中文演示稿系统介绍了 [[RM6]] 作为施耐德 `12~24kV` [[气体绝缘开关柜]] / 环网柜产品线的定位、柜型、功能单元、安全边界和配网自动化扩展。它的独特价值不只在 `630A / 20kA` 这一基础参数口径，而在于把 `ATS`、`T200C`、`Easergy T300`、`Flair 22D/23DV`、`VD23`、`VPIS` 和 `Smart RMU` 组合成一条完整的",

    "markdown": "---\ntitle: \"RM6-S 操作说明书\"\ntype: source\ntags: [rm6-s, ring-main-unit, gas-insulated, medium-voltage, manual]\ndate: 2021-02-01\nsource_file: raw/MVP/RM6-S/RM6-S 操作说明书.pdf\n---\n\n## Summary\n这份 `RM6-S` 中文《操作说明书》不是产品目录，而是一份面向运行、操作与维护的 `12kV` [[气体绝缘开关柜]] 说明书。它把 [[RM6S]] 放在更早期的 `RM6` 路线中，重点讲 `OE / I / Q / B / IC` 功能单元的手动/电动操作、[[机械联锁]]、可视接地、`Flair2XD`、`VPIS-V2`、`T200I`、`VD23`、电缆试验和 `SF6` 压力维护边界，而不是像后续 [[RM6SeT]] 目录那样提供完整产品族参数表。\n\n## Key Claims\n- 封面标题为 `RM6-S 气体绝缘金属封闭开关设备 / SF6 Gas-Insulated Switchboards 12kV / 操作说明书`，说明文档对象是 `12kV` RM6-S。\n- 页脚与末页给出 `SAS0.463.171-00`、`AMTNoT132-02` 和侧边 `SAS0.463.171-00 (2021/2)` 口径，表明这是一份较晚修订仍沿用较早模板的运维文件；正文同时保留 `© 施耐德电气 2010` 版权标识。\n- 目录说明文档主体不是参数总览，而是运行维护结构：服务说明、关于说明书的说明、联锁、操作附件、`OE / I / Q / B / IC` 功能单元操作、电动操作、可视接地、`Flair2XD`、`VPIS-V2`、`T200I`、`VD23`、维护、备件、电缆试验、`SF6` 气体特性和寿命终结。\n- 文档明确要求操作前细读说明书，并说明这里只描述设备不带电安装态或禁止操作状态下的操作；操作人员必须经过安全培训并佩戴适当防护装置。\n- 联锁章节单独区分 `Q`、`B` 和 `IC` 功能单元，说明 RM6-S 的运行安全高度依赖机械联锁而不是仅靠操作经验。\n- `OE / I / Q / B / IC` 五类功能单元都有独立操作章节，说明 RM6-S 采用的是比 `2018` RM6 演示稿和 `2022/2025` RM6 SeT 目录更早的一套功能代号体系。\n- `B` 功能单元操作页显示断路器合闸/分闸与隔离开关合闸/分闸之间存在明确顺序关系，并支持可选按钮或电动操作分闸。\n- 电动操作章节区分可选电动操作机构、带电动控制的应急手动操作，以及不同功能单元的手动接地开关分闸方法。\n- 文档设有“可视接地”专章，说明 RM6-S 把接地可见性作为专门操作对象，而不只是接地状态指示。\n- `Flair2XD` 章节把 `Flair 21D / 22D / 23DV` 作为故障电流指示模块引入 RM6-S；资料说明 `21D` 可由传感器自供电，而 `22D / 23DV` 可接入 `VPIS-V2` 带电指示输出并需要 `24Vdc~48Vdc` 外部供电。\n- `Flair2XD` 的 CT 与中压电缆连接页给出安装边界：电缆长度 `3m` 以下、电缆截面积 `1.5mm²` 以下，并要求 `MF1 CT` 三个 CT 安装方向一致且接地编织电缆穿过 CT 内。\n- `VPIS-V2` 章节说明其内置 `3` 个指示灯，符合 `IEC 61958`；但手册明确警告：单独由 `VPIS-V2` 提供的电压指示不能确认系统已经失电。\n- 同一章节说明 `VPIS-V2` 还提供与核相器连接的触点，核相器型号给为 `V2-VPI62421`。\n- `VD23` 章节把它定义为电压检测继电器，输入来自 `VPIS-V2`，外部供电为 `24V` 或 `48V` 直流；它支持自动校准、过电压/欠电压检测和相序检测，并通过 `R1 / R2` 继电器与时间延迟参数工作。\n- `T200I` 章节不是产品宣传，而是界面、检测与控制原理和功能测试手册；页面显示其测试覆盖数字输入、数字输出和模拟输入，说明 RM6-S 已有比较明确的二次控制接入边界。\n- 电缆试验章节给出“母线通电时使用插入式三通接头进行电缆试验”的步骤，包括安装测试适配器、下压联锁滑片模拟电缆室门解锁、打开接地开关、执行试验和恢复使用。\n- 同一章节特别警告：在这种电缆试验操作条件下，负荷开关不再受联锁保护；电缆室门和负荷开关之间可选增加附加联锁机构。\n- `SF6` 章节说明绝缘气体符合 `GB/T 12022`，每台设备包含一个按 `GB 3906` 充气并设计为气密密封压力系统的气箱，正常工作寿命期内不需要再补充充气。\n- 手册给出 `20℃` 时相对充气压力 `0.03 MPa`、绝对压力 `0.13 MPa` 的口径，并展示普通温度补偿压力表和海拔超过 `1000m` 的专用压力表。\n- 压力表触点动作阈值表给出 `20℃` 下高阈值 `250 ± 30 mbar`、低阈值 `140 + 50 mbar`。\n- `RM6-S` 开关柜只有在压力表指针位于与环境温度对应的绿色区域内时，才能操作负荷开关；指针落入红色区域时需联系施耐德代表。\n- 文档反复强调安全禁令：不能在有压力的气箱上冲孔、不要试图打开气箱、不要在没有专用工具和专业人员时回收 `SF6`。\n- “设备寿命的终结”章节给出样例 `RM6-S-NE I-I-Q (12kV - 630A)` 的退役评估，并在材料再分配表中列出总重 `310.392 kg`、其中金属部分 `275.991 kg / 88.92%`、`SF6 2.450 kg / 0.79%`，显示这份说明书兼顾了寿命期末回收边界。\n\n## Key Quotes\n> \"单独由VPIS-V2提供的电压指示不能确保系统是否失电。\" — 带电显示边界\n\n> \"在20℃时相对充气压力是0.03 MPa (0.13 MPa绝对值)\" — RM6-S 气箱工作压力口径\n\n## Connections\n- [[RM6S]] — 文档核心对象。\n- [[RM6]] — RM6-S 可视为 RM6 路线中更早、且更偏 `12kV` 运维手册口径的分支。\n- [[气体绝缘开关柜]] — RM6-S 属于 `SF6` 密封压力系统的 `12kV` 气体绝缘金属封闭路线。\n- [[机械联锁]] — 手册把不同功能单元联锁和电缆试验中的联锁边界写得很具体。\n- [[数字化中压运维]] — `Flair2XD`、`VPIS-V2`、`T200I`、`VD23` 构成 RM6-S 较早期的故障检测、带电显示和二次控制层。\n- [[施耐德电气]] — 文档所属公司。\n\n## Contradictions\n- 与 `2018` 年 [[RM6]] 演示稿、`2022/2025` 年 [[RM6SeT]] 目录并不直接冲突，但资料层级完全不同：RM6-S 是 `12kV` 运维说明书，后两者是产品宣传或工程目录，不能拿本手册的窄口径去覆盖后续产品族参数。\n- RM6-S 的功能代号体系为 `OE / I / Q / B / IC`，明显不同于 `2018` RM6 演示稿的 `I / IC / B / BC / D / Q / Mt / O` 和 `RM6 SeT` 的 `C / F / V / D / PT / Cr / Vr / M`。这更像版本与平台演进，而不是简单名称缩写差异。\n",

    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018.md",
    "markdown": "---\ntitle: \"RM6-S/RM6-S Plus 中压配电 12 kV 以下气体绝缘开关设备 产品目录\"\ntype: source\ntags: [rm6-s, rm6-s-plus, ring-main-unit, gas-insulated, medium-voltage, catalog, schneider-electric]\ndate: 2018-10-15\nsource_file: raw/二次气体绝缘开关柜/RM6 Plus/RM6-S Plus-中压配电24 kV 以下气体绝缘开关设备.pdf\n---\n\n## Summary\n这份 `48` 页中文 PDF 是 [[RM6S]] 与 [[RM6SPlus]] 的正式产品目录层，不是现有 `2021` [[RM6S]] 操作说明书的重复件，也不是 [[RM6SeT]] 的早期改名版本。它带有 `SCDOC1739 / 2018.10` 尾标，系统区分了 `630A` 侧扩的 `RM6-S` 与 `1250A` 顶扩的 `RM6-S Plus`，因此更适合被视为 RM6 路线中一条独立的 `12kV` 二次配电 GIS 分支资料链。\n\n## Key Claims\n- 封面写有 `RM6-S/RM6-S Plus 中压配电 12 kV 以下气体绝缘开关设备` 与 `产品目录`，PDF 元数据显示创建时间 `2018-10-15`、修改时间 `2018-10-15`。\n- 末页尾标为 `SCDOC1739 / 2018.10`，说明它是正式目录层而不是操作手册、培训稿或演示稿。\n- 公司页保留 `2017` 财年施耐德口径：`247 亿欧元`、全球 `14.2 万` 员工、中国 `17000+` 员工、`23` 家工厂、`8` 个物流中心、`9` 个分公司和 `37` 个办事处。\n- 简介页把 `RM6-S/RM6-S Plus` 定义为 `12kV` 以下的中压开关柜，覆盖 `630A / 1250A`、`20kA / 25kA / 31.5kA`，面向公共配电、工业、基础设施和可再生能源场景。\n- 文档强调高压导电部分位于不锈钢 `SF6` 气箱中，主回路 `30` 年寿命、寿命期内免维护且无需补气，工作连续性为 `LSC2A`。\n- 运行条件页给出 `-5℃ ~ +40℃`、可选 `-25℃`、最大安装海拔 `1000m`、`+20℃` 时额定压力 `0.03 MPa`、柜体 `IK07`，并注明可选防浸式方案通过 `24 kV 50 Hz` 水下 `24` 小时试验。\n- 内部电弧等级页给出 `RM6-S/RM6-S Plus` 的 `AFL 16/20/25/31.5kA 1s` 与 `AF/AFL` 计量单元边界，说明这条路线在 `2018` 已有多档内部电弧能力。\n- `RM6-S` 侧重 `I / Q / B / O / IC / B/CB / M` 这组 `630A` 级功能体系，并保留 `O - 0.3s - CO - 180s - CO` 的快速自动重合闸顺序。\n- `RM6-S Plus` 被明确定义为 `RM6-S` 的升级版：额定电流从 `630A` 提升到 `1250A`，柜间拼接从侧部扩展改为顶部扩展。\n- `RM6-S Plus` 的主功能单元写为 `CB / B / G / CBBr / M / PT`，其中 `CB` 为 `1250A 31.5kA` 进线/出线真空断路器单元，`B` 为 `630A 25kA` 线路与变压器保护单元，`CBBr` 为 `1250A` 断路器母联单元。\n- `RM6-S Plus` 目录明确给出顶部拼柜套管、普通电缆连接 `CB-C` 与固体母线连接 `CB-B` 两种电缆室方案，以及 `PT` 可位于母线任意位置的配置边界。\n- 可扩展性页说明 `RM6-S` 通过侧部扩展口连接新增功能单元，且两台 `RM6-S` 柜之间的母线连接由特有 [[ALink]] 装置实现；`RM6-S Plus` 则通过顶部扩展真空连接和特定固体母线装置拼柜。\n- 同一页还明确：`RM6-S` 扩展安装需预留大于 `450mm` 额外空间，而 `RM6-S Plus` 扩展无需额外安装空间。\n- 远程控制页把远方控制等级正式写成 `0~4` 五级，并列出电话线调制解调器、无线电和 `GSM` 网络等通信实现。\n- 附件与保护页说明 `RM6-S` 可装配 `MiCOM P114S`、`SEG WIC1` 等自供电保护继电器；`RM6-S Plus` 则以 `Sepam40` 作为 `CB` 进线柜标准配置、`Sepam20` 作为 `B` 出线柜标准配置。\n\n## Key Quotes\n> \"RM6-S Plus是RM6-S的升级版，额定电流从630A提升到1250A，侧部扩展变为顶部扩展\" — `RM6-S Plus` 在产品族中的直接定位\n\n> \"RM6-S和RM6-S Plus在安装和扩展连接时无需任何气体处理\" — 目录对扩展边界的正式表述\n\n## Connections\n- [[RM6S]] — 构成 RM6-S 从目录层到运维手册层的资料链\n- [[RM6SPlus]] — 该目录中新增明确对象\n- [[RM6]] — 属于 RM6 路线下更窄、更偏 `12kV` 的二次配电 GIS 分支\n- [[ALink]] — 目录明确把它用于 `RM6-S` 侧部扩展\n- [[气体绝缘开关柜]] — 体现 `12kV` 二次配电 GIS 的另一条产品分支\n- [[施耐德电气]] — 文档所属公司与目录发布主体\n\n## Contradictions\n- 与 [[rm6-s-operation-maintenance-instructions-2021]] 不冲突；`2021` 文档是运行维护手册，这份 `2018.10` 文档是正式产品目录，资料层级不同。\n- 与 [[rm6-set-medium-voltage-switchgear-catalog-2022]] 不冲突；`RM6-S Plus` 是 `2018` 时点独立的 `12kV` 目录分支，而 `RM6SeT` 是后续 `24kV` 及以下、更工程化的另一条产品族目录。\n- 文件名写成“`24 kV 以下`”，但封面、目录和正文核心定义反复写成“`12 kV 以下`”；当前应以封面和正文口径为主，同时保留文件名差异。\n",

    "markdown": "---\ntitle: \"RM6 SeT 中压开关柜\"\ntype: source\ntags: [rm6-set, ring-main-unit, gas-insulated, medium-voltage, catalog]\ndate: 2022-02-01\nsource_file: raw/MVP/RM6 SeT/ECATA1138 RM6 SeT中压开关柜.pdf\n---\n\n## Summary\n这份 `ECATA1138 / 2022.02` 中文产品目录把 [[RM6SeT]] 定义为施耐德 `24kV` 及以下中压二次配电 [[气体绝缘开关柜]] / 环网柜方案。与已入库的 `2018` 年 [[RM6]] 演示稿相比，它更像正式工程目录：补全了 `IP67` 气箱、`IP43` 电缆室、`IK07`、`40` 年寿命、`A-link` 扩展、`1~6` 功能共箱、`C/F/V/D/PT` 功能体系、`Easergy P1` 保护和 `PD110/TH110-R/CL110/SMD/Easergy T300` 数字化方案。\n\n## Key Claims\n- 封面把产品定义为 `SeT` 系列 `RM6 SeT` 中压开关柜，副标题为“`24kV` 及以下气体绝缘开关设备”，末页文档号为 `ECATA1138 2022.02D0214`。\n- 目录强调主回路 `40` 年以上使用寿命、寿命期内免维护、开关柜在寿命期内无需补气，`3mm 304` 不锈钢气箱保证极低气体泄漏率。\n- 文档将 RM6 SeT 描述为“鲁棒性设计、全能型架构、数字化”，强调适用于恶劣环境、紧凑型设计、三工位负荷开关、双电源自动切换、闭环配电网和自动重合闸。\n- 资料称施耐德已有超过 `180` 万台中压气体绝缘开关柜在 `150` 多个国家和地区运行，并把 RM6、FBX、GMA、GHA、MCSet/F400 和 `Easergy T300` 放入同一历史演进图谱。\n- RM6 SeT 可实现 `1~6` 功能共箱，并支持不可扩展 `NE`、左扩 `LE`、右扩 `RE` 和双扩 `DE`；扩展通过 [[ALink]] 实现，扩展时无须气体处理、无须特殊工具、无须特殊地基准备。\n- 对自由组合的限制写得更明确：`PT` 电压互感器柜和 `M` 计量柜只能单元式、不能共箱，只能通过可扩展 RM6 SeT 连接。\n- 主要一次功能体系包括 `C` 三工位负荷开关、`F` 负荷开关-熔断器组合电器、`V` 真空断路器、`D` 提升柜和 `PT` 辅助电源/母线电压测量柜。\n- 基础绝缘参数为 `12kV / 24kV`，相间及对地工频耐受 `42 / 65kV`，断口工频 `48 / 79kV`，雷电冲击 `75/95 / 125kV`，断口冲击 `85/110 / 145kV`。\n- 母线额定电流为 `630A`，短时耐受电流 `20kA`，持续时间 `4/2s`，额定峰值耐受电流 `50kA`。\n- 外壳与隔室防护边界比旧 `RM6` 演示稿更完整：气箱 `IP67`，电缆室 `IP43`，机构室 `IP4X`，低压间 `IP4X`，隔室间 `IP2X`，机械冲击等级 `IK07`。\n- 内部电弧一栏写明基础型为“未分类”，同时提供 `A FL` 与 `A FLR 20kA 1s` 口径，说明 `IAC A-FLR` 是可选项而不是所有基础柜型默认分类。\n- `C` 功能负荷开关页给出 `M2` 级 `5000` 次机械寿命、`E1/E2/E3` 开断等级、`C1/C2` 容性电流开断重击穿等级，以及接地开关 `3000` 次延长机械寿命。\n- `F` 功能熔断器组合电器页给出 `31.5kA` 开断能力，转移电流 `12kV 1750A`、`24kV 1000A`，并注明可选 `1200A`。\n- `V` 功能真空断路器页给出 `20kA` 开断能力、`M2 10000` 次机械寿命、`E2` 电寿命、分闸/跳闸时间 `<40ms`、合闸时间 `<60ms`，以及 `O - 0.3s - CO - 3 min - CO` 自动重合闸顺序。\n- 保护页把 `VIP40/45/400/410` 与 `Easergy P1` 并列，说明 RM6 SeT 已不只依赖早期 VIP 路线，还可接入更完整的 `Easergy P1` 保护 IED。\n- 数字化页补入 `Easergy T300`、`VT/LPVT`、`CT/LVCT`、`TH110-R`、`PD110`、`CL110`、`PS100/PS50` 和 `SMD`，并接入 [[EcoStruxure]]、`Asset Advisor`、`ADMS`、`Substation Operation` 等架构。\n- 目录明确 `Easergy T300` 支持 `IEC 60870-101/104`、`MODBUS`、`IEC61850` 和 `IEC61131-3` 自动化逻辑，兼容电脑、手机和移动终端运维。\n- 安装页给出更正式的尺寸口径：单功能 `C/D` 柜宽可到 `375mm`，`V/F/PT420` 常见宽度 `420mm`，`PT600` 宽 `600mm`；最大 `6` 功能共箱，总宽可到 `2170mm`，深度 `750mm`。\n- 土建页给出到后墙 `≥20mm`、不可扩展侧面到墙 `≥30mm`、可扩展侧面到墙 `≥450mm`、到屋顶 `≥100mm` 等安装边界，并补充防内燃弧站房的天花板高度和泄压条件。\n\n## Key Quotes\n> \"主回路具有40年以上使用寿命，寿命期内免维护\" — 产品寿命期定位\n\n> \"Easergy T300可分布式安装于RM6 SeT环网柜中\" — 一二次融合与数字化卖点\n\n## Connections\n- [[RM6SeT]] — 文档核心产品对象。\n- [[RM6]] — RM6 SeT 是当前 wiki 中 RM6 路线的更新一代正式目录口径。\n- [[气体绝缘开关柜]] — RM6 SeT 属于施耐德 `24kV` 及以下二次配电 GIS / RMU 路线。\n- [[ALink]] — 目录明确以 `A-link` 作为侧面扩展连接结构。\n- [[自动投切]] — 文档把 ATS、闭环配电和自动重合闸放入正式产品能力范围。\n- [[数字化中压运维]] — `Easergy T300`、`PD110`、`TH110-R`、`CL110`、`SMD` 组成完整状态监测与运维架构。\n- [[内部电弧防护]] — 文档给出可选 `A FLR 20kA 1s`、安全阀和底部泄压安装边界。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 与 `2018` 年 [[RM6]] 演示稿没有直接冲突；`RM6 SeT` 目录可以看作 RM6 路线更正式、更工程化的一版资料。两者共通点是 `12~24kV`、`630A`、`20kA` 级二次配电 GIS / RMU 口径，但 `RM6 SeT` 更强调 `1~6` 功能共箱、`A-link` 扩展、`IP67/IP43/IK07`、`Easergy P1` 和完整 [[EcoStruxure]] 数字化方案。\n- 与现有 [[FBX]] 相比，二者都属于施耐德中压二次配电 GIS，但 RM6 SeT 更偏环网柜与自由组合/扩展平台，FBX 更偏 `FBX-C / FBX-E` 产品族和 `LSC2A` 目录表达。\n",

    "markdown": "---\ntitle: \"RM6 SeT 中压开关柜 2025\"\ntype: source\ntags: [rm6-set, ring-main-unit, gas-insulated, medium-voltage, catalog]\ndate: 2025-02-01\nsource_file: raw/MVP/RM6 SeT/ECATA1138 RM6 SeT中压开关柜20250211.pdf\n---\n\n## Summary\n这份 `ECATA1138 / 2025.02` 中文目录是 [[RM6SeT]] 的后续修订版，不是已入库 `2022.02` 目录的简单重命名。它保留了主回路 `40` 年寿命、`3mm 304` 不锈钢气箱、`IP67/IP43/IK07`、`1~6` 功能共箱、[[ALink]] 扩展以及 `Easergy P1`、`Easergy T300`、`PD110/TH110-R/CL110/SMD/PS100/PS50` 这套数字化架构，同时把 `Cr / Vr / M` 模块更明确地写进功能与参数页，并在部分 `12kV` 表格中出现了 `25kA` 短时耐受和 `63kA` 峰值耐受口径。\n\n## Key Claims\n- 末页文档号更新为 `ECATA1138 2025.02D0214`，说明这是 `2022.02D0214` 之后的目录修订版。\n- 目录继续把 RM6 SeT 定位为 `24kV` 及以下气体绝缘开关设备，保留“鲁棒性设计、全能型架构、数字化”主叙事。\n- 主回路 `40` 年寿命、寿命期内免维护、无需补气、`3mm 304` 不锈钢气箱、三工位负荷开关、安全阀和 `Digital logbook` 二维码等核心卖点继续保留。\n- `1~6` 功能共箱、`NE / LE / RE / DE` 扩展方式和通过 [[ALink]] 侧扩且无需气体处理的实现方式继续保留。\n- 与 `2022.02` 版相比，功能/模块说明页把 `Cr` 负荷开关母线柜、`Vr` 断路器母线柜和 `M` 计量柜更明确地列入目录结构，而不再只围绕 `C / F / V / D / PT` 展开。\n- `M` 计量柜在新版中有独立模块位置，说明 `M` 不再只是“不能共箱”的约束性备注，而是被提升为更明确的选型对象。\n- 新版仍给出 `PT` 和 `M` 柜只能单元式、不能共箱、只能通过可扩展 RM6 SeT 连接的边界，因此自由组合规则没有被放宽。\n- 新版继续保留 `Easergy P1` 在核心元件和附件章节中的位置，说明保护路线仍是 `VIP40/45/400/410 + Easergy P1` 并行。\n- 数字化章节继续覆盖 `Easergy T300`、`VT/LPVT`、`CT/LVCT`、`TH110-R`、`PD110`、`CL110`、`SMD` 和 `PS100/PS50`，说明 RM6 SeT 的 [[数字化中压运维]] 架构并未回退。\n- 内部电弧栏仍给出基础型“未分类”与 `A FL / A FLR 20kA 1s` 口径，继续支持把 `A-FLR` 视为可选能力而不是默认全系标配。\n- 新版目录中的部分表格开始出现 `20/25kA` 短时耐受、`50/63kA` 峰值耐受和相应时间参数组合，显示 RM6 SeT 至少在部分 `12kV` 柜型上新增了更高短路能力口径。\n- 这些 `25kA / 63kA` 口径并不是整本目录对所有柜型的统一替换；当前更稳妥的理解是：新版为部分柜型补入了更高能力选项，而 `24kV` 侧仍保留 `20kA / 50kA` 主口径。\n- 封面后的施耐德中国介绍页也发生修订，说明新版目录连带更新了企业概况页，但这部分属于宣传背景变化，不应覆盖具体产品技术参数。\n\n## Key Quotes\n> \"Easergy T300可分布式安装于RM6 SeT环网柜中\" — 一二次融合能力延续到新版目录\n\n> \"ECATA1138 2025.02D0214\" — 新版目录版本标识\n\n## Connections\n- [[RM6SeT]] — 该文档是 RM6 SeT 的后续修订目录。\n- [[RM6]] — 它把 RM6 路线补成 `2018 -> 2022 -> 2025` 的版本链。\n- [[气体绝缘开关柜]] — RM6 SeT 继续属于施耐德 `24kV` 及以下二次配电 GIS / RMU 路线。\n- [[ALink]] — 新版继续以 `A-link` 作为侧扩连接结构。\n- [[数字化中压运维]] — `Easergy T300`、`TH110-R`、`PD110`、`CL110`、`SMD` 和 `PS100/PS50` 继续构成数字化运维链路。\n- [[自动投切]] — RM6 SeT 的自动切换与配网自动化定位在新版中继续保留。\n- [[施耐德电气]] — 文档所属公司。\n\n## Contradictions\n- 与 `2022.02` 的 [[RM6SeT]] 目录相比，新版更像“增补与细化”而不是技术路线反转：`40` 年寿命、`IP67/IP43/IK07`、`A-link`、`1~6` 功能共箱和数字化架构保持一致。\n- 当前最需要保留的版本差异是：`2025.02` 明确加入 `Cr / Vr / M` 模块表达，并在部分 `12kV` 参数表中出现 `25kA / 63kA` 口径；因此不能再把 RM6 SeT 简化为只有 `C / F / V / D / PT` 且全系统一 `20kA / 50kA` 的单一版本。\n",

    "color": "#4CAF50",

    "markdown": "---\ntitle: \"RM6 SF6绝缘环网柜和紧凑型开关柜 产品目录\"\ntype: source\ntags: [rm6, ring-main-unit, gas-insulated, medium-voltage, catalog, schneider-electric]\ndate: 2018-09-28\nsource_file: raw/二次气体绝缘开关柜/RM6/RM6SF6绝缘环网柜和紧凑性开关柜产品目录.pdf\n---\n\n## Summary\n这份 `68` 页中文 PDF 是 [[RM6]] 路线一层独立的正式产品目录，而不是现有 `2018-05-09` 中文演示稿的重复件。它带有 `SCDOC1043-MV / 2018.10` 尾标，结构完整覆盖设备特性、附件、电网远程控制、中压电缆头、户外开关站、安装、订购表和方案页，因此更适合作为 RM6 在中国市场的工程目录层来理解。\n\n## Key Claims\n- 封面写有 `RM6 中压开关柜`、`SF6绝缘环网柜和紧凑型开关柜`、`3～24kV`、`产品目录`，PDF 元数据显示创建和修改时间均为 `2018-09-28`。\n- 末页尾标为 `SCDOC1043-MV / 2018.10`，说明它是正式目录层，而不是培训稿、演示稿或操作手册。\n- 公司页保留 `2017` 财年施耐德口径：`247 亿欧元`、全球 `14.2 万` 员工、中国 `17000+` 员工、`23` 家工厂、`8` 个物流中心、`9` 个分公司和 `37` 个办事处。\n- 产品定义页把 RM6 写成满足 `24kV` 以下中压配电系统需求的设备，可保护开放式环网或辐射式网络中的变压器，且带电部件永久封闭在 `SF6` 壳体内。\n- 路线页强调 RM6 全球已有 `170 万台` 功能单元应用，并写出 `2016：诞生了智能化环网柜` 这一历史节点。\n- 文档给出 `1~5` 功能模块、`2/3/4/5` 回路连接、`630A` 断路器线路保护和可集成远程控制设备的总体产品框架。\n- 环境与结构参数页明确写出 `-40℃ ~ 40℃`、海拔 `≤1000m`、`SF6气室 IP67`、熔断器室 `IP67`、外壳 `IP4X`、`20℃下 SF6充气压力 0.2Bar`、年泄漏率 `0.01%/年` 和气室不锈钢板厚 `2mm`。\n- 电气特性表覆盖 `12kV / 24kV` 两档，给出工频耐压 `42/48kV` 与 `65/79kV`、冲击耐压 `95/110kV` 与 `125/145kV`、主回路额定电流 `630A`，并把 `20kA/4s`、`20kA/3s`、`25kA/1s` 等选项落到订购层。\n- 功能体系页明确列出 `I / B / D / Q / IC / BC / O / Pt / Mt`，柜型体系明确列出 `NE / RE / LE / DE`。\n- 主要特性页把内部燃弧能力写为 `20kA 1s`，并把气压表/压力开关、门连锁、低压间、升高座和 `Fusarc CF` 列为正式选件。\n- `I` 功能附件页列出电动操作、辅助触点、`Flair 22D`、`Amp 21D` 和钥匙锁；`B` 功能页列出 `VIP400 / VIP410 / Sepam 20系列`。\n- 自动投切页把双电源自动切换系统和网络 `ATS` 正式写入目录，控制器明确为 `T200 I`，并给出 `TR < 2 s`、`T1 0s~200s`、`T2 0s~30分钟` 以及自动/半自动模式。\n- 附件页继续补入 `Flair 22D / Flair 23DV / Amp 21D`、`VD23`、`VPIS`、压力表/压力开关，以及电缆室内部电弧 `20kA 1s` 和钥匙锁/机械联锁逻辑。\n- 订购表进一步确认这是一层正式工程目录，明确给出 `12kV 20kA/4S`、`12kV 20kA/3S`、`12kV 25kA/1S`、`24kV 20kA/1S`、`24kV 20kA/3S`、`Flair 22D`、`Amp21D`、`VPIS + RV10`、`Sepam`、`VIP45` 和 `VIP400` 等订购项。\n\n## Key Quotes\n> \"SF6绝缘环网柜和紧凑型开关柜\" — 封面对 RM6 产品类型的正式定义\n\n> \"双电源自动切换系统\" — 目录中 `ATS` 章节的正式标题\n\n## Connections\n- [[RM6]] — 构成 RM6 路线中 `2018.10` 的中文正式目录层\n- [[自动投切]] — 把 `ATS`、`T200 I`、`TR / T1 / T2` 和自动/半自动模式正式落入目录\n- [[气体绝缘开关柜]] — 明确记录 `IP67 / IP4X / 0.2Bar / 0.01%/年 / 2mm` 这组 RM6 工程边界\n- [[施耐德电气]] — 保留 `2017` 财年施耐德中国公司页口径\n\n## Contradictions\n- 与 [[rm6-offer-presentation-life-is-on-201801update]] 不冲突；演示稿更偏装机规模、`58` 种标准柜型、`T200C` 和 `Smart RMU / Easergy T300` 场景叙事，这份 `2018.10` 目录则更偏正式参数页、安装页和订购表。\n- 与 [[rm6-24kv-medium-voltage-distribution-catalog-2012]] 不冲突；`2012` 是英文正式目录基线，`2018.10` 是中国市场的后续正式目录层，应并存保留。\n",

    "markdown": "---\ntitle: \"SC6中压开关元件产品目录\"\ntype: source\ntags: [sc6, as12, switch, component, air-insulated, medium-voltage, catalog, schneider-electric]\ndate: 2017-09-08\nsource_file: raw/二次空气绝缘开关柜/AS12中压开关 产品目录.pdf\n---\n\n## Summary\n这份 PDF 的文件名写作“AS12中压开关 产品目录”，但正文真实题名是 `SC6`，封面写明“中压开关元件 SC6 可靠核‘芯’ 6-12kV 630A 产品目录”，尾页文件号为 `SCDOC1158-MV`，时间口径为 `2017.09`。它不是完整开关柜目录，而是施耐德面向空气绝缘柜体集成场景提供的 `12kV` 中压开关元件收敛版资料，保留了与更早 [[AS12AS24]] 路线的连续性，同时把功能和电压口径收敛到 `SIC / SQC` 与 `12kV`。\n\n## Key Claims\n- 文件名使用 `AS12`，但正文产品名明确为 `SC6`，应按正文题名建档，同时保留其与 [[AS12AS24]] 的版本连续性。\n- 封面给出 `SC6`、`6-12kV`、`630A` 和“中压开关元件”定位，尾页写明文件号 `SCDOC1158-MV`、版本时间 `2017.09`。\n- 产品继续被定义为“空气绝缘开关柜的核心元件”，柜体仍由国内开关柜制造商完成，施耐德提供核心开关本体与附件体系。\n- 功能系列收敛为 `SIC` 和 `SQC`：分别适用于负荷开关进出线柜/连接柜，以及熔断器开关组合柜。\n- 参数口径集中在 `12kV`、`630A`、`20kA/4s`，峰值耐受电流 `50kA`，短路关合电流 `50kA`。\n- 资料还给出 `10A` 电缆充电电流开断、`94.5A` 接地故障电流开断、`31.5A` 的 `5%` 额定有功负载开断，以及 `1750A` 最大转移电流和 `630A` 闭环开断能力。\n- 绝缘水平写为工频耐压 `42/48kV`、雷电冲击耐压 `75/85kV`。\n- 技术页继续采用 `SF6` 作为绝缘和灭弧介质，气室相对压力 `0.4 bar`，年泄漏率 `<0.05%`。\n- 机械寿命口径为主开关 `5000` 次、接地开关 `3000` 次，电气寿命等级写为 `E3`。\n- 安全与可视化边界包括三位置开关、天然联锁、观察窗、同轴指示、柜门/接地/主开关联锁、柜后泄压，以及可选 `VPIS-V2`、`SF6` 压力表和带接点输出压力开关。\n- 附件体系包括 `Fusarc CF`、`Easergy Amp 21D`、`Easergy Flair 22D`、`Talus 200I` 和钥匙闭锁。\n- 技术页正文仍出现“`AS12` 开关使用 `SF6` 气体作为绝缘和灭弧介质”的表述，说明这份 `SC6` 目录很可能延续自更早的 `AS12` 平台文案与结构。\n\n## Key Quotes\n> \"中压开关元件 SC6 可靠核'芯' 6-12kV 630A 产品目录\" — 封面题名\n\n> \"作为空气绝缘开关柜的核心元件\" — 产品定位页\n\n## Connections\n- [[SC6]] — 本文档的正文产品对象。\n- [[AS12AS24]] — 更早的 `12/24kV` 多功能平台版本，可视为 `SC6` 的前序资料。\n- [[空气绝缘开关设备]] — `SC6` 仍服务于空气绝缘柜体集成场景。\n- [[施耐德电气]] — 厂商主体与附件生态提供方。\n- [[数字化中压运维]] — `Flair 22D`、`Talus 200I` 等附件使其接入较早期配网自动化场景。\n\n## Contradictions\n- 与已入库 [[AS12AS24]] 资料不构成冲突，更像 `2010 -> 2017` 的版本演进：前者覆盖 `12/24kV` 与 `IS / QS / DS / CS / ES`，后者收敛到 `12kV` 与 `SIC / SQC`。\n- 它不是完整整柜目录，不能拿 `SC6` 的单型号元件参数去替换 [[SM6]]、[[RM6]]、[[FBX]] 或 [[PIX]] 等整柜产品线口径。\n- 虽然处于 [[空气绝缘开关设备]] 场景，但开关本体仍使用 `SF6` 密闭压力系统，因此应继续理解为“空气绝缘柜体中的 `SF6` 开关核心”，而不是纯无气体绝缘路线。\n",
    "preview": "## Summary 这份 PDF 的文件名写作“AS12中压开关 产品目录”，但正文真实题名是 `SC6`，封面写明“中压开关元件 SC6 可靠核‘芯’ 6-12kV 630A 产品目录”，尾页文件号为 `SCDOC1158-MV`，时间口径为 `2017.09`。它不是完整开关柜目录，而是施耐德面向空气绝缘柜体集成场景提供的 `12kV` 中压开关元件收敛版资料，保留了与更早 [[AS12AS24]] 路线的连续性，同时把功能和电压",

    "markdown": "---\ntitle: \"SM6中压开关柜24kV产品目录\"\ntype: source\ntags: [sm6, air-insulated, switchgear, medium-voltage, catalog, schneider-electric]\ndate: 2017-08-21\nsource_file: raw/二次空气绝缘开关柜/SM6中压开关柜 24kV 产品目录.pdf\n---\n\n## Summary\n这份中文 PDF 是 `2017-08-21` 元数据日期的正式 SM6 产品目录，封面标题为“中压开关柜 SM6 悉心守护 享受无忧 6～24kV 产品目录”，尾页文件号为 `SCDOC064-MV`，时间口径写为 `2017.08`。它不是现有 `2012` 英文目录和 `2019` 中文演示稿的重复件，而是面向中国市场的 `24kV` 正式目录版本：一方面把 [[SM6]] 的柜型、参数和订货体系落到中文工程口径，另一方面又继续保留“空气绝缘柜体 + `SF6` 密闭压力系统开关核心”的边界。\n\n## Key Claims\n- 封面标题写明 `SM6`、`6～24kV` 和“产品目录”，尾页文件号为 `SCDOC064-MV`，版本时间为 `2017.08`。\n- PDF 元数据为 `CreationDate=2017-08-21`、`ModDate=2017-08-21`。\n- 目录将 [[SM6]] 定义为可扩展模块组合式、金属密封开关柜系列产品，适用于工矿企业二次变电站 `24 kV` 以下的用户和配电站。\n- 主要柜型覆盖 `IM / IMC / IMB / IMP` 负荷开关进出线柜、`QM / QMC` 熔断器负荷开关组合柜、`CRM` 带熔断器接触器柜、`DM1-A / DM1-D / DM1-S` 隔离开关加 `SF6` 断路器柜、`DMV` 隔离开关加真空断路器柜、`CM / CM2` 电压互感器柜、`GBC-A / GBC-B` 计量柜、`NSM-C` 双电源进线柜、`GBM` 母线升高柜、`GAM2` 进线电缆连接柜和 `TM` 站用变柜。\n- 目录给出柜体尺寸口径：户内安装、`375 - 750 mm` 宽、`1600 mm` 高、`1030 mm` 深，电缆前接线。\n- 额定参数口径覆盖 `7.2 / 12 / 24 kV`，额定电流 `630 / 1250 A`，短时耐受可选 `20 kA / 4s` 或 `25 kA / 1s`，短路关合电流写为 `50 kA / 63 kA`，`24 kV` 口径写为 `50 kA`。\n- 内部电弧与结构等级写为 `LSC2A`、`PI`、`IP4X`，并明确给出内燃弧 `IAC: A-FLR, 20 kA / 1s`；另有基础等级 `12.5 kA 1 s, IAC: A-FL`。\n- `QM / QMC` 最大分断能力写为 `12 kV 25 kA`、`24 kV 20 kA`；`DM1-A / DM1-D` 同样写为 `12 kV 25 kA`、`24 kV 20 kA`。\n- 机械/电气寿命部分给出：`IM / IMC / IMB / IMP` 负荷开关 `5000` 次机械寿命；`DM1-A / DM1-D` 断路器 `10000` 次机械寿命，电气寿命按 `12.5 kA 40 次 / 20 kA 25 次 / 25 kA 20 次` 口径给出；`DMV` 则写为 `25 kA, 100 次开断`。\n- 结构说明把柜体分成五个间隔：开关间隔、母线间隔、电缆间隔、操作机构间隔、控制保护间隔；其中开关与接地装置被密封在充满 `SF6` 的气室内，符合“密闭压力系统”标准要求。\n- 断路器柜支持 `SFset` 与 `SF1` 两类断路器：`SFset` 配自能式保护装置和特殊传感器，不需要辅助电源；`SF1` 配综合保护继电器和标准传感器，需要辅助电源。\n- 接触器柜支持 `Rollarc 400` 和 `Rollarc 400D` 两类接触器。\n- 监控与保护层包括 `Sepam 20/40/80`、`VIP`、`Easergy T200 S`、自动转换设备、`Easergy Flair 22D` 故障指示器和 `Easergy Amp 21D` 安培表。\n- `Easergy T200 S` 被写成“即插即用”多功能远程监测与控制接口，可采集开关位置、故障检测、电流值，向开关发送分合闸命令，并通过 `Modbus`、`DNP3.0 level 2`、`IEC 870-5-101` 与 `SCADA` 交换信息。\n- `Flair 22D` 被列为故障电流指示器，`Amp 21D` 被列为自供电安培表，并写明 `SM6-24` 可在所有进线柜和熔断器柜上集成 `Amp 21D`。\n- 目录还补入了应用方案页，如 `NSM-C` 双电源进线、开闭站方案、备用电源自动投切和 `S20 / S40` 保护器组合。\n\n## Key Quotes\n> \"SM6 柜用于工矿企业二次变电站24 kV以下的用户和配电站\" — 产品适用范围\n\n> \"开关间隔：负荷开关、隔离开关或接地开关被密封在充满SF6气体的气室内，符合'密闭压力系统'标准要求\" — 结构边界\n\n## Connections\n- [[SM6]] — 本目录的核心产品对象。\n- [[空气绝缘开关设备]] — 目录继续把 SM6 放在空气绝缘柜体语境中理解。\n- [[施耐德电气]] — 厂商主体与保护、自动化体系提供方。\n- [[数字化中压运维]] — `Easergy T200 S`、`Sepam`、`VIP`、`Flair 22D`、`Amp 21D` 共同构成较早期数字化与监测层。\n- [[自动投切]] — `NSM-C`、自动转换设备和 `S40` 保护器构成双电源自动切换方案。\n- [[内部电弧防护]] — `A-FL / A-FLR` 和引导通道方案构成重要安全边界。\n\n## Contradictions\n- 与 `2012` 英文正式目录不构成冲突，而是更聚焦中国市场和 `24kV` 口径的后续版本：英文目录上探到 `36 kV` 并给出更宽柜型族，中文目录则收敛到 `24 kV` 以下并展开中文应用、选型、订货和自动化方案。\n- 与 `2019` 中文演示稿不冲突，而是更正式的参数/订货底座：`2017` 目录强调工程参数、柜型和附件，`2019` 资料更偏市场叙事与 `Smart SM6` 在线监测层。\n- 它再次确认 `SM6` 并不是纯无气体绝缘路线：虽然柜体按空气绝缘开关柜叙事，但开关与接地核心仍位于 `SF6` 密闭压力系统内。\n",
    "preview": "## Summary 这份中文 PDF 是 `2017-08-21` 元数据日期的正式 SM6 产品目录，封面标题为“中压开关柜 SM6 悉心守护 享受无忧 6～24kV 产品目录”，尾页文件号为 `SCDOC064-MV`，时间口径写为 `2017.08`。它不是现有 `2012` 英文目录和 `2019` 中文演示稿的重复件，而是面向中国市场的 `24kV` 正式目录版本：一方面把 [[SM6]] 的柜型、参数和订货体系落到中文工程",

    "markdown": "---\ntitle: \"SM6模块化空气绝缘开关柜产品目录 2012\"\ntype: source\ntags: [sm6, air-insulated, switchgear, medium-voltage, catalog, schneider-electric]\ndate: 2012-07-10\nsource_file: raw/二次空气绝缘开关柜/SM6.pdf\n---\n\n## Summary\n这份英文 PDF 是 `Catalogue | 2012` 版的正式 SM6 产品目录，封面标题为 `SM6 Modular units Air insulated switchgear up to 36 kV`，PDF 元数据日期为 `2012-07-10`。它不是现有 `2019` 中文演示稿的重复件，而是更早、更正式的参数与功能总览：一方面把 [[SM6]] 明确定义为最高 `36 kV` 的模块化空气绝缘开关柜，另一方面又反复说明有源开断和接地部分位于 `SF6` 密封单元中，因此非常适合用来校准 SM6 的产品边界。\n\n## Key Claims\n- 封面标题写明 `SM6`、`Modular units`、`Air insulated switchgear up to 36 kV` 和 `Catalogue | 2012`。\n- PDF 元数据为 `CreationDate=2012-07-10`、`ModDate=2012-07-10`。\n- 目录把 [[SM6]] 描述为一套模块化、协调化的柜型体系，采用 `SF6 or vacuum breaking technology switchgear`，寿命口径写为 `30 years life span`。\n- 资料声称施耐德在工厂成套柜方面有 `40` 多年经验，在中压 `SF6` 开断技术方面有 `30` 多年经验；到 `2012` 年，全球已安装超过 `1,100,000` 台 `SM6` 柜体，以及超过 `2,500,000` 台 `SF6` 中压单元。\n- 安全/连续性部分强调 IEC `62271-200` 型式试验、前方闭门操作、`VPIS` 带电显示、物理位置指示、联锁、`anti-reflex` 手柄和内部电弧防护。\n- 目录明确给出 `LSC2A` 失电连续性等级、`PI` 绝缘隔板、柜体 `IP3X`，并把“带电维护简单”作为核心卖点。\n- 内部电弧口径为：`24 kV` 下 `A-FL 12.5 kA 1 s / 16 kA 1 s`，`A-FLR 16 kA 1 s / 20 kA 1 s`；`36 kV` 下给出 `A-FL 16 kA 1 s`。\n- 排气方案包括向下排气，以及 `24 kV` 可选向上排气。\n- 目录说明 active parts integrated in an `SF6-filled, sealed for life` unit，这一点对理解“空气绝缘柜体 + `SF6` 开关核心”的边界非常关键。\n- 柜型/功能单元覆盖 `IM / IMC / IMB` 开关柜、`PM` 熔断器开关柜、`QM / QMC / QMB` 熔断器组合柜、`CRM / CVM` 接触器柜、`DM1-A / DM1-D / DM1-S / DM1-W / DM1-Z / DM2 / DM2-W` 断路器柜、`DMV-A / DMV-D / DMV-S / DMVL-A / DMVL-D` 真空断路器柜、`CM / CM2` 电压互感器柜、`GBC-A / GBC-B` 测量柜、`NSM-cables / NSM-busbars`、`GIM`、`GEM`、`GBM`、`GAM2 / GAM`、`SM`、`TM` 等。\n- 柜宽口径显示 `24 kV` 下常见 `375 / 500 / 625 / 750 mm`，`36 kV` 下常见 `750 / 1000 / 1500 mm`；其中 `IM` 可为 `24 kV 375 or 500 mm / 36 kV 750 mm`，`QM` 可为 `24 kV 375 or 500 mm / 36 kV 750 mm`。\n- 保护与自动化部分包含 `PowerMeter`、`Sepam`、`VIP 35`、`VIP 300 LL`、`Amp 21D`，并把 `Easergy T200 S`、`Easergy T200 I` 列入中压网络管理方案。\n- 目录特别说明 vacuum type circuit breaker cubicles up to `24 kV`，且封面处 `Evolis` 标注 `(*) Not available at 36 kV`，说明 `36 kV` 口径下不能简单套用 `24 kV` 的真空断路器能力。\n\n## Key Quotes\n> \"Air insulated switchgear up to 36 kV\" — 封面产品边界\n\n> \"The active parts (breaking and earthing) are integrated in an SF6-filled, 'sealed for life' unit\" — 维护与结构边界\n\n## Connections\n- [[SM6]] — 本目录的核心产品对象。\n- [[空气绝缘开关设备]] — 封面与总体分类把 SM6 放在空气绝缘开关柜语境中。\n- [[施耐德电气]] — 产品、保护、监控与服务体系提供方。\n- [[数字化中压运维]] — `Easergy T200`、`Sepam`、`VIP` 和 `PowerMeter` 体现较早期的远方管理与监控层。\n- [[内部电弧防护]] — `A-FL / A-FLR` 与上下排气方案构成重要安全边界。\n\n## Contradictions\n- 与现有 [[SM6]] `2019` 中文演示稿不构成冲突，而是更早的正式目录版本：`2012` 目录给出最高 `36 kV`、更完整柜型谱系与结构参数，`2019` 资料则更聚焦中国市场 `7.2~24 kV` 环网柜叙事和 `Smart SM6` 在线监测层。\n- 它再次确认了一个需要保留的边界：虽然产品被写成“空气绝缘开关柜”，但开断与接地有源部分并非纯空气绝缘，而是位于 `SF6` 密封单元中，因此不能把 [[SM6]] 简单归并到纯无气体绝缘路线。\n- 目录中的 vacuum/Evolis 口径只明确到 `24 kV`，而 `36 kV` 版本并不等价，因此后续引用断路器类型时需要区分电压等级。\n",
    "preview": "## Summary 这份英文 PDF 是 `Catalogue | 2012` 版的正式 SM6 产品目录，封面标题为 `SM6 Modular units Air insulated switchgear up to 36 kV`，PDF 元数据日期为 `2012-07-10`。它不是现有 `2019` 中文演示稿的重复件，而是更早、更正式的参数与功能总览：一方面把 [[SM6]] 明确定义为最高 `36 kV` 的模块化空气绝缘开",

  {
    "id": "sources/sm6-product-introduction-and-digital-content-2019",
    "label": "SM6 7.2~24kV 空气绝缘环网柜",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\sm6-product-introduction-and-digital-content-2019.md",
    "markdown": "---\ntitle: \"SM6 7.2~24kV 空气绝缘环网柜\"\ntype: source\ntags: [sm6, ring-main-unit, air-insulated, medium-voltage, presentation, digitalization]\ndate: 2019-03-27\nsource_file: raw/MVP/SM6/20190327 产品介绍+数字化内容.pptx\n---\n\n## Summary\n这份 `20` 页中文演示稿把 [[SM6]] 定位为施耐德 `7.2~24kV` 环网柜路线中的一个独立分支，并把它与 `RM6/FBX`、[[Premset]] 放在同一分类页中对照。它的独特价值不在完整参数表，而在于同时保留了柜型谱系、`SF6` 绝缘开关间隔，以及 `Smart SM6` 围绕 `Easergy T300`、温升、局放和环境监测展开的数字化监测层。\n\n## Key Claims\n- 封面将 SM6 定义为 `7.2~24kV` 空气绝缘环网柜，文件名中带 `20190327` 时间戳。\n- 前半部分先从中压配电网络、金属封闭开关设备功能和环网柜定义切入，强调环网柜主要用于中压二次配电，具有结构简单、运行可靠安全、维修量小和运行费用低等特点。\n- 分类页把环网柜分成 `SM6`、`RM6/FBX` 和 [[Premset]] 三组，说明这份资料把 SM6 视为施耐德环网柜谱系中的独立产品线，而不是 RM6 的别名。\n- `SM6监测需求` 页面把主要在线监测对象落在主母排搭接点和电缆搭接处温升、电缆室局放，以及母线室/电缆室环境温湿度。\n- 温升监测器件写成 `TH110 / TH110-R / TH110-S`，局放器件写成 `PD110`，环境监测器件写成 `CL110`。\n- `Smart SM6` 架构页给出配网监控中心、`SCADA / DMS`、`101/104`、`Easergy T300`、Local HMI 和现场监测传感器的组合。\n- 进出线柜页列出 `IM 375`、`IM 500`、`NSM-C 1000` 和 `IMC 500` 等柜型线索，面向双馈线和主进线带备用线或发电机场景。\n- 负荷/隔离开关柜页说明开关间隔内装三工位负荷开关，且“充有六氟化硫（SF6）气体为绝缘介质”；母线间隔可向两侧扩展，操作机构间隔可安装电动操作机构，电缆间隔正面连接。\n- 负荷/隔离开关续页强调三位置设计、天然联锁、位置显示、传动机构直接可靠，并给出 `1.4 bar` 气包和 `0.01%` 泄漏率宣传口径。\n- 保护柜页把保护路线分为 `SF1 / SFset` 断路器、`SF6` 灭弧和负荷开关熔断器组合电器，并列出 `QM375/500`、`QMC625`、`DM1-A750` 等柜型。\n- 断路器柜页同样说明开关间隔“充有 SF6 气体作为绝缘介质，符合密闭压力系统标准”，可安装 `SFset / SF1` 断路器。\n- 两种断路器对比页给出：`SF1` 组装 `Sepam` 综合保护，配标准电流互感器，需要辅助电源，覆盖 `630A` 和 `1250A`；`SFset` 为真空断路器型，配专用传感元件和 `VIP400` 电子继电器，不需要辅助电源，额定 `630A`。\n- 测量柜页列出 `CM2500`、`GBC-B750`、`GBC-A750` 等柜型；专用柜页列出 `GAM23750`、`IMB 375`、`GBM 375`、`DM1-D 750` 等特殊用途柜型。\n\n## Key Quotes\n> \"SM6 7.2~24kV 空气绝缘环网柜\" — 封面标题口径\n\n> \"环网柜分类 SM6 RM6/FBX Premset\" — 施耐德环网柜产品线并列关系\n\n## Connections\n- [[SM6]] — 文档核心产品对象。\n- [[空气绝缘开关设备]] — 封面与分类页把 SM6 放在空气绝缘环网柜语境中。\n- [[数字化中压运维]] — `Smart SM6` 用 `Easergy T300`、Local HMI 和在线传感器构成数字化层。\n- [[温度智能监测]] — 主母排与电缆搭接点温升监测是资料强调的核心需求。\n- [[局部放电监测]] — `PD110` 被用于电缆室局放在线监测。\n- [[施耐德电气]] — SM6 所属公司与数字化架构提供方。\n- [[RM6]] — 分类页把 SM6 与 RM6/FBX 明确并列。\n- [[FBX]] — 分类页把 SM6 与 FBX 明确并列。\n- [[Premset]] — 分类页把 SM6 与 Premset 明确并列。\n\n## Contradictions\n- 与现有 [[空气绝缘开关设备]]、[[气体绝缘开关柜]] 页面不构成直接冲突，但它带来一个需要显式保留的边界：封面将 SM6 写成“空气绝缘环网柜”，而负荷/断路器柜页又明确开关间隔充 `SF6` 作为绝缘介质，因此不宜把它简单写成纯空气绝缘路线，也不宜直接并入 RM6/FBX 那类紧凑气体绝缘 RMU 口径。\n",
    "preview": "## Summary 这份 `20` 页中文演示稿把 [[SM6]] 定位为施耐德 `7.2~24kV` 环网柜路线中的一个独立分支，并把它与 `RM6/FBX`、[[Premset]] 放在同一分类页中对照。它的独特价值不在完整参数表，而在于同时保留了柜型谱系、`SF6` 绝缘开关间隔，以及 `Smart SM6` 围绕 `Easergy T300`、温升、局放和环境监测展开的数字化监测层。 ## Key Claims",

  {
    "id": "sources/smart-hvx-product-introduction-v3-4",
    "label": "Smart HVX 产品介绍 V3.4",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\smart-hvx-product-introduction-v3-4.md",
    "markdown": "---\ntitle: \"Smart HVX 产品介绍 V3.4\"\ntype: source\ntags: [deck, smart-hvx, product-introduction, medium-voltage]\nsources: []\nlast_updated: 2026-06-03\ndate: 2020-05-07\nsource_file: raw/MCP/Smart HVX产品介绍_V3.4_200507.pdf\n---\n\n## Summary\n这份演示材料从“智在可靠、智在掌握、智在千里、智在上市”四个叙事角度介绍 [[SmartHVX]]，比前面的样本更强调销售价值、竞品式技术对比、运维效率依据和典型配电房方案。它补充了 [[温度智能监测]] 相比变色片、热电偶、光纤和人工红外线方案的差异，进一步展开 [[配柜智能监测]]、[[二次元件智能监测]]、[[PMBEasy]]、手机 APP、柜体 HMI 和 [[千里眼]] 的组合价值。\n\n## Key Claims\n- [[SmartHVX]] 的可靠性宣传建立在 [[HVX]] 平台、测温、线圈电机监测和配柜状态监测之上，并称这些能力可提升缺陷预测能力。\n- 文档将温度监测方案与变色片、热电偶、光纤、红外线和第三方外置无线测温方案进行对比，突出内嵌式、自供电、ZigBee 非接触通信和 NFC 组网。\n- 配柜监测强调对断路器手车摇进摇出状态进行实时测量，避免位置不到位导致温升及绝缘事故。\n- 二次元件监测强调非侵入式设计、实时健康显示、历史健康状态和趋势诊断。\n- “运维效率提高 100%”的依据之一是国家电网公司状态检修规程中的部分停电试验项目可由 Smart HVX 智能化监测替代或支撑。\n- “运维成本降低 50%”通过典型 110kV 变电站、20 面 10kV 开关柜的年工时对比来说明，材料给出传统约 121 小时、采用 Smart HVX/千里眼后约 59.5 小时的示例。\n\n## Key Quotes\n> “可靠承诺：安装调试后一年内如发生故障，而对应的传感器没有检测出报警信号,则赔付新断路器一台。” — 可靠性承诺，限定于上千里眼且记录可查的系统\n\n> “Zigbee非接触式，接收单元与高压侧电气隔离” — 温度监测通信特点\n\n> “虽千里，犹咫尺” — 千里眼远程运维卖点\n\n## Connections\n- [[SmartHVX]] — 文档核心对象，提供价值叙事和整体配置视图。\n- [[测温技术对比]] — 新增的横向比较主题，解释 Smart HVX 为什么强调内嵌式、自供电和无线通信。\n- [[温度智能监测]] — 文档展开最充分的监测能力。\n- [[配柜智能监测]] — 用于监测断路器与开关柜配合是否到位。\n- [[二次元件智能监测]] — 覆盖合分闸线圈和储能电机健康状态。\n- [[BMM]] — 作为断路器状态监测单元出现在典型方案中。\n- [[PMBEasy]] — 本地显示和主动运维智能单元。\n- [[千里眼]] — 云端远程运维系统，用于降本和无人值守叙事。\n- [[数字化中压运维]] — 这份资料强化了数字化运维从设备监测走向云端分析和工时节省的价值链。\n\n## Contradictions\n- 文档多数页面延续“可靠性提高 1 倍”的说法，但后部上市页出现“可靠性高出 50%”表述；这与现有样本中的“可靠性提高 1 倍”存在口径不一致，应作为后续核对点。\n- “可靠承诺”带有限定条件：仅限上千里眼且报警和设备故障记录可查的系统，不应泛化为所有 Smart HVX 场景。\n",
    "preview": "## Summary 这份演示材料从“智在可靠、智在掌握、智在千里、智在上市”四个叙事角度介绍 [[SmartHVX]]，比前面的样本更强调销售价值、竞品式技术对比、运维效率依据和典型配电房方案。它补充了 [[温度智能监测]] 相比变色片、热电偶、光纤和人工红外线方案的差异，进一步展开 [[配柜智能监测]]、[[二次元件智能监测]]、[[PMBEasy]]、手机 APP、柜体 HMI 和 [[千里眼]] 的组合价值。 ## Key Cl",

  {
    "id": "sources/smart-hvx-product-pmb-introduction",
    "label": "Smart HVX & PMBox 介绍",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\smart-hvx-product-pmb-introduction.md",
    "markdown": "---\ntitle: \"Smart HVX & PMBox 介绍\"\ntype: source\ntags: [deck, smart-hvx, pmb-easy, pmbox, edge-control]\ndate: 2020-06-01\nsource_file: raw/MCP/SmartHVX产品+PMB介绍.pptx\n---\n\n## Summary\n这份演示稿把 [[SmartHVX]]、[[PMBEasy]] 和 [[PMBox]] 放在同一套主动运维叙事中说明：前半部分复核 Smart HVX 的温度、配柜和二次元件监测能力，中段展开 PMB Easy 单柜版/全站版的显示与通讯架构，后半部分把 PMBox 描述为基于 [[EcoStruxure]] Power 的站室级边缘控制产品。相比已有 PMB Easy 资料，它新增了 PMBox 的资产管理、状态监测、预测性维护、3D 站室视图、局部放电分析和历史数据查询等能力。\n\n## Key Claims\n- [[SmartHVX]] 的可靠性价值仍围绕 [[温度智能监测]]、[[配柜智能监测]] 和 [[二次元件智能监测]] 展开。\n- [[PMBEasy]] 单柜版提供 3.5 英寸或 7 英寸柜体 HMI 显示，全站版采用 10.1 英寸触摸屏，最多显示 40 台断路器。\n- PMB Easy 通讯架构继续使用 [[ZBRN32]]、[[Link150]]、[[BMM]]、交换机和云服务来承接标准测温型与智能型 Smart HVX。\n- [[PMBox]] 被定位为 [[EcoStruxure]] Power 边缘控制层产品，面向配电现场的数据建模、资产管理、状态监测和预测性维护。\n- PMBox 可接入 [[SmartHVX]]、Easergy MiCOM、PDM8A、DTU T300、TH110、TH110-R、CL110 等现场设备或传感器。\n\n## Key Quotes\n> \"PMBox 主动运维专家\" — PMBox 章节标题\n\n> \"接入间隔数量– 40台\" — PMBox 主要功能页中的容量口径\n\n## Connections\n- [[SmartHVX]] — 文档前半部分复核其监测能力和方案组合。\n- [[PMBEasy]] — 文档中段重点介绍其单柜版、全站版、HMI 和通讯架构。\n- [[PMBox]] — 文档新增的站室级主动运维产品对象。\n- [[EcoStruxure]] — PMBox 的架构定位来源。\n- [[主动运维]] — Smart HVX、PMB Easy 与 PMBox 共同承接的运维价值主张。\n- [[数字化中压运维]] — PMBox 把运维对象从断路器扩展到站室资产与多类接入设备。\n- [[千里眼]] — Smart HVX 云端远程运维链路的一部分。\n\n## Contradictions\n- 这份材料与已有 Smart HVX、PMB Easy 资料在核心架构上基本一致；新增差异主要是 PMBox 范围更广，不应与专为 Smart HVX 设计的 PMB Easy 混同。\n",
    "preview": "## Summary 这份演示稿把 [[SmartHVX]]、[[PMBEasy]] 和 [[PMBox]] 放在同一套主动运维叙事中说明：前半部分复核 Smart HVX 的温度、配柜和二次元件监测能力，中段展开 PMB Easy 单柜版/全站版的显示与通讯架构，后半部分把 PMBox 描述为基于 [[EcoStruxure]] Power 的站室级边缘控制产品。相比已有 PMB Easy 资料，它新增了 PMBox 的资产管理、状态",
    "group": 1,

  {
    "id": "sources/smd-and-sensors-for-sm6-training-v2",
    "label": "SMD and Sensors for SM6 training v2",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\smd-and-sensors-for-sm6-training-v2.md",
    "markdown": "---\ntitle: \"SMD and Sensors for SM6 training v2\"\ntype: source\ntags: [smd, sm6, sensors, training, digitalization, monitoring]\ndate: 2018-10-01\nsource_file: raw/MVP/SM6/SMD and Sensors for SM6 training v2.pptx\n---\n\n## Summary\n这份 `31` 页英文培训稿把 `SMD` 从目录中的一个缩写选项推进成可实施的站室级监测设备对象。它围绕 `SMD V3` 功能、`TH110`/`CL110` 传感器、配对配置流程以及 `V4 / V4.1 / V5` 版本路线展开，同时把资料边界明确停留在 `2018.10` 培训与 roadmap 阶段，而不是正式产品目录或当前量产清单。\n\n## Key Claims\n- 封面标题为 `SMD & Sensors presentation`，副标题写明 `Substation Monitoring Device – TH110 – CL110`，作者 `Paolo TARDITO`，时间为 `October 2018`。\n- 议程显示这份资料主要覆盖 `SMD Introduction`、`SMD V3 functions`、`TH110 / CL110`、配对配置步骤和 `SMD V4` 后续功能。\n- `SMD` 被描述为面向配电站室的状态监测设备，价值叙事围绕 `24/7` 监测、即时告警、减少非计划停机和从 time-based maintenance 转向 condition-based maintenance。\n- 架构页给出 `SMD` 的输入来源包括 `zigbee` 传感器、`PT100`、`DI` 和继电器信息；输出去向包括 local lights、Local HMI、Nearby HMI、`Modbus TCP` 以及发往 `Facility Expert` 的 `SMS`。\n- `SMD V3` 功能页把能力列成 thermal monitoring、environmental monitoring、dry transformer monitoring、CB monitoring、substation alarming、local and remote monitoring、nearby control。\n- 热监测页把对象写成 cable、busbar、CB、withdrawable connections 和 transformer connection，并强调采用 innovative wireless sensor。\n- 热算法页给出 `Standard Monitoring`、`Advanced Monitoring`、phase comparison、discrepancy monitoring，以及基于电流、柜体额定电流和热极限的 real-time threshold。\n- 干式变压器监测通过 `PT100` 监测绕组；断路器监测则基于 relay 信息判断操作机构和主回路健康。\n- 远程告警页提到 `Facility Hero` mobile application、mobile or emails alarm notification、`SMS`，以及接入 `Scada` 或 service platform。\n- `TH110` 被定位为紧凑型无线温升传感器，用于 critical points；`CL110` 被定位为环境监测传感器，标注 `IP54`、indoor applications、battery powered 和 `life expectation >15 years`。\n- 配对配置部分区分 `Level 1.1` 与 `Level 1.2`：前者用 `Thermal Connect App`、`NFC tag`、传感器位置定义和 `Android telephone`；后者强调逐只传感器通电配对、本地保存 ID/position/channel 和在 SMD software 中建立项目。\n- `SMD V4` 标注 `release in November 2018`，新增 batch pairing、easy configuration、channel automatic generation、`Easergy P3 and P5 compatibility` 和新的 `Modbus mapping for new relays`。\n- `SMD V4.1` 标注 `release January 2019`，新增 threshold easier configuration、copy/paste cubicle、change cubicle position in SLD、export/import cubicle as template 和 cubicle library。\n- `SMD V5` 被写成 `release end of April` 的 roadmap，计划补充 oil transformer monitoring、ANSI adaptations、`CL110 in free location`、wireless sensor signal status、busbar/double busbar monitoring 和 double cubicle。\n- `Wireless sensors roadmap for 2019` 中还把 partial discharges sensor 列为“next”方向，并说明 ambient air PD 与 humidity、condensation、pollution 相关，因此它应视为规划项，而不是这份资料时点的既有标配。\n\n## Key Quotes\n> \"SMD & Sensors presentation\" — 封面标题\n\n> \"Substation Monitoring Device – TH110 – CL110\" — 设备与传感器关系\n\n## Connections\n- [[SMD]] — 本文档把它从缩写选项展开为独立监测设备对象。\n- [[SM6]] — 文件名表明培训语境面向 SM6 路线。\n- [[数字化中压运维]] — 资料把监测、告警、远程接入和版本迭代放在同一运维链条中。\n- [[温度智能监测]] — `TH110` 和热算法是主体内容之一。\n- [[局部放电监测]] — `partial discharges sensor` 在 2019 roadmap 中被提为下一步方向。\n- [[施耐德电气]] — `SMD`、`Facility Hero`、`Facility Expert` 和 `Easergy P3/P5` 均处于施耐德命名体系中。\n\n## Contradictions\n- 与《SM6 7.2~24kV 空气绝缘环网柜》来源页不冲突，但角色不同：后者偏产品谱系与监测对象说明，这份培训稿偏 `SMD` 软件/传感器实施与版本路线。\n- 需要显式保留时间边界：`V4 / V4.1 / V5`、`partial discharges sensor`、`CL110 in free location`、double busbar 和 double cubicle 都在 roadmap 或培训稿阶段出现，不能直接写成当时已正式量产或已成为所有产品线标配。\n",
    "preview": "## Summary 这份 `31` 页英文培训稿把 `SMD` 从目录中的一个缩写选项推进成可实施的站室级监测设备对象。它围绕 `SMD V3` 功能、`TH110`/`CL110` 传感器、配对配置流程以及 `V4 / V4.1 / V5` 版本路线展开，同时把资料边界明确停留在 `2018.10` 培训与 roadmap 阶段，而不是正式产品目录或当前量产清单。 ## Key Claims",
    "group": 0,
    "value": 15
  },
  {
    "id": "sources/trihal-series-resin-cast-dry-transformer-catalog",
    "label": "Trihal系列树脂浇注干式变压器产品目录",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\trihal-series-resin-cast-dry-transformer-catalog.md",
    "markdown": "---\ntitle: \"Trihal系列树脂浇注干式变压器产品目录\"\ntype: source\ntags: [trihal, transformer, dry-type, resin-cast, schneider-electric, catalog]\ndate: 2016-05-10\nsource_file: raw/MVT/Trihal系列树脂浇注干式变压器产品目录.pdf\n---\n\n## Summary\n这份 `2016-05-10` 元数据日期的中文产品目录把知识库从中压开关柜扩展到了施耐德的干式变压器路线。它既介绍了 [[Trihal]] 树脂浇注干式变压器的技术卖点和试验边界，也给出了中国本地化产品谱系，包括 `SCB10/11/12/13`、`SCBH15` 和 `SC10` `35kV` 级配电/电力变压器参数、外形尺寸、防护外壳、温控与强迫风冷、安装通风和安全距离要求。\n\n## Key Claims\n- 元数据 `CreationDate` / `ModDate` 为 `2016-05-10`，目录封面标题为 `Trihal系列树脂浇注干式变压器 产品目录`。\n- 文档说明 [[施耐德电气]] 于 `2002-06` 注册成立施耐德（苏州）变压器有限公司（`SST`），`2003-05` 正式投产，主打 Trihal 系列干式变压器，以实现从中压开关、变压器到低压终端配电的本地化综合优化配电方案。\n- 文档把 Trihal 的技术起点追溯到 `1983` 年，并强调施耐德在树脂浇注干式变压器关键技术和工艺上拥有两项独家专利。\n- 目录声称 Trihal 是少数通过 `E3`、`C3`、`F1` 试验认证的干式变压器产品之一；`2012` 年生产销售 `7200+` 台、`930+` 万千伏安，累计已有 `10万+` 台运行于 `100+` 个国家和地区。\n- 产品特点集中在低损耗、低噪声、较 `C2-E2` 更严酷的环境/气候试验、防火 `F1`、全球运行可靠性和 `10kV` 产品 `95kV` 抗雷电冲击水平。\n- 不带外壳产品出厂配置为 `IP00`；标准保护外壳为 `IP21`；户外型外壳通常为 `IP44`，但会使冷却能力下降，容量较小时约降 `5%`、较大时约降 `10%`。\n- 领先技术页给出高压铜带绕制 + 阻燃配方真空浇注、低压铜箔绕制 + 热固性环氧预浸布绝缘，以及硅钢片铁芯 `45°` 全斜接缝步进叠片结构。\n- 高压浇注系统补充了双酚环氧树脂、柔韧添加剂、石英粉和氢氧化铝阻燃填料的配方逻辑，并把“线性电压梯度”和“独特阻燃防火浇注配方”标为施耐德独家专利。\n- 产品范围页给出容量 `30kVA~25000kVA`、电压 `35kV` 及以下，可选 `IP00`、`IP21` 和其它等级外壳。\n- 参数页覆盖多条中国本地化产品线：`SCB11/SCB10` `10kV`、`20kV` 配电变压器，`SCB10` `35kV` 配电变压器，`SC10` `35kV` 电力变压器，以及 `30~250kVA` 小容量和 `SCBH15` 系列页面。\n- `SC10` `35kV` 电力变压器容量可达 `25000kVA`，高压侧为 `35/38.5kV`，低压侧可为 `10/10.5/11/6/6.3/6.6kV`，联结组别写成 `YNd11` 或 `Yd11`。\n- 例行试验包括绕组电阻、变比与矢量组、阻抗电压、负载损耗、空载损耗、空载电流、工频耐压和感应耐压；并给出局部放电测量保证 `<5pC`。\n- `C2` 试验页写出标准要求局放 `≤10pC`，Trihal 试验结果 `<2pC`；`E2` 环境试验则包含冷凝和 `144h` 湿热试验。\n- 型式试验可包括雷电冲击试验和温升试验；标准试验水平汇总给出系统最高电压 `12/24/40.5kV` 对应工频耐压 `35/50/70kV` 和雷电冲击 `95/125/170kV`。\n- 特殊试验包括按 `IEC 60076-5` 进行的短路试验，以及噪声水平测量。\n- 过载能力页说明在自然风冷 `AN` 下按标准环境温度运行；若装设强迫风冷 `AF`，一般可临时增容 `50%`，且对容量大于 `630kVA` 的无外壳 `IP00` 产品有明确说明。\n- 附件页给出温度控制器：可直接显示绕组温度，输出故障/超温/跳闸触点，控制风机，支持模拟量和 `RS232/485` 数字信号，并带“黑匣子”掉电记录功能。\n- 附件与安装页还给出风机报警/跳闸温度边界：`F` 级变压器 `130°C/150°C`，`H` 级变压器 `155°C/175°C`。\n- 安装页说明 Trihal 无液体介质、具较好防火性能；常规安装条件包括海拔 `≤1000m`、环境温度 `-25°C ~ +40°C`，并给出自然通风与强迫通风公式。\n- 无外壳 `IP00` 产品需保持最小安全距离：例如 `10kV` 对实心墙 `120mm`、对通风栅 `300mm`；`35kV` 对实心墙 `320mm`、对通风栅 `400mm`；带 `IP21` 外壳时与建筑墙体至少 `200mm`。\n- 低压连接除电缆外还可采用预制封闭母线 `PBT`；目录称 IP00 变压器带有封闭母线端子，现场三方向可调 `±15mm`，连接或拆卸最快约 `1h`。\n\n## Key Quotes\n> \"Trihal系列树脂浇注干式变压器\" — 封面标题\n\n> \"Trihal是世界上仅有的几个已通过E3、C3、F1试验认证的干变产品之一\" — 技术与认证卖点\n\n## Connections\n- [[Trihal]] — 本目录核心产品线对象。\n- [[干式变压器]] — 文档主体技术类别。\n- [[施耐德电气]] — 产品线所属厂商与本地化生产主体上级公司。\n- [[FBX]] — 文档把施耐德的本地化综合优化配电方案写成从中压开关、变压器到低压终端配电的连续链条，可与现有二次配电设备页形成配电系统连接。\n- [[RM6]] — 同属施耐德配电产品组合中的中压侧对象，可作为系统集成边界参考。\n\n## Contradictions\n- 与现有开关柜类页面不构成直接冲突，但资料范围明显不同：它描述的是干式变压器而不是开关柜，不应把 `IP00/IP21/IP44`、`E3/C3/F1`、局放 `<5pC` 或风冷增容 `50%` 等口径迁移到开关柜页面。\n- 目录中的企业介绍采用 `2014` 财年附近的历史口径，例如施耐德全球销售额、中国办事处和员工数，与后续 `2018~2025` 开关柜目录中的企业规模数字并不一致，应按版本时间理解。\n- 文档同时使用 `Trihal` 品牌名和 `SCB/SCBH/SC10` 中国本地系列型号，说明它不是单一型号手册，而是一个包含本地化系列的产品目录，不宜把 `Trihal` 简化成一台标准样机。\n",
    "preview": "## Summary 这份 `2016-05-10` 元数据日期的中文产品目录把知识库从中压开关柜扩展到了施耐德的干式变压器路线。它既介绍了 [[Trihal]] 树脂浇注干式变压器的技术卖点和试验边界，也给出了中国本地化产品谱系，包括 `SCB10/11/12/13`、`SCBH15` 和 `SC10` `35kV` 级配电/电力变压器参数、外形尺寸、防护外壳、温控与强迫风冷、安装通风和安全距离要求。 ## Key Claims",
    "group": 0,
    "value": 14
  },

    "markdown": "---\ntitle: \"WI-G 27.5kV 铁道用气体绝缘开关柜 产品目录\"\ntype: source\ntags: [wig, railway, gas-insulated, switchgear, catalog]\ndate: 2018-10-17\nsource_file: raw/一次气体绝缘开关柜/WI-G27.5kv铁道用气体绝缘开关柜.pdf\n---\n\n## Summary\n这份 `SCDOC1543 / 2018.10` 中文产品目录把 [[WIG]] / WI-G 明确写成面向铁路一次供电变配电开关站的 `27.5kV` 铁道用 [[气体绝缘开关柜]]。与现有偏运行维护的 [[wi-g-railway-gas-insulated-switchgear-operation-instructions]] 不同，它是一层更早的产品目录资料，重点放在 `27.5/2×27.5kV` 牵引供电口径、模块化功能单元、[[BLink]] 母线连接、前接线电缆方案、尺寸重量和土建安装图。\n\n## Key Claims\n- [[WIG]] / WI-G 被定位为气体绝缘金属封闭中压开关设备，专用于输电和配电系统，满足铁路供电各种一次供电变配电站要求。\n- 文档强调 WI-G 是单母线系统的紧凑、模块化、寿命期免维护开关柜，现场安装、扩展和拆除时通过 [[BLink]] 实现无需气体处理。\n- 技术特征页给出牵引供电口径：额定电压 `27.5/2×27.5kV`，最高电压 `31.5kV`，额定雷电冲击耐受电压 `200/325kV`，额定工频耐受电压 `95/140kV`，母线与出线额定工作电流 `≤2500A`，额定峰值耐受电流 `≤80kA`，额定短路开断电流 `≤31.5kA`，额定短时耐受电流 `≤31.5kA(4s)`。\n- WI-G 成功通过 `IAC` 抗内部电弧故障试验，最大参数为 `31.5kA / 1s`。\n- 主回路防护等级为 `IP65`，操作机构 `IP2X`，低压箱和电缆室 `IP3X`，可选 `IP5X`。\n- 功能单元围绕断路器模块、母线 PT 模块、母线避雷器模块、母线接地模块、母线越区开关和母线带电显示展开；断路器模块采用真空断路器、二/三工位隔离/接地开关和机械/电气联锁。\n- 气箱按 `IEC 62271-200`、`GB/T 11022` 要求设计成密封压力系统，每台柜标准配置气体状态显示器；每个气室由压力传感器单独监测，一个显示器最多可接三个压力传感器，并可远传报警。\n- 电压检测系统支持组合式 [[IVIS]] 与插入式电压检测系统；电缆连接采用前接线内锥系统，按 `EN 50181` 选用 3 号电缆插头，也可选 `Connex` 4 号终端，每相最多可接 4 根插座。\n- 尺寸重量页给出进出线柜和母线分段联络柜宽度 `600/750/800mm`，深度 `1340mm`，带泄压通道时深度 `1595mm`，高度随低压箱为 `2180/2380/2580/2780mm`，重量大约 `650kg` 到 `1380kg`。\n\n## Key Quotes\n> \"WI-G是一种经济型开关，当安装、扩展拆除时，可从任一开关柜进行拼接，由于采用了创新的母线连接B—link，现场不需要任何气体处理。\" — 安装与扩展特点\n\n> \"WI-G设计成标准的靠墙安装。它不需要安装通道。所有的操作和维护过程可在柜前完成。\" — 土建与运维边界\n\n## Connections\n- [[WIG]] — 文档把 WIG/WI-G 从演示稿与操作说明书进一步补成 `2018.10` 的正式产品目录层。\n- [[施耐德电气]] — 文档保留 `2017` 财年 `247 亿欧元 / 14.2 万员工 / 中国超过 17000 名员工 / 23 家工厂 / 8 个物流中心 / 9 个分公司 / 37 个办事处` 的公司介绍页。\n- [[气体绝缘开关柜]] — WI-G 属于 `SF6` 气体绝缘金属封闭路线。\n- [[金属封闭开关设备]] — 目录明确它是金属封闭中压开关设备，并给出 `IP65` 主回路与 `IAC` 口径。\n- [[BLink]] — 目录把 B-link 写成无需现场气体处理的核心母线连接技术。\n- [[IDIS]] — 目录给出气体状态显示器、压力传感器和远传报警架构。\n- [[IVIS]] — 目录列出智能式电压监测系统 IVIS 和插入式电压检测系统。\n- [[气室监测]] — 每个气室单独监测、独立泄压，并通过显示器统一汇总状态。\n- [[内部电弧防护]] — 文档给出 `31.5kA / 1s` 的 `IAC` 抗内部电弧故障试验口径。\n\n## Contradictions\n- 与 [[wi-g-railway-gas-insulated-switchgear-operation-instructions]] 不冲突，而是资料层级不同：本页是 `2018.10` 的 `27.5kV` 产品目录，强调牵引供电参数、模块和土建；操作说明书则偏 `31.5kV` 设备运行、联锁与维护。\n- 现有操作说明书使用铭牌示例 `WI-G 31-25-20`，并按最高电压 `31.5kV` 运行维护口径描述设备；本页则更明确地把应用电压写成铁路牵引系统常见的 `27.5/2×27.5kV`。当前更适合把两者视为同一 WI-G 设备族在“应用额定电压”与“最高设备电压/运维标识”上的不同表达层，而不是直接冲突。\n",

  {
    "id": "sources/wi-g-railway-gas-insulated-switchgear-operation-instructions",
    "label": "WI-G 铁道用气体绝缘金属封闭开关设备 操作说明书",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\wi-g-railway-gas-insulated-switchgear-operation-instructions.md",
    "markdown": "---\ntitle: \"WI-G 铁道用气体绝缘金属封闭开关设备 操作说明书\"\ntype: source\ntags: [manual, railway, gas-insulated, switchgear]\ndate: 2020-08-23\nsource_file: raw/MVE/WSG/WI-G 铁道用气体绝缘金属封闭开关设备 操作说明书.pdf\n---\n\n## Summary\n这份操作说明书介绍 [[WIG]] 铁道用 [[气体绝缘开关柜]] 的使用范围、额定参数、典型柜型、绝缘气体监控、电压检测、运行操作、联锁与维护要求。它把 WI-G 定位为铁道牵引供电/配电场景下的中压 [[金属封闭开关设备]]，采用 SF6 密封压力系统、真空灭弧室、[[BLink]] 母线连接、[[IDIS]] 气体监测和 [[IVIS]]/插入式 VDS 电压检测。\n\n## Key Claims\n- WI-G 是铁道用气体绝缘金属封闭开关设备，英文标题为 `Gas-Insulated Switchgear for railway application`。\n- 使用范围章节说明，WI-G 型气体绝缘中压开关设备专用于输电和配电系统，只能在规定技术参数范围内使用。\n- WI-G 系列开关柜为金属封闭、SF6 绝缘、通过型式试验、通过抗内部电弧故障试验，并设计用于户内安装。\n- 说明书列出 IEC 62271-200、IEC 62271-100、IEC 62271-102、IEC 61243-5、IEC 60529、IEC 60376 等适用标准。\n- 正常环境条件按 IEC 60694 / GB/T 11022 口径，温度等级为“室内 -5”，环境温度 -5℃~40℃，24h 平均温度不超过 35℃，安装海拔不超过 1000m。\n- WI-G 铭牌示例 `WI-G 31-25-20` 表示 WI-G 铁道用气体绝缘开关柜系列、额定电压 31.5kV、额定短时耐受电流 25kA、额定工作电流 2000A。\n- WI-G 系列额定值包括额定电压 31.5kV、雷电冲击耐受电压 200kV、短时工频耐受电压 95kV、母线/出线额定工作电流 ≤2500A、额定峰值耐受电流 ≤80kA、额定短路开断电流 ≤31.5kA、额定短时耐受电流 ≤31.5kA/4s、额定频率 50/60Hz。\n- 柜体可配置内锥型电缆连接的 WI-G 断路器柜、母线联络柜、母线电压互感器、母线避雷器和母线接地开关等方案。\n- 典型断路器柜结构包括带三工位开关的母线室、运输吊环、母线连接 [[BLink]]、带真空灭弧室的断路器室、电流互感器、内锥型电缆连接、可选电压互感器、电缆室门、VDS 电压指示、[[IDIS]] 绝缘气体监测指示、操作面板、低压箱和 IDIS 气体密度开关。\n- 绝缘气体为符合 IEC 60376 要求的 SF6；气箱按 IEC 62271-200 设计为密封压力系统，正常使用寿命期间和正常操作条件下不用再补充绝缘气体。\n- WI-G 的 [[IDIS]] 额定充气压力为 0.06MPa，压力下降预报警值为 0.05MPa，主报警值为 0.03MPa，基准条件为 20℃、绝对大气压力 101.3kPa。\n- IDIS 用彩色 LED 显示最多三个气体密度开关信号，并可通过通信线缆把信号传到遥控或 I&C 系统；绿色表示运行准备，黄色表示压力降低预警，红色表示压力降低主报警。\n- 电压检测系统章节包含组合式 [[IVIS]] 和插入式电压检测系统；IVIS 满足 IEC 61243-5，不需要外接辅助电源，具备密封一体、耐气候、免维护和可长期监测带电状态的特点。\n- 运行章节详细列出手动操作面板、断路器操作、隔离开关/接地开关操作、标准开关操作、母线接地和机械联锁逻辑。\n- 机械联锁用于防误操作，限制隔离/接地开关插孔、手柄拔出、断路器合闸按钮、断路器合闸脉冲以及多个联锁杆同时打开等状态。\n- 维护章节说明，高压元件即真空断路器、隔离开关和接地开关免维护；开关柜至少每两年目视检查一次。\n- 维护计划包括每 2 年外观检查和清洁、断路器循环 1000 次后或每 4 年润滑操动机构并进行开关试验、每 1 年建议局放检查、每 2 年建议二次元件检查、断路器/隔离/接地开关循环 2000 次后更换部分二次/驱动部件、每 6 年检查 PT 绝缘件并评估 [[BLink]] 和堵头是否更换。\n- 一旦达到真空室最大允许开断操作次数，或断路器/隔离开关/接地开关操作循环达到 10000 次，维护计划要求更换开关柜。\n\n## Key Quotes\n> \"WI-G 型气体绝缘中压开关设备专用于输电和配电系统。\" — 使用范围\n\n> \"正常使用寿命期间...不用再补充绝缘气体。\" — 绝缘气体监控\n\n## Connections\n- [[WIG]] — 本说明书把已有高铁智能开关柜方案对象补全为铁道用气体绝缘开关设备本体。\n- [[施耐德电气]] — 说明书封面和服务章节均为施耐德电气中压配电资料口径。\n- [[气体绝缘开关柜]] — WI-G 属于 SF6 气体绝缘中压开关柜。\n- [[金属封闭开关设备]] — WI-G 是金属封闭中压开关设备，并引用 IEC 62271-200。\n- [[IDIS]] — WI-G 使用 IDIS 做气体密度状态显示和远方信号输出。\n- [[IVIS]] — WI-G 可使用 IVIS 做组合式电压检测。\n- [[BLink]] — WI-G 方案图把 B-Link 作为母线连接。\n- [[气室监测]] — 说明书给出 SF6 密封压力系统、IDIS 额定压力和报警阈值。\n- [[内部电弧防护]] — 说明书强调通过抗内部电弧故障试验，并说明内部电弧故障时通过泄压通道保障 IEC 62271-200 规定的人员安全。\n\n## Contradictions\n- 未发现与现有 wiki 的直接冲突。需要注意的是，既有 [[WIG]] 演示稿偏数字化变电站和智能监测集成，本说明书偏 31.5kV 铁道用 GIS 一次设备、运行操作和维护，两者应视为同一 WI-G/WIG 设备族的不同资料层级。\n",
    "preview": "## Summary 这份操作说明书介绍 [[WIG]] 铁道用 [[气体绝缘开关柜]] 的使用范围、额定参数、典型柜型、绝缘气体监控、电压检测、运行操作、联锁与维护要求。它把 WI-G 定位为铁道牵引供电/配电场景下的中压 [[金属封闭开关设备]]，采用 SF6 密封压力系统、真空灭弧室、[[BLink]] 母线连接、[[IDIS]] 气体监测和 [[IVIS]]/插入式 VDS 电压检测。 ## Key Claims",

  {
    "id": "sources/wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window",
    "label": "WIG 高铁智能开关柜 交大运达保护 帕斯菲克视窗",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window.md",
    "markdown": "---\ntitle: \"WIG 高铁智能开关柜 交大运达保护 帕斯菲克视窗\"\ntype: source\ntags: [wig, smart-switchgear, high-speed-rail, digital-substation]\ndate: 2018-04-01\nsource_file: raw/MVE/WIG/WIG高铁智能开关柜-交大运达保护-帕斯菲克视窗.ppt\n---\n\n## Summary\n这份演示稿介绍了 [[WIG]] 高铁智能开关柜的数字化变电站方案，重点不是传统一次设备参数，而是 [[数字化变电站]] 架构、IEC 61850 思路、保护测控、合并智能单元、光纤通信、网关、后台系统和 [[智能监测显示终端]] 的集成。它把当前 wiki 的数字化运维知识从施耐德 PIX/Smart PIX 叙事扩展到高铁牵引供电或高铁配电场景下的多厂家智能开关柜系统。\n\n## Key Claims\n- [[数字化变电站]] 被定义为信息采集、传输、处理、输出过程完全数字化的变电站，基本特征包括设备智能化、通信网络化和运行管理自动化。\n- 演示稿按 IEC 61850 的思路把数字化变电站分为过程层、间隔层和站控层：过程层包括合并单元和智能单元，间隔层包括保护装置和测控装置，站控层包括监控、远动和故障信息子系统。\n- 数字化变电站的价值包括减少二次接线、提升测量精度、提高信号传输可靠性，并降低电缆带来的电磁兼容、传输过电压和两点接地问题。\n- WIG 工厂简易系统框图包括网关、保护测控装置、合并智能单元、光交换机、辅助监控后台系统、保护测控后台系统和智能监测显示终端。\n- 在线监测对象包括断路器特性、三工位开关、SF6 密度、高压带电、避雷器状态、储能电机、断路器分合闸回路电流、气室温度、柜内温度和自动加热除湿控制。\n- 设备供应边界中，[[成都交大运达]] 提供保护测控相关设备，[[常州帕斯菲克]] 提供视窗/后台相关设备，[[深圳昇伟电子科技]] 提供智能监测显示终端相关设备。\n- 通讯链路包括 Modbus-RTU、光纤、网线、双绞线和规约转换，系统图中写有 Modbus-RTU 转 IEC61580。\n\n## Key Quotes\n> \"数字化变电站：指信息采集、传输、处理、输出过程完全数字化的变电站\" — 定义页\n\n> \"一次设备在线状态监测（状态监测和故障诊断）使设备状态可视化：节省检修及时间成本\" — 与传统变电站区别页\n\n## Connections\n- [[WIG]] — 文档核心高铁智能开关柜对象。\n- [[数字化变电站]] — 演示稿的总体系统架构。\n- [[智能监测显示终端]] — WIG 方案中的关键人机界面和状态监测汇聚装置。\n- [[数字化中压运维]] — 该资料从高铁应用角度补充状态可视化、保护测控后台和辅助监控后台。\n- [[气室监测]] — WIG 方案包括 SF6 密度和气室温度在线监测。\n- [[温度智能监测]] — WIG 方案包括开关柜温度在线监测和温度控制。\n- [[成都交大运达]] — 保护测控设备提供方。\n- [[常州帕斯菲克]] — 视窗/后台相关设备提供方。\n- [[深圳昇伟电子科技]] — 智能监测显示终端相关设备提供方。\n\n## Contradictions\n- 演示稿正文强调 IEC 61850，但系统框图多处写作 “IEC61580”。结合上下文和行业标准，这很可能是 IEC 61850 的笔误；后续引用规约时应优先核对原始工程图纸或设备通信清单。\n- WIG 资料提到 SF6 密度在线监测，因此它可能涉及气室/SF6 设备，但演示稿未给出完整柜型、绝缘介质和额定参数，暂不把 WIG 归入 [[气体绝缘开关柜]] 或具体电压等级。\n",
    "preview": "## Summary 这份演示稿介绍了 [[WIG]] 高铁智能开关柜的数字化变电站方案，重点不是传统一次设备参数，而是 [[数字化变电站]] 架构、IEC 61850 思路、保护测控、合并智能单元、光纤通信、网关、后台系统和 [[智能监测显示终端]] 的集成。它把当前 wiki 的数字化运维知识从施耐德 PIX/Smart PIX 叙事扩展到高铁牵引供电或高铁配电场景下的多厂家智能开关柜系统。 ## Key Claims",
