    "markdown": "---\ntitle: \"风能解决方案\"\ntype: source\ntags: [wind-energy, solutions, schneider-electric, medium-voltage, monitoring]\ndate: 2018-10-01\nsource_file: raw/二次气体绝缘开关柜/FBX/风能解决方案.pdf\n---\n\n## Summary\n这份 `SCDOC1273 / 2018.10` 中文资料不是单一产品目录，而是施耐德面向风电行业的系统级解决方案总册。它把风能场景拆成四组方案：风力发电机组系统、风场连接系统、并网电站系统，以及电力监控与视频安防系统，并把 [[FBX]]、[[FLUSARC]]、[[WSG]]、[[DNF7]]、[[Trihal]]、[[Premset]]、[[PLSCADA]] 和 [[iRIO]] 等产品与系统对象放进同一套风电叙事。与已有 `FBX`、`DVCAS` 等单产品资料相比，这份来源的价值不在补单柜细表，而在于补清施耐德 `2018` 时点对风机、风场连接、并网升压站和监控安防的一体化方案视角。\n\n## Key Claims\n- 资料将施耐德风能市场方案分成四类：风力发电机组系统方案、风场连接系统方案、并网电站系统方案、电力监控及视频安防系统方案。\n- 风机系统章节强调中压设备需适应 `600mm` 宽塔筒门和 `2000m` 海拔机内安装语境，并把低压导电轨、低压配电柜、[[Premset]] 紧凑型中压开关柜、[[Trihal]] 升压变压器、接触器、空气断路器、PLC、HMI、UPS 和机柜组成一整套主电路与控制辅助系统。\n- 其中 [[Premset]] 页给出 `12kV`、`630/1250A`、`20kA x 4s`、`25kA x 3s`、`25kA x 4s`、`31.5kA x 4s`、`375mm` 宽度和 `700mm` 前端对齐电缆连接等口径。\n- 风场连接章节明确写到中压开关设备特别紧凑，宽度小于 `60cm`，可通过风机塔筒门，并列出预装式箱式变电站可选 `RM6`、`FBX`、`FLUSARC` 等不同型号开关设备。\n- [[FLUSARC]] 被定位为 `40.5kV`、`SF6` 绝缘、真空断路器的环网开关设备，适用于系统标称电压最高至 `35kV` 的场内连接和风机变压器保护，并注明适用于海上及陆上型风机。\n- [[FLUSARC]] 页给出典型组合 `C-C-C-CB`、`C-C-CB`、`CBL`，以及 `40.5kV`、`630A`、工频耐压 `95/118kV`、雷电冲击 `185/215kV`、`-5℃~+40℃` 可选 `-30℃` 等口径。\n- 并网电站章节把 [[WSG]]、[[DNF7]]、[[HVX]] 以及 `FP 40.5kV SF6` 断路器并列为场站侧主要设备，并补出当时的组合口径：[[WSG]] `40.5kV / 2500A / 40kA / 4秒`、[[DNF7]] `40.5kV / 3150A / 31.5kA / 4秒`。\n- 电力监控章节以 [[PLSCADA]] 为中心变电站综合自动化系统软件，以 [[iRIO]] 为风机侧智能终端，并配合 `ION7650`、`PowerLogic`、`MiCOM`、`Sepam`、`DLR`、`LOM` 和 `Pelco` 视频安防形成风场集中监控方案。\n- [[iRIO]] 页给出中低压开关状态、柜门、告警、温湿度监测，`16` 个 `DI/DO`、`16` 个 `AI`、内置 Web 服务器、无线传输、email/SMS 报警等能力。\n- 末页尾标为 `SCDOC1273 / 2018.10`，属于施耐德电气（中国）有限公司发布的系统级风能资料。\n\n## Key Quotes\n> \"施耐德电气可以为风电市场提供4个全新的解决方案\" — 对整本资料结构的直接概括。\n\n> \"开关设备我们设计的特别紧凑，其宽度小于60cm，使其可以通过风机的塔筒门。\" — 对风场连接设备安装边界的直接表述。\n\n## Connections\n- [[施耐德电气]] — 资料所属厂商与系统集成主体。\n- [[FBX]] — 风场连接和箱变方案中的可选中压开关设备。\n- [[FLUSARC]] — 风场连接章节中的 `40.5kV` 环网开关设备。\n- [[WSG]] — 并网电站章节中的 `40.5kV` SF6 充气绝缘柜。\n- [[DNF7]] — 并网电站章节中的 `40.5kV` 空气绝缘柜。\n- [[Premset]] — 风机系统章节中的紧凑型中压开关柜。\n- [[Trihal]] — 风机系统和并网侧章节中的变压器对象。\n- [[PLSCADA]] — 中心变电站综合自动化系统软件。\n- [[iRIO]] — 风机监控侧智能终端。\n- [[数字化中压运维]] — 资料把风机、风场和升压站监控整合成远程管理、事件记录、电能质量分析和视频安防链路。\n\n## Contradictions\n- 与现有 [[FBX]]、[[DVCAS]]、[[WSG]]、[[DNF7]] 等来源不构成直接冲突；这份资料更像 `2018` 时点的行业解决方案总册，而不是单产品工程目录。\n- 并网电站章节中的参数与各产品独立目录相比应视为方案宣传口径，后续工程选型仍应优先以对应产品正式目录或标准为准。\n",
    "preview": "## Summary 这份 `SCDOC1273 / 2018.10` 中文资料不是单一产品目录，而是施耐德面向风电行业的系统级解决方案总册。它把风能场景拆成四组方案：风力发电机组系统、风场连接系统、并网电站系统，以及电力监控与视频安防系统，并把 [[FBX]]、[[FLUSARC]]、[[WSG]]、[[DNF7]]、[[Trihal]]、[[Premset]]、[[PLSCADA]] 和 [[iRIO]] 等产品与系统对象放进同一套",

  {
    "id": "sources/wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018",
    "label": "WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜 产品目录 2018",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018.md",
    "markdown": "---\ntitle: \"WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜 产品目录 2018\"\ntype: source\ntags: [catalog, switchgear, gas-insulated, medium-voltage]\ndate: 2018-09-13\nsource_file: raw/MVE/WSG/交流金属封闭气体绝缘开关柜 WS-G 12_40.5kV 产品目录.pdf\n---\n\n## Summary\n这份 `SCDOC1541 / 2018.09` 产品目录是当前 wiki 中早于 `2024.01` 版的 [[WSG]] 产品级资料。它从概述、优点和改善、关注细节、运行条件与技术特性、尺寸重量、主接线方案、应用范例以及发货运输订货要求等角度，给出一个偏工程选型的早期口径：额定电压至 `40.5kV`、额定电流至 `2500A`、额定开断电流至 `31.5kA`，并强调 [[BLink]]、[[IDIS]]、`DXN8B` VDS、可选 [[IVIS]] 和靠墙安装等特征。`2026-06-09` 补入的 `raw/一次气体绝缘开关柜/WS-G 40.5kV气体绝缘开关柜产品目录.pdf` 与当前来源文件 `raw/MVE/WSG/交流金属封闭气体绝缘开关柜 WS-G 12_40.5kV 产品目录.pdf` 的 `SHA256` 完全一致，属于同一 PDF 的重命名副本，不构成新的 WS-G 版本层。\n\n## Key Claims\n- 封面标题为“交流金属封闭气体绝缘开关柜 WS-G 12~40.5kV 产品目录”，末页印有文档号 `SCDOC1541` 和日期 `2018.09`。\n- 目录将 WS-G 定位为“安全、可靠、环保”以及“简单、创新、经济”的气体绝缘开关柜，适用于公共和工业配电网、基础设施工程、采矿、冶金、石油化工、燃油燃气、铁路供电、集装箱基地和船舶行业。\n- 这版目录的产品口径是额定电压可至 `40.5kV`、额定电流可至 `2500A`、额定开断电流可至 `31.5kA`，可设计为单母线或双母线系统。\n- 用户受益部分强调：扩展和柜子更新时无需气体处理、创新的耐故障母线连接、友好的操作界面、操作可靠性和人员操作安全、寿命期成本低以及环保易回收。\n- [[BLink]] 被描述为创新母线连接系统：每台柜母线位于独立充气室内，现场安装容易且无需气体处理；扩展或更换开关柜时不影响气室；硅橡胶绝缘件在工厂已安装并做局放试验；现场安装可视；拆卸后可形成绝缘距离；必要时可分段测量母线电阻。\n- 目录强调 WS-G 可标准靠墙安装，不需要安装通道，所有操作和维护过程都可在柜前完成，也可选择独立式安装方式。\n- 通用模块包括：内锥/外锥进出线断路器柜、高压出线侧带隔离/接地开关的 PT、双母线母线联络合柜、带断路器的母线分段和提升合柜、母线分断柜、计量柜，以及 PT、接地开关、避雷器和母线带电显示等母线辅助模块。\n- 断路器柜说明中，真空断路器安装在金属封闭充气室内；单母线模块装三工位隔离/接地开关和母线系统；双母线模块由上部气室三工位开关和后部气室二工位隔离开关构成。\n- 目录把问答式机械联锁写为关键安全特征：断路器弹簧机构支持连续自动重合闸，断路器与二/三工位隔离接地开关的问答式机械联锁可避免误操作。\n- [[IDIS]] 被明确写为每个气室的气体密度监控系统：气体状态由压力传感器检测，经电子信号送到柜前 IDIS 显示器；每个气室监测信号独立；一个显示器最多可连接三个压力传感器；报警信号可通过接点远传。\n- 目录给出额定充气压力、预警压力和报警压力：`12~24kV` 为 `0.030 / ≤0.030且>0.010 / ≤0.010MPa`，`36kV` 为 `0.050 / ≤0.030且>0.010 / ≤0.010MPa`，`40.5kV` 为 `0.060 / ≤0.050且>0.030 / ≤0.030MPa`。\n- 电压检测采用 VDS 方案：带电测试通过电缆插座内的电容分压器实现，标准配置为 `DXN8B` 户内高压带电显示装置；也可选用 [[IVIS]] 智能化电压检测系统。\n- 电缆连接系统给出外锥和内锥两条路线：外锥按 `EN 50181 C` 型、适用于 `33kV` 电网、最高只能达到 `36kV`；内锥按 `EN 50181`、适用于 `35kV` 电网，并可配 2/3/4 号终端与避雷器。\n- 运行环境条件按 IEC 62271-1 / IEC 60694 口径给出：最高温度 `40℃`、24 小时平均 `35℃`、室内最低 `-5℃/-25℃`，安装高度 `1000m`，更高值按要求提供。\n- 技术特性表给出：雷电冲击耐受 `75/125/170/185kV`，工频耐受 `28/42, 50/65, 70, 95kV`，峰值耐受 `100kA`，短时耐受电流最大 `40kA`（40.5kV 为 `40kA/4s`），额定母线电流和出线柜额定电流最大均为 `2500A`，抗内部电弧等级最大 `40kA 1s`。\n- 尺寸表给出单母线与双母线在 `12~36kV` 和 `40.5kV` 下、`800~1600A / 2000A / 2500A` 不同电流等级对应的柜宽、柜深和柜高；重量表给出外锥出线柜约 `700kg`、内锥出线柜约 `1000kg`、内锥进线柜约 `900kg`、母线分段柜约 `1100kg`。\n- 目录列出典型单母线和双母线主接线方案，并补充 PT、接地开关、避雷器、母线带电显示等母线辅助模块，以及土建基础图和空间分布图。\n- 发货文件包括合格证、出厂检验报告、装箱与备件清单、使用说明书、设备规范表和辅助回路接线图；订货资料要求电气参数、单线图、保护控制监测资料、布置图、门廊和运输通道尺寸等。\n\n## Key Quotes\n> \"WS-G 安全 · 可靠 · 环保\" — 概述页产品定位\n\n> \"WS-G 简单 · 创新 · 经济\" — 概述页产品定位\n\n## Connections\n- [[WSG]] — 这是早于 `2024.01` 目录的产品级来源，补齐 2018 版工程选型口径。\n- [[施耐德电气]] — 目录第 2 页和末页给出 2017 财年与中国区历史口径。\n- [[BLink]] — 本目录系统说明 B-link 在工厂局放、现场可视安装、拆装后绝缘距离和分段电阻测量方面的细节。\n- [[气室监测]] — 本目录详细给出 `IDIS`、压力传感器、独立气室和预警/报警压力阈值。\n- [[IDIS]] — 目录明确 IDIS 显示器可接最多三个压力传感器，并支持报警接点远传。\n- [[IVIS]] — 目录把 `DXN8B` 作为标准 VDS，把 `IVIS` 作为可选智能化电压检测系统。\n- [[气体绝缘开关柜]] — 目录强调 SF6 充气密封气室、靠墙安装、现场无需气体处理和寿命期免维护。\n- [[金属封闭开关设备]] — 资料从断路器柜、单母线/双母线模块、电缆连接、低压箱和土建基础角度展开柜体结构。\n- [[内部电弧防护]] — 目录给出 IAC 最大 `40kA 1s` 以及每个气室独立泄压装置口径。\n\n## Contradictions\n- 这份 2018 目录把 WS-G 常规产品口径写为 `2500A / 31.5kA / 1000m`，而 `2024.01` 产品目录与 `2024` 企业标准已更新为最高 `3150A / 40kA / 5500m` 的口径；它们应视为版本演进而非简单冲突。\n- 2015 企业标准和部分图片页保留 `4000A` 主母线或双母线应用口径，而这份 2018 目录与 2024.01 目录都未把 `4000A` 作为常规参数表主口径；工程引用时需要区分“标准代码/特定方案”和“目录常规产品”。\n- 本目录将 `IVIS` 作为可选项、标准带电显示为 `DXN8B` VDS；操作说明书则把 `IVIS/VDS` 放在统一电压检测系统章节下描述，属于资料角度差异，不构成功能冲突。\n- `2026-06-09` 新补入的 `WS-G 40.5kV气体绝缘开关柜产品目录.pdf` 与现有 `交流金属封闭气体绝缘开关柜 WS-G 12_40.5kV 产品目录.pdf` 哈希一致：`84DB9BF540F96FD39F5E5F6CD9A317BAAACE3CA0CFD5995EE34A0A83C489AE6F`，因此按同版重命名副本处理，而非新增来源页。\n",
    "preview": "## Summary 这份 `SCDOC1541 / 2018.09` 产品目录是当前 wiki 中早于 `2024.01` 版的 [[WSG]] 产品级资料。它从概述、优点和改善、关注细节、运行条件与技术特性、尺寸重量、主接线方案、应用范例以及发货运输订货要求等角度，给出一个偏工程选型的早期口径：额定电压至 `40.5kV`、额定电流至 `2500A`、额定开断电流至 `31.5kA`，并强调 [[BLink]]、[[IDIS]]、`",

    "markdown": "---\ntitle: \"WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜 产品目录\"\ntype: source\ntags: [catalog, switchgear, gas-insulated, medium-voltage]\ndate: 2024-01-03\nsource_file: raw/MVE/WSG/WS-G 交流金属封闭气体绝缘开关柜SCDOC1541_20240103 2 (1).pdf\n---\n\n## Summary\n这份 2024.01 产品目录从产品与工程选型角度介绍 [[WSG]] 12~40.5kV 交流 [[气体绝缘开关柜]]。它补充了企业标准之外的应用行业、B-link 母线连接、模块配置、气室压力阈值、电缆连接、尺寸重量、主接线方案、运输贮存和订货资料要求。\n\n## Key Claims\n- WS-G 适用于公共和工业配电网、基础设施、采矿、冶金、石油化工、燃油燃气、铁路供电、集装箱基地和船舶行业。\n- 产品目录给出额定电压至 40.5kV、额定电流至 3150A、额定开断电流至 40kA 的产品口径，支持单母线或双母线系统。\n- WS-G 采用紧凑模块化设计，适合空间受限项目或利用现有地基的升级改造；柜前即可完成拼接、安装、扩展、拆除和维护。\n- [[BLink]] 使相邻柜母线连接不需要现场气体处理，扩展或更换柜体时也不影响气室。\n- 每台 WS-G 的母线位于独立充气室内并纳入绝缘气体监测系统；每个气室都有独立气体密度监测和泄压装置。\n- 目录给出气室额定充气压力、预警压力和报警压力：40.5kV 额定 0.060MPa，预警区间为 ≤0.050MPa 且 >0.030MPa，报警为 ≤0.030MPa。\n- VDS 通过电缆插座内的电容分压器显示带电状态，显示器布置在柜前控制面板下方，符合 IEC 61243-5 和 VDE 0682-415。\n- 外锥电缆插座按 EN 50181 C 型并适用于 33kV 电网，目录备注外锥连接最高只能达到 36kV；内锥电缆插座按 EN 50181 并适用于 35kV 电网。\n- 单母线和双母线方案覆盖断路器柜、隔离柜、母线提升、母线联络、母线分段、PT、接地开关、避雷器等功能模块。\n- 低压箱可按 600mm、800mm、1000mm 或 1200mm 高度组合，二次连接采用插拔式，低压箱可现场单独安装。\n- 发货资料包括合格证、出厂检验报告、装箱清单、使用说明书、设备规范表和辅助回路接线图；订货需提供电气参数、单线图、保护控制监测资料、布置图和运输通道尺寸等。\n\n## Key Quotes\n> \"安全，可靠，环保\" — 目录概述对 WS-G 的第一组产品定位。\n\n> \"简单，创新，经济\" — 目录概述对 WS-G 的第二组产品定位。\n\n## Connections\n- [[WSG]] — 本目录是 WS-G 产品级资料，补充应用、模块、安装扩展和订货信息。\n- [[施耐德电气]] — 文件末尾标识为施耐德电气（中国）有限公司产品目录。\n- [[气体绝缘开关柜]] — 资料说明带电中压元件位于 SF6 充气密封气室中。\n- [[金属封闭开关设备]] — 目录从柜体结构、功能模块、隔室和主接线角度展开金属封闭设备。\n- [[BLink]] — 目录系统说明 WS-G 母线连接在现场无气体处理条件下安装、扩展和更换。\n- [[气室监测]] — 目录给出不同电压等级的额定充气压力、预警压力和报警压力。\n- [[内部电弧防护]] — 目录把 IAC 40kA/1s 写入人员安全与产品参数口径。\n- [[IDIS]] — 目录中的气体密度/压力状态监测与已有 IDIS 主题相邻，但本目录正文主要使用机械或电气检测装置、密度表和压力阈值表述。\n- [[IVIS]] — 目录使用 VDS 带电显示口径，与已有电压检测主题相邻。\n\n## Contradictions\n- 2015 版企业标准保留 4000A 主母线口径，2024 企业标准和本产品目录给出最高 3150A 的常规产品口径；40.5kV 图片页又给出 4000A 双母线应用参数。当前应视为版本、配置或项目应用口径差异，工程引用需回到具体项目文件确认。\n- 本目录说明外锥电缆连接最高只能达到 36kV，而 WS-G 整机覆盖到 40.5kV；这不是整机电压等级矛盾，而是电缆连接形式的适用边界。\n",

  {
    "id": "sources/wsg-2014-06-27-product-presentation",
    "label": "WS-G 40.5kV及以下气体绝缘开关柜 2014产品介绍",

    "color": "#4CAF50",
    "path": "wiki\\sources\\wsg-2014-06-27-product-presentation.md",
    "markdown": "---\ntitle: \"WS-G 40.5kV及以下气体绝缘开关柜 2014产品介绍\"\ntype: source\ntags: [presentation, switchgear, gas-insulated, medium-voltage]\ndate: 2014-06-27\nsource_file: raw/MVE/WSG/WS-G-2014-06-27.pdf\n---\n\n## Summary\n这份 2014-06 的施耐德开关（苏州）有限公司材料以产品介绍形式概述 [[WSG]] 40.5kV 及以下气体绝缘开关柜。它补充了 2014 年历史口径下的应用领域、额定参数、产品结构、[[BLink]]、[[气室监测]]、电缆连接、低压箱、五大特征、单/双母线接线方案和 2006-2014 年中国运行实例。\n\n## Key Claims\n- WS-G 应用领域覆盖 12~40.5kV 中压配电，标准型海拔 1000m，特殊型海拔 4000m。\n- 应用行业包括石油化工、工业、基建、供电、冶金、海运、交通和风场。\n- 2014 材料的额定参数表给出 12/17.5/24/36/40.5kV，雷电冲击耐受 75/95/125/170/185kV，工频耐受 28/38(42)/50/70/95kV。\n- 该材料给出主母线和馈线自然冷却额定电流 2500A，短时耐受电流 31.5kA/4s，峰值耐受电流最大 80kA，并注释 100kA/40kA 需咨询。\n- 标准和试验引用 IEC 62271-200、GB 3906 和 DL/T 404。\n- 产品结构包括断路器室、母线室、B-Link、控制面板、出线模块、电压互感器、电缆室和可拆卸低压箱。\n- 密封气室在整个寿命周期免维护，符合 IEC 62271-1，安装、排列扩展或拆卸过程中不需要充放气操作。\n- 每个气室有独立压力监视系统，气体泄漏率 <0.1% p.a.，气室装有自封阀用于寿命到期后的气体回收和再利用；泄压方向为向后和向上，释放通道可选。\n- [[BLink]] 被描述为独特母线连接，现场安装、扩展、开关更换和寿命期末拆卸均不需要 SF6 充放操作。\n- B-link 使用高性能硅橡胶套管使各相母线连接分别绝缘，并通过异常表面模拟绝缘试验；材料给出 44.5kV 局部放电试验 ≤2pC 和 100kV 工频耐压口径。\n- 气体密度监测系统无气体管路连接；气体密度继电器带温度补偿，可把气体压力转换成电信号，密度显示仪可显示压力数值并远传报警。\n- 友好操作界面包括清晰的控制面板、适宜手动操作装置位置、断路器/隔离开关/接地开关合分操作、馈线接地开关与断路器自动机械联锁，以及问答式强制闭锁。\n- 内锥电缆终端符合 EN 50181，满足 GB 标准 40.5kV 绝缘水平，标准 3# 内锥端子截面可达 630mm²，特殊 4# 端子截面可达 1200mm²，每相可配 4 个电缆套管。\n- 外锥电缆终端符合 EN 50181 C 型，达到 36kV 绝缘水平，额定电流 630A、增强型到 1250A，电缆截面到 630mm²；馈线 >1250A~2500A 时每相配 2 个外锥电缆套管。\n- 五大特征被概括为重视环保、工艺先进、运行经济、安全可靠、操作简单。\n- 运行实例清单覆盖广州地铁、成都地铁、上海轨道交通杨浦线、苏州供电局、武汉地铁、哈尔滨地铁、兰新二线、神华项目、福建中景石化、九江石化和青海盐湖集团等 2006-2014 年项目。\n\n## Key Quotes\n> \"重视环保 / 工艺先进 / 运行经济 / 安全可靠 / 操作简单\" — 材料对 WS-G 五大特征的概括。\n\n> \"在现场不需要作SF6气体充放操作\" — B-link 和密封气室相关的现场安装/扩展卖点。\n\n## Connections\n- [[WSG]] — 2014 年产品介绍视角，补充历史参数、产品结构、五大特征和运行实例。\n- [[施耐德电气]] — 材料发布主体为施耐德开关（苏州）有限公司。\n- [[气体绝缘开关柜]] — 资料强调 SF6 气体绝缘、密封气室和紧凑化。\n- [[金属封闭开关设备]] — 资料展示单/双母线柜体结构、隔室和低压箱。\n- [[BLink]] — 资料详细说明母线连接无现场气体处理、电场优化和局放/工频试验口径。\n- [[气室监测]] — 资料说明无气体管路的气体密度继电器、压力数值显示和报警远传。\n- [[内部电弧防护]] — 资料给出通过 31.5kA/1s 内部电弧故障试验的人员安全口径。\n- [[机械联锁]] — 资料把馈线接地开关与断路器自动机械联锁、问答式强制闭锁作为操作简单和防误操作卖点。\n\n## Contradictions\n- 2014 材料给出的常规自然冷却电流为 2500A，短路/短时口径为 31.5kA；2024 产品目录和企业标准出现 3150A/40kA 口径，40.5kV 图片页还出现 4000A 双母线口径。应按年份、配置和项目文件区分，不应把 2014 演示参数覆盖到后续版本。\n- 2014 材料称特殊型海拔 4000m，2024 企业标准把特殊使用条件海拔提高到 5500m；这是版本演进差异。\n",
    "preview": "## Summary 这份 2014-06 的施耐德开关（苏州）有限公司材料以产品介绍形式概述 [[WSG]] 40.5kV 及以下气体绝缘开关柜。它补充了 2014 年历史口径下的应用领域、额定参数、产品结构、[[BLink]]、[[气室监测]]、电缆连接、低压箱、五大特征、单/双母线接线方案和 2006-2014 年中国运行实例。 ## Key Claims",

    "markdown": "---\ntitle: \"WS-G 40.5kV 气体绝缘开关柜图片页\"\ntype: source\ntags: [image, switchgear, gas-insulated, offshore-wind]\ndate: 2020-02-12\nsource_file: raw/MVE/WSG/WSG 40.5kV 气体绝缘开关柜.JPG\n---\n\n## Summary\n这张图片页介绍 [[WSG]] 40.5kV [[气体绝缘开关柜]]，并把应用语境标注为海上风电 35kV 开关设备。它以截面图、参数框和产品优势说明形式，补充了 WS-G 在 40.5kV、双母线 4000A、40kA/3s、IAC 40kA/1s 场景下的宣传口径，并突出专利母线连接装置 [[BLink]]。\n\n## Key Claims\n- 图片标题为“WS-G 40.5kV 气体绝缘开关柜”，副标题标注“海上风电35kV开关设备”。\n- 图片说明选择 GIS 气体绝缘柜的理由包括耐腐蚀、可抵御恶劣运行环境、提供最佳供电连续性、提高操作者安全保护、维护工作量少。\n- 参数框给出额定电压 40.5kV、额定工频耐受电压 95kV、额定雷电冲击耐受电压 185kV。\n- 参数框给出额定短时耐受电流 40kA/3s、额定峰值耐受电流 100kA。\n- 参数框给出额定母线电流 4000A，并注明双母线。\n- 参数框给出抗内部电弧等级 IAC 40kA/1s。\n- 图片把“母线连接装置 [[BLink]]”标为专利技术。\n- 产品优势包括完善的联锁系统，确保操作人员时刻处于安全状态。\n- 图片说明带电中压部件安装在充有气体的密封气室中，不受风场恶劣环境影响。\n- 图片说明每个气室均有机械或电气检测装置，并分别具有独立的泄压装置。\n- 图片说明气箱由不锈钢铬镍钢制成，实现免维护。\n- 图片说明该方案可减少对升压站空间和占地面积的需求，从而节约成本。\n- 图片底部部分文字被头像遮挡，能辨认到安装/扩展以及 4500m 高海拔相关表述，但完整句子不可可靠读取，未纳入确定性结论。\n\n## Key Quotes\n> \"专利技术：母线连接装置B-LINK\" — 技术卖点\n\n> \"额定母线电流：4000A（双母线）\" — 参数框\n\n## Connections\n- [[WSG]] — 图片直接补充 WS-G 40.5kV 宣传参数和海上风电应用语境。\n- [[气体绝缘开关柜]] — 图片从耐腐蚀、密封气室、免维护和占地节约角度说明 GIS 价值。\n- [[金属封闭开关设备]] — 截面图展示带电部件、气箱、操作面板和柜体结构。\n- [[BLink]] — 图片把 B-LINK 母线连接装置作为专利技术卖点。\n- [[内部电弧防护]] — 参数框给出 IAC 40kA/1s。\n- [[气室监测]] — 图片说明每个气室有机械或电气检测装置和独立泄压装置。\n\n## Contradictions\n- 与 2015 版 [[WSG]] 企业标准中的 4000A 双母线/40.5kV 口径相互印证；与 2024 版企业标准最高 3150A 的口径存在版本差异，后续引用应标注资料版本或来源类型。\n",

    "markdown": "---\ntitle: \"WS-G 40.5kV 气体绝缘开关柜植入要点图片页\"\ntype: source\ntags: [image, switchgear, gas-insulated, feature-highlights]\ndate: 2020-02-12\nsource_file: raw/MVE/WSG/WSG特点.JPG\n---\n\n## Summary\n这张单页图片标题为“WS-G 40.5kV 气体绝缘开关柜 - 植入要点”，集中列出 15 条产品卖点，重点围绕断路器/三工位开关寿命、三相共箱结构、[[BLink]] 母线连接、内部电弧、柜宽、无源气体密度表和维护便利性。它不像企业标准或产品目录那样给出完整参数表，而是补充了一种偏销售和项目沟通场景的优势摘要口径。\n\n## Key Claims\n- 图片标题为“WS-G 40.5kV 气体绝缘开关柜 - 植入要点”，副标题为“产品优势”。\n- 开关柜采用与柜体同品牌的断路器真空灭弧室、操作机构和隔离/接地三工位开关。\n- 断路器机械寿命为 10000 次；隔离/接地三工位开关机械寿命也为 10000 次，并标注“提供型式试验报告”。\n- 采用三相共箱式结构，现场安装及母线连接时无需充放气处理。\n- 采用 [[BLink]] 方式实现主母线连接；当排列中任何一台开关柜需要移出时，无需进行气体处理，也不会影响相邻开关柜，从而实现快速移出和移入并减少母线断电时间。\n- 主母线侧可直接安装线电压互感器和避雷器；母线电压互感器与主母线间需设置隔离/接地开关，方便维护和检修。\n- 电缆侧安装电压互感器时，与一次回路间同样可设置隔离/接地开关，方便维护和检修。\n- 图片给出气体年泄漏率“小于 0.01%/年”，并标注“提供型式试验报告”。\n- 进出线及馈线开关柜在 2000A 及以下时柜宽不大于 600mm；母联、提升在一个柜中时，2000A 及以下柜宽不大于 800mm。\n- 互感器采用上海雷兹或大一互产品，避雷器采用西安神电产品，以保证产品性能的优越性。\n- 母线室、断路器室和电缆室的抗内部电弧故障能力需达到 25kA、31.5kA 或 40kA，持续 1 秒，并标注“提供型式试验报告”。\n- 断路器额定短路电流开断次数为 50 次 / 25kA 或 31.5kA，并标注“提供型式试验报告”。\n- 紧急情况下不可打开操作 / 断路器分闸间。\n- 采用无需电源的气体密度表，不受外部因素影响，可直观反映内部气压变化，并可对气体泄漏故障进行预警。\n- 电缆安装高度达到 750mm，现场电缆施工更方便；更换 CT 无需拆电缆，后期维护和更换更简便。\n\n## Key Quotes\n> \"采用B-Link方式实现主母线连接\" — 主母线连接卖点\n\n> \"气体年泄漏率不大于0.01%/年\" — 泄漏率卖点\n\n## Connections\n- [[WSG]] — 图片直接补充 WS-G 40.5kV 的卖点摘要、柜宽口径和维护便利性。\n- [[BLink]] — 图片进一步强调柜列内单柜移出时无需气体处理且不影响相邻柜。\n- [[气体绝缘开关柜]] — 图片从三相共箱、无源密度表、密封气室和免充放气安装角度说明 GIS 价值。\n- [[金属封闭开关设备]] — 图片涉及母线室、断路器室、电缆室、主母线侧和电缆侧附件布置。\n- [[内部电弧防护]] — 图片给出 25kA / 31.5kA / 40kA、持续 1 秒的内部电弧口径。\n- [[气室监测]] — 图片补充无需电源的气体密度表和泄漏预警描述。\n\n## Contradictions\n- 该图片给出气体年泄漏率 `< 0.01%/年`，明显严于 [[WSG]] 企业标准、产品目录和 2014 材料中常见的 `< 0.1%/年` 口径；后续引用泄漏率时应保留来源差异，优先以正式标准/目录为准。\n- 图片中的柜宽口径限定在 `2000A 及以下` 场景，不能直接外推到现有 wiki 里已记录的 `2500A`、`3150A` 或 `4000A` 版本。\n- 右侧下半部分内容被头像遮挡，因此只采用左侧 15 条清晰可读卖点，不把遮挡区文字纳入确定性结论。\n",
    "preview": "## Summary 这张单页图片标题为“WS-G 40.5kV 气体绝缘开关柜 - 植入要点”，集中列出 15 条产品卖点，重点围绕断路器/三工位开关寿命、三相共箱结构、[[BLink]] 母线连接、内部电弧、柜宽、无源气体密度表和维护便利性。它不像企业标准或产品目录那样给出完整参数表，而是补充了一种偏销售和项目沟通场景的优势摘要口径。 ## Key Claims",

  {
    "id": "sources/wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions",
    "label": "WS-G 气体绝缘金属封闭开关设备 操作说明书",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions.md",
    "markdown": "---\ntitle: \"WS-G 气体绝缘金属封闭开关设备 操作说明书\"\ntype: source\ntags: [manual, operation, switchgear, gas-insulated]\ndate: 2019-09-19\nsource_file: raw/MVE/WSG/WS-G 气体绝缘金属封闭开关设备 操作说明书.pdf\n---\n\n## Summary\n这份操作说明书是 [[WSG]] 气体绝缘金属封闭开关设备的运行与操作文件，文档编号为 `KSGA0.463.150-03`。当前源 PDF 已损坏并被截断，只能从恢复出的前 31 页扫描图中可靠读取概述、参数、控制元件、单/双母线方案、[[气室监测]]、[[IDIS]]、[[IVIS]]/VDS、手动操作面板和部分 [[机械联锁]] 内容。\n\n## Key Claims\n- 封面标题为“WS-G 气体绝缘金属封闭开关设备 / Gas-Insulated Switchgear up to 40.5kV / 操作说明书”。\n- 目录显示完整说明书应覆盖服务、概述、技术参数/控制和操作元件、方案、绝缘气体监控、电压检测系统、运行、开关柜操作、维护、附录和备注。\n- 运行和维护操作应由具备相应运行和操作资格认可的人员承担，并应熟悉当地和国家关于高压电气设施与电气设备的安全规则。\n- 施耐德用户服务中心提供中压开关安装调试、维护保养和紧急援助、设备更新改造、质保延伸、高压设备调试监督和技术支持。\n- 铭牌示例说明 WS-G 型号可按 `WS-G 36-16-08` 解析为系列、额定电压 36kV、额定短时耐受电流 16kA 和额定工作电流 800A。\n- 恢复页中的参数表给出额定电压 12/17.5/24/36/40.5kV，雷电冲击耐受 75/95/125/170/185kV，工频耐受 28/38/50/70/95kV。\n- 该说明书参数表给出母线和出线柜额定工作电流均为 ≤2500A，额定峰值耐受电流 ≤80kA，额定短路开断电流 ≤31.5kA，额定短时耐受电流 ≤31.5kA/4s，额定频率 50/60Hz。\n- 开关柜基于手动操作原则设计，可按客户和线路图要求配置电机、合闸线圈、分闸线圈、第二线圈、失压分闸线圈、闭锁电磁铁和辅助开关等电气控制/操作元件。\n- 气箱按 IEC 62271-200 设计成密封压力系统，绝缘气体为符合 IEC 60376 要求的 SF6；在 IEC 60694 正常操作条件和正常寿命期内不需要补充绝缘气体。\n- 每台柜按标准配置 [[IDIS]]；IDIS 是温度补偿气体密度信息系统，以彩色 LED 显示最多三个气体密度开关信号，并可通过背面通信继电器把信号传给遥控或 I&C 系统。\n- IDIS 绿色表示运行准备，黄色表示压力降低预警，黄红组合表示压力降低主报警；压力低或故障时应联系服务中心，主报警时还应切断气室电源。\n- 说明书给出 WS-G IDIS 压力阈值：12/24kV ≤1250A 为 0.03/0.015/0.01MPa，12/24kV >1250A 为 0.05/0.03/0.01MPa，36kV 为 0.05/0.03/0.01MPa，40.5kV 为 0.06/0.05/0.03MPa。\n- [[IVIS]] 是符合 IEC 61243-5 的组合式电压检测系统，不需要外接附加电源，密封一体、耐气候、免维护，可长期监视带电状态。\n- 插入式 VDS 也按 IEC 61243-5 检查网络电压和各相电压状态；开关元件首次投入运行前必须进行相位检查。\n- 手动操作面板包括断路器分/合按钮、弹簧储能手柄插孔、断路器/隔离开关/接地开关状态指示、隔离/接地操作手柄插孔、联锁杆、VDS、机械锁和标示牌等。\n- 说明书强调只有完整的联锁装置才能预防开关设备误操作；机械联锁会限制断路器、隔离开关、接地开关、操作手柄和联锁杆之间的错误顺序。\n\n## Key Quotes\n> \"任何运行和维护操作应由获得相应的运行和操作资格认可的人员承担。\" — 运行维护人员资质要求。\n\n> \"只有使用完整的联锁装置才能达到预防开关设备误操作。\" — 联锁章节的安全警告。\n\n## Connections\n- [[WSG]] — 这份说明书补充 WS-G 的运行、操作、控制元件、IDIS/VDS 和联锁信息。\n- [[施耐德电气]] — 封面和服务页均标识 Schneider Electric。\n- [[气体绝缘开关柜]] — 说明书确认 WS-G 使用 SF6 密封压力系统。\n- [[金属封闭开关设备]] — 文档面向气体绝缘金属封闭开关设备的操作运行。\n- [[气室监测]] — 说明书给出 IDIS 压力阈值、LED 状态和远程信号。\n- [[IDIS]] — 本文是 WS-G IDIS 系统的操作说明来源之一。\n- [[IVIS]] — 本文补充 WS-G 的 IVIS/VDS 电压检测和相位检查要求。\n- [[机械联锁]] — 本文给出 WS-G 断路器、隔离开关、接地开关和手柄之间的机械联锁规则。\n- [[内部电弧防护]] — 铭牌示例中出现 IAC AFL 参数，但恢复页未展开内部电弧章节。\n\n## Contradictions\n- 本说明书参数表给出母线和出线柜额定电流 ≤2500A、短路开断电流 ≤31.5kA，而 2024 产品目录给出最高 3150A/40kA，40.5kV 图片页给出 4000A 双母线和 40kA/3s。当前应视为说明书版本、配置范围或截断来源造成的口径差异，工程引用需回到完整项目文件确认。\n- 源 PDF 的线性化信息声明总长度约 41,951,389 字节，但本地文件只有 18,215,701 字节；`markitdown` 报 `Unexpected EOF`，PyMuPDF 只能得到 0 页。当前入库基于从文件中恢复的 31 张扫描页，未覆盖目录显示的第 32~54 页内容，特别是断路器操作、隔离/接地开关操作、标准开关操作、母线接地、完整开关柜操作、维护和附录章节。\n",
    "preview": "## Summary 这份操作说明书是 [[WSG]] 气体绝缘金属封闭开关设备的运行与操作文件，文档编号为 `KSGA0.463.150-03`。当前源 PDF 已损坏并被截断，只能从恢复出的前 31 页扫描图中可靠读取概述、参数、控制元件、单/双母线方案、[[气室监测]]、[[IDIS]]、[[IVIS]]/VDS、手动操作面板和部分 [[机械联锁]] 内容。 ## Key Claims",
    "group": 3,
    "value": 18

  {
    "id": "sources/wsg-wig-smart-switchgear-2019",
    "label": "WSG-WIG 智能开关柜",

    "color": "#4CAF50",

    "markdown": "---\ntitle: \"WSG-WIG 智能开关柜\"\ntype: source\ntags: [wsg, wig, smart-switchgear, monitoring]\ndate: 2019-02-01\nsource_file: raw/MVE/WSG/WSG-WIG-智能开关柜.ppt\n---\n\n## Summary\n这份 2019.2 演示稿把 [[WSG]] 和 [[WIG]] 放在智能开关柜在线监测项目语境中，重点不是一次主参数，而是状态在线监测、智能开关设备标准、WIG 工厂系统框图、[[智能监测显示终端]] 和各类监测模块的项目计划。它补充了 [[数字化中压运维]] 从“产品目录能力”到“项目开发清单”的一层证据，覆盖温度、SF6 密度/微水、局放、弧光、避雷器、三工位视频和断路器特性在线监测。\n\n## Key Claims\n- 演示稿认为，将一次设备状态监测纳入变电站自动化系统，可长期连续监测断路器重要参数，实时反映运行状态，并提升电力系统可靠性、降低运维成本。\n- 标准动态部分列出 NB/T 42044-2014《3.6kV~40.5kV智能交流金属封闭开关设备和控制设备》，并指出智能元件应与开关设备一体化设计，且智能元件应在工作或模拟工作状态下随高压开关设备进行试验。\n- GB/T 2900.20-2016 新增“智能开关设备”“智能金属封闭开关设备和控制设备”“智能气体绝缘金属封闭开关设备”等术语，定义强调电子设备、变送器、执行器，以及监测和诊断等附加功能。\n- WIG 工厂简易系统框图包含网关、双绞线、光交换机、辅助监控后台系统、智能监测显示终端、成都交大运达设备、常州帕斯菲克设备，并继续出现 `Modbus-RTU` 转 `IEC61580` 的规约转换写法。\n- [[智能监测显示终端]] 被定义为多功能、智能化监测装置，可集成一次回路模拟图、带电显示、开关状态、断路器机械特性、操作次数、回路电流、SF6 密度/温度、避雷器、加热除湿和温度控制，并通过 MODBUS 向监控网络提供遥测、遥信数据。\n- 项目清单覆盖环境温湿度、高压带电状态、开关柜位置状态、储能电机状态、断路器机械特性、三工位电机状态、避雷器在线状态、SF6 气体密度、电弧光、SF6 微水、局放、三工位视频、母线及电缆头温度和断路器电寿命等检测项目。\n- WSG 测温总体设计包括主母线温度、内锥电缆头温度和外锥电缆头温度：母线连接器与 B-Link 间、内锥电缆头可用电流取电型无线测温，外锥电缆头可用电容分压型无线测温。\n- SF6 密度/微水在线监测对象为母线室和断路器室，监测参量包括温度、压力、密度和微水；密度依据温度和压力计算，精度口径包含露点 ±3K、密度 ±0.35g/L、压力 ±10mbar。\n- [[局部放电监测]] 部分对比脉冲电流法与暂态对地电压 TEV+超声波方案；TEV+超声波方案被描述为非侵入式、适合现场改造，预警后由专业局放检测设备复核。\n- 电弧光监测通过检测弧光并结合过流闭锁触发跳闸，演示稿称整套母线保护动作时间可达 5~7ms，并可显示弧光发生点位置以便快速处理故障。\n- 断路器特性在线监测覆盖实时数据与预警、储能时间、电机电流电压、控制回路特性、分合闸时间、线圈电流电压、机械动作次数、I2t 累加值、触头位移、合分闸位移-时间曲线、开距、超程和速度。\n\n## Key Quotes\n> \"将一次设备的状态监测作为变电站自动化系统的有机组成部分\" — 状态在线监测定位页\n\n> \"智能开关柜状态在线监测可以提高1倍运维效率\" — 智能开关柜状态在线监测意义页\n\n> \"所有智能元件应在工作或模拟工作状态下随高压开关设备进行试验\" — 智能开关柜技术原则页\n\n## Connections\n- [[WSG]] — 演示稿把 WSG 作为测温、SF6 密度/微水、局放、弧光和断路器特性监测的落地柜型之一。\n- [[WIG]] — WIG 工厂系统框图和智能监测显示终端延续了高铁智能开关柜方案。\n- [[智能监测显示终端]] — 文档给出终端的综合监测对象和 MODBUS 通讯角色。\n- [[数字化中压运维]] — 该资料把状态监测、预警、诊断和项目开发计划串成智能开关柜运维路线。\n- [[主动运维]] — 断路器长期连续监测、趋势判断和寿命预测服务于状态检修与主动检修。\n- [[温度智能监测]] — 文档细化 WSG 主母线、内锥电缆头和外锥电缆头测温方案。\n- [[气室监测]] — 文档补充 SF6 密度、温度、压力和微水在线监测。\n- [[局部放电监测]] — 文档对比脉冲电流法、TEV 与超声波方案。\n- [[内部电弧防护]] — 文档补充弧光监测与过流闭锁的主动切除方案。\n- [[二次元件智能监测]] — 文档补充分合闸线圈、储能电机和断路器机械特性的在线监测。\n\n## Contradictions\n- 系统框图继续写作 `Modbus-RTU` 转 `IEC61580`；结合前一份 WIG 演示稿和行业常识，这很可能仍是 `IEC 61850` 的笔误，工程引用应核对原图或通信清单。\n- 演示稿包含大量项目计划、参考价格和供应商开发状态，这些信息带有 2019 年项目阶段属性；后续不能直接视为当前可采购或已量产状态。\n- 该材料的重点是智能监测项目，不给出 WSG/WIG 的完整一次额定参数，因此不应用它覆盖企业标准、产品目录或操作说明书中的主参数。\n",

const adjacency = new Map();
const searchInput = document.getElementById("search");
const stats = document.getElementById("stats");
const controls = {
  extracted: document.getElementById("cb-extracted"),
  inferred: document.getElementById("cb-inferred"),
  ambiguous: document.getElementById("cb-ambiguous"),

  confValue: document.getElementById("conf-val"),
};
const nodeMap = new Map(originalNodes.map(node => [node.id, node]));

function hexToRgba(color, alpha) {
  if (!color) return `rgba(255, 255, 255, ${alpha})`;
  const normalized = color.replace("#", "");
  const value = normalized.length === 3
    ? normalized.split("").map(ch => ch + ch).join("")
    : normalized;
  const intValue = Number.parseInt(value, 16);
  const r = (intValue >> 16) & 255;
  const g = (intValue >> 8) & 255;
  const b = intValue & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function escapeHtml(text) {
  return (text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function stripFrontmatter(markdown) {
  return (markdown || "").replace(/^---\n[\s\S]*?\n---\n?/, "");
}

function renderInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink">[[$1]]</span>');
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  return html;
}

function renderMarkdown(markdown) {
  const lines = stripFrontmatter(markdown).split(/\r?\n/);
  const html = [];
  let paragraph = [];
  let listType = null;
  let listItems = [];
  let quoteLines = [];
  let inCodeBlock = false;
  let codeLines = [];

  function flushParagraph() {
    if (!paragraph.length) return;
    html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
    paragraph = [];
  }

  function flushList() {
    if (!listType || !listItems.length) return;
    const items = listItems.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("");
    html.push(`<${listType}>${items}</${listType}>`);
    listType = null;
    listItems = [];
  }

  function flushQuote() {
    if (!quoteLines.length) return;
    html.push(`<blockquote>${quoteLines.map(line => renderInlineMarkdown(line)).join("<br>")}</blockquote>`);
    quoteLines = [];
  }

  function flushCode() {
    if (!codeLines.length) {
      html.push("<pre><code></code></pre>");
      return;
    }
    html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
    codeLines = [];
  }

  for (const rawLine of lines) {
    const line = rawLine.replace(/\t/g, "    ");
    const trimmed = line.trim();

    if (trimmed.startsWith("```")) {
      flushParagraph();
      flushList();
      flushQuote();
      if (inCodeBlock) {
        flushCode();
        inCodeBlock = false;
      } else {
        inCodeBlock = true;
      }
      continue;
    }

    if (inCodeBlock) {
      codeLines.push(rawLine);
      continue;
    }

    if (!trimmed) {
      flushParagraph();
      flushList();
      flushQuote();
      continue;
    }

    const headingMatch = trimmed.match(/^(#(1, 6))\s+(.+)$/);
    if (headingMatch) {
      flushParagraph();
      flushList();
      flushQuote();
      const level = headingMatch[1].length;
      html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`);
      continue;
    }

    if (/^(-(3,)|\*(3,))$/.test(trimmed)) {
      flushParagraph();
      flushList();
      flushQuote();
      html.push("<hr>");
      continue;
    }

    const quoteMatch = trimmed.match(/^>\s?(.*)$/);
    if (quoteMatch) {
      flushParagraph();
      flushList();
      quoteLines.push(quoteMatch[1]);
      continue;
    }
    flushQuote();

    const unorderedMatch = trimmed.match(/^[-*]\s+(.+)$/);
    if (unorderedMatch) {
      flushParagraph();
      if (listType && listType !== "ul") flushList();
      listType = "ul";
      listItems.push(unorderedMatch[1]);
      continue;
    }

    const orderedMatch = trimmed.match(/^\d+\.\s+(.+)$/);
    if (orderedMatch) {
      flushParagraph();
      if (listType && listType !== "ol") flushList();
      listType = "ol";
      listItems.push(orderedMatch[1]);
      continue;
    }

    flushList();
    paragraph.push(trimmed);
  }

  if (inCodeBlock) flushCode();
  flushParagraph();
  flushList();
  flushQuote();
  return html.join("");
}

function rebuildAdjacency(filteredEdges) {
  adjacency.clear();
  for (const node of originalNodes) {
    adjacency.set(node.id, new Set());
  }
  for (const edge of filteredEdges) {
    if (!adjacency.has(edge.from)) adjacency.set(edge.from, new Set());
    if (!adjacency.has(edge.to)) adjacency.set(edge.to, new Set());
    adjacency.get(edge.from).add(edge.to);
    adjacency.get(edge.to).add(edge.from);
  }
}

function currentEdgeState() {
  const minConf = parseInt(controls.confSlider.value, 10) / 100;
  controls.confValue.textContent = minConf.toFixed(2);
  return {
    showExtracted: controls.extracted.checked,
    showInferred: controls.inferred.checked,
    showAmbiguous: controls.ambiguous.checked,
    minConf,
  };
}

function passesEdgeFilters(edge, edgeState) {
  const typeOk = (edge.type === "EXTRACTED" && edgeState.showExtracted)
    || (edge.type === "INFERRED" && edgeState.showInferred)
    || (edge.type === "AMBIGUOUS" && edgeState.showAmbiguous);
  const confOk = (edge.confidence ?? 1.0) >= edgeState.minConf;
  return typeOk && confOk;
}

function searchNodes(q) {
  applyFilters(q, activeNodeId);
}

function clearSelection() {
  activeNodeId = null;
  closeDrawer();
  applyFilters(searchInput.value, null);
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
}

function openDrawer(node, relatedIds) {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawer-title").textContent = node.label;
  const communityText = Number.isInteger(node.group) && node.group >= 0 ? ` · community ${node.group}` : "";
  document.getElementById("drawer-meta").textContent = `${node.type}${communityText}`;
  document.getElementById("drawer-path").textContent = node.path;
  document.getElementById("drawer-preview").textContent = node.preview || "";
  document.getElementById("drawer-markdown").innerHTML = renderMarkdown(node.markdown || "");

  const relatedList = document.getElementById("drawer-related-list");
  relatedList.innerHTML = "";
  const relatedNodes = originalNodes
    .filter(item => relatedIds.has(item.id) && item.id !== node.id)
    .sort((a, b) => a.label.localeCompare(b.label));

  if (relatedNodes.length === 0) {
    const empty = document.createElement("span");
    empty.textContent = "No directly connected nodes";
    relatedList.appendChild(empty);
    return;
  }

  for (const related of relatedNodes) {
    const chip = document.createElement("button");
    chip.className = "related-chip";
    chip.textContent = related.label;
    chip.onclick = () => focusNode(related.id);
    relatedList.appendChild(chip);
  }
}

function applyFilters(query = searchInput.value, selectedNodeId = activeNodeId) {
  const lower = (query || "").trim().toLowerCase();
  const edgeState = currentEdgeState();
  const filteredEdges = originalEdges.filter(edge => passesEdgeFilters(edge, edgeState));
  rebuildAdjacency(filteredEdges);

  const relatedIds = selectedNodeId
    ? new Set([selectedNodeId, ...(adjacency.get(selectedNodeId) || [])])
    : null;
  const filteredNodeIds = new Set();
  for (const edge of filteredEdges) {
    filteredNodeIds.add(edge.from);
    filteredNodeIds.add(edge.to);
  }

  let visibleNodeCount = 0;
  const nodeUpdates = originalNodes.map(node => {
    const matchesSearch = !lower || node.label.toLowerCase().includes(lower);
    const isActive = selectedNodeId === node.id;
    const isConnected = filteredNodeIds.has(node.id);
    const isRelated = !relatedIds || relatedIds.has(node.id);
    const hidden = !selectedNodeId && !lower && !isConnected;
    const emphasized = matchesSearch && isRelated && (isConnected || !!lower || isActive);

    if (!hidden) {
      visibleNodeCount += 1;
    }

    return {
      id: node.id,
      hidden,
      color: {
        background: emphasized ? node.color : hexToRgba(node.color, hidden ? 0.05 : 0.14),
        border: emphasized ? hexToRgba(node.color, 0.96) : hexToRgba(node.color, hidden ? 0.08 : 0.22),
        highlight: { background: node.color, border: hexToRgba(node.color, 1) },
        hover: { background: node.color, border: hexToRgba(node.color, 1) },
      },
      font: {
        color: emphasized ? "#f2f3f8" : hidden ? "rgba(242,243,248,0.08)" : "rgba(242,243,248,0.2)",
      },
      borderWidth: isActive ? 5 : 2,
      size: isActive ? 18 : 12,
    };
  });

  const edgeUpdates = originalEdges.map(edge => {
    const enabled = passesEdgeFilters(edge, edgeState);
    if (!enabled) {
      return { id: edge.id, hidden: true };
    }

    const matchesSearch = !lower
      || nodeMap.get(edge.from)?.label.toLowerCase().includes(lower)
      || nodeMap.get(edge.to)?.label.toLowerCase().includes(lower);
    const isRelated = !relatedIds || relatedIds.has(edge.from) || relatedIds.has(edge.to);
    const touchesActive = !!selectedNodeId && (edge.from === selectedNodeId || edge.to === selectedNodeId);
    const emphasized = matchesSearch && isRelated;

    return {
      id: edge.id,
      hidden: false,
      width: touchesActive ? 2.8 : emphasized ? 1.2 : 0.6,
      color: emphasized ? edge.color : hexToRgba(edge.color, 0.08),
    };
  });

  nodes.update(nodeUpdates);
  edges.update(edgeUpdates);

  if (selectedNodeId) {
    const activeNode = nodeMap.get(selectedNodeId);
    if (activeNode) {
      openDrawer(activeNode, relatedIds || new Set([selectedNodeId]));
    }
  }

  const focusSuffix = selectedNodeId && nodeMap.get(selectedNodeId)
    ? ` · focused: ${nodeMap.get(selectedNodeId).label}`
    : "";
  stats.textContent = `${visibleNodeCount} nodes · ${filteredEdges.length} edges${focusSuffix}`;
}

const container = document.getElementById("graph");

// Adaptive physics based on graph size
const nodeCount = originalNodes.length;
const gravConst = nodeCount > 80 ? -8000 : nodeCount > 30 ? -5000 : -2000;
const springLen = nodeCount > 80 ? 250 : nodeCount > 30 ? 200 : 150;

const network = new vis.Network(container, { nodes, edges }, {
  nodes: {
    shape: "dot",
    font: { color: "#ddd", size: 12, strokeWidth: 3, strokeColor: "#111" },
    borderWidth: 1.5,
    scaling: {
      min: 8,
      max: 40,
      label: { enabled: true, min: 10, max: 20, drawThreshold: 6, maxVisible: 24 },
    },
  },
  edges: {
    width: 0.8,
    smooth: { type: "continuous" },
    arrows: { to: { enabled: true, scaleFactor: 0.4 } },
    color: { inherit: false },
    hoverWidth: 2,
  },
  physics: {
    stabilization: { iterations: 250, updateInterval: 25, fit: true },
    barnesHut: { gravitationalConstant: gravConst, springLength: springLen, springConstant: 0.02, damping: 0.15 },
    minVelocity: 0.75,
  },
  interaction: { hover: true, tooltipDelay: 150, hideEdgesOnDrag: true, hideEdgesOnZoom: true },
});

// Ensure the graph fits the viewport after physics stabilization
network.once("stabilizationIterationsDone", function () {
  network.fit({ animation: { duration: 400, easingFunction: "easeInOutQuad" } });
});

function focusNode(nodeId) {
  activeNodeId = nodeId;
  applyFilters(searchInput.value, nodeId);
  const node = nodeMap.get(nodeId) || nodes.get(nodeId);
  const relatedIds = new Set([nodeId, ...(adjacency.get(nodeId) || [])]);
  openDrawer(node, relatedIds);
  network.focus(nodeId, {
    scale: 1.1,
    animation: { duration: 300, easingFunction: "easeInOutQuad" },
  });
}

network.on("click", params => {
  if (params.nodes.length > 0) {
    focusNode(params.nodes[0]);
  } else {
    clearSelection();
  }
});

applyFilters();
