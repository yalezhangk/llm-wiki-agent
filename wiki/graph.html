    "markdown": "---\ntitle: \"Trihal\"\ntype: entity\ntags: [product, transformer, dry-type, schneider-electric]\nsources: [trihal-series-resin-cast-dry-transformer-catalog]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[Trihal]] 是 [[施耐德电气]] 的树脂浇注 [[干式变压器]] 产品线。当前已入库目录把它写成一条同时覆盖全球技术叙事与中国本地化系列的路线：一方面强调 `1983` 年起的树脂浇注工艺、`E3/C3/F1` 试验认证和独家专利，另一方面又落到 `SCB10/11/12/13`、`SCBH15` 和 `SC10` `35kV` 级配电/电力变压器参数、附件和安装实施边界。\n\n## Key Details\n- 目录元数据日期为 `2016-05-10`，封面标题为 `Trihal系列树脂浇注干式变压器 产品目录`。\n- 资料说明施耐德在中国通过施耐德（苏州）变压器有限公司（`SST`）进行本地化生产，`2002-06` 注册成立，`2003-05` 正式投产。\n- Trihal 技术叙事追溯到 `1983` 年，文档称施耐德在树脂浇注干式变压器关键技术和工艺上拥有两项独家专利。\n- 产品卖点包括低损耗、低噪声、较 `C2-E2` 更严苛的环境/气候试验、防火 `F1`、全球运行可靠性和 `10kV` 侧 `95kV` 抗雷电冲击能力。\n- 产品范围覆盖 `30kVA~25000kVA`、`35kV` 及以下，并可选 `IP00`、`IP21` 和 `IP44` 等外壳配置。\n- 参数页显示 Trihal 不是单一型号，而是一个包含 `SCB10/11`、`SCB12/13`、`SCBH15`、`SC10 35kV` 配电/电力变压器的本地化目录体系。\n- `SC10` `35kV` 电力变压器页把容量推进到 `25000kVA`，说明这条产品线不只覆盖配电侧，也延伸到更高容量的 `35kV` 电力变压器边界。\n- 试验与质量页给出局放保证 `<5pC`、`C2/E2/F1`、雷电冲击、温升、短路和噪声试验口径。\n- 附件页补充了温度控制器、强迫风冷增容 `50%`、`RS232/485`、`PBT` 封闭母线连接和 `IP21/IP44` 外壳等工程实现细节。\n- 安装页给出海拔 `≤1000m`、环境温度 `-25°C ~ +40°C`、无外壳最小安全距离和变电室通风公式，说明该目录兼具产品宣传和实施手册性质。\n\n## Related\n- [[施耐德电气]]\n- [[干式变压器]]\n",
    "preview": "## Summary [[Trihal]] 是 [[施耐德电气]] 的树脂浇注 [[干式变压器]] 产品线。当前已入库目录把它写成一条同时覆盖全球技术叙事与中国本地化系列的路线：一方面强调 `1983` 年起的树脂浇注工艺、`E3/C3/F1` 试验认证和独家专利，另一方面又落到 `SCB10/11/12/13`、`SCBH15` 和 `SC10` `35kV` 级配电/电力变压器参数、附件和安装实施边界。 ## Key Details",

    "markdown": "---\ntitle: \"WIG\"\ntype: entity\ntags: [product, smart-switchgear, high-speed-rail, gas-insulated-switchgear]\nsources: [wi-g-27-5kv-railway-gas-insulated-switchgear-catalog-2018, wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-wig-smart-switchgear-2019]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[WIG]] / WI-G 是 [[施耐德电气]] 面向铁道应用的 [[气体绝缘开关柜]] 和智能开关柜资料对象。已有演示稿重点在 [[数字化变电站]] 架构和多厂家智能设备集成；`2018.10` 产品目录则把 WI-G 补成 `27.5kV` 牵引供电目录层；操作说明书再把它落到 `31.5kV` 设备本体的运行、联锁和维护口径，覆盖额定参数、[[BLink]] 母线连接、[[IDIS]] 绝缘气体监控、[[IVIS]] 电压检测和维护计划。\n\n## Key Details\n- 应用语境是高铁智能开关柜，演示稿日期页为 2018.4。\n- 系统架构包含过程层、间隔层和站控层的数字化变电站思路。\n- 监测对象包括断路器机械特性、储能电机、三工位开关电机、避雷器、SF6 密度、气室温度、开关柜温度和高压带电状态。\n- 智能监测显示终端通过 MODBUS 协议向计算机监控网络提供遥测、遥信数据。\n- 供应协作边界涉及 [[成都交大运达]]、[[常州帕斯菲克]] 和 [[深圳昇伟电子科技]]。\n- `2018.10` 产品目录把 WI-G 直接定位为铁路一次供电变配电站使用的 `27.5/2×27.5kV` 单母线气体绝缘金属封闭开关柜，最高电压 `31.5kV`，母线与出线额定工作电流 `≤2500A`，短路开断电流 `≤31.5kA`。\n- 产品目录强调 WI-G 的 [[BLink]] 母线连接、靠墙安装、柜前完成操作维护、前接线内锥电缆系统和 `IAC 31.5kA/1s` 抗内部电弧试验，是现有操作说明书之外更偏工程目录和土建边界的一层资料。\n- 操作说明书封面标题为“WI-G 铁道用气体绝缘金属封闭开关设备”，英文为 `Gas-Insulated Switchgear for railway application`。\n- 说明书给出 WI-G 系列额定值：额定电压 31.5kV、雷电冲击耐受电压 200kV、短时工频耐受电压 95kV、母线/出线额定工作电流 ≤2500A、短路开断电流 ≤31.5kA、短时耐受电流 ≤31.5kA/4s、频率 50/60Hz。\n- 柜体方案包括内锥型电缆连接断路器柜、母线联络柜、母线电压互感器、母线避雷器和母线接地开关。\n- 断路器柜结构包含带三工位开关的母线室、[[BLink]] 母线连接、带真空灭弧室的断路器室、电流互感器、内锥型电缆连接、电压互感器、VDS、[[IDIS]]、操作面板和低压箱。\n- WI-G 的 SF6 气箱为密封压力系统，正常使用寿命期间和正常操作条件下不需要补充绝缘气体。\n- WI-G 的 [[IDIS]] 表给出额定充气压力 0.06MPa、预报警 0.05MPa、主报警 0.03MPa。\n- 产品目录和操作说明书共同说明 WI-G 是同一设备族的不同资料层：前者更突出 `27.5kV` 铁路应用、电缆连接和基础安装；后者更突出 `31.5kV` 设备运行、维护和周期性检查。\n- 维护计划要求开关柜至少每两年目视检查一次，并建议每年局放检查、每两年二次元件检查；真空室达到最大允许开断次数或断路器/隔离/接地开关达到 10000 次操作循环后更换开关柜。\n- 2019.2 WSG-WIG 智能开关柜演示稿延续 WIG 工厂简易系统框图，补充网关、光交换机、辅助监控后台、智能监测显示终端和多类在线监测项目的开发状态。\n\n## Related\n- [[数字化变电站]]\n- [[智能监测显示终端]]\n- [[数字化中压运维]]\n- [[气体绝缘开关柜]]\n- [[金属封闭开关设备]]\n- [[气室监测]]\n- [[IDIS]]\n- [[IVIS]]\n- [[BLink]]\n- [[内部电弧防护]]\n- [[温度智能监测]]\n- [[局部放电监测]]\n- [[成都交大运达]]\n- [[常州帕斯菲克]]\n- [[深圳昇伟电子科技]]\n",
    "preview": "## Summary [[WIG]] / WI-G 是 [[施耐德电气]] 面向铁道应用的 [[气体绝缘开关柜]] 和智能开关柜资料对象。已有演示稿重点在 [[数字化变电站]] 架构和多厂家智能设备集成；`2018.10` 产品目录则把 WI-G 补成 `27.5kV` 牵引供电目录层；操作说明书再把它落到 `31.5kV` 设备本体的运行、联锁和维护口径，覆盖额定参数、[[BLink]] 母线连接、[[IDIS]] 绝缘气体监控、[[",

    "path": "wiki\\entities\\WSG.md",
    "markdown": "---\ntitle: \"WSG\"\ntype: entity\ntags: [product, gas-insulated-switchgear, medium-voltage]\nsources: [q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, wsg-wig-smart-switchgear-2019, wsg-feature-highlights-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[WSG]] 是 [[施耐德电气]] 资料中的 WS-G 交流 [[气体绝缘开关柜]]，企业标准标题为“WS-G 交流气体绝缘金属封闭开关设备”，产品目录标题为“WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜”。它是一类户内 [[金属封闭开关设备]]，用于接收和分配网络电能，覆盖 50Hz、12kV~40.5kV 的单母线、双母线或母线分段系统。当前 wiki 记录了企业标准、产品目录、图片页和操作说明书等多种来源，后续引用参数时需要按具体版本、配置和应用场景区分。\n\n## Key Details\n- 企业标准号为 Q/320500 KSGA 09-2015，2015-11-30 发布，2016-01-01 实施。\n- 2024 版企业标准号为 Q/AVXM 031-2024，2024-07-01 发布，2024-07-21 实施，发布主体为施耐德电气(厦门)开关设备有限公司。\n- 国内型号码为 KGN23，附录给出国内全型号 `KGN23-40.5(Z)(G)/T□-□(WS-G)`。\n- 额定电压覆盖 12kV、24kV、36kV 和 40.5kV。\n- 2015 版主母线额定电流覆盖 630A~4000A，馈线额定电流覆盖 630A~2500A；2024 版主母线和馈线额定电流均覆盖 630A~3150A。\n- 主回路短时耐受能力覆盖 25kA、31.5kA 和 40kA，持续时间按电压等级和回路类型为 3s 或 4s。\n- 充气箱防护等级为 IP65，开关柜防护等级为 IP4X、IP5X、IK07。\n- SF6 年漏气率要求不超过 0.1%，气室内 SF6 湿度限值为 250μL/L。\n- 运行连续性类别为 LSC2A，内部电弧耐受能力给出 AFL 25/1、31.5/1、40/1 kA/s，AFLR 可选。\n- 柜体配置真空断路器和隔离/接地功能开关；母线隔室和断路器隔室为 SF6 充气隔室，电缆隔室为可触及隔室。\n- 每一充气隔室应配置带温度补偿的 SF6 密度监视装置，并支持低气压报警和最低功能压力报警。\n- 2024 版特殊使用条件海拔提高到 5500m，并在出厂试验中给出 2000m 以上至 5500m 的辅助/控制回路耐压口径。\n- 2024 版在低气压报警/最低功能压力注释中引入 [[IDIS]] 阈值，并新增零表压绝缘试验和背对背电容器组开合试验等条目。\n- 40.5kV 图片页把 WS-G 放在海上风电 35kV 开关设备语境中，突出耐腐蚀、供电连续性、操作安全和低维护工作量。\n- 该图片页给出 40.5kV、95kV 工频耐受、185kV 雷电冲击、40kA/3s、100kA 峰值、4000A 双母线和 IAC 40kA/1s 参数口径。\n- 图片页把母线连接装置 [[BLink]] 标为专利技术，并强调密封气室、不锈钢铬镍钢气箱、独立泄压和免维护。\n- 2024.01 产品目录把 WS-G 定位为 12~40.5kV 产品族，给出额定电流至 3150A、额定开断电流至 40kA，并支持单母线或双母线系统。\n- 目录列出的应用包括公共和工业配电网、基础设施、采矿、冶金、石油化工、燃油燃气、铁路供电、集装箱基地和船舶行业。\n- 产品目录强调 WS-G 柜前即可完成拼接、安装、扩展、拆除和维护，适合空间受限项目或用现有地基升级改造。\n- [[BLink]] 在 WS-G 目录中被描述为相邻柜母线连接方式，现场安装、扩展或更换柜体时不需要气体处理。\n- 产品目录给出外锥/内锥电缆连接、低压箱高度、单母线/双母线柜宽深高、重量、主接线方案、发货文件和订货资料要求。\n- 2018.09 产品目录 `SCDOC1541` 给出更早一版目录口径：额定电流至 2500A、额定开断电流至 31.5kA、安装高度 1000m，并系统说明靠墙安装、柜前维护、B-link、IDIS、DXN8B VDS 和可选 IVIS。\n- 该目录还补充了单母线/双母线尺寸重量、土建基础图，以及外锥仅至 36kV、内锥适用于 35kV 电网等早期电缆连接边界。\n- `2026-06-09` 补入的 `WS-G 40.5kV气体绝缘开关柜产品目录.pdf` 与现有 `2018.09` 目录源文件为完全相同的重命名副本，进一步确认这条资料链仍应作为单一 `SCDOC1541` 目录层处理，而不是新增一版 `40.5kV` 独立目录。\n- 操作说明书编号为 `KSGA0.463.150-03`，封面标题为“WS-G 气体绝缘金属封闭开关设备 / Gas-Insulated Switchgear up to 40.5kV”。\n- 操作说明书的恢复页给出 12/17.5/24/36/40.5kV、母线和出线柜电流 ≤2500A、短路开断 ≤31.5kA、短时耐受 ≤31.5kA/4s、50/60Hz 的操作手册版本口径。\n- 操作说明书说明 WS-G 以手动操作为基本设计，可按线路图配置电机、合/分闸线圈、失压分闸线圈、闭锁电磁铁和辅助开关等控制元件。\n- 操作说明书确认 WS-G 标准配置 [[IDIS]]，并补充 [[IVIS]]/VDS 电压检测、首次投运前相位检查和 [[机械联锁]] 防误操作规则。\n- 该操作说明书源文件损坏并截断，当前只恢复前 31 页；未覆盖完整断路器操作、开关柜操作、维护和附录章节。\n- 2014-06 产品介绍把 WS-G 的五大特征概括为重视环保、工艺先进、运行经济、安全可靠和操作简单。\n- 2014 材料的历史参数口径为 12/17.5/24/36/40.5kV、主母线/馈线自然冷却 2500A、31.5kA/4s、内部电弧 31.5kA/1s，并把特殊型海拔列为 4000m。\n- 2014 材料展示了 2006-2014 年中国运行实例，包括地铁、石化、盐湖、煤化工、供电局和风电并网移动式变电站等场景。\n- 2019.2 智能开关柜演示稿把 WSG 放入在线监测项目开发语境，细化了主母线、内锥电缆头、外锥电缆头测温，以及 SF6 密度/微水、局放、弧光、三工位视频和断路器特性监测。\n- WSG 特点图片页补充了 40.5kV 场景下的 15 条卖点摘要，包括三相共箱、单柜移出无需气体处理、2000A 及以下 600/800mm 柜宽、无源气体密度表、电缆安装高度 750mm 和 CT 更换无需拆缆。\n- 该图片页同时给出断路器与隔离/接地三工位开关机械寿命均为 10000 次、额定短路电流开断次数 50 次 / 25kA 或 31.5kA，以及内部电弧能力 25kA / 31.5kA / 40kA 持续 1 秒的卖点口径。\n- 特点图片页把气体年泄漏率写为 <0.01%/年，严于现有标准/目录常见的 <0.1%/年，应视为单页宣传口径。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[金属封闭开关设备]]\n- [[气室监测]]\n- [[内部电弧防护]]\n- [[IDIS]]\n- [[BLink]]\n- [[机械联锁]]\n- [[智能监测显示终端]]\n- [[温度智能监测]]\n- [[局部放电监测]]\n- [[GHA]]\n- [[GMA]]\n- [[HVX]]\n",
    "preview": "## Summary [[WSG]] 是 [[施耐德电气]] 资料中的 WS-G 交流 [[气体绝缘开关柜]]，企业标准标题为“WS-G 交流气体绝缘金属封闭开关设备”，产品目录标题为“WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜”。它是一类户内 [[金属封闭开关设备]]，用于接收和分配网络电能，覆盖 50Hz、12kV~40.5kV 的单母线、双母线或母线分段系统。当前 wiki 记录了企业标准、产品目录、图片页和操作说明",

    "markdown": "---\ntitle: \"ZBRN32\"\ntype: entity\ntags: [device, receiver, temperature]\nsources: [3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[ZBRN32]] 是 [[SmartHVX]] 方案中的数据接收器，主要承接温度传感器上传的数据，并把监测链路继续连接到 [[Link150]]、服务器或远程系统。它在标准测温型和智能型方案中承担温度监测接入角色。\n\n## Key Details\n- 文档将其标注为“数据接收器”。\n- 它与进口施耐德温度传感器共同组成温度监测链路。\n- 它是本地/远程运维显示链路中的前端接入组件。\n\n## Related\n- [[SmartHVX]]\n- [[温度智能监测]]\n- [[Link150]]\n- [[千里眼]]\n",

    "markdown": "---\ntitle: \"千里眼\"\ntype: entity\ntags: [system, cloud, remote-ops]\nsources: [3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page, smart-hvx-product-introduction-v3-4]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[千里眼]] 是 [[SmartHVX]] 方案中的远程运维系统，用于通过网页和手机端展示云端监测信息。它在资料中与 [[PMBEasy]] 形成互补，一个偏向本地显示与边缘运维，一个偏向云端可视化与远程访问。\n\n## Key Details\n- 标准测温型和智能型支持接入千里眼。\n- 文档将其描述为“手机 + 网页云端显示”的运维系统。\n- 它承接温度数据接收器、网关和服务器之后的远程展示能力。\n- V3.4 产品介绍用典型 110kV 变电站、20 面 10kV 开关柜的一年周期示例，说明采用 Smart HVX/千里眼后年运维工时可由约 121 小时降至约 59.5 小时。\n- 该材料还把部分可靠性承诺限定在“上千里眼且报警和设备故障记录有据可查”的系统中。\n\n## Related\n- [[SmartHVX]]\n- [[PMBEasy]]\n- [[主动运维]]\n- [[数字化中压运维]]\n- [[ZBRN32]]\n- [[Link150]]\n",

    "markdown": "---\ntitle: \"施耐德电气\"\ntype: entity\ntags: [company, power-distribution]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, hvx-manual, dnf7-metal-clad-switchgear-technical-instruction-2010, dnf7-chinese-product-catalog-2011, dnf7-chinese-selection-manual-2017, dnf7-english-selection-manual-2017, gma-12kv-medium-voltage-gas-insulated-switchgear-catalog-2018, mvnex-12kv-air-insulated-switchgear-catalog-2017, pix-12kv-24kv-air-insulated-switchgear-catalog-2016, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear, gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wi-g-27-5kv-railway-gas-insulated-switchgear-catalog-2018, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, wsg-wig-smart-switchgear-2019, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018, fbx-catalogue-2020, fbx-medium-voltage-switchgear-catalog-2018, fbx-medium-voltage-switchgear-catalog-2017, wind-energy-solutions-2018, flusarc-40-5kv-sf6-insulated-medium-voltage-switchgear-catalog-2016, fox-medium-voltage-switchgear-core-unit-catalog-2016, sm6-air-insulated-switchgear-catalog-2012, sm6-24kv-medium-voltage-switchgear-catalog-2017, sm6-product-introduction-and-digital-content-2019, smd-and-sensors-for-sm6-training-v2, premset-ip41-option-installation-instructions-2017, premset-12kv-compact-modular-vacuum-switchgear-catalog-2018, premset-product-brochure-2012, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020, rm6-o-cable-branch-box-brochure-2008, rm6-24kv-medium-voltage-distribution-catalog-2012, rm6-offer-presentation-life-is-on-201801update, rm6-sf6-insulated-ring-main-unit-and-compact-switchgear-catalog-2018, rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018, rm6-set-medium-voltage-switchgear-catalog-2022, rm6-s-operation-maintenance-instructions-2021, rm-airset-eco-gas-insulated-ring-main-unit-2020, cas-36-ring-main-unit-catalog-2008, dvcas-wind-farm-secondary-distribution-switchgear-catalog-2007, trihal-series-resin-cast-dry-transformer-catalog, as12-as24-medium-voltage-switch-catalog, as12-medium-voltage-switch-brochure-2016, sc6-medium-voltage-switch-component-catalog-2017]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[施耐德电气]] 是这份资料中的厂商主体，被描述为全球能效管理和自动化领域的专家。文档用它来承接 [[EcoStruxure]] 架构、[[SmartHVX]] 智能中压断路器、[[PMBEasy]] 主动运维单元，以及 [[GHA]]、[[GMA]]、[[PIX]] 等中压开关柜产品和方案。\n\n## Key Details\n- 文档将施耐德定位为面向安全、可靠、高效和可持续能源管理的全球企业。\n- 中国区介绍强调本地员工规模、工厂、物流中心、研发中心与办事处分布。\n- [[SmartHVX]] 被放在施耐德中压配电和数字化运维能力的产品叙事中。\n- 较早版本的 HVX 说明书补充了 2014 年前后的公司背景与在华布局，但这些统计数字应视为带时间戳的历史信息。\n- PIX 中文目录同样采用 2014 年前后的公司介绍口径，包括全球销售额、员工数和中国区办事处/工厂/研发中心等历史统计，后续引用时应保留版本时间语境。\n- `PIX-12kv-24kv空气绝缘开关柜` 说明到 `2016.03` 时，施耐德中国市场已经发布 `SCDOC1842` 口径的 PIX 正式目录：公司介绍页保留 `2014` 财年 `250亿欧元`、全球 `170,000+` 员工、中国 `28,000` 员工、`45` 个办事处、`30` 家工厂和 `8` 个物流中心等历史统计，并把 PIX-12kV、PIX-24kV、PIX-M 和 PIX-Gen 组织成统一产品目录。\n- PIX550 目录采用 2015 财年公司介绍口径，包括 270 亿欧元销售额、全球 16 万名员工和中国 26000 名员工等历史统计。\n- PIX500 目录同样采用 2015 财年公司介绍口径；`2026-06-09` 补入的正确命名同版副本进一步确认了 `270 亿欧元 / 全球 16 万名员工 / 中国 26000 名员工 / 26 家工厂 / 8 个物流中心 / 5 个分公司 / 40 个办事处` 这组历史统计应按 `2016.11` 资料语境理解。\n- GHA 英文演示稿补充了施耐德在气体绝缘开关柜产品组合中的 40.5kV 路线。\n- `GMA12kV中压气体绝缘开关柜-web.pdf` 说明到 `2018.12` 时，施耐德中国市场还保留一份更窄的 `12kV` GMA 中文目录层：公司介绍页使用 `2017` 财年 `247 亿欧元`、全球 `14.2 万` 员工、中国超过 `17000` 名员工、`23` 家工厂、`8` 个物流中心、`9` 个分公司和 `37` 个办事处等统计。\n- GHA 2018 目录进一步说明施耐德已有 30 多年一次气体绝缘开关柜开发制造经验，已安装柜体基数超过 120000 台。\n- WS-G 企业标准由施耐德开关(苏州)有限公司发布，补充了施耐德在中国企业标准口径下的 12kV~40.5kV 气体绝缘金属封闭开关设备资料。\n- 2024 版 WS-G 企业标准由施耐德电气(厦门)开关设备有限公司发布，说明同一 WS-G 标准体系已经出现苏州与厦门两个发布主体/版本口径。\n- WI-G 操作说明书补充了施耐德在铁道用气体绝缘金属封闭开关设备上的操作、维护和用户服务口径。\n- `WI-G27.5kv铁道用气体绝缘开关柜.pdf` 说明到 `2018.10` 时，施耐德电气（中国）有限公司已经发布 `SCDOC1543` 口径的铁道用产品目录：公司介绍页使用 `2017` 财年 `247 亿欧元`、全球 `14.2 万` 员工、中国超过 `17000` 名员工、`23` 家工厂、`8` 个物流中心、`9` 个分公司和 `37` 个办事处等统计。\n- WS-G 2024.01 产品目录由施耐德电气（中国）有限公司标识发布，补充了施耐德在 WS-G 产品目录、应用行业、订货资料和工程选型维度的公开口径。\n- 更早的 WS-G `SCDOC1541 / 2018.09` 产品目录同样由施耐德电气（中国）有限公司标识发布，并保留 2017 财年 `247 亿欧元 / 14.2 万员工 / 中国超过 17000 名员工 / 23 家工厂` 等历史公司介绍口径。\n- WS-G 操作说明书补充了施耐德对 WS-G 用户服务、人员资质、运行操作、IDIS/VDS 和机械联锁的操作维护口径。\n- WS-G 2014 产品介绍由施耐德开关（苏州）有限公司发布，补充了 2014 年中国市场应用、产品结构、运行实例和五大特征的历史宣传口径。\n- WSG-WIG 智能开关柜演示稿以 Schneider Electric / SAS 标识呈现，补充了施耐德在 2019 年围绕 WSG/WIG 智能在线监测项目、标准验证和供应商开发计划的内部方案口径。\n- `FBX catalogue 2020` 目录把施耐德的中压气体绝缘产品线再向 `24kV` 及以下二次配电方向延伸，补充了 `FBX-C/FBX-E`、`630A/20kA`、`LSC2A`、寿命期免补气和 EcoStruxure 监测选项口径。\n- `FBX中压开关柜 SF6绝缘3_24kV` 说明到 `2017.10` 时，施耐德中国市场已经发布更早的 `SCDOC1544` 中文目录层：仍采用 `2016` 财年 `247 亿欧元`、全球 `16` 万员工和中国 `26000` 名员工等公司介绍口径，但更强调 `FBX-E` 穿越狭窄门洞安装在风机塔筒内、`A-Link` 扩展、`Flair` 故障指示与传统远方故障隔离恢复供电场景。\n- `FBX 中压开关柜产品目录` 的 `2018.04` 版保留了更早的公司介绍口径，包括 `2016` 财年 `247 亿欧元` 销售额、全球 `16` 万员工，以及中国 `26000` 名员工、`26` 家工厂、`8` 个物流中心、`5` 个分公司和 `40` 个办事处等历史统计。\n- `DNF7 Metal-Clad Switchgear Technical Instruction` 显示施耐德在 `2010.12 / 2011-01-04` 时点已经形成面向 `36kV / 40.5kV` 的 DNF7 英文技术说明体系：一方面保留 `2009` 财年 `158 亿欧元`、全球 `100000+` 员工和中国区 `22000` 名员工等更早公司口径，另一方面把 `HVX`、`FP`、`LSC2B/PM`、`Middle Rolling / Floor Rolling` 和一次选型方案落到工程资料层。\n- `DNF7-产品目录` 说明到 `2011.06` 时，施耐德已经在中国市场发布 `SCDOC1542` 口径的 DNF7 中文产品目录：公司介绍页保留 `2010` 财年 `196亿欧元`、全球 `110,000+` 员工、中国 `22,000` 员工、`77` 个办事处、`26` 家工厂、`6` 个物流中心、`3` 个研发中心等历史统计，并把 DNF7 写成 `40.5kV` 空气绝缘开关柜目录、附典型方案和基础安装页。\n- `MVnex-12KV空气绝缘开关柜` 说明到 `2017.05` 时，施耐德已经在中国市场发布 `ECATA944` 口径的 MVnex 中文正式目录：公司介绍页使用 `2016` 财年 `247亿欧元`、全球 `160,000` 员工、中国 `26,000` 员工、`26` 家工厂、`8` 个物流中心、`5` 个分公司和 `40` 个办事处等统计，并把 `MVnex / MVnex 550 / MVnex 500 / Smart MVnex` 整理成统一产品族。\n- `DNF7 中文选型手册170816-20P-AVX` 说明到 `2017.08` 时，施耐德已经在 `schneider-electric.cn` 口径下把 DNF7 整理成一份完整中文工程选型手册：除 `40.5kV(GB) / 36kV(IEC)`、`HVX / FP` 外，还明确写出 `KYN28 / KYN61`、GB/DL/T/IEC 标准、本地应用行业、一次方案和配电室基础安装图。\n- `DNF7 英文选型手册170821-12P-AVX` 说明到 `2017` 时，施耐德仍在中国市场保留这套 DNF7 英文选型手册口径：技术骨架基本沿用较早英文说明，但公司介绍更新为 `2016` 销售额 `24.7 billion Euros`、全球 `160,000+` 员工、中国 `26,000` 员工和“在中国超过 30 年”的品牌叙事。\n- `SM6 Catalogue 2012` 说明施耐德在 `2012` 时已把 [[SM6]] 建成正式英文产品目录体系：最高 `36 kV`、模块化柜型、`30` 年寿命、`Easergy T200`、`Sepam`、`VIP`、`PowerMeter`，并给出超过 `1,100,000` 台 SM6 与超过 `2,500,000` 台中压 `SF6` 单元的历史装机宣传口径。\n- `SM6中压开关柜24kV产品目录` 则说明到 `2017.08`，施耐德已经形成中国市场正式中文目录口径：`24 kV` 以下、`SCDOC064-MV`、`LSC2A / PI / IP4X / IAC A-FLR 20kA/1s`、`NSM-C` 双电源进线柜，以及 `Easergy T200 S / Flair 22D / Amp 21D / Sepam / VIP` 这组自动化与监测配置。\n- `2019-03-27` 的 `SM6` 演示稿补出了施耐德在 `RM6/FBX/Premset` 之外的另一条环网柜谱系：封面写 `7.2~24kV` 空气绝缘环网柜，分类页把 `SM6` 与 `RM6/FBX`、`Premset` 并列；但负荷开关柜和断路器柜页又明确使用 `SF6` 绝缘隔室，说明它是施耐德二次配电环网柜中的边界型平台而非 RM6 改名版本。\n- `SMD and Sensors for SM6 training v2` 则把施耐德的数字化配电叙事补到培训/实施层：`SMD` 被明确写成 `Substation Monitoring Device`，可接 `TH110`、`CL110`、`PT100`、继电器和 `DI`，并接出 Local HMI、Nearby HMI、`Modbus TCP`、`Facility Expert` 告警和 `Facility Hero` 移动应用。\n- `AS12/AS24中压开关` 目录显示施耐德在 `2010` 年前后还提供一条更底层的二次配电路线：不是完整柜体，而是可供国内柜厂集成的 `12/24kV` 空气绝缘柜用 `SF6` 中压开关核心元件，并配套 `Fusarc CF`、`Flair 22D`、`Talus 200I` 和 `Sepam` 等附件与自动化生态。\n- `AS12中压开关 产品简介` 说明到 `2016.09` 时，施耐德仍在中国市场保留这条核心元件路线的独立折页层：正文已聚焦 `AS12 12kV 630A`，但仍保留 `IS / QS / CS / DS / ES`、`375mm / 500mm` 宽度、`AS12-ES` 和三工位 `SF6 0.4 bar` 密闭压力系统。\n- `SC6中压开关元件产品目录` 则说明到 `2017` 时，这条更底层的开关元件路线在中国市场已出现单型号收敛版：文件名仍沿用 `AS12`，但正文题名改为 `SC6`，功能收敛为 `SIC / SQC`，参数集中到 `12kV 630A 20kA/4s`。\n- `Trihal系列树脂浇注干式变压器产品目录` 把施耐德在中压配电链条中的变压器一侧补齐：资料说明施耐德通过施耐德（苏州）变压器有限公司在中国本地化生产 [[Trihal]]，并把“从中压开关、变压器到低压终端配电”的综合优化配电方案写成明确战略目标。\n- 同一目录还表明施耐德在干式变压器上保留了独立的技术路线和中国本地系列：一方面强调 `1983` 起的树脂浇注工艺、`E3/C3/F1`、局放和雷电冲击等技术口径，另一方面又落到 `SCB10/11/12/13`、`SCBH15`、`SC10 35kV` 等本地化产品谱系。\n- `PREMSET Installation instructions IP41 option` 不是产品目录，而是法国发布的安装说明，补充了施耐德服务中心可提供工程技术支持、投运、培训、维护、改造和备件服务等售后口径。\n- `Premset 12 kV紧凑型模块化真空开关设备产品目录` 把施耐德的中压开关柜路线再补出一条 `12kV` 屏蔽式固体绝缘分支，主打 `375mm` 紧凑宽度、`630/1250A`、`31.5kA x 4s`、`25kA x 1s A-FLR` 和 `IP67` 主回路。\n- `Premset 产品手册` 则保留了更早的 `2012.06` 公司宣传口径：全球约 `110000` 员工、每年 `4-5%` 销售收入投入研发、全球运行中压功能单元超过 `4000000`，并把 Premset 描述为面向智能电网的创新型中压产品。\n- `Premset 样本 2020` 说明施耐德在 Premset 路线中已经把“智能电网就绪”进一步落到具体产品矩阵：`Easergy T300`、`SMD`、`Easergy P3/P5`、`Sepam`、`VIP 400/410`、`TH110-R`、`Flair 22D/23DM` 和 `EcoStruxure Power Device` 等命名开始直接进入正式目录。\n- `RM6-O电缆分支箱` 说明施耐德至少在 `2008.12` 已经把 RM6 模块架构延伸到 `3~24kV` `SF6` 绝缘电缆分支箱产品：资料给出 `630A`、`1.2Bar` 气室、超过 `30` 年寿命、双电缆接入、`Flair 22D`、机械联锁和配网自动化预留接口。\n- `RM6 24 kV Medium Voltage Distribution Catalogue 2012` 说明施耐德至少在 `2012` 时就已形成 RM6 的英文正式目录层，并把 `sealed pressure system`、`PM class`、`LSC2B / LSC2A`、`Automatic transfer systems`、`Easergy T200 I` 和 `DNV` marine application 这些工程边界写入目录。\n- `RM6` 演示稿补充了施耐德在中压二次配电环网柜上的成熟产品线：资料声称 RM6 已在全球 `50` 多个国家累计应用超过 `1,700,000` 个功能单元，并把 `ATS`、`T200C`、`Easergy T300` 和 `Smart RMU` 作为配网自动化卖点。\n- `RM6SF6绝缘环网柜和紧凑性开关柜产品目录` 说明到 `2018.10`，施耐德中国市场已经形成 RM6 的中文正式目录层：尾标为 `SCDOC1043-MV`，公司页保留 `2017` 财年 `247 亿欧元 / 全球 14.2 万员工 / 中国 17000+ 员工 / 23 家工厂 / 8 个物流中心 / 9 个分公司 / 37 个办事处` 口径，并把 `IP67 / IP4X / 0.2Bar / 2mm`、`Pt` 单元、订购表和 `T200 I` 自动投切页写成正式工程目录内容。\n- `RM6-S Plus-中压配电24 kV 以下气体绝缘开关设备` 说明到 `2018.10`，施耐德中国市场还存在一条更窄的 `RM6-S / RM6-S Plus` 目录分支：尾标为 `SCDOC1739`，公司页同样保留 `2017` 财年 `247 亿欧元 / 全球 14.2 万员工 / 中国 17000+ 员工 / 23 家工厂 / 8 个物流中心 / 9 个分公司 / 37 个办事处` 口径，并把 `RM6-S 630A` 侧扩、`RM6-S Plus 1250A` 顶扩、`A-Link`、`Sepam20/40` 和远程控制 `0~4` 级写成正式工程目录内容。\n- `RM6 SeT` 正式目录则把这条 RM6 路线进一步产品化和标准化：引入 `3mm 304` 不锈钢气箱、主回路 `40` 年寿命、`A-link` 扩展、`Easergy P1` 保护以及 `PD110/TH110-R/CL110/SMD/Easergy T300` 组成的数字化配电方案。\n- `RM6-S` 操作说明书则从售后与运行维护层面补入更早期的 RM6 路线对象：它聚焦 `12kV SF6` 气体绝缘开关设备、`OE / I / Q / B / IC` 功能单元、`Flair2XD`、`VPIS-V2`、`T200I`、`VD23`、`SF6 0.03 MPa @ 20℃` 和寿命期末材料回收边界。\n\n- `RM AirSeT环保气体绝缘环网柜` 说明施耐德在 RMU 路线除 `SF6` 型 [[RM6]] / [[RM6SeT]] 外，还布局了采用 `GWP < 1` 环保气体、真空灭弧和 `SVI` 技术的 [[RMAirSeT]] 分支，并继续叠加 `Easergy T300`、`PMBOX`、`PD110`、`TH110-R` 等数字化叙事。\n- `CAS RMU-Ring Main Unit` 说明施耐德至少在 `2008.02` 已经发布一份明确使用 `CAS 36 Ring Main Unit` 命名的英文目录；当前抽取得到的页数有限，但它已经把产品价值概括为供电连续性、安全、可升级和监测控制，适合作为施耐德后续 [[RM6]]、[[FBX]]、[[SM6]] 等环网柜 / RMU 路线之前的一层早期英文目录背景。\n- `SCDOC-DVCAS-EN` 则把这条更早的环网柜 / RMU 图谱补成一份完整风电场专用目录：资料把 [[DVCAS]] 写成 `36kV` 风电场集电网二次配电开关柜，强调 `600mm` 门洞通过能力、`2000m` 海拔、`SF6 0.3bar` 密封气箱、`IP67` 高压隔室、`I / D / 0 / T` 模块体系，以及 `VIP-35`、`Flair`、`48Vdc` 电动机构和远方故障隔离恢复供电逻辑。\n- `风能解决方案` 说明到 `2018.10`，施耐德已经把风电行业整理成四组系统级方案：风机系统、风场连接、并网电站和电力监控/视频安防，并把 [[FBX]]、[[FLUSARC]]、[[WSG]]、[[DNF7]]、[[Trihal]]、[[Premset]]、[[PLSCADA]] 和 [[iRIO]] 放进同一套风能叙事。\n- `FLUSARC 40.5 kV` 中文目录说明到 `2016.07`，施耐德已经在中国市场以 `SCDOC1545` 形式发布独立的 `40.5kV` `SF6` 绝缘中压开关柜目录；公司页使用 `2015` 财年 `270亿欧元`、全球 `16万` 员工、中国 `26000` 员工、`26` 家工厂、`8` 个物流中心、`5` 个分公司和 `40` 个办事处的历史口径。\n- `FOX中压开关柜核心元件产品目录` 说明到 `2016.03`，施耐德已在中国市场发布 `12kV` 以下 `SF6` 气体绝缘开关设备核心元件目录；它强调“施耐德提供核芯元件、合作伙伴生产电缆室和低压间”的合作分工，属于不同于完整整柜目录的集成路线。\n## Related\n- [[SmartHVX]]\n- [[HVX]]\n- [[PIX]]\n- [[GHA]]\n- [[WSG]]\n- [[FBX]]\n- [[SM6]]\n- [[RM6]]\n- [[RM6O]]\n- [[RM6S]]\n- [[RM6SPlus]]\n- [[RM6SeT]]\n- [[RMAirSeT]]\n- [[Premset]]\n- [[WIG]]\n- [[GMA]]\n- [[PIX500]]\n- [[PIX550]]\n- [[PMBEasy]]\n- [[EcoStruxure]]\n- [[SMD]]\n- [[AS12AS24]]\n- [[SC6]]\n- [[CAS36]]\n- [[DVCAS]]\n- [[FLUSARC]]\n- [[FOX]]\n- [[PLSCADA]]\n- [[iRIO]]\n- [[Trihal]]\n- [[干式变压器]]\n",

    "id": "sources/2-smart-hvx-intelligent-medium-voltage-circuit-breaker",
    "label": "Smart HVX 智能中压断路器 产品简介",

    "path": "wiki\\sources\\2-smart-hvx-intelligent-medium-voltage-circuit-breaker.md",
    "markdown": "---\ntitle: \"Smart HVX 智能中压断路器 产品简介\"\ntype: source\ntags: [brochure, medium-voltage, smart-maintenance]\nsources: []\nlast_updated: 2026-06-03\ndate: 2020-07-02\nsource_file: raw/MCP/2.样本Smart HVX智能中压断路器.pdf\n---\n\n## Summary\n这份样本介绍了 [[施耐德电气]] 基于 [[HVX]] 真空断路器推出的 [[SmartHVX]] 智能中压断路器产品线，重点覆盖温度监测、配柜状态监测、二次元件监测以及与 [[PMBEasy]] 的联动方式。文档将方案分为基础测温型、标准测温型和智能型三档，强调通过 [[温度智能监测]]、[[配柜智能监测]]、[[二次元件智能监测]] 和 [[主动运维]] 提升供电可靠性与运维效率。材料同时把该产品放在 [[EcoStruxure]] 架构和施耐德数字化配电能力的整体叙事中。\n\n## Key Claims\n- [[SmartHVX]] 以 [[HVX]] 真空断路器为基础，适用于主流空气绝缘开关设备，并面向石油化工、配电系统、交通运输和工矿企业等场景。\n- 文档将智能化价值概括为可靠性提高 1 倍、运维效率提高 100%、运维成本降低 50%，属于典型的产品宣传口径。\n- 产品方案分为基础测温型、标准测温型和智能型，其中智能型在温度监测之外增加 [[配柜智能监测]]、[[二次元件智能监测]] 和可选本地显示。\n- [[PMBEasy]] 被定位为 [[SmartHVX]] 的主动运维智能单元，可提供关键指标监测、状态预警和趋势分析，并支持单柜版与全站版。\n- 标准测温型和智能型支持对接云端“千里眼”运维系统，也可将监测信息上传至本地部署的 PME/PSO 系统。\n\n## Key Quotes\n> “全新一代 Smart HVX 智能中压断路器” — 产品定位\n\n> “可靠性提高 1倍” — 宣传卖点\n\n> “运维效率提高100%” — 宣传卖点\n\n## Connections\n- [[施耐德电气]] — 产品所属公司，文档开篇介绍其能效管理、自动化和 [[EcoStruxure]] 架构。\n- [[HVX]] — [[SmartHVX]] 的机械与电气基础平台。\n- [[SmartHVX]] — 文档核心对象，承接三类智能配置方案。\n- [[PMBEasy]] — 主动运维智能单元，用于本地显示、状态预警和趋势分析。\n- [[EcoStruxure]] — 作为施耐德物联网和边缘控制平台背景，解释产品的数字化定位。\n- [[温度智能监测]] — 断路器六点测温及可选母排/电缆测温是三种配置的共同基础。\n- [[配柜智能监测]] — 智能型新增能力，用于识别前倾、横梁变形等异常。\n- [[二次元件智能监测]] — 智能型新增能力，覆盖分合闸线圈和储能电机健康状态。\n- [[主动运维]] — [[PMBEasy]] 与远程系统共同支持从监测走向预测性运维。\n\n## Contradictions\n- 当前 wiki 中暂无可识别的冲突信息；这是首个导入来源。\n",
    "preview": "## Summary 这份样本介绍了 [[施耐德电气]] 基于 [[HVX]] 真空断路器推出的 [[SmartHVX]] 智能中压断路器产品线，重点覆盖温度监测、配柜状态监测、二次元件监测以及与 [[PMBEasy]] 的联动方式。文档将方案分为基础测温型、标准测温型和智能型三档，强调通过 [[温度智能监测]]、[[配柜智能监测]]、[[二次元件智能监测]] 和 [[主动运维]] 提升供电可靠性与运维效率。材料同时把该产品放在 [[E",

    "markdown": "---\ntitle: \"Smart HVX 智能中压断路器 方案总览\"\ntype: source\ntags: [brochure, overview, medium-voltage, smart-maintenance]\nsources: []\nlast_updated: 2026-06-03\ndate: 2020-07-02\nsource_file: raw/MCP/3.Smart HVX智能中压断路器方案总览-单页.pdf\n---\n\n## Summary\n这份单页资料是对 [[SmartHVX]] 方案组合的浓缩总览，重点突出其“智能中压断路器 + 本地/云端运维显示链路”的整体架构。相比上一份更完整的产品简介，这份材料更强调配置分层、通信链路和显示终端之间的关系，明确了基础测温型、标准测温型和智能型的功能边界，以及 [[PMBEasy]]、[[千里眼]]、[[BMM]] 等组件在方案中的位置。\n\n## Key Claims\n- [[SmartHVX]] 通过物联网与传感器技术实现全面感知、风险预警和主动运维，目标是提升供电连续性、运维效率和用户数字化体验。\n- 三种配置方案的核心差异在于是否具备 [[配柜智能监测]]、[[二次元件智能监测]] 以及本地/云端显示接入能力。\n- 基础测温型侧重就地温度显示，标准测温型与智能型进一步支持接入 [[千里眼]] 与 [[PMBEasy]]。\n- 方案拓扑中出现了 [[ZBRN32]] 数据接收器、[[Link150]] 智能网关和 [[BMM]] 断路器监测单元，说明 Smart HVX 已经不仅是单一断路器产品，而是一个带接入链路的运维方案。\n- 监测信息除云端系统外，也可上传至本地部署的 PME 电能质量管理系统和 PSO 电力监控系统。\n\n## Key Quotes\n> “全面提升用户数字化体验。” — 方案总体价值描述\n\n> “智能中压断路器方案总览” — 文档定位\n\n## Connections\n- [[SmartHVX]] — 文档核心对象，描述其整体方案拓扑与配置层级。\n- [[温度智能监测]] — 三种配置的共同基础能力。\n- [[配柜智能监测]] — 智能型中的新增监测能力。\n- [[二次元件智能监测]] — 智能型中的新增监测能力。\n- [[PMBEasy]] — 本地主动运维显示与分析单元，包含单柜版和全站版。\n- [[千里眼]] — 面向手机和网页云端显示的远程运维系统。\n- [[BMM]] — 断路器监测单元，用于采集配柜、线圈及电机相关信息。\n- [[ZBRN32]] — 温度数据接收器，承接温度传感器与后续网关链路。\n- [[Link150]] — 智能网关，用于方案中的网络接入。\n- [[主动运维]] — 文档反复强调的运维目标与价值主张。\n\n## Contradictions\n- 与 [[2-smart-hvx-intelligent-medium-voltage-circuit-breaker]] 的主体结论一致，暂无直接冲突；这份文档更像方案拓扑和配置边界的压缩版说明。\n",
    "preview": "## Summary 这份单页资料是对 [[SmartHVX]] 方案组合的浓缩总览，重点突出其“智能中压断路器 + 本地/云端运维显示链路”的整体架构。相比上一份更完整的产品简介，这份材料更强调配置分层、通信链路和显示终端之间的关系，明确了基础测温型、标准测温型和智能型的功能边界，以及 [[PMBEasy]]、[[千里眼]]、[[BMM]] 等组件在方案中的位置。 ## Key Claims",
    "group": 1,
    "value": 20
  },
  {
    "id": "sources/as12-as24-medium-voltage-switch-catalog",
    "label": "AS12/AS24中压开关产品目录",

    "color": "#4CAF50",
    "path": "wiki\\sources\\as12-as24-medium-voltage-switch-catalog.md",
    "markdown": "---\ntitle: \"AS12/AS24中压开关产品目录\"\ntype: source\ntags: [as12, as24, switch, air-insulated, medium-voltage, catalog, schneider-electric]\ndate: 2010-03-18\nsource_file: raw/二次空气绝缘开关柜/AS12AS24中压开关.pdf\n---\n\n## Summary\n这份 PDF 元数据 `CreationDate=2010-03-18`、`ModDate=2010-11-24` 的中文产品目录把 [[AS12AS24]] 定位为施耐德用于二次变电站和配电站的中压开关核心元件，而不是完整柜体产品线。它面向空气绝缘开关柜场景，提供 `IS / QS / DS / CS / ES` 功能分支、`12/24kV` `630A` 基本口径、密闭压力系统 `SF6` 开关本体，以及熔断器、安培表、故障指示器、远方终端和保护装置等附件体系。\n\n## Key Claims\n- 封面写明 `3-24kV 630A`，正文主参数页给出 `12kV` 和 `24kV` 两档额定电压，额定电流 `630A`。\n- 文档将 [[AS12AS24]] 描述为“空气绝缘开关柜的核心元件”，柜体由国内开关柜制造商制造，AS12/AS24 负责负荷开关、组合电器、隔离等功能。\n- 功能系列包括 `IS`、`QS`、`DS`、`CS`、`ES`：分别对应负荷开关进出线柜、熔断器组合柜、双电源进线或快速合闸场合、PT 柜及中压/低压变压器柜、隔离开关+断路器柜。\n- 绝缘水平为 `12kV: 42/48kV, 75/85kV` 与 `24kV: 65/79kV, 125/145kV`；短时耐受电流常规为 `20kA/3s`，`AS12` 可选 `25kA/1s`；峰值耐受/短路关合最高写到 `50/63kA` 与 `50kA`。\n- 技术页说明三相旋转触头装于 `SF6` 气室，气体相对压力 `0.4 bar`，符合 IEC “密闭压力系统”，年泄漏率 `<0.05%`。\n- 永磁旋弧灭弧结构被作为核心卖点，资料强调低操作过电压、触头磨损小、电气寿命 `E3`、主开关机械寿命 `5000` 次、接地开关 `2000` 次。\n- 安全页强调三位置开关、天然联锁、观察窗、同轴机械指示、柜门/接地/主开关“五防”联锁，以及事故时泄压朝柜后释放。\n- 附件体系覆盖 `Fusarc CF` 熔断器、`Amp 21D` 自供电数字电流表、`Easergy Flair 22D` 故障指示器、`Talus 200/T200I` 远程终端、钥匙闭锁和 `Sepam 10/20/40/80` 综合保护。\n- `Talus 200` 被写成中压二次配电网络的远程控制终端，可实现通讯、电参量测量、状态监控、故障隔离、电网重构和双电源切换/备用电源自投。\n- 环境边界给出运行温度 `-15~40°C`、储存 `-40~70°C`、海拔 `<=1000m`；并说明抗潮湿恶劣环境部件为标准配置。\n\n## Key Quotes\n> \"作为空气绝缘开关柜的核心元件\" — 产品定位页\n\n> \"密闭压力系统设计，年泄漏率仅为国标要求的1/20\" — 密封性能卖点\n\n## Connections\n- [[AS12AS24]] — 文档核心产品对象。\n- [[空气绝缘开关设备]] — 资料明确把 AS12/AS24 放在空气绝缘开关柜场景中理解。\n- [[施耐德电气]] — 厂商与附件、保护、自动化体系提供方。\n- [[机械联锁]] — 天然联锁、50P 锁和钥匙闭锁构成重要安全边界。\n- [[数字化中压运维]] — `Flair 22D`、`Talus 200I` 和 `Sepam` 把它接入配网自动化与远方监控场景。\n\n## Contradictions\n- 与现有 [[SM6]]、[[PIX]]、[[MVnex]]、[[DNF7]] 页面不构成直接冲突，但资料边界明显不同：它写的是“开关核心元件 + 柜体功能组合”，不是完整成套开关柜目录，不能把柜体尺寸、隔室等级或整柜方案口径互相替换。\n- 它一方面属于 [[空气绝缘开关设备]] 场景，另一方面开关本体又采用 `SF6` 密闭压力系统，因此更适合记为“空气绝缘柜体中的 SF6 开关核心”，而不是纯无气体绝缘路线。\n- 文档中的 `Talus 200`、`Sepam 20/40/80`、`Flair 22D` 等自动化与保护配置代表 `2010` 年前后的可选附件生态，不应覆盖后续 `Smart SM6`、`RM6 SeT` 或 `FBX 2020` 中更晚的数字化平台口径。\n",
    "preview": "## Summary 这份 PDF 元数据 `CreationDate=2010-03-18`、`ModDate=2010-11-24` 的中文产品目录把 [[AS12AS24]] 定位为施耐德用于二次变电站和配电站的中压开关核心元件，而不是完整柜体产品线。它面向空气绝缘开关柜场景，提供 `IS / QS / DS / CS / ES` 功能分支、`12/24kV` `630A` 基本口径、密闭压力系统 `SF6` 开关本体，以及熔断器",
    "group": 0,
    "value": 21

    "markdown": "---\ntitle: \"AS12中压开关 产品简介\"\ntype: source\ntags: [as12, switch, air-insulated, medium-voltage, brochure, schneider-electric]\ndate: 2016-08-30\nsource_file: raw/二次气体绝缘开关柜/RM6/AS12三工位SF6中压开关折页.pdf\n---\n\n## Summary\n这份两页中文折页的 PDF 元数据日期为 `2016-08-30`，末页尾标为 `SCDOC928-MV / 2016.09`，正文题名为 [[AS12AS24]] 路线中的 `AS12 中压开关 产品简介`。它不是更早 `AS12/AS24` 目录的同版副本，也不是后续 [[SC6]] 目录，而是一层居中的 `AS12` 单型号宣传/选型折页：参数收束到 `12kV 630A`，但仍保留 `IS / QS / CS / DS / ES` 全套功能分支、`375mm / 500mm` 宽度口径，以及 `AS12-ES` 隔离开关断路器组合。\n\n## Key Claims\n- 封面写明 `AS12 中压开关 产品简介`、`12kV 630A`、`可靠核“芯” 灵活便捷`，末页尾标为 `SCDOC928-MV`，时间口径为 `2016.09`。\n- 资料仍将产品定位为柜厂集成用中压开关核心元件，而不是完整整柜；虽然源文件放在 `RM6` 目录下，但正文内容与 [[RM6]] 产品线无关。\n- 第 1 页订购表覆盖 `AS12-IS / AS12-QS / AS12-CS / AS12-DS` 的 `375mm / 500mm` 宽度版本，并单列 `AS12-ES` 隔离开关断路器组合，注明相关图纸和安装说明需另查。\n- 技术参数延续这条路线的核心边界：`12kV`、`630A`、工频耐压 `42/48kV`、雷电冲击耐压 `75/85kV`、短时耐受电流 `20kA/3s` 或 `25kA/1s`、峰值耐受 `50kA` 或 `63kA`。\n- `AS12-ES` 页给出断路器组合口径：额定短路开断电流 `25kA`、隔离开关机械寿命 `5000/2000` 次、断路器机械寿命 `30000` 次、电气寿命 `E2` 级。\n- 开关本体继续采用 `SF6` 密闭压力系统，正文写三相旋转触头装在相对压力 `0.4 bars` 的气室内，并强调符合 IEC “密闭压力系统”要求。\n- 资料保留永磁旋弧灭弧技术叙事，强调电弧在永久磁铁电磁场作用下旋转、拉长并在电流过零时熄灭，以换取低操作过电压、低触头磨损和较长电气寿命。\n- 安全边界继续围绕三工位开关、天然闭锁、观察窗、同轴机械指示、主开关/接地开关分离操作孔、后下方泄压和“五防”联锁展开。\n- 操作机构层写出 `CIT / CI1 / CI2 / CS` 四类机构，覆盖手动、电动、储能、按钮分合与脱扣器等差异。\n- 与 `2010` 的 [[AS12AS24]] 目录相比，这份折页已经收束到 `AS12 12kV`，但尚未像 `2017` 的 [[SC6]] 那样把功能进一步收敛到 `SIC / SQC`。\n\n## Key Quotes\n> “三工位开关，‘闭合’、‘断开’、‘接地’三位置天然闭锁” — 安全特征页\n\n> “开关三相旋转触头被装入充满SF6气体、相对压力为0.4bars的气室内” — 密封性能页\n\n## Connections\n- [[AS12AS24]] — 这份折页更适合视为 `AS12/AS24` 平台在 `2016` 时点聚焦 `AS12` 的中间版本。\n- [[SC6]] — 与后续 `2017` `SC6` 目录共同构成 `AS12/AS24 -> AS12 -> SC6` 的连续版本链。\n- [[空气绝缘开关设备]] — 仍服务于空气绝缘柜体集成场景，但开关核心本体采用 `SF6`。\n- [[施耐德电气]] — 厂商主体与中国市场 `2016.09` 折页层资料。\n- [[机械联锁]] — 三工位天然闭锁、观察窗和“五防”联锁是关键安全边界。\n\n## Contradictions\n- 不与 [[AS12AS24]] 构成冲突，而是把更早 `12/24kV` 平台收束成 `2016` 的 `AS12 12kV` 单型号折页层，同时保留 `IS / QS / CS / DS / ES` 全套功能。\n- 不应与 [[SC6]] 混为同版：`SC6` 目录已改写为 `SIC / SQC` 和 `20kA/4s` 收敛口径，而这份折页仍保留 `AS12` 命名、`IS / QS / CS / DS / ES` 和 `20kA/3s or 25kA/1s` 的旧平台表达。\n- 虽然原文件位于 `raw/二次气体绝缘开关柜/RM6/`，但正文没有 `RM6` 产品线内容，因此不应把它归为 [[RM6]] 的版本来源。\n",
    "preview": "## Summary 这份两页中文折页的 PDF 元数据日期为 `2016-08-30`，末页尾标为 `SCDOC928-MV / 2016.09`，正文题名为 [[AS12AS24]] 路线中的 `AS12 中压开关 产品简介`。它不是更早 `AS12/AS24` 目录的同版副本，也不是后续 [[SC6]] 目录，而是一层居中的 `AS12` 单型号宣传/选型折页：参数收束到 `12kV 630A`，但仍保留 `IS / QS / C",

    "markdown": "---\ntitle: \"CAS 36 Ring Main Unit Catalogue 2008\"\ntype: source\ntags: [cas36, ring-main-unit, medium-voltage, catalog, schneider-electric]\ndate: 2008-02-01\nsource_file: raw/二次气体绝缘开关柜/CAS&DVCAS/CAS RMU-Ring Main Unit.pdf\n---\n\n## Summary\n这份 `02/2008` 英文目录把 [[CAS36]] 明确写成 `CAS 36 Ring Main Unit`，是当前知识库里出现得更早的一层施耐德环网柜资料。当前可抽取到的正文页数较少，尚不足以重建完整参数表，但它已经清楚给出这条路线的产品叙事重点：供电连续性、人员与设备安全、可升级性，以及监测与控制能力。与后续 [[RM6]]、[[FBX]]、[[SM6]] 等更完整的中国市场或后续版本资料相比，它更适合作为施耐德 RMU / 二次配电气体绝缘路线的早期英文目录层。\n\n## Key Claims\n- 封面将产品明确命名为 `CAS 36 Ring Main Unit`。\n- 资料尾标可见文档号 `AMTED304013EN`，并写有 `Catalogue` 与 `02/2008`。\n- 文档归属 `Power distribution networks` 产品叙事。\n- 正文导言强调 `better service continuity`、`increased personnel and equipment safety`、`guaranteed upgradeability` 与 `efficient monitoring and control`。\n- 版权页可见发布主体为 `Schneider Electric Industries SAS`，地址为 `89, boulevard Franklin Roosevelt, F-92500 Rueil-Malmaison`。\n- 当前抽取得到的页数有限，尚未看到完整的额定电压、电流、短路能力或柜型表，因此不能用它覆盖后续 [[RM6]]、[[FBX]]、[[SM6]] 等更完整资料中的工程参数。\n\n## Key Quotes\n> \"CAS 36 Ring Main Unit\" — 封面对产品对象的直接命名。\n\n> \"better service continuity\" — 导言页对产品价值的概括之一。\n\n## Connections\n- [[CAS36]] — 资料核心产品对象。\n- [[施耐德电气]] — 资料所属厂商。\n- [[气体绝缘开关柜]] — 结合归档位置与后续产品链，可将其视为施耐德二次配电 RMU / GIS 叙事中的早期目录层。\n- [[RM6]] — 后续更成熟的施耐德环网柜路线，可作为时间上的对照对象。\n- [[FBX]] — 后续标准化二次配电 GIS / RMU 目录路线，可作产品族表达方式对照。\n- [[SM6]] — 后续另一条施耐德环网柜谱系，可作边界对照。\n\n## Contradictions\n- 与 [[RM6]]、[[FBX]]、[[SM6]] 不构成直接参数冲突；更稳妥的理解是 [[CAS36]] 代表 `2008` 的早期英文目录层，而后者代表更晚、更完整或更本地化的资料层。\n- 由于当前未抽取到完整参数页，不能把 `CAS 36` 中的 `36` 直接等同写成全套已确认额定口径。\n",

    "markdown": "---\ntitle: \"DNF7 Chinese Product Catalog 2011\"\ntype: source\ntags: [switchgear, air-insulated, Schneider-Electric, DNF7]\ndate: 2011-06-27\nsource_file: raw/一次空气绝缘开关柜/DNF7/DNF7-产品目录.pdf\n---\n\n## Summary\n这份中文 PDF 适合按 `2011.06 / SCDOC1542` 的 DNF7 中国产品目录层处理，而不是并入 `2017` 中文选型手册或 `2025` 中文数字化样本。它仍围绕 `40.5kV`、空气绝缘、金属封闭、可移开式结构和 `FP / HVX-O` 断路器方案展开，但参数与安装口径明显更早。它真正新增的价值，是把 DNF7 在中国市场的更早中文目录状态补出来：主口径仍是 `2500A`、`25/31.5kA`、`1300 x 2760 x 2500 mm`，并带有较完整的中国公司介绍、典型方案和基础安装页。\n\n## Key Claims\n- 封面将产品写成 `DNF 7 40.5kV 中压空气绝缘开关柜 产品目录`，末页给出 `2011.06 / SCDOC1542`。\n- 概述页把 DNF7 定义为适用于三相交流 `50Hz`、额定电压 `40.5kV`、单母线及单母线分段系统的户内金属铠装成套开关柜。\n- 这一版资料的主参数口径仍是开关柜额定电流 `2500A`，而不是后续 `2017` 中文手册中的 `3150A`。\n- 柜体尺寸口径为 `1300 x 2760 x 2500 mm`，不同于后续资料中的 `1200(1400) x 2505 x 2400 mm` 体系。\n- 资料强调 `FP` 型 `SF6` 断路器和 `HVX-O` 真空断路器两条手车路线，并给出电压互感器、电流互感器和避雷器参数。\n\n## Key Quotes\n> \"DNF 7 40.5kV\"\n\n> \"中压空气绝缘开关柜\"\n\n> \"2011.06\"\n\n## Connections\n- [[DNF7]] — 构成更早的中国市场目录层。\n- [[空气绝缘开关设备]] — 支撑 DNF7 的 `40.5kV` 空气绝缘路线在中国市场的早期目录表达。\n- [[金属封闭开关设备]] — 继续体现铠装移开式、金属隔板和防内部电弧设计口径。\n- [[施耐德电气]] — 补入 `2010/2011` 时点的中国公司介绍与渠道布局口径。\n- [[HVX]] — 记录 `HVX-O` 在 DNF7 更早中文目录中的出现。\n\n## Contradictions\n- 与 [[DNF7]] 后续 `2017` 中文手册中的 `3150A`、`KYN28 / KYN61`、`1200mm / 1400mm` 口径存在明显版本差异；更稳妥的理解方式是把它视为更早一代中国目录层，而不是冲突数据。\n",

    "markdown": "---\ntitle: \"DNF7 户内交流金属封闭开关设备\"\ntype: source\ntags: [dnf7, switchgear, medium-voltage, digital-distribution]\ndate: 2025-04-10\nsource_file: raw/MVE/DNF7/DNF7户内交流金属封闭开关设备-2025.4.10.pdf\n---\n\n## Summary\n这份样本介绍了 [[施耐德电气]] 的 [[DNF7]] 户内交流 [[金属封闭开关设备]]，定位为数字化中压配电产品。它把 40.5kV 空气绝缘开关柜本体、[[HVX]] 真空断路器、[[内部电弧防护]]、LSC2B/PM 隔室设计，以及接入 [[EcoStruxure]]、[[PMBox]]、[[PMBEasy]] 和千里眼资产顾问的智能化方案放在同一套产品叙事中。\n\n## Key Claims\n- [[DNF7]] 面向发电配电系统、基础设施、商业建筑、新能源和工业场景，核心诉求是安全可靠、简便高效和数字化中压配电。\n- DNF7 额定电压为 40.5kV，额定频率 50/60Hz，额定短路开断电流覆盖 25kA 和 31.5kA，主母线最大额定电流可达 3150A。\n- 设备符合 GB/T 3906-2020 与 IEC 62271-200:2021，采用 LSC2B 运行连续性类别和 PM 级金属隔板。\n- 文档强调 IAC AFLR 31.5kA/1s 内部电弧类别、压力释放通道、五防联锁和关门操作，以提升人员和设备安全。\n- 智能化方案包括 TH110 温度在线监测、[[SmartHVX]] 断路器特性在线监测、视频监测、弧光保护、剩余电寿命在线监测和 [[PMBox]] 主动运维。\n\n## Key Quotes\n> \"设计寿命可达30年\" — 安全可靠章节中的设计寿命口径\n\n> \"DNF7 开关设备内部燃弧类别符合 IAC AFLR\" — 人员防护章节\n\n## Connections\n- [[DNF7]] — 文档核心产品对象。\n- [[金属封闭开关设备]] — DNF7 所属设备类别。\n- [[内部电弧防护]] — 文档反复强调的安全与人员防护主题。\n- [[HVX]] — DNF7 进线、馈线和母线分段等功能单元使用的真空断路器平台。\n- [[SmartHVX]] — DNF7 智能化方案中的断路器特性监测载体。\n- [[EcoStruxure]] — DNF7 可接入的数字化架构与平台。\n- [[PMBox]] — DNF7 本地/边缘主动运维管理单元。\n- [[PMBEasy]] — DNF7 智能化方案图中提到的本地管理单元之一。\n- [[数字化中压运维]] — DNF7 把设备本体、安全防护和智能化运维连接起来。\n\n## Contradictions\n- 未发现与现有 Smart HVX、PMB Easy 或 PMBox 页面直接冲突的信息；这份资料主要把既有数字化运维能力扩展到 DNF7 开关柜本体层。\n",
    "preview": "## Summary 这份样本介绍了 [[施耐德电气]] 的 [[DNF7]] 户内交流 [[金属封闭开关设备]]，定位为数字化中压配电产品。它把 40.5kV 空气绝缘开关柜本体、[[HVX]] 真空断路器、[[内部电弧防护]]、LSC2B/PM 隔室设计，以及接入 [[EcoStruxure]]、[[PMBox]]、[[PMBEasy]] 和千里眼资产顾问的智能化方案放在同一套产品叙事中。 ## Key Claims",

    "markdown": "---\ntitle: \"DNF7 Metal-Clad Switchgear Technical Instruction\"\ntype: source\ntags: [dnf7, switchgear, medium-voltage, air-insulated, technical-manual]\ndate: 2010-12-01\nsource_file: raw/一次空气绝缘开关柜/DNF7/DNF7 Selection Manual in.pdf\n---\n\n## Summary\n这份英文 PDF 是一份更早期的 [[DNF7]] 技术说明/选型手册，封面标题为 `DNF7 Metal-Clad Switchgear Air Insulated Switchgear Technical Instruction`，封底印有 `ONEXXXX 2010.12`，而 PDF 元数据 `CreationDate` 为 `2011-01-04`、`ModDate` 为 `2016-03-09`。它不是现有 `2025-04-10` 中文样本的重复件，而是 DNF7 在更早阶段的英文工程口径：重点落在 `36kV / 40.5kV` 系统适用范围、四隔室结构、`HVX` 与 `FP` 互换、`Middle Rolling / Floor Rolling` 两种抽出方式，以及一次方案和基础尺寸。它同时保留了带时间边界的早期公司介绍与市场口径，因此更适合用来补 DNF7 的版本链，而不是覆盖后续数字化样本中的较新叙事。\n\n## Key Claims\n- [[DNF7]] 被定义为面向户内应用的 air insulated metal-clad switchgear，适用于 `36kV` 和 `40.5kV` 系统。\n- 早期英文手册明确 DNF7 采用四隔室结构：busbar、circuit breaker、cable 和 low voltage compartment，并按 `LSC2B` 与 `PM partition class` 组织。\n- 文档强调可配置施耐德可抽出式 `HVX` 真空断路器与 `FP` 气体绝缘断路器，且相同额定值下 switching technology 可互换。\n- 设备提供 `Middle Rolling` 与 `Floor Rolling` 两种 withdrawable 形式，并给出进线/馈线、计量/测量、母联/母线上升等一次方案页。\n- 技术数据页给出 `36kV / 40.5kV`、`1250~3150A`、`AFLR 31.5kA (1s)`、外壳 `IP4X`、可选 `IP41`、标准尺寸 `1200(1400) x 2505 x 2400 mm` 和最大重量 `1800kg` 等较早期工程口径。\n\n## Key Quotes\n> \"The latest range of air insulated metal-clad switchgear DNF7\" — 产品总述页\n\n> \"it is a LSC2B service continuity, PM partition class switchgear\" — 结构与连续性描述页\n\n## Connections\n- [[DNF7]] — 该文件记录的是 DNF7 更早阶段的英文技术/选型口径。\n- [[空气绝缘开关设备]] — 文档明确把 DNF7 写成 air insulated metal-clad switchgear。\n- [[金属封闭开关设备]] — 四隔室、金属隔板、联锁与泄压设计都属于这一类别的核心特征。\n- [[HVX]] — DNF7 早期就已支持施耐德可抽出式 HVX 真空断路器。\n- [[施耐德电气]] — 文档同时保留了 `2009` 销售额、`2010/2011` 时点的中国区布局和 EcoStruxure 早期公司叙事。\n\n## Contradictions\n- 与现有 [[dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10]] 不构成直接冲突，但版本侧重点明显不同：这份早期英文手册突出 `36kV / 40.5kV` 双口径、`HVX / FP` 互换与抽出式结构，`2025` 中文样本则更聚焦 `40.5kV`、数字化中压运维和在线监测方案。\n- 文中的公司规模、营收和中国区员工/工厂数量属于 `2009~2011` 时点的历史口径，不能直接当作后续年份事实使用。\n",

    "markdown": "---\ntitle: \"DVCAS Switchgears for Transformer Substations in Wind Farms\"\ntype: source\ntags: [dvcas, wind-farm, ring-main-unit, secondary-distribution, gas-insulated, catalog]\ndate: 2007-01-01\nsource_file: raw/二次气体绝缘开关柜/CAS&DVCAS/SCDOC-DVCAS-EN.pdf\n---\n\n## Summary\n这份 `01/2007` 英文目录把 [[DVCAS]] 定位为风电场用 `36kV` 中压二次配电开关柜，面向风机箱变和集电网场景。与刚入库的 `CAS 36` 单页式目录层不同，这份资料给出了更完整的工程骨架：`36kV / 630A / 20kA`、`IP67` 高压隔室、`SF6 0.3 bar`、`I / D / 0 / T` 模块化功能，以及风机塔筒内安装、故障隔离和远方恢复供电的应用逻辑。它更像施耐德体系内一条偏风电专用的早期 RMU / GIS 分支，而不是后续 [[RM6]]、[[FBX]]、[[SM6]] 的简单前身。\n\n## Key Claims\n- 封面将产品写为 `DVCAS Switchgears for transformer substations in wind farms`，并标注 `36 kV`、`SECONDARY DISTRIBUTION SWITCHGEAR`。\n- 资料把应用场景明确限定在风电场集电网与风机箱变，强调 `36 kV` 是新风电场的主导趋势，并要求设备可穿过仅 `600 mm` 宽的风机门洞。\n- 目录说明 [[DVCAS]] 适用于海拔 `2000 m` 以内的风电场。\n- 总参数页给出：额定频率 `50Hz`、额定电压 `36kV`、工频耐压 `70kV`、雷电冲击耐压 `170kV`、主母线额定电流 `630A`、短时耐受 `20kA / 3s`、短路开断能力 `20kA`、关合能力 `50kA peak`、内部电弧 `IAC AFL 20kA / 1s`。\n- 防护等级写为高压隔室 `IP67`、低压与操作机构隔室 `IP3X`，`SF6` 在 `20℃` 下压力为 `0.3 bar`。\n- 结构上每个模块单元包含金属底架、操作与继保隔室、电缆隔室，以及容纳母线与开断元件的不锈钢密封气箱；绝缘介质为 `SF6`。\n- 资料将柜型功能模块写为 `D` 保护功能、`I` 进线三工位负荷开关、`0` 出线刚性提升、`T` 带接地开关的提升，并通过 `NE / LE / RE / DE` 表示左右扩展能力。\n- 推荐的风电场标准功能组包括 `NE-D0`、`NE-ID0` 和 `NE-IID0`，分别对应变压器保护加出线、再加一路进线、再加两路进线。\n- `D` 保护单元采用真空断路器，文中写为 `Evolis CAS`，并给出 `E2` 电寿命、`M1/2000` 机械寿命，以及 `VIP-35` 自供电继电器与 `CSH-30` 零序电流传感器。\n- `I` 进线单元采用 `SF6` 自气吹灭弧的三工位开关，可选 `48Vdc` 电动操作、`230Vac` 充电整流及 `Flair` 故障指示，实现远方故障隔离和供电恢复。\n- 电缆室采用符合 `EN 50181` 的 `C` 型套管，口径写为 `630A / 25kA / M16`，并支持每相两根电缆连接。\n- 目录把该产品归入 MESA 路线，说明 MESA 为 Schneider Electric 成员企业，并强调其在风电场中压开关柜上的大量装机经验。\n\n## Key Quotes\n> \"DVCAS switchgears can go through doors only 600 mm wide.\" — 风机塔筒内安装边界的直接表述。\n\n> \"These DVCAS switchgears can be installed in wind farms up to 2000 m over the sea level.\" — 海拔适用范围说明。\n\n## Connections\n- [[DVCAS]] — 资料核心产品对象。\n- [[施耐德电气]] — 资料所属集团背景。\n- [[气体绝缘开关柜]] — 资料属于 `36kV` 风电场二次配电气体绝缘路线。\n- [[CAS36]] — 同目录夹中的更简版 `CAS 36` 资料，可作为相近时期的早期 RMU 命名层对照。\n- [[RM6]] — 后续更通用的施耐德二次配电环网柜路线。\n- [[FBX]] — 后续更标准化的二次配电 GIS / RMU 目录路线。\n\n## Contradictions\n- 与 [[CAS36]] 不构成直接冲突；更适合把两者理解为相近时期的相邻资料层：[[CAS36]] 更像简要产品叙事页，[[DVCAS]] 则是风电专用工程目录。\n- 与 [[RM6]]、[[FBX]]、[[SM6]] 不应视为同一产品的简单旧版本关系；[[DVCAS]] 明显更聚焦 `36kV` 风电场集电网与箱变应用，而后者更偏通用二次配电环网柜 / RMU。\n",
    "preview": "## Summary 这份 `01/2007` 英文目录把 [[DVCAS]] 定位为风电场用 `36kV` 中压二次配电开关柜，面向风机箱变和集电网场景。与刚入库的 `CAS 36` 单页式目录层不同，这份资料给出了更完整的工程骨架：`36kV / 630A / 20kA`、`IP67` 高压隔室、`SF6 0.3 bar`、`I / D / 0 / T` 模块化功能，以及风机塔筒内安装、故障隔离和远方恢复供电的应用逻辑。它更像施耐德",
    "group": 0,
    "value": 22

  {

    "path": "wiki\\sources\\fbx-catalogue-2020.md",
    "markdown": "---\ntitle: \"FBX catalogue 2020\"\ntype: source\ntags: [fbx, gas-insulated-switchgear, medium-voltage, catalog]\ndate: 2020-05-01\nsource_file: raw/MVP/FBX/FBX catalogue 2020.pdf\n---\n\n## Summary\n这份 `SCDOC1544 / 2020.05` 目录介绍了 [[FBX]] 中压 [[气体绝缘开关柜]]，定位为 `24kV` 及以下二次配电用紧凑型设备。它补充了与 [[GMA]]、[[GHA]] 和 [[WSG]] 不同的一条施耐德产品线：FBX 更强调 `630A / 20kA`、紧凑柜宽、变压器保护单元、`LSC2A` 连续性和寿命期内免补气，同时保留可接入 [[EcoStruxure]] 的在线监测选项；与更早的 `2018.04` 版相比，这一版更明显地强化了数字化章节。\n\n## Key Claims\n- [[FBX]] 面向公共配电、工业、基础设施和可再生能源场景，覆盖 `12kV` 和 `24kV`，额定电流 `630A`，额定短时耐受/内部电弧主口径为 `20kA` 级。\n- FBX 采用 `SF6` 绝缘，带电主回路封闭在不锈钢气箱中，主回路设计寿命 `30` 年，寿命期内免维护、无需补气。\n- 产品分为 `FBX-C` 紧凑型和 `FBX-E` 可扩展型；前者可把 6 个以下功能单元集成在单个气箱中，后者支持左右扩展。\n- `FBX-E` 通过 [[ALink]] 实现左右扩展，扩展时无需现场气体处理。\n- 典型功能单元包括 `C` 进出线、`T1` 熔断器变压器保护、`T2` 真空断路器线路/变压器保护、`R` 直接进线、`Sb` 母线分段和 `M` 计量单元。\n- 目录给出 `LSC2A` 工作连续性、主回路 `IP67`、熔断器隔室 `IP65` 可选 `IP67`、操作机构和低压隔室 `IP3X`、电缆隔室开门 `IP2XC` 和柜体 `IK07`。\n- `T1` 单元强调上下游双接地开关、熔断器撞针触发三相分闸和机械联动；`T2` 单元强调固定式真空断路器、具有关合能力的接地开关和可选无辅助电源故障跳闸继电器。\n- 目录给出 `AFL/AF 16kA 或 20kA / 1s` 的内部电弧口径，并提供室内安装、泄压和运输通道要求。\n- EcoStruxure 章节补充 `Easergy T300`、`SMD`、`TH110-R`、`PD110` 和 `VPIS` 等数字化监测与接入选项。\n- 可持续发展章节说明约 `90%` 金属材料可回收，`SF6` 约占总重 `0.5%`，可在寿命期终通过阀门回收再利用。\n\n## Key Quotes\n> \"24kV及以下气体绝缘开关设备\" — 封面副标题\n\n> \"主回路使用寿命30年，寿命期内免维护\" — 产品寿命口径\n\n## Connections\n- [[FBX]] — 文档核心产品对象。\n- [[气体绝缘开关柜]] — FBX 所属设备类别。\n- [[金属封闭开关设备]] — FBX 采用金属封闭与密封气箱结构。\n- [[内部电弧防护]] — 目录给出 `16/20kA 1s` 内部电弧等级口径。\n- [[ALink]] — FBX-E 的特有扩展母线连接装置。\n- [[数字化中压运维]] — 目录补充了 `Easergy T300`、`SMD`、`TH110-R` 和 `PD110` 等在线监测选项。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 未发现与 [[GMA]]、[[GHA]] 或 [[WSG]] 的直接冲突；它们同属施耐德中压开关柜，但 FBX 当前来源更偏 `24kV` 及以下、`630A / 20kA` 的二次配电紧凑路线，不应与更高电流或更高电压产品线参数互相覆盖。\n- 与 [[FBX]] 的 `2018.04` 目录相比，这一版延续同一 `SCDOC1544` 口径，但新增了更明显的 [[EcoStruxure]]、`Easergy T300`、`SMD`、`TH110-R` 和 `PD110` 数字化内容。\n",
    "preview": "## Summary 这份 `SCDOC1544 / 2020.05` 目录介绍了 [[FBX]] 中压 [[气体绝缘开关柜]]，定位为 `24kV` 及以下二次配电用紧凑型设备。它补充了与 [[GMA]]、[[GHA]] 和 [[WSG]] 不同的一条施耐德产品线：FBX 更强调 `630A / 20kA`、紧凑柜宽、变压器保护单元、`LSC2A` 连续性和寿命期内免补气，同时保留可接入 [[EcoStruxure]] 的在线监测选项",
    "group": 3,
    "value": 33
  },
  {
    "id": "sources/fbx-medium-voltage-switchgear-catalog-2017",
    "label": "FBX 中压开关柜产品目录 2017",
    "type": "source",

    "path": "wiki\\sources\\fbx-medium-voltage-switchgear-catalog-2017.md",
    "markdown": "---\ntitle: \"FBX 中压开关柜产品目录 2017\"\ntype: source\ntags: [fbx, gas-insulated-switchgear, medium-voltage, catalog]\ndate: 2017-10-01\nsource_file: raw/二次气体绝缘开关柜/FBX/FBX中压开关柜 SF6绝缘3_24kV.pdf\n---\n\n## Summary\n这份 `SCDOC1544 / 2017.10` 中文目录是当前 [[FBX]] 资料链中更早的一版正式产品目录。它与后续 `2018.04` 和 `2020.05` 版共享 `24kV` 及以下、`630A / 20kA`、`FBX-C / FBX-E`、`LSC2A`、`SF6 0.03MPa` 和 `AFL/AF 16/20kA 1s` 等核心口径，但更突出可再生能源、风机塔筒内安装、`600mm` 门洞通过、`A-Link` 扩展和传统远控/故障隔离叙事，而尚未展开后续版本中的 [[EcoStruxure]] 在线监测章节。\n\n## Key Claims\n- [[FBX]] 被定义为 `24kV` 及以下、`630A`、`20kA` 的二次配电用中压开关装置，可通过 `T1` 熔断器或 `T2` 真空断路器实现变压器保护。\n- 目录给出 `FBX-C` 紧凑型和 `FBX-E` 可扩展型两条柜型路线，并列出 `C`、`T1`、`T2`、`R`、`Sb` 和 `M` 功能单元。\n- 简介页明确把 `FBX-E` 写入风机塔筒应用语境，说明其可凭紧凑尺寸通过狭窄门洞安装在风机塔筒内。\n- 运行条件页给出 `-5℃ ~ +40℃` 常规温度、可选 `-25℃`、常规海拔 `1000m`、`SF6` 绝缘、`20℃` 额定压力 `0.03 MPa`、主回路 `IP67`、熔断器隔室 `IP65` 可选 `IP67`、低压隔室 `IP3X` 和柜体 `IK07`。\n- 内部故障电弧等级给出 `C/T1/T2/R` 的 `AFL 16kA 或 20kA / 1s` 与 `M1~M4` 的 `AF 16kA 或 20kA / 1s`。\n- 目录强调主回路 `30` 年使用寿命、寿命期内免维护、无需补气，以及 `LSC2A` 类工作连续性。\n- `FBX-E` 通过 [[ALink]] 实现左右扩展，扩展时无需现场气体处理，并要求预留大于 `450mm` 的安装空间。\n- 资料把 `Flair` 故障指示器、进线开关电动操作、远方故障隔离与供电恢复写入使用场景，说明这版更突出传统配网自动化和可再生能源运维叙事。\n- 电缆选型页系统列出 `EUROMOLD`、`nkt`、`Südkabel`、`Tyco` 等连接件路线，并说明 `C / R` 功能单元支持每相双电缆连接。\n- 末页给出 `SCDOC1544`、`2017.10` 和施耐德电气（中国）有限公司发布信息。\n- 标准页中出现“`RM6-S开关柜满足以下标准和法规的要求`”字样，但上下文主体均为 FBX，宜视为模板/排版遗留，不能据此把该目录归到 [[RM6S]]。\n\n## Key Quotes\n> \"FBX-E凭借其紧凑尺寸通过狭窄的门安装在风机塔筒内\" — 对风机塔筒安装场景的直接表述。\n\n> \"主回路具有30年的使用寿命，寿命期内免维护\" — 产品寿命口径。\n\n## Connections\n- [[FBX]] — 文档核心产品对象。\n- [[ALink]] — 目录明确命名的扩展母线连接装置。\n- [[气体绝缘开关柜]] — FBX 所属设备类别。\n- [[金属封闭开关设备]] — FBX 采用密封气箱与金属封闭结构。\n- [[内部电弧防护]] — 目录给出 `AFL/AF 16kA 或 20kA / 1s` 口径。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 与 [[FBX]] 的 `2018.04` 和 `2020.05` 目录不构成直接冲突；更适合视为同一 `SCDOC1544` 资料链中的更早版本层。\n- 标准页出现 `RM6-S` 字样与全文 FBX 主题不一致，应视为版本模板遗留而非产品归属变更。\n",
    "preview": "## Summary 这份 `SCDOC1544 / 2017.10` 中文目录是当前 [[FBX]] 资料链中更早的一版正式产品目录。它与后续 `2018.04` 和 `2020.05` 版共享 `24kV` 及以下、`630A / 20kA`、`FBX-C / FBX-E`、`LSC2A`、`SF6 0.03MPa` 和 `AFL/AF 16/20kA 1s` 等核心口径，但更突出可再生能源、风机塔筒内安装、`600mm` 门洞通过",

  {

    "path": "wiki\\sources\\fbx-medium-voltage-switchgear-catalog-2018.md",
    "markdown": "---\ntitle: \"FBX 中压开关柜产品目录\"\ntype: source\ntags: [fbx, gas-insulated-switchgear, medium-voltage, catalog]\ndate: 2018-04-01\nsource_file: raw/MVP/FBX/FBX 中压开关柜产品目录.pdf\n---\n\n## Summary\n这份 `SCDOC1544 / 2018.04` 中文目录是当前 [[FBX]] 资料链中更早的一版正式产品目录。它与后续 `2020.05` 版共享 `24kV` 及以下、`630A / 20kA`、`FBX-C / FBX-E`、`LSC2A` 和 `AFL/AF 16/20kA 1s` 等核心工程口径，但更突出 [[ALink]] 扩展结构、远方控制等级、联锁逻辑和安装实现，而尚未出现后续版本更明显的 [[EcoStruxure]] 监测与接入章节。\n\n## Key Claims\n- [[FBX]] 被定义为 `24kV` 及以下、`630A`、`20kA` 的二次配电用中压开关装置，可通过 `T1` 熔断器或 `T2` 真空断路器实现变压器保护。\n- 目录给出 `FBX-C` 紧凑型和 `FBX-E` 可扩展型两条柜型路线，并列出 `C`、`T1`、`T2`、`R`、`Sb` 和 `M` 功能单元。\n- [[ALink]] 被明确写为 `FBX-E` 的特有母线连接装置，支持左右扩展、无需现场气体处理，并要求扩展时预留大于 `450mm` 的安装空间。\n- 目录强调主回路 `30` 年使用寿命、寿命期内免维护、无需补气，以及 `LSC2A` 类工作连续性。\n- 运行条件包括常规海拔 `1000m`、`SF6` 绝缘、`20℃` 额定压力 `0.03MPa`、主回路 `IP67`、熔断器隔室 `IP65` 可选 `IP67`、低压隔室 `IP3X` 和柜体 `IK07`。\n- 内部故障电弧等级给出 `C/T1/T2/R` 的 `AFL 16kA 或 20kA / 1s` 与 `M1~M4` 的 `AF 16kA 或 20kA / 1s`。\n- 使用章节系统列出隔离开关、接地开关、断路器和电缆隔室门的联锁状态，并说明只有在允许状态下才可插入操作手柄。\n- 目录提供远方控制 `0~4` 级口径、`VDS-HR`、`VDS-LR`、`VPIS` 和可选 `IVIS`，但尚未像后续版本那样展开 [[EcoStruxure]] 与在线监测设备清单。\n- 末页给出 `2018.04` 日期、客户关爱中心热线与“本手册采用生态纸印刷”等早期发布特征。\n\n## Key Quotes\n> \"A-Link 母线连接器，实现 FBX-E 功能扩展\" — 扩展结构口径\n\n> \"功能单元的维护操作简化，并且其他功能单元无需中断供电（LSC2A类）\" — 连续性口径\n\n## Connections\n- [[FBX]] — 文档核心产品对象。\n- [[ALink]] — 目录明确命名的扩展母线连接装置。\n- [[气体绝缘开关柜]] — FBX 所属设备类别。\n- [[金属封闭开关设备]] — FBX 采用密封气箱与金属封闭结构。\n- [[内部电弧防护]] — 目录给出 `AFL/AF 16kA 或 20kA / 1s` 口径。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 未发现与 [[FBX]] 的 `2020.05` 目录存在直接冲突；两者文档号同为 `SCDOC1544`，但 `2018.04` 版更突出 [[ALink]]、联锁和远控等级，`2020.05` 版则新增更明显的 [[EcoStruxure]] 与在线监测章节，应视为同一产品线的前后版本。\n",
    "preview": "## Summary 这份 `SCDOC1544 / 2018.04` 中文目录是当前 [[FBX]] 资料链中更早的一版正式产品目录。它与后续 `2020.05` 版共享 `24kV` 及以下、`630A / 20kA`、`FBX-C / FBX-E`、`LSC2A` 和 `AFL/AF 16/20kA 1s` 等核心工程口径，但更突出 [[ALink]] 扩展结构、远方控制等级、联锁逻辑和安装实现，而尚未出现后续版本更明显的 [[E",

  {
    "id": "sources/flusarc-40-5kv-sf6-insulated-medium-voltage-switchgear-catalog-2016",
    "label": "FLUSARC 40.5 kV SF6 绝缘中压开关柜",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\flusarc-40-5kv-sf6-insulated-medium-voltage-switchgear-catalog-2016.md",
    "markdown": "---\ntitle: \"FLUSARC 40.5 kV SF6 绝缘中压开关柜\"\ntype: source\ntags: [switchgear, gas-insulated, flusarc, wind-power, schneider-electric]\ndate: 2016-07-01\nsource_file: raw/二次气体绝缘开关柜/FLUSARC 40.5/FLUSARC 40.5 kV SF6 绝缘中压开关柜.pdf\n---\n\n## Summary\n这份 `SCDOC1545 / 2016.07` 中文 PDF 是 [[FLUSARC]] 的独立正式产品目录，不是此前《风能解决方案》里那一页风场连接简介的重复件。它把 `FLUSARC 40.5 kV` 明确写成适用于 `40.5kV` 中压二次配电站和风电场中压/低压预装式变电站的 `SF6` 绝缘、真空断路器开关柜路线，并给出完整的标准、环境、参数、功能单元、联锁、电缆连接和安装运输口径。与 `2018` 风电总册相比，这份资料的价值在于把 [[FLUSARC]] 从场景化方案对象补成了可独立选型的工程目录层。\n\n## Key Claims\n- 资料把 [[FLUSARC]] 明确定位为 `40.5kV` 中压二次配电站和风电场预装式变电站用 `SF6` 绝缘中压开关柜，采用真空断路器。\n- 目录给出完整工程口径：`40.5kV`、`630A`、`20kA / 3s`、`AFLR 20kA / 1s`、工频耐压 `95/110kV`、雷电冲击 `185/215kV`。\n- 运行环境边界包括主回路 `IP67`、操作机构/电缆室 `IP3X / IP4X`、最大海拔 `2000m`、腐蚀等级 `C4` 和 `20℃` 时 `SF6 0.03MPa` 相对压力。\n- 资料明确写出至少 `30` 年良好运行且无需重新充气，寿命期内基本免维护，并通过压力表连续监测气箱压力。\n- 功能单元已形成独立目录体系：`C` 负荷开关馈线单元、`RE` 直接进线单元、`CB` 真空断路器馈线单元和 `L` 侧面联络单元。\n- 断路器单元采用三工位隔离/接地开关，负荷开关和断路器功能都给出机械联锁矩阵与电缆室门联锁边界。\n- 电缆连接支持前置插拔式套管、全绝缘或半绝缘终端、`EUROMOLD` `630A` 接口，以及双电缆或电缆加避雷器方案。\n- 安装资料给出 `500/550mm` 柜宽、`1155mm` 深度、基础固定、柜后至少 `100mm` 预留泄压距离，以及包装、运输和吊装要求。\n\n## Key Quotes\n> \"采用SF6气体绝缘，真空断路器。\"\n\n> \"保证良好地运行至少30年，而无需重新充气。\"\n\n## Connections\n- [[FLUSARC]] — 这份资料是其独立正式目录层，补齐工程参数与安装边界。\n- [[施耐德电气]] — 资料所属厂商，封面和公司页给出 `2015` 财年口径。\n- [[气体绝缘开关柜]] — 作为 `40.5kV` `SF6` 绝缘中压开关柜路线的具体实例。\n- [[机械联锁]] — 目录详细给出负荷开关、断路器、接地开关和电缆室门的联锁矩阵。\n- [[气室监测]] — 目录明确使用压力表对金属气箱内压力进行连续监测。\n- [[DVCAS]] — 两者都面向风电场景，前者是 `40.5kV` 路线，后者是更早的 `36kV` 风电集电网分支。\n\n## Contradictions\n- 与《风能解决方案》不构成直接冲突；后者是 `2018.10` 的系统级行业总册，这份资料则是 `2016.07` 的独立产品目录，应优先用于 [[FLUSARC]] 的具体工程参数和安装边界。\n- 这份目录的内部燃弧和短时耐受口径为 `20kA / 1s` 与 `20kA / 3s`，明显低于并网电站侧 [[WSG]]、[[DNF7]] 等 `40.5kV` 一次设备路线，说明它更适合风场连接和预装式变电站场景，而不是直接等同于更高容量的一次开关柜。\n",
    "preview": "## Summary 这份 `SCDOC1545 / 2016.07` 中文 PDF 是 [[FLUSARC]] 的独立正式产品目录，不是此前《风能解决方案》里那一页风场连接简介的重复件。它把 `FLUSARC 40.5 kV` 明确写成适用于 `40.5kV` 中压二次配电站和风电场中压/低压预装式变电站的 `SF6` 绝缘、真空断路器开关柜路线，并给出完整的标准、环境、参数、功能单元、联锁、电缆连接和安装运输口径。与 `2018` ",

    "id": "sources/fox-medium-voltage-switchgear-core-unit-catalog-2016",
    "label": "FOX中压开关柜核心元件产品目录",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\fox-medium-voltage-switchgear-core-unit-catalog-2016.md",
    "markdown": "---\ntitle: \"FOX中压开关柜核心元件产品目录\"\ntype: source\ntags: [switchgear, gas-insulated, core-unit, fox, schneider-electric]\ndate: 2016-03-01\nsource_file: raw/二次气体绝缘开关柜/FOX/FOX中压开关柜核芯单元产品目录.pdf\n---\n\n## Summary\n这份 `SCDOC1608 / 2016.03` 中文 PDF 不是完整环网柜目录，而是 [[FOX]] 这条“中压开关柜核心元件”路线的正式产品目录。资料把它明确写成 `12kV` 以下、`SF6` 气体绝缘的开关柜核心单元，适用于配电网络环网单元和最终用户配电，并强调由施耐德提供核芯元件、由合作伙伴完成电缆室和低压间。与现有 [[AS12AS24]]、[[SC6]] 这种“空气绝缘柜体中的核心开关元件”路线相比，[[FOX]] 更像一条面向二次配电 GIS / RMU 集成场景的成套核心模块路线。\n\n## Key Claims\n- 资料封面写为 `FOX 中压开关柜核心元件 12kV 气体绝缘开关设备`，末页尾标为 `SCDOC1608 / 2016.03`。\n- [[FOX]] 被定位为 `12kV`、`630A` 的中压开关柜核心元件，可作为配电网络环网单元或最终用户配电单元。\n- 产品有两种柜型：`FOX-NE` 紧凑型和 `FOX-DE` 可扩展/模块化柜型；`FOX-DE` 支持左右两侧扩展。\n- 保护方案分为 `Q` 方案和 `B` 方案：前者用负荷开关-熔断器组合电器做变压器保护，后者用真空断路器做变压器保护。\n- 资料给出 `I / Q / B / O / IC` 功能单元体系，其中 `B` 单元适用于负荷电流较大、不能使用负荷开关-熔断器组合的场合。\n- 技术参数页给出：`12kV`、工频耐压 `42kV`、雷电冲击 `75kV`、母线 `630A`、额定短时耐受 `20kA / 4s`、峰值耐受 `50kA`、`B` 型柜短路开断 `20kA`、`20℃` 时 `SF6 0.03MPa`。\n- 目录强调 `30` 年使用寿命，寿命期内主回路免维护，并通过询问式机械联锁系统避免误操作。\n- 外形图页明确保留制造边界：核芯元件由施耐德提供，电缆室和低压间由合作伙伴生产。\n\n## Key Quotes\n> \"FOX为中压开关柜核心元件，12kV，630A。\"\n\n> \"以上核芯元件由施耐德电气提供，电缆室和低压间由合作伙伴生产。\"\n\n## Connections\n- [[FOX]] — 这份资料是其独立正式目录层。\n- [[施耐德电气]] — 核芯元件提供方，资料使用 `2014` 财年中国市场公司介绍口径。\n- [[气体绝缘开关柜]] — 作为 `12kV` 二次配电 GIS / RMU 核芯模块路线的具体实例。\n- [[机械联锁]] — 资料强调询问式机械联锁系统和清晰可见的状态模拟图。\n- [[AS12AS24]] — 同样属于“施耐德提供核心元件、合作伙伴完成柜体”的路线，但后者偏空气绝缘柜体集成。\n- [[SC6]] — 可与 `AS12AS24 -> SC6` 的收敛关系对照理解，都是柜厂集成型元件路线。\n\n## Contradictions\n- 与现有 [[FBX]]、[[RM6]]、[[FLUSARC]] 不构成直接冲突；这些页面更偏完整产品线或整柜目录，而这份资料强调“核芯元件 + 合作伙伴柜体”的边界。\n- 与 [[AS12AS24]]、[[SC6]] 的差异不在于是否为“核心元件”，而在于绝缘路线不同：[[FOX]] 是 `12kV` 以下 `SF6` 气体绝缘开关设备，后两者更偏空气绝缘柜体中的中压开关核心。\n- `SCDOC1608_web - FOX.pdf` 与当前来源在页数、关键正文、目录号 `SCDOC1608` 和时间 `2016.03` 上一致，但文件哈希不同，更适合视为同版 `web` 导出副本而非新的版本层。\n",
    "preview": "## Summary 这份 `SCDOC1608 / 2016.03` 中文 PDF 不是完整环网柜目录，而是 [[FOX]] 这条“中压开关柜核心元件”路线的正式产品目录。资料把它明确写成 `12kV` 以下、`SF6` 气体绝缘的开关柜核心单元，适用于配电网络环网单元和最终用户配电，并强调由施耐德提供核芯元件、由合作伙伴完成电缆室和低压间。与现有 [[AS12AS24]]、[[SC6]] 这种“空气绝缘柜体中的核心开关元件”路线相比",
    "group": 0,
    "value": 28
  },
  {
    "id": "sources/gha-gas-insulated-switchgear-presentation-vers-06-englisch",
    "label": "GHA Gas Insulated Switchgear Presentation Vers 06 English",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\gha-gas-insulated-switchgear-presentation-vers-06-englisch.md",
    "markdown": "---\ntitle: \"GHA Gas Insulated Switchgear Presentation Vers 06 English\"\ntype: source\ntags: [gha, gas-insulated-switchgear, medium-voltage, presentation]\ndate: 2010-09-01\nsource_file: raw/MVE/WSG/GHA prentation Vers 06 englisch.ppt\n---\n\n## Summary\nThis presentation introduces [[GHA]] as a [[施耐德电气]] gas-insulated medium-voltage switchgear platform up to 40.5kV with a vacuum circuit-breaker, single-busbar and double-busbar variants, sealed gas compartments, and a user-oriented operating interface. Its distinctive technical themes are [[BLink]] busbar connection without site gas handling, [[IDIS]] gas-density indication, [[ILIS]] internal-arc detection and turn-off, cable connection flexibility, seismic qualification, and [[内部电弧防护]].\n\n## Key Claims\n- [[GHA]] is positioned as [[气体绝缘开关柜]] with a vacuum circuit-breaker up to 40.5kV, covering both single-busbar and double-busbar switchgear arrangements.\n- The deck repeatedly frames the product around sealed-for-life gas compartments, touch-proof construction, and protection from dust, humidity, small animals, UV/light, salt, and aggressive gases.\n- [[BLink]] allows switchgear panels to be erected, extended, disassembled, or moved within a switchboard row without gas handling outside the manufacturer's site.\n- [[BLink]] uses single-pole silicone-rubber insulation for busbar connections, is earthed against contact voltage, and is type-tested at 40.5kV / BIL 185kV.\n- The B-link screw-type contact is stated as type-tested at 40kA for 3s and 104kA peak current.\n- Gas compartments are described as a sealed pressure system according to IEC 62271-1, with leakage rate `<< 0.1 % p.a.` and gas removal by commercial valve at end of service life for recycling.\n- [[IDIS]] provides per-compartment gas-density indication through temperature-compensated gas density switches, two alarm levels, traffic-light display, remote signaling, group signal, and self-monitoring.\n- Cable systems include outer-cone connections up to and including 36kV / BIL 170kV, optional inner-cone connections up to 40.5kV, and fully insulated busbar systems up to 2500A via inner-cone plug-in systems.\n- [[ILIS]] detects and analyzes internal arc faults, with a release logic combining protection-relay current and internal-arc detection above `>= 1 kA`; the deck states a total turn-off time of approximately 100ms.\n- The GHA option set includes IAC AFLR up to 40kA for 1s, upward/backward pressure relief, an optional exhaust duct, and seismic qualification including UBC seismic zone 4 references.\n\n## Key Quotes\n> \"Gas insulated switchgear up to 40.5 kV\" — title positioning.\n\n> \"Safety through Sealed for Life\" — safety and lifecycle framing.\n\n> \"B-Link enables moving a switchgear panel within the switchboard row without gas handling.\" — core B-link value claim.\n\n## Connections\n- [[GHA]] — product described by the presentation.\n- [[施耐德电气]] — supplier context for the switchgear portfolio.\n- [[气体绝缘开关柜]] — product category shared with [[GMA]] and [[GMAirSeT]], but at a higher voltage level than the GMA pages currently cover.\n- [[BLink]] — GHA busbar-link technology enabling extension and panel movement without site gas handling.\n- [[IDIS]] — GHA gas-density information and display system for compartment monitoring.\n- [[ILIS]] — GHA internal-arc detection and turn-off option.\n- [[气室监测]] — gas-density monitoring theme strengthened by IDIS.\n- [[内部电弧防护]] — IAC AFLR and ILIS arc-fault protection theme.\n- [[金属封闭开关设备]] — broader medium-voltage switchgear enclosure category.\n\n## Contradictions\n- No direct contradiction was found with the current [[GMA]] and [[GMAirSeT]] pages. GHA should be treated as a separate gas-insulated switchgear family rather than as a variant of GMA.\n- The legacy `.ppt` text extraction fragments some rating tables. Only clearly extracted values are recorded here; a future PDF/catalog source should verify the complete rated-current and short-time withstand tables before using them for selection.\n",
    "preview": "## Summary This presentation introduces [[GHA]] as a [[施耐德电气]] gas-insulated medium-voltage switchgear platform up to 40.5kV with a vacuum circuit-breaker, single-busbar and double-busbar variants, sealed gas compartment",
    "group": 3,

  {
    "id": "sources/gha-nrjcat18789en-0318",
    "label": "GHA Gas-insulated Switchgear Catalog 2018",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\gha-nrjcat18789en-0318.md",
    "markdown": "---\ntitle: \"GHA Gas-insulated Switchgear Catalog 2018\"\ntype: source\ntags: [gha, gas-insulated-switchgear, medium-voltage, catalog]\ndate: 2018-03-01\nsource_file: raw/MVE/WSG/GHA_NRJCAT18789EN_0318.pdf\n---\n\n## Summary\nThis 2018 catalog is the formal product catalog for [[GHA]], a [[施耐德电气]] gas-insulated medium-voltage switchgear platform up to 40.5kV. It confirms the general GHA ratings, IEC single-busbar and double-busbar configurations, GHA Rail and ANSI application branches, [[BLink]], [[IDIS]], [[IVIS]], cable connection options, [[EcoStruxure]] ready solutions, environmental handling of SF6, and [[内部电弧防护]].\n\n## Key Claims\n- [[GHA]] is gas-insulated switchgear and controlgear with vacuum circuit-breaker for public and industrial medium-voltage distribution systems up to 40.5kV.\n- General IEC ratings cover 12/17.5/24/36/38/40.5kV, rated lightning impulse withstand voltage 75/95/125/170/170/185kV, rated short-time current 40kA, rated peak withstand current 100kA, rated busbar current 2500A with higher values up to 4000A on request, and rated branch current up to 2500A.\n- Internal Arc Classification is listed as 40kA/1s; all cubicles are described as IAC AFL 1s as standard, with IAC AFLR available when rear access is required.\n- GHA modules are organized around single or double busbar, outer or inner cone cable connection, and IAC AFL or AFLR options.\n- IEC single-busbar and double-busbar functional overviews both cover up to 40.5kV and up to 40kA, with feeder currents up to 2500A.\n- GHA Rail is a railway-derived single-busbar branch for one-pole or two-pole configurations, with nominal voltage 25/25-0-25kV, rated voltage 27.5/27.5-0-27.5kV, busbar/feeders up to 2000A, and up to 2500A / 31.5kA for one-pole configuration.\n- GHA ANSI is described as UL and CSA certified for ANSI applications, with ratings up to 38kV, 2500A and 40kA.\n- Gas-filled compartments are sealed pressure systems according to IEC/EN 62271-1, made of chromium-nickel steel, leakproof across service life, and delivered factory-filled with no gas handling needed for installation, extension, replacement, or dismantling under normal conditions.\n- [[BLink]] connects adjacent GHA panel busbars without site gas work and is described as IP65 and maintenance-free; the catalog states its current-carrying connection was checked at 40kA for 3s and 100kA peak current.\n- [[IDIS]] monitors autonomous gas-filled compartments through pressure sensors and displays gas status by green/yellow/red LEDs, with a common remote gas warning group signal.\n- [[IVIS]] is an integrated voltage detection system for voltage presence, isolation verification, and phase comparison according to IEC/EN 61243-5.\n- EcoStruxure ready content connects GHA with nearby control, Substation Monitoring Device, HMI, protection/metering/condition monitoring, Easergy P3/Sepam/MiCOM, VAMP arc mitigation, TH110 thermal monitoring, CL110 ambient monitoring, SCADA and cloud/mobile use cases.\n- Environmental content states that GHA contains SF6 in sealed pressure vessels, supports closed SF6 circulation and recovery through self-sealing valves, and has a 90% potential recyclability ratio by weight excluding packaging.\n\n## Key Quotes\n> \"Gas-insulated switchgear up to 40.5 kV\" — catalog title positioning.\n\n> \"No gas-handling along lifetime of the switchgear under normal operations\" — lifecycle installation/operation claim.\n\n> \"GHA is ready for the IoT\" — digital readiness positioning.\n\n## Connections\n- [[GHA]] — product family and catalog subject.\n- [[施耐德电气]] — supplier and catalog owner.\n- [[气体绝缘开关柜]] — core switchgear category.\n- [[BLink]] — busbar connection system without site gas work.\n- [[IDIS]] — gas-density / pressure-status information system.\n- [[IVIS]] — integrated voltage detection system.\n- [[气室监测]] — gas compartment monitoring theme.\n- [[内部电弧防护]] — IAC and arc mitigation theme.\n- [[EcoStruxure]] — digital monitoring and control architecture.\n- [[数字化中压运维]] — broader connected operation and condition monitoring direction.\n- [[温度智能监测]] — TH110 thermal monitoring content.\n- [[金属封闭开关设备]] — broader equipment category.\n\n## Contradictions\n- The 2018 catalog refines the older GHA presentation by providing a complete general ratings table. Future GHA selection should prefer this catalog over the legacy PPT for ratings.\n- The B-link peak-current wording differs by source: the older presentation states 104kA peak current, while this catalog states 100kA peak current. Treat this as a version/documentation difference and verify against project-specific ordering documents before engineering use.\n- The catalog does not explicitly repeat the older presentation's [[ILIS]] name; it instead describes EcoStruxure-ready arc mitigation using Easergy P3 and VAMP-style arc detection. This is a scope difference rather than a confirmed contradiction.\n",
    "preview": "## Summary This 2018 catalog is the formal product catalog for [[GHA]], a [[施耐德电气]] gas-insulated medium-voltage switchgear platform up to 40.5kV. It confirms the general GHA ratings, IEC single-busbar and double-busbar ",

    "color": "#4CAF50",

    "markdown": "---\ntitle: \"GM AirSeT 中压一次气体绝缘开关柜 产品目录 V1.1\"\ntype: source\ntags: [gm-airset, gas-insulated-switchgear, dry-air, sf6-free, medium-voltage]\ndate: 2023-10-10\nsource_file: raw/MVE/GMA Air/GM AirSeT 中压一次气体绝缘开关柜 产品目录（版本V1.1）.pdf\n---\n\n## Summary\n这份产品目录介绍了 [[GMAirSeT]] 环保 [[气体绝缘开关柜]]，它与 [[GMA]] 的柜型结构、模块化扩展和密封气室设计高度相似，但核心差异在于采用干燥空气/环保气体替代 SF6 作为绝缘介质。文档把 GM AirSeT 放在碳达峰、碳中和、GWP 和温室气体减排语境中，强调现场无需气体操作、寿命期末无需额外气体处理，并保持 IAC AFLR 31.5kA/1s、IP67 气室和 31.5kA 短时耐受等关键性能。\n\n## Key Claims\n- [[GMAirSeT]] 主要应用于基础设施、政府机关、电子行业、交通行业和高端商建。\n- GM AirSeT 采用环保型绝缘介质，文档说明该介质来自以空气为原料获得的压缩空气，无毒无害，不需要担心温室效应和泄漏对维修人员造成安全隐患。\n- 产品为金属封闭、干燥空气绝缘、预装结构且通过型式试验的开关设备，并按 GB/T 3906、IEC 62271-200 通过内部电弧等级试验验证。\n- 额定电压为 12kV，主母线额定电流不超过 2000A，分支母线额定电流不超过 1250A，额定短时耐受电流为 31.5kA，短路持续时间为 4s。\n- 环保气体额定充气压力为 0.04MPa 左右，干燥空气气体湿度不超过 250µL/L，年漏气率不超过 0.05%。\n- 文档给出高海拔试验 2500m、1.1 倍额定电流温升和符合 SGCC 要求等可靠性/适配性口径。\n\n## Key Quotes\n> \"环境友好，采用环保型绝缘介质\" — 主要特点\n\n> \"采用干燥空气，无需担心气体排放对环境造成影响\" — 环境兼容性设计\n\n## Connections\n- [[GMAirSeT]] — 文档核心产品对象。\n- [[气体绝缘开关柜]] — GM AirSeT 所属设备类别。\n- [[GMA]] — 结构相近但使用 SF6 绝缘的相邻产品线。\n- [[金属封闭开关设备]] — GM AirSeT 也是金属封闭并通过型式试验的开关设备。\n- [[内部电弧防护]] — 文档强调 IAC AFLR 31.5kA/1s 内部故障电弧等级。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 未发现与 [[GMA]] 的直接冲突；两者应理解为相近柜型平台下的不同绝缘介质路线：GMA 使用 SF6，GM AirSeT 使用干燥空气/环保气体。\n",
    "preview": "## Summary 这份产品目录介绍了 [[GMAirSeT]] 环保 [[气体绝缘开关柜]]，它与 [[GMA]] 的柜型结构、模块化扩展和密封气室设计高度相似，但核心差异在于采用干燥空气/环保气体替代 SF6 作为绝缘介质。文档把 GM AirSeT 放在碳达峰、碳中和、GWP 和温室气体减排语境中，强调现场无需气体操作、寿命期末无需额外气体处理，并保持 IAC AFLR 31.5kA/1s、IP67 气室和 31.5kA 短时耐",

    "markdown": "---\ntitle: \"GMA12kV中压气体绝缘开关柜 产品目录\"\ntype: source\ntags: [gma, gas-insulated-switchgear, medium-voltage, chinese-catalog]\ndate: 2018-12-21\nsource_file: raw/一次气体绝缘开关柜/GMA12kV中压气体绝缘开关柜-web.pdf\n---\n\n## Summary\n这份中文产品目录是 [[GMA]] 在中国市场的一份更早、且更窄的 `12kV` 目录层，PDF 元数据日期为 `2018-12-21`，末页时间口径为 `2018.12`。它把 GMA 明确写成中压气体绝缘单母线系统的一次配电设备，参数集中在 `12kV`、主母线 `1250A`、分支母线 `630/1250A`、`25/31.5kA`、`IAC 31.5kA/1s`，并补进了柜宽代码、柜型代码、操作模拟面板、压力表监测、主接线方案和基础槽钢页。\n\n## Key Claims\n- [[GMA]] 主要应用于变电站和配电站、基础设施、政府机关、工业、交通行业、水处理等场景，强调紧凑、模块化、可扩展和现场无需气体操作。\n- 文档把 GMA 定义为金属封闭、`SF6` 气体绝缘、预装结构且通过型式试验的开关设备，并说明已按 `GB/T 3906`、`IEC 62271-200` 通过内部电弧等级试验验证。\n- 技术参数集中在 `12kV`：主母线额定电流 `1250A`，分支母线额定电流 `630/1250A`，额定短时耐受电流 `25/31.5kA`，峰值耐受 `63/80kA`，额定短路持续时间 `4s`。\n- 断路器参数为 `25/31.5kA` 开断、`63/80kA` 关合、机械寿命 `10000` 次、等级 `M2-E2-C2`、额定短路开断次数 `50` 次。\n- 气室为符合 `IEC 62271-1` 和 `GB/T 11022` 的密封压力系统，额定充气压力 `0.03MPa`、报警压力 `0.02MPa`、最低功能闭锁压力 `0.01MPa`、年漏气率 `0.05%`，每个充气隔室标配温度补偿压力表，可选报警接点输出远程监测。\n- 柜型与柜宽代码被写成 `CB-C`、`CB-B`、`BC-CB`、`D`、`M`、`BB-PT`，对应 `420/510/600/750/800mm` 柜宽；典型方案包括进线柜、馈线柜、联络柜、计量柜、进线隔离柜、母线进线柜和 PT 柜。\n\n## Key Quotes\n> \"插接式设计，可快速安装，现场无需气体操作\" — 安装与扩展特点\n\n> \"通过 IAC 耐内部电弧故障试验，参数达 31.5 kA / 1s\" — 人员安全口径\n\n## Connections\n- [[GMA]] — 文档核心产品对象，补进 `2018.12` 的中国市场 `12kV` 目录层。\n- [[气体绝缘开关柜]] — GMA 所属设备类别。\n- [[金属封闭开关设备]] — 文档直接使用金属封闭、预装结构且通过型式试验的设备口径。\n- [[气室监测]] — 文档给出温度补偿压力表、报警接点、额定/报警/闭锁压力和年漏气率。\n- [[内部电弧防护]] — 文档明确通过 `IAC 31.5kA/1s` 试验。\n- [[施耐德电气]] — 文档保留 `2017` 财年 `247 亿欧元 / 14.2 万员工 / 中国超过 17000 名员工 / 23 家工厂 / 8 个物流中心 / 9 个分公司 / 37 个办事处` 的公司介绍口径。\n\n## Contradictions\n- 与 [[gma-medium-voltage-primary-gas-insulated-switchgear-v1-5]] 不应视为冲突，更适合理解为版本演进：`2018.12` 中文目录聚焦 `12kV`、主母线 `1250A`、机械寿命 `10000` 次和更具体的柜型代码；`2023 V1.5` 中文目录则扩展到 `12/24kV`、主母线 `≤2000A`、分支母线 `≤1250A` 和更宽的产品叙事。\n- 与 [[gma-nrjed311328en-1017]] 也不存在直接冲突：英文国际版可到 `24kV`、`2500A` 并强调 IoT / Smart Grid ready；本页更像 `2018` 中国市场中较窄、较工程化的 `12kV` 目录层。\n",
    "preview": "## Summary 这份中文产品目录是 [[GMA]] 在中国市场的一份更早、且更窄的 `12kV` 目录层，PDF 元数据日期为 `2018-12-21`，末页时间口径为 `2018.12`。它把 GMA 明确写成中压气体绝缘单母线系统的一次配电设备，参数集中在 `12kV`、主母线 `1250A`、分支母线 `630/1250A`、`25/31.5kA`、`IAC 31.5kA/1s`，并补进了柜宽代码、柜型代码、操作模拟面板、压",

    "path": "wiki\\sources\\gma-air-c4c-digital-implement-20191204.md",
    "markdown": "---\ntitle: \"GMA Air C4C Digital Implement\"\ntype: source\ntags: [gma-air, digital-monitoring, switchgear, implementation]\ndate: 2019-12-04\nsource_file: raw/MVE/GMA Air/GMA Air C4C Digital _ Implement  20191204.pptx\n---\n\n## Summary\n这份单页演示稿以“Ready for digital by 2020”为主题，列出 GMA Air / [[GMAirSeT]] 数字化实施所需的监测对象和传感器。它不像产品目录那样描述完整柜型，而是补充 [[气体绝缘开关柜]] 的数字化监测清单，包括 IED 保护、计量、状态监测、断路器电气监测、[[气室监测]]、电缆室温升监测、[[局部放电监测]]、RFID 和 Zigbee 通信。\n\n## Key Claims\n- IED 侧能力覆盖保护、计量和 condition monitoring。\n- 断路器电气监测关注 switching time、motor circuit current、motor voltage 和 motor times。\n- [[气室监测]] 包括 gas density monitoring、gas temperature monitoring 和 gas humidity monitoring。\n- 电缆侧/电缆终端温升监测使用 TH110、TH110-R 等传感器线索。\n- 开关柜 [[局部放电监测]] 被列为 GMA Air 数字化能力的一部分。\n\n## Key Quotes\n> \"Ready for digital by 2020\" — 幻灯片标题\n\n> \"Gas density monitoring\" — 气室监测项之一\n\n## Connections\n- [[GMAirSeT]] — 文档语境中的 GMA Air 产品对象。\n- [[气体绝缘开关柜]] — 数字化监测能力的设备类别背景。\n- [[气室监测]] — 新增的气体绝缘柜状态监测主题。\n- [[局部放电监测]] — 新增的开关柜绝缘状态监测主题。\n- [[数字化中压运维]] — 这份资料把中压开关柜数字化落实到具体传感器和监测点。\n\n## Contradictions\n- 未发现与 GM AirSeT 产品目录冲突的信息；这份材料更像数字化实施清单，补充监测对象而非修正产品参数。\n",
    "preview": "## Summary 这份单页演示稿以“Ready for digital by 2020”为主题，列出 GMA Air / [[GMAirSeT]] 数字化实施所需的监测对象和传感器。它不像产品目录那样描述完整柜型，而是补充 [[气体绝缘开关柜]] 的数字化监测清单，包括 IED 保护、计量、状态监测、断路器电气监测、[[气室监测]]、电缆室温升监测、[[局部放电监测]]、RFID 和 Zigbee 通信。 ## Key Claims",

    "markdown": "---\ntitle: \"GMA 中压一次气体绝缘开关柜 产品目录 V1.5\"\ntype: source\ntags: [gma, gas-insulated-switchgear, medium-voltage, catalog]\ndate: 2023-06-01\nsource_file: raw/MVE/GMA/GMA 中压一次气体绝缘开关柜 产品目录（版本V1.5）.pdf\n---\n\n## Summary\n这份产品目录介绍了 [[GMA]] 中压一次 [[气体绝缘开关柜]]，定位为 SF6 气体绝缘、单母线系统的一次配电设备。它补充了与 [[DNF7]] 不同的中压开关柜路线：GMA 面向 12/24kV、紧凑模块化、气室密封、固体绝缘母线和现场无需气体操作，而 DNF7 则是 40.5kV 空气绝缘 [[金属封闭开关设备]]。\n\n## Key Claims\n- [[GMA]] 主要应用于基础设施、政府机关、电子行业、交通行业和高端商建。\n- GMA 采用模块化设计，可向两边任意扩展，插接式设计支持快速安装，现场无需气体操作。\n- GMA 是金属封闭、SF6 气体绝缘、预装结构且通过型式试验的开关设备，并按 GB/T 3906、IEC 62271-200 通过内部电弧等级试验验证。\n- 额定电压为 12/24kV，主母线额定电流不超过 2000A，分支母线额定电流不超过 1250A，额定短时耐受电流为 31.5/25kA，短路持续时间为 4s。\n- SF6 气室额定充气压力为 0.03MPa 左右，报警压力为 0.02MPa，最低功能闭锁压力为 0.01MPa，年漏气率不超过 0.05%。\n- 充气隔室防护等级为 IP67，操作机构和低压隔室可达 IP4X/IP5X，电缆室门开启状态下为 IP2X。\n\n## Key Quotes\n> \"现场无需气体操作\" — 安装与扩展特点\n\n> \"通过IAC 耐内部电弧故障试验，参数达31.5 kA/1s\" — 人员安全特点\n\n## Connections\n- [[GMA]] — 文档核心产品对象。\n- [[气体绝缘开关柜]] — GMA 所属设备类别。\n- [[金属封闭开关设备]] — GMA 也是金属封闭并通过型式试验的开关设备。\n- [[内部电弧防护]] — GMA 通过 IAC 内部电弧等级试验，参数为 31.5kA/1s。\n- [[施耐德电气]] — 产品所属公司。\n\n## Contradictions\n- 未发现与 [[DNF7]] 的直接冲突；两者都是中压开关柜，但电压等级、绝缘介质和产品定位不同，应并列理解。\n",
    "preview": "## Summary 这份产品目录介绍了 [[GMA]] 中压一次 [[气体绝缘开关柜]]，定位为 SF6 气体绝缘、单母线系统的一次配电设备。它补充了与 [[DNF7]] 不同的中压开关柜路线：GMA 面向 12/24kV、紧凑模块化、气室密封、固体绝缘母线和现场无需气体操作，而 DNF7 则是 40.5kV 空气绝缘 [[金属封闭开关设备]]。 ## Key Claims",

    "markdown": "---\ntitle: \"GMA Gas-insulated Switchgear Catalog 2017\"\ntype: source\ntags: [gma, gas-insulated-switchgear, english-catalog, medium-voltage]\ndate: 2017-10-01\nsource_file: raw/MVE/GMA Air/GMA_NRJED311328EN_1017.pdf\n---\n\n## Summary\n这份英文目录是 [[GMA]] 气体绝缘开关柜的 2017 年国际版产品目录，覆盖 up to 24kV、2500A、31.5kA 的中压配电应用。相比已导入的中文 GMA 目录，它提供了更完整的国际版定位、紧凑柜宽、远程监控、[[EcoStruxure]] ready、Easergy 保护、Magelis 就地控制、IAC AFL/AFLR 内部电弧等级和全生命周期服务叙事。\n\n## Key Claims\n- [[GMA]] 适用于供电公司、工业、基础设施、风电和光伏等中压配电系统，尤其适合 switching substations 和 transformer substations up to 24kV。\n- 文档将 GMA 定位为 gas-insulated switchgear and controlgear with vacuum circuit-breaker，并强调施耐德已开发和制造一次气体绝缘开关柜 30 多年。\n- 英文目录给出的技术范围包括额定电压 12/15/17.5/24kV、母线电流 1250/1600/2000/2500A、进线/馈线电流 630 到 2500A、额定短时耐受电流 16/20/25/31.5kA。\n- 所有 GMA cubicles 标配 Internal Arc Classified AFL 25kA 或 31.5kA 1s，AFLR 为可选。\n- GMA 的紧凑性强调 800A 以下馈线可做到 450mm 柜宽，1600A 到 2500A 进线柜可为 800mm 宽。\n- 文档把 GMA 描述为 ready for IoT，可集成进 Smart Grid，并提供 remote monitoring、nearby control、substation monitoring、protection / metering / condition monitoring 等数字化路径。\n\n## Key Quotes\n> \"GMA is ready for the IoT\" — 数字化与远程监控定位\n\n> \"No gas handling on-site during installation, extension or replacement\" — 安装、扩展和替换特点\n\n## Connections\n- [[GMA]] — 文档核心产品对象，补充英文国际版参数和数字化定位。\n- [[气体绝缘开关柜]] — GMA 所属设备类别。\n- [[内部电弧防护]] — 文档强调 IAC AFL 1s 标配、AFLR 可选。\n- [[气室监测]] — 文档提到 gas monitoring pressure gauge 与 sealed pressure system。\n- [[EcoStruxure]] — 文档的 ready solutions 和 remote monitoring 背景。\n- [[数字化中压运维]] — 文档把 GMA 与 IoT、Smart Grid、远程监控、保护、计量和状态监测连接起来。\n\n## Contradictions\n- 英文 2017 目录给出的 GMA 范围可到 2500A，而中文 2023 目录把主母线额定电流写为 ≤2000A、分支母线 ≤1250A；当前先按版本/市场差异记录，不直接视为技术冲突，后续应结合具体销售地区和型号选型表核对。\n",
    "preview": "## Summary 这份英文目录是 [[GMA]] 气体绝缘开关柜的 2017 年国际版产品目录，覆盖 up to 24kV、2500A、31.5kA 的中压配电应用。相比已导入的中文 GMA 目录，它提供了更完整的国际版定位、紧凑柜宽、远程监控、[[EcoStruxure]] ready、Easergy 保护、Magelis 就地控制、IAC AFL/AFLR 内部电弧等级和全生命周期服务叙事。 ## Key Claims",

  {

    "color": "#4CAF50",
    "path": "wiki\\sources\\hvx-manual.md",
    "markdown": "---\ntitle: \"HVX 中压真空断路器系列 说明书\"\ntype: source\ntags: [manual, medium-voltage, vacuum-circuit-breaker]\nsources: []\nlast_updated: 2026-06-03\ndate: 2014-07-01\nsource_file: raw/MCP/HVX说明书.pdf\n---\n\n## Summary\n这份说明书把知识重心从 [[SmartHVX]] 的智能化方案拉回到 [[HVX]] 本体，系统介绍了 HVX 中压真空断路器的标准、运行条件、机械结构、二次装置、型号组成、选型参数、外形尺寸和订货方式。相比前两份偏方案的资料，它提供了更具体的工程信息，例如 12kV / 24kV / 40.5kV 的额定范围、真空灭弧室与全固封极柱设计、手车式/固定式结构差异，以及脱扣器、辅助开关、防跳继电器和储能电机等二次装置。\n\n## Key Claims\n- [[HVX]] 是施耐德针对中国市场开发、适用于空气绝缘开关柜的模块化中压真空断路器，可与同类标准产品互换。\n- 说明书覆盖 12kV、24kV 和 40.5kV 三个主要电压等级，并给出不同额定短路开断电流和额定工作电流的型号组合。\n- 文档强调 [[真空灭弧室]]、[[全固封极柱]] 和电动底盘车是 HVX 的关键设计要点，用于提升可靠性、绝缘能力和环境适应性。\n- [[HVX]] 的二次装置体系较完整，包括合分闸脱扣器、欠压/过流脱扣器、辅助开关、[[防跳继电器]]、储能电机和闭锁电磁铁。\n- 说明书不仅给出应用范围和寿命试验信息，还提供了详细的订货表，说明 HVX 已具备标准化选型和 OEM 配置能力。\n\n## Key Quotes\n> “HVX是我们采用模块化设计的最新型真空断路器，针对中国市场开发” — 产品定位\n\n> “可以和同类标准产品实现互换” — 兼容性描述\n\n## Connections\n- [[HVX]] — 文档核心对象，覆盖其平台能力、型号、结构和订货方式。\n- [[SmartHVX]] — 前两份资料中的智能化方案建立在 HVX 平台之上。\n- [[施耐德电气]] — 设备厂商，文档附带较早版本的公司介绍。\n- [[真空灭弧室]] — HVX 核心灭弧部件，说明书专门介绍其设计特点。\n- [[全固封极柱]] — HVX 的绝缘和环境适应性关键设计。\n- [[防跳继电器]] — 二次装置中的重要保护/防误动部件。\n\n## Contradictions\n- 与现有 Smart HVX 资料在产品平台关系上保持一致，暂无实质冲突。\n- 文中施耐德公司规模、销售额等背景数据早于 2020 年来源，属于时间差异，不作为知识冲突处理。\n",
    "preview": "## Summary 这份说明书把知识重心从 [[SmartHVX]] 的智能化方案拉回到 [[HVX]] 本体，系统介绍了 HVX 中压真空断路器的标准、运行条件、机械结构、二次装置、型号组成、选型参数、外形尺寸和订货方式。相比前两份偏方案的资料，它提供了更具体的工程信息，例如 12kV / 24kV / 40.5kV 的额定范围、真空灭弧室与全固封极柱设计、手车式/固定式结构差异，以及脱扣器、辅助开关、防跳继电器和储能电机等二次装置",
    "group": 4,
    "value": 34

  {
    "id": "sources/mvnex-12kv-air-insulated-switchgear-catalog-2017",

    "markdown": "---\ntitle: \"MVnex 12kV Air-Insulated Switchgear Catalog 2017\"\ntype: source\ntags: [mvnex, metal-clad-switchgear, medium-voltage, air-insulated]\ndate: 2017-05-23\nsource_file: raw/一次空气绝缘开关柜/MVnex-12KV空气绝缘开关柜.pdf\n---\n\n## Summary\n这份中文 PDF 适合按 `ECATA944 / 2017.05` 的 MVnex 中国目录层处理，而不是并入已入库的 `2019-08-16` MVnex 样本。它已经完整覆盖 MVnex 标准型、`550` 紧凑型、`500` 超紧凑型和 `Smart` 智能型，但整体叙事仍更偏传统产品目录与土建安装资料。它真正新增的价值，是把 MVnex 在中国市场的更早正式目录口径补出来：`2016` 财年施耐德公司介绍、`ECATA944` 文件号、标准型 `4000A / 40kA`、`550/500` 小型化分支参数，以及更详细的柜型方案和基础框架页。\n\n## Key Claims\n- 文档封面写作 `MVnex 新一代高质量，多元化的中压金属铠装式开关柜`，末页给出 `ECATA944 / 2017.05`。\n- MVnex 标准产品额定电压 `12kV`，母线和断路器额定电流覆盖 `630~4000A`，短时耐受 `25/31.5/40kA`，峰值耐受 `63/80/100kA`。\n- 标准型柜宽覆盖 `650mm / 800mm / 1000mm`，外壳 `IP4X`，隔室间 `IP2X`，为四隔室移开式金属铠装结构。\n- MVnex 550 紧凑型柜宽 `550mm`，适用于 `1250A / 31.5kA` 及以下，但可与更高参数 MVnex 直接拼柜。\n- MVnex 500 超紧凑型柜宽 `500mm`，主回路固定联接，适用于 `1250A / 31.5kA` 及以下，支持靠墙安装和 `1m` 柜前操作通道。\n- MVnex Smart 已经在 `2017` 目录中出现完整数字化开关站叙事，包括温度、局放、断路器机械特性在线监测、电动底盘车、移动运维和环境监测系统。\n\n## Key Quotes\n> \"新一代高质量，多元化的中压金属铠装式开关柜\"\n\n> \"最高参数：12kV, 4000A, 40kA\"\n\n> \"ECATA944\"\n\n## Connections\n- [[MVnex]] — 构成更早的中国市场正式目录层。\n- [[金属铠装开关设备]] — 继续支撑 MVnex 属于移开式四隔室金属铠装路线。\n- [[空气绝缘开关设备]] — 继续支撑 MVnex 属于 `12kV` 空气绝缘开关柜路线。\n- [[施耐德电气]] — 补入 `2016/2017` 时点的公司介绍与在华布局口径。\n- [[HVX]] — 记录 MVnex 标准型和超紧凑型使用 HVX 固封式真空断路器。\n- [[数字化中压运维]] — 说明 `2017` 目录阶段已经出现 `Smart MVnex` 数字化开关站叙事。\n\n## Contradictions\n- 与现有 [[MVnex]] 页面引用的 `2019-08-16` 样本不存在直接冲突；更稳妥的理解方式是把本资料视为更早的中国目录层，而把后者视为较晚的样本/演示层。\n",
    "preview": "## Summary 这份中文 PDF 适合按 `ECATA944 / 2017.05` 的 MVnex 中国目录层处理，而不是并入已入库的 `2019-08-16` MVnex 样本。它已经完整覆盖 MVnex 标准型、`550` 紧凑型、`500` 超紧凑型和 `Smart` 智能型，但整体叙事仍更偏传统产品目录与土建安装资料。它真正新增的价值，是把 MVnex 在中国市场的更早正式目录口径补出来：`2016` 财年施耐德公司介绍、",

  {
    "id": "sources/mvnex-medium-voltage-metal-clad-switchgear",
    "label": "MVnex 中压金属铠装开关柜",
    "type": "source",
    "color": "#4CAF50",
    "path": "wiki\\sources\\mvnex-medium-voltage-metal-clad-switchgear.md",
    "markdown": "---\ntitle: \"MVnex 中压金属铠装开关柜\"\ntype: source\ntags: [mvnex, metal-clad-switchgear, medium-voltage, smart-switchgear]\ndate: 2019-08-16\nsource_file: raw/MVE/MVnex/MVnex 中压金属铠装开关柜.pdf\n---\n\n## Summary\n这份样本介绍了 [[MVnex]] 中压 [[金属铠装开关设备]]，定位为新一代高质量、多元化的中压金属铠装式开关柜。它把 MVnex 标准型、MVnex 550 紧凑型、MVnex 500 超紧凑型和 Smart MVnex 智能型放在同一产品族中，补充了与 [[DNF7]]、[[GMA]]、[[GMAirSeT]] 不同的 12kV 空气绝缘金属铠装/中置式开关柜路线。\n\n## Key Claims\n- [[MVnex]] 是应用于高压/中压与中压/中压变电站中压部分的户内式 [[金属封闭开关设备]]，开关柜为移开式金属铠装型。\n- MVnex 标准产品参数可达 12kV、4000A、40kA，柜宽覆盖 650mm、800mm、1000mm，并覆盖断路器柜、接触器柜和多种特殊柜型。\n- MVnex 550 紧凑型柜宽 550mm，最高参数 12kV、1250A、31.5kA，占地面积可比传统柜减少 40% 以上。\n- MVnex 500 超紧凑型柜宽 500mm，最高参数 12kV、1250A、31.5kA，可靠墙安装，柜前只需 1m 操作通道。\n- 标准型配置 [[HVX]] 固封式真空断路器，也可使用 CVX 接触器；结构上包括低压室、断路器室、母线室和电缆室四个独立隔室。\n- Smart MVnex 包括 TH110 温度在线监测、Easergy P3 微机保护、VAMP 弧光保护、主动运维智能单元和千里眼。\n\n## Key Quotes\n> \"灵活配置 为您而动\" — MVnex 产品口号\n\n> \"最高参数：12kV, 4000A, 40kA\" — MVnex 标准产品能力口径\n\n## Connections\n- [[MVnex]] — 文档核心产品对象。\n- [[金属铠装开关设备]] — MVnex 所属开关柜类别。\n- [[金属封闭开关设备]] — MVnex 也是户内金属封闭开关设备的一种。\n- [[HVX]] — MVnex 标准型、550 和 500 方案中的真空断路器平台。\n- [[内部电弧防护]] — 文档提到标准型抗内部电弧等级可达 40kA 1s。\n- [[数字化中压运维]] — Smart MVnex 把开关柜扩展到在线监测、主动运维和云端移动运维。\n- [[局部放电监测]] — MVnex 550/500 智能化能力中提到局放在线监控。\n- [[千里眼]] — Smart MVnex 的云平台和移动运维能力之一。\n\n## Contradictions\n- 未发现与 [[DNF7]]、[[GMA]] 或 [[GMAirSeT]] 的直接冲突；MVnex 应作为 12kV 空气绝缘金属铠装/中置式开关柜产品线并列理解。\n",
    "preview": "## Summary 这份样本介绍了 [[MVnex]] 中压 [[金属铠装开关设备]]，定位为新一代高质量、多元化的中压金属铠装式开关柜。它把 MVnex 标准型、MVnex 550 紧凑型、MVnex 500 超紧凑型和 Smart MVnex 智能型放在同一产品族中，补充了与 [[DNF7]]、[[GMA]]、[[GMAirSeT]] 不同的 12kV 空气绝缘金属铠装/中置式开关柜路线。 ## Key Claims",

    "markdown": "---\ntitle: \"PIX 12kV 24kV Air-Insulated Switchgear Catalog 2016\"\ntype: source\ntags: [pix, air-insulated-switchgear, metal-enclosed-switchgear, medium-voltage]\ndate: 2016-03-11\nsource_file: raw/一次空气绝缘开关柜/PIX-12kv-24kv空气绝缘开关柜.pdf\n---\n\n## Summary\n这份中文 PDF 适合按 `SCDOC1842 / 2016.03` 的 PIX 中国正式目录层处理，而不是并入现有 `2019-08-16` 中文目录或更晚的 `V8` 修订版。它已经完整覆盖 `PIX-12kV`、`PIX-24kV`、`PIX-M` 接触器柜和 `PIX-Gen` 发电机出口断路器柜，同时带有较完整的产品结构、部件参数、一次方案、应用实例和安装订货页。它真正新增的价值，是把 `2016` 时点的中国市场正式目录口径补出来：施耐德 `2014` 财年公司介绍、`SCDOC1842` 文件号、`2016.03` 版本标识，以及比后续中文目录更早的企业背景与市场包装层。\n\n## Key Claims\n- 文档封面写作 `PIX 户内交流金属封闭开关设备 产品目录`，末页给出 `SCDOC1842 / 2016.03`。\n- `PIX-12kV` 覆盖 `7.2kV / 12kV`、`630A~4000A`，`PIX-Gen` 可达 `5000A / 6300A` 与 `63kA`。\n- `PIX-24kV` 覆盖 `630A~4000A`、`20kA~40kA`，峰值耐受最高 `100kA`。\n- 目录已经给出四隔室、五防联锁、活门、二次插头联锁、泄压装置、`HVX`、`VAH`、`CVX`、`ESW` 和 `MiCOM` 等核心部件。\n- 资料还完整补入 `PIX-12kV`、`PIX-24kV` 的一次方案与应用实例、订货须知、配电室平面布置和基础安装。\n- 施耐德公司介绍页采用 `2014` 财年 `250亿欧元`、全球 `170,000+` 员工、中国 `28,000` 员工、`45` 个办事处、`30` 家工厂和 `8` 个物流中心等更早统计口径。\n\n## Key Quotes\n> \"PIX 户内交流金属封闭开关设备\"\n\n> \"SCDOC1842\"\n\n> \"2016.03\"\n\n## Connections\n- [[PIX]] — 构成更早的中国正式目录层。\n- [[空气绝缘开关设备]] — 继续支撑 PIX 属于 `12/24kV` 空气绝缘开关柜路线。\n- [[金属封闭开关设备]] — 继续体现 PIX 的户内交流金属封闭口径。\n- [[金属铠装开关设备]] — 明确 PIX 属于铠装移开式结构。\n- [[HVX]] — 记录 PIX 主要断路器平台之一。\n- [[施耐德电气]] — 补入 `2014/2016` 时点的公司介绍与中国市场口径。\n\n## Contradictions\n- 与现有 `2019` 中文目录和 `V8` 修订版不存在直接冲突；更稳妥的理解方式是把本资料视为更早的中国正式目录层，而把后两者视为较晚的中国目录/修订层。\n",
    "preview": "## Summary 这份中文 PDF 适合按 `SCDOC1842 / 2016.03` 的 PIX 中国正式目录层处理，而不是并入现有 `2019-08-16` 中文目录或更晚的 `V8` 修订版。它已经完整覆盖 `PIX-12kV`、`PIX-24kV`、`PIX-M` 接触器柜和 `PIX-Gen` 发电机出口断路器柜，同时带有较完整的产品结构、部件参数、一次方案、应用实例和安装订货页。它真正新增的价值，是把 `2016` 时点",

    "markdown": "---\ntitle: \"PIX 50kA Catalogue EN\"\ntype: source\ntags: [pix, air-insulated-switchgear, metal-clad-switchgear, medium-voltage]\ndate: 2019-01-01\nsource_file: raw/MVE/PIX/PIX 50kA Catalogue_EN.pdf\n---\n\n## Summary\n这份英文目录介绍了 [[PIX]] 空气绝缘中压开关柜，定位为 17.5kV、50kA、4000A 的高性能 [[金属铠装开关设备]]，并采用 [[HVX]] embedded pole 真空断路器。它把 PIX 放在重工业、油气、矿业、发电和船舶等高要求场景中，补充了当前 wiki 在 [[MVnex]] 之外的高短路开断能力空气绝缘开关柜路线。\n\n## Key Claims\n- [[PIX]] 是施耐德电气的空气绝缘开关柜，目录封面给出的能力口径为 17.5kV、50kA、4000A，并配置 [[HVX]] embedded pole。\n- PIX 高压部分通过金属隔板分成母线室、电缆室和开关设备室，符合 IEC 62271-200 的 LSC2B-PM 运行连续性和隔板类别。\n- 技术参数覆盖 12kV 和 17.5kV，额定短路开断电流为 50kA，额定短路持续时间 3s，最大母线额定电流 4000A。\n- [[内部电弧防护]] 口径为 IAC AFLR 50kA/1s，可通过弧光检测与快速跳闸限制内部电弧影响。\n- 功能单元包括进线/馈线 F、母线分段 BS、母线提升 BR、母线计量与接地 BME，以及带接触器馈线 FC。\n- 保护、监测和控制方案包括 Easergy P5/P3/MiCOM 保护继电器、VAMP 弧光保护、Easergy TH110 温度监测和 Easergy CL110 环境监测。\n- PIX 可作为 EcoStruxure-ready 方案的一部分，支持 nearby control、substation monitoring、SCADA/Services 远程监测、云端应用和移动报警。\n\n## Key Quotes\n> \"Air insulated switchgear 17.5 kV-50 kA-4000 A with HVX embedded pole\" — 封面能力描述\n\n> \"Protection against internal arc according to the latest IAC test AFLR, 50 kA, 1s\" — 安全能力描述\n\n## Connections\n- [[PIX]] — 文档核心产品对象。\n- [[金属铠装开关设备]] — PIX 采用金属隔板、抽出式主开关设备和 LSC2B-PM 隔室结构。\n- [[空气绝缘开关设备]] — PIX 属于空气绝缘中压开关柜路线。\n- [[HVX]] — PIX 的主断路器平台为 HVX embedded pole。\n- [[内部电弧防护]] — PIX 把 IAC AFLR 50kA/1s 作为安全卖点，并可叠加弧光保护。\n- [[温度智能监测]] — TH110 被用于连续监测现场连接点温度。\n- [[数字化中压运维]] — PIX 目录将保护继电器、传感器、SMD、HMI、SCADA、云应用和移动报警纳入数字化运维链路。\n- [[EcoStruxure]] — 目录把 PIX 相关 connected products 放在 EcoStruxure-ready 方案下。\n\n## Contradictions\n- 未发现与 [[MVnex]] 的直接冲突；PIX 应作为更高短路能力的 17.5kV/50kA 空气绝缘开关柜路线理解，而 MVnex 当前资料主要覆盖 12kV、最高 40kA。\n- 目录文本中出现 “IEC 62217-200” 表述，结合上下文和后续章节应为 IEC 62271-200，入库时按明显排版/OCR 错误处理。\n",
    "preview": "## Summary 这份英文目录介绍了 [[PIX]] 空气绝缘中压开关柜，定位为 17.5kV、50kA、4000A 的高性能 [[金属铠装开关设备]]，并采用 [[HVX]] embedded pole 真空断路器。它把 PIX 放在重工业、油气、矿业、发电和船舶等高要求场景中，补充了当前 wiki 在 [[MVnex]] 之外的高短路开断能力空气绝缘开关柜路线。 ## Key Claims",

  {
    "id": "sources/pix-catalogue-indoor-ac-metal-enclosed-switchgear",
    "label": "PIX 户内交流金属封闭开关设备 产品目录",
    "type": "source",

    "path": "wiki\\sources\\pix-catalogue-indoor-ac-metal-enclosed-switchgear.md",
    "markdown": "---\ntitle: \"PIX 户内交流金属封闭开关设备 产品目录\"\ntype: source\ntags: [pix, air-insulated-switchgear, metal-enclosed-switchgear, medium-voltage]\ndate: 2019-08-16\nsource_file: raw/MVE/PIX/PIX catalogue-户内交流金属封闭开关设备.pdf\n---\n\n## Summary\n这份中文目录介绍了 [[PIX]] 铠装移开式户内交流 [[金属封闭开关设备]]，覆盖 PIX-12kV、PIX-24kV、接触器柜 PIX-M 和发电机出口断路器柜 PIX-Gen。它与英文 [[PIX]] 50kA 目录互为补充：英文目录强调 17.5kV/50kA/4000A 和 EcoStruxure-ready 数字化方案，中文目录则更完整地展开中国市场的型号体系、12/24kV 参数、一次方案、订货与安装要求。\n\n## Key Claims\n- [[PIX]] 被定义为铠装移开式户内交流 [[金属封闭开关设备]]，方案包括适用于 FC 回路的接触器柜 PIX-M，以及用于发电机出口、工矿企业配电和大型电动机启动等场合的 PIX-Gen。\n- PIX-12kV 覆盖 7.2kV 和 12kV，额定电流 630A~4000A，PIX-Gen 可达 5000A/6300A。\n- PIX-12kV 额定短路开断电流覆盖 20kA~50kA，PIX-Gen 可达 63kA；额定短路峰值耐受电流为 125kA/150kA，PIX-Gen 可达 160kA。\n- PIX-24kV 额定电流 630A~4000A，额定短路开断电流 20kA~40kA，额定短路峰值耐受电流最高 100kA。\n- 柜体由断路器室、母线隔室、电缆隔室和继电器仪表隔室四个独立功能隔室组成，各隔室间防护等级达到 IP2X。\n- 三个高压隔室均设有泄压通道；断路器手车、接地开关、二次插头和下门之间通过联锁满足五防要求。\n- 主要部件包括 [[HVX]] 真空断路器、VAH 高容量户内真空断路器、CVX 真空接触器-熔断器组合电器、ESW 接地开关和 MiCOM 综合继电保护装置。\n\n## Key Quotes\n> \"PIX型开关柜是铠装移开式户内交流金属封闭开关设备\" — 产品类别定义\n\n> \"所有技术参数均严格按型式试验数据所得，非理论计算值。\" — 参数来源说明\n\n## Connections\n- [[PIX]] — 文档核心产品对象。\n- [[空气绝缘开关设备]] — HVX 章节明确 PIX 适用于主流空气绝缘开关设备，整份目录也以空气绝缘金属封闭柜为对象。\n- [[金属封闭开关设备]] — 文档标题和正文均采用“户内交流金属封闭开关设备”口径。\n- [[金属铠装开关设备]] — PIX 被定义为铠装移开式产品。\n- [[HVX]] — PIX 主要断路器平台之一，12kV 可覆盖 25/31.5/40/50kA，24kV 可覆盖 25/31.5/40kA。\n- [[内部电弧防护]] — 目录强调高压隔室压力释放通道和关门操作/联锁，但未像英文目录那样给出 IAC AFLR 数值。\n\n## Contradictions\n- 与英文 [[PIX]] 50kA 目录存在版本/市场口径差异：英文目录聚焦 17.5kV、50kA、4000A、IAC AFLR 50kA/1s 和数字化监测；中文目录覆盖 12/24kV、PIX-M、PIX-Gen、一次方案和安装订货信息，其中 PIX-Gen 12kV 可达 6300A/63kA。两者应按不同目录版本和应用范围理解，不应直接互相覆盖。\n- 中文目录强调高压隔室泄压和五防联锁，但未给出明确 IAC AFLR 等级；内部电弧等级仍以英文目录和其他产品样本中的明确测试口径为准。\n",
    "preview": "## Summary 这份中文目录介绍了 [[PIX]] 铠装移开式户内交流 [[金属封闭开关设备]]，覆盖 PIX-12kV、PIX-24kV、接触器柜 PIX-M 和发电机出口断路器柜 PIX-Gen。它与英文 [[PIX]] 50kA 目录互为补充：英文目录强调 17.5kV/50kA/4000A 和 EcoStruxure-ready 数字化方案，中文目录则更完整地展开中国市场的型号体系、12/24kV 参数、一次方案、订货与安",

    "label": "PIX 户内交流金属封闭开关设备 产品目录 V8",
