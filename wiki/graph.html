  {
    "id": "concepts/测温技术对比",
    "label": "测温技术对比",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\测温技术对比.md",
    "markdown": "---\ntitle: \"测温技术对比\"\ntype: concept\ntags: [temperature, comparison, monitoring]\nsources: [smart-hvx-product-introduction-v3-4]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[测温技术对比]] 是 Smart HVX 产品介绍 V3.4 中用来解释 [[温度智能监测]] 差异化价值的主题。材料把 Smart HVX 的内嵌式、自供电、ZigBee 非接触通信和 NFC 自动识别组网，与变色片、热电偶、光纤、人工红外线以及第三方外置无线测温做对比。\n\n## Key Details\n- 对变色片和人工红外线的批评集中在封闭开关柜中不便粘贴、观测或巡视。\n- 对热电偶的批评集中在安装维护困难、易受电磁场干扰和误报警风险。\n- 对光纤的批评集中在施工复杂、维护成本高，以及测点数与光纤条数相关。\n- 对第三方外置式无线测温的批评集中在改变电场分布、可能增加绝缘隐患、外置固定可靠性和电池安全问题。\n- Smart HVX 方案强调内嵌式保持原有外形、自供电免维护、无线通信隔离高压侧，以及整机原厂安装调试。\n\n## Related\n- [[SmartHVX]]\n- [[温度智能监测]]\n- [[ZBRN32]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[测温技术对比]] 是 Smart HVX 产品介绍 V3.4 中用来解释 [[温度智能监测]] 差异化价值的主题。材料把 Smart HVX 的内嵌式、自供电、ZigBee 非接触通信和 NFC 自动识别组网，与变色片、热电偶、光纤、人工红外线以及第三方外置无线测温做对比。 ## Key Details",
    "group": 1,
    "value": 11
  },
  {
    "id": "concepts/温度智能监测",
    "label": "温度智能监测",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\温度智能监测.md",
    "markdown": "---\ntitle: \"温度智能监测\"\ntype: concept\ntags: [monitoring, temperature, medium-voltage]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, 3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page, smart-hvx-product-introduction-v3-4, pix-50ka-catalogue-en, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, gha-nrjcat18789en-0318, wsg-wig-smart-switchgear-2019, smd-and-sensors-for-sm6-training-v2]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[温度智能监测]] 是 [[SmartHVX]] 三种方案的共同基础能力，核心是断路器六点测温，并可扩展到母排或电缆测温。文档强调无线无源传感器、自供电设计和非接触式无线通信，以兼顾兼容性、安全性和免维护需求。\n\n## Key Details\n- 基础测温型通过手机 APP、NFC 与 USB 数据接收器实现就地查看温度值。\n- 标准测温型支持把温度信息接入 [[PMBEasy]] 或远程运维系统。\n- 智能型在此基础上叠加更多状态监测能力。\n- 方案总览进一步给出了接入链路中的关键设备，包括 [[ZBRN32]] 数据接收器与 [[Link150]] 智能网关。\n- V3.4 产品介绍通过 [[测温技术对比]] 强调 Smart HVX 采用内嵌式、自供电和无线通信方案，以避免外置式安装、电池供电和封闭柜体观测带来的风险或维护负担。\n- PIX 英文目录补充了 Easergy TH110 在 [[空气绝缘开关设备]] 中的用法：无线、自供电、Zigbee Green Power 通信，用于连续监测现场关键连接点温度，并可接入 SMD、SCADA/Services、云端应用和移动报警。\n- PIX V8 目录把自供电嵌入式无线测温列入 [[SmartPIX]] 能力，用于精准温度监测并支撑预测性维护。\n- WIG 高铁智能开关柜演示稿把开关柜温度在线监测、气室 SF6 温度、自动加热除湿控制和温度控制列入 [[智能监测显示终端]] 能力。\n- GHA 2018 目录同样把 Easergy TH110 放在 [[EcoStruxure]] ready condition monitoring 中，描述为自供电、Zigbee Green Power 2.4GHz、精度 +/-1°C、工作范围 -25°C 到 +115°C 的无线热监测传感器。\n- WSG-WIG 智能开关柜演示稿补充 WSG 测温总体设计：主母线温度、内锥电缆头温度和外锥电缆头温度分别通过电流取电型或电容分压型无线测温传感器采集，并通过数据接收集中器、温度显示终端和 RS485/Modbus RTU 接入后台。\n- 该演示稿还给出无线温度传感器工作边界线索：测量范围 0°C~125°C 误差不大于 +/-2°C，分辨率 0.1°C，启动电流推荐为所配高压开关设备额定电流的 5%，最低不低于 10A。\n- `SMD and Sensors for SM6 training v2` 把 `TH110` 明确放到施耐德站室级 [[SMD]] 架构中：监测对象覆盖 cable、busbar、CB、withdrawable connections 和 transformer connection，适合安装在 critical points。\n- 同一培训稿还补出热算法边界：`Standard Monitoring`、`Advanced Monitoring`、phase comparison、discrepancy monitoring，以及基于实时负荷、电流额定值和柜体 thermal limit 的动态阈值。\n- 配置层面，它还给出 `Thermal Connect App`、`NFC tag`、传感器 ID/位置录入和 batch pairing 流程，说明温度智能监测不仅是传感器本体，也包括现场配对和项目配置步骤。\n\n## Related\n- [[SmartHVX]]\n- [[HVX]]\n- [[PMBEasy]]\n- [[ZBRN32]]\n- [[Link150]]\n- [[测温技术对比]]\n- [[主动运维]]\n- [[PIX]]\n- [[SmartPIX]]\n- [[WIG]]\n- [[WSG]]\n- [[GHA]]\n- [[智能监测显示终端]]\n- [[SMD]]\n",
    "preview": "## Summary [[温度智能监测]] 是 [[SmartHVX]] 三种方案的共同基础能力，核心是断路器六点测温，并可扩展到母排或电缆测温。文档强调无线无源传感器、自供电设计和非接触式无线通信，以兼顾兼容性、安全性和免维护需求。 ## Key Details",

    "path": "wiki\\concepts\\电缆分支箱.md",
    "markdown": "---\ntitle: \"电缆分支箱\"\ntype: concept\ntags: [distribution, cable-branching, medium-voltage]\nsources: [rm6-o-cable-branch-box-brochure-2008]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[电缆分支箱]] 是配网场景中用于替代架空线分支、实现多路电缆分支接线的中压设备类别。当前知识库里，它由 [[RM6O]] 这份 `2008.12` 资料首次引入，呈现出全绝缘、全密封、双电缆接入、可扩展出线和较低土建复杂度的产品边界。\n\n## Key Details\n- 在当前资料里，电缆分支箱被明确用来替代配网架空线中的大量分支接线。\n- `RM6-O` 路线把它做成 `SF6` 绝缘、金属封闭、`sealed pressure system` 结构。\n- 可支持一进二出、三出或更多出线，并可通过主母线扩展附件增加馈线。\n- 每路进出线可接双电缆，并配置电压指示器。\n- 可选 `Flair 22D` 故障指示器、单孔或三孔底板、电动操作和辅助接点。\n- 安装边界包括地面安装、靠墙安装和 `260/520mm` 升高座；还要考虑内燃弧时的后部或下部泄压路径。\n\n## Related\n- [[RM6O]]\n- [[RM6]]\n- [[施耐德电气]]\n",
    "preview": "## Summary [[电缆分支箱]] 是配网场景中用于替代架空线分支、实现多路电缆分支接线的中压设备类别。当前知识库里，它由 [[RM6O]] 这份 `2008.12` 资料首次引入，呈现出全绝缘、全密封、双电缆接入、可扩展出线和较低土建复杂度的产品边界。 ## Key Details",

    "markdown": "---\ntitle: \"真空灭弧室\"\ntype: concept\ntags: [component, vacuum, interruption]\nsources: [hvx-manual]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[真空灭弧室]] 是 [[HVX]] 中压真空断路器的核心灭弧部件。说明书将施耐德 VG 系列真空灭弧室描述为通过计算机建模优化设计，并采用完全一次封排技术，以提升稳定性、体积表现和寿命。\n\n## Key Details\n- 文档强调其设计目标包括高稳定性、小体积和长寿命。\n- 它与 [[全固封极柱]] 共同构成 HVX 一次回路和绝缘能力的重要基础。\n\n## Related\n- [[HVX]]\n- [[全固封极柱]]\n",

    "markdown": "---\ntitle: \"空气绝缘开关设备\"\ntype: concept\ntags: [switchgear, air-insulated, medium-voltage]\nsources: [dnf7-metal-clad-switchgear-technical-instruction-2010, dnf7-chinese-product-catalog-2011, dnf7-chinese-selection-manual-2017, dnf7-english-selection-manual-2017, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, mvnex-12kv-air-insulated-switchgear-catalog-2017, mvnex-medium-voltage-metal-clad-switchgear, pix-50ka-catalogue-en, pix-12kv-24kv-air-insulated-switchgear-catalog-2016, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, sm6-air-insulated-switchgear-catalog-2012, sm6-24kv-medium-voltage-switchgear-catalog-2017, sm6-product-introduction-and-digital-content-2019, as12-as24-medium-voltage-switch-catalog, as12-medium-voltage-switch-brochure-2016, sc6-medium-voltage-switch-component-catalog-2017]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[空气绝缘开关设备]] 是当前 wiki 中与 [[气体绝缘开关柜]] 并列的中压开关柜路线，主要依靠空气作为主绝缘介质，并通过金属封闭、隔室分隔、联锁和 [[内部电弧防护]] 来满足安全与运行连续性要求。已有资料中，[[DNF7]]、[[MVnex]] 和 [[PIX]] 都属于这一大类，但电压等级、结构紧凑性和短路能力侧重点不同。\n\n## Key Details\n- [[DNF7]] 面向 40.5kV 户内交流 [[金属封闭开关设备]]，强调 LSC2B、PM 隔板和 IAC AFLR 31.5kA/1s。\n- `DNF7 Metal-Clad Switchgear Technical Instruction` 则把这条路线向前补到 `2010.12 / 2011-01-04` 时点：它把 DNF7 写成适用于 `36kV / 40.5kV` 系统的 air insulated metal-clad switchgear，可配 `HVX` 真空断路器或 `FP` 气体绝缘断路器，并区分 `Middle Rolling / Floor Rolling` 两种抽出式实现。\n- `DNF7 Chinese Product Catalog 2011` 说明到 `2011` 时，这套 DNF7 空气绝缘金属封闭方案已经有一份中国市场目录层：产品名写成 `40.5kV` 中压空气绝缘开关柜，参数主口径仍是 `2500A` 和 `1300 x 2760 x 2500 mm`，并配 `FP / HVX-O`、典型方案与基础安装页。\n- `DNF7 Chinese Selection Manual 2017` 则说明到 `2017` 时，这套 DNF7 空气绝缘金属封闭方案已经有一份更完整的中文工程手册：它把 `40.5kV(GB) / 36kV(IEC)`、`KYN28 / KYN61`、五防闭锁、一次方案和基础框架安装要求都写成了本地化选型口径。\n- `DNF7 English Selection Manual 2017` 说明到 `2017` 时，这套 DNF7 空气绝缘金属封闭方案仍以英文选型手册形式在中国市场流通：技术主体基本沿用较早英文说明，但公司介绍和品牌页已更新到 `2016/2017` 口径。\n- [[MVnex]] 面向 12kV [[金属铠装开关设备]]，标准型最高 4000A、40kA，并有 550/500 小型化分支。\n- `MVnex 12kV Air-Insulated Switchgear Catalog 2017` 说明到 `2017` 时，MVnex 在中国市场已经形成完整正式目录：标准型 `4000A / 40kA`，`550` 与 `500` 小型化分支，以及 `Smart MVnex` 数字化开关站叙事都已同时出现。\n- [[PIX]] 面向 12/17.5/24kV 高性能空气绝缘开关柜；英文目录给出 17.5kV、50kA、4000A 和 IAC AFLR 50kA/1s，中文目录链则从 `2016` 起补充 12kV/24kV、PIX-M、PIX-Gen、应用实例与安装订货口径。\n- PIX V8 目录把产品族扩展为 7.2/12/24kV 口径，并以 550/650/800/1000/1200mm 等柜宽组合覆盖不同功能单元。\n- PIX-Gen 是空气绝缘路线中的发电机出口断路器柜分支，中文目录给出 12kV、5000A/6300A 和 63kA 的高容量口径。\n- [[PIX550]] 是 PIX 旗下 12kV 小型化分支，柜宽 550mm，额定电流 ≤1250A，短时耐受/开断能力 ≤31.5kA。\n- [[PIX500]] 是 PIX 旗下 500mm 小型化空气绝缘分支，采用 HVX 固封式断路器和三工位开关，目录强调无 SF6；`2026-06-09` 补入的正确命名同版副本也再次确认了这一路线对应 `PIX500` 而非 `PIX550`。\n- `SM6 Modular units Air insulated switchgear up to 36 kV` 正式目录把 [[SM6]] 的边界说得更清楚：它被定义为最高 `36 kV` 的空气绝缘开关柜，但 active parts integrated in an `SF6-filled, sealed for life` unit，并给出 `LSC2A`、`PI` 隔板与 `A-FL / A-FLR` 内部电弧分类。\n- `SM6中压开关柜24kV产品目录` 则把这条路线进一步落到中国市场正式口径：适用 `24 kV` 以下二次变电站和工矿配电站，柜体尺寸收敛到 `375-750 mm` 宽、`1600 mm` 高、`1030 mm` 深，并把 `IP4X`、`LSC2A`、`PI` 和 `IAC A-FLR 20 kA/1s` 等工程口径写成中文目录参数。\n- `SM6` 演示稿补入施耐德一条更偏环网柜的空气绝缘路线：封面写 `7.2~24kV` 空气绝缘环网柜，分类页把 [[SM6]] 与 [[RM6]] / [[FBX]]、[[Premset]] 并列。\n- 但 [[SM6]] 并不是 [[PIX500]] 那种“无 `SF6`”的纯空气绝缘路线；其负荷/隔离开关柜和断路器柜页都明确写开关间隔充 `SF6` 作为绝缘介质，因此更适合理解为“空气绝缘柜体 + `SF6` 开关隔室”的边界型 RMU 平台。\n- `AS12/AS24中压开关` 目录则补出另一种边界：它不是完整开关柜，而是施耐德提供给国内柜厂集成的 `12/24kV` 空气绝缘柜核心开关元件，覆盖 `IS/QS/DS/CS/ES` 功能分支。\n- 这条 `AS12/AS24` 路线同样不是纯无气体绝缘：资料明确写三相旋转触头装在 `SF6 0.4 bar` 密闭压力气室内，年泄漏率 `<0.05%`，因此更适合理解为“空气绝缘柜体中的 `SF6` 开关核心”。\n- `AS12中压开关 产品简介` 则把这条元件路线推进到 `2016.09` 的中间层：虽然已经收束到 `AS12 12kV 630A` 两页折页，但仍保留 `IS/QS/CS/DS/ES`、`375mm / 500mm` 宽度、`AS12-ES` 和三工位 `SF6 0.4 bar` 密闭压力系统。\n- `SC6中压开关元件产品目录` 则把这条元件路线推进到 `2017` 时点：文件名仍带 `AS12`，但正文题名已改为 [[SC6]]，并把参数与功能收敛到 `12kV`、`630A`、`20kA/4s` 和 `SIC/SQC`。\n- `Smart SM6` 还把 `Easergy T300`、`TH110 / TH110-R / TH110-S`、`PD110` 和 `CL110` 接到 `SCADA / DMS` 与 Local HMI，说明空气绝缘路线同样可以接入 [[数字化中压运维]]。\n- 这一路线常与 [[HVX]] 真空断路器、抽出式主开关设备、金属隔室和机械/电气联锁配合使用。\n- 与 [[GMA]]、[[GMAirSeT]] 所代表的气体绝缘路线相比，空气绝缘开关设备通常体积更大，但维护和绝缘介质管理边界不同。\n\n## Related\n- [[DNF7]]\n- [[MVnex]]\n- [[PIX]]\n- [[PIX500]]\n- [[PIX550]]\n- [[SM6]]\n- [[AS12AS24]]\n- [[SC6]]\n- [[SmartPIX]]\n- [[金属封闭开关设备]]\n- [[金属铠装开关设备]]\n- [[气体绝缘开关柜]]\n- [[HVX]]\n- [[内部电弧防护]]\n",
    "preview": "## Summary [[空气绝缘开关设备]] 是当前 wiki 中与 [[气体绝缘开关柜]] 并列的中压开关柜路线，主要依靠空气作为主绝缘介质，并通过金属封闭、隔室分隔、联锁和 [[内部电弧防护]] 来满足安全与运行连续性要求。已有资料中，[[DNF7]]、[[MVnex]] 和 [[PIX]] 都属于这一大类，但电压等级、结构紧凑性和短路能力侧重点不同。 ## Key Details",

  {
    "id": "concepts/自动投切",
    "label": "自动投切",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\自动投切.md",
    "markdown": "---\ntitle: \"自动投切\"\ntype: concept\ntags: [automation, transfer-switching, medium-voltage]\nsources: [sm6-24kv-medium-voltage-switchgear-catalog-2017, rm6-24kv-medium-voltage-distribution-catalog-2012, rm6-offer-presentation-life-is-on-201801update, rm6-sf6-insulated-ring-main-unit-and-compact-switchgear-catalog-2018, rm6-set-medium-voltage-switchgear-catalog-2022]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[自动投切]] 是中压配电场景中为提高供电连续性而设置的自动切换逻辑，用于在主供电源失压或故障时自动切换到备用电源、母联或发电机。当前 wiki 中，这一主题既出现在 [[SM6]] 的 `2017` 中文正式目录，也贯穿 [[RM6]] 从 `2012` 英文正式目录到后续演示稿、SeT 目录的连续资料链，重点落在二次配电环网柜的 `ATS`、联锁和配电终端控制实现上。\n\n## Key Details\n- `SM6中压开关柜24kV产品目录` 已把自动转换设备写成正式中文目录内容，并通过 `NSM-C` 双电源进线柜、`S20 / S40` 保护器和双路常供/母联常断等方案页说明二次变电站自动切换场景。\n- 这份目录中的 `Easergy T200 S` 负责采集开关位置、故障检测和电流值，并向开关发送分合闸命令，构成较早期 SM6 自动投切与远方控制的执行层。\n- `2012` 英文 `RM6` 正式目录已经把 `Automatic transfer systems` 写成独立章节，并明确列出 bus tie coupling、source changeover、generator override 和 `Easergy T200 I`。\n- 同一目录还给出 `TR < 2 s`、`T1 100 ms~60 s`、`T2 5 s~300 s`、`T3 100 ms~3 s` 的时序参数，说明 RM6 自动投切能力在正式目录层早于 `2018` 中文演示稿。\n- RM6 演示稿将自动投切放在“重要用户侧 MV 供电中断不可接受”的场景中，强调备用电源自动投入和母联自动投切。\n- 文档给出三类典型场景：两路进线自动切换、失压后切换至发电机，以及一路失电后分失电侧并合上母联开关。\n- `ATS` 章节将目标性能写为投切时间 `<10s`。\n- `RM6-NRM` 方案强调机械加电气双重联锁，即使电气联锁失效或误操作，机械联锁仍保证有且仅有一台开关处于合闸状态。\n- 文档明确要求同时采集进线电缆电压与三相电流信号，以便识别失压、故障和负荷侧电流异常，并在故障时自动闭锁投切功能。\n- 方案支持主供电源选择、自投自复、现场手动优先和投切功能闭锁。\n- 通信与远方接入部分给出 `RS485` 与以太网实现三遥的口径。\n- `T200C` 被列为双电源自动投切关键设备，负责中压开关分合闸控制、测量采集处理、事件记录和自动控制。\n- `2018.10` 中文正式目录则把 RM6 的自动投切正式落到 `T200 I` 控制器，并给出 `TR < 2 s`、`T1 0s~200s`、`T2 0s~30分钟` 以及自动/半自动模式，说明同年演示稿与正式目录在控制器命名和参数表达上应按来源分开保留。\n- `VPIS`、`VD23` 和 `Flair` 被作为同品牌电压显示、电压检测和故障指示配套装置接入 `ATS` 系统。\n- `RM6 SeT` 目录把自动投切从演示级方案推进到正式产品能力：文档明确把双电源自动切换、闭环配电网和自动重合闸列入 RM6 SeT 的应用场景。\n- `RM6 SeT` 的 `V` 功能真空断路器页还给出自动重合闸顺序 `O - 0.3s - CO - 3 min - CO`，说明这条线已经不只是负荷开关型 ATS，也覆盖断路器型快速切换逻辑。\n\n## Related\n- [[RM6]]\n- [[SM6]]\n- [[RM6SeT]]\n- [[数字化中压运维]]\n- [[施耐德电气]]\n",
    "preview": "## Summary [[自动投切]] 是中压配电场景中为提高供电连续性而设置的自动切换逻辑，用于在主供电源失压或故障时自动切换到备用电源、母联或发电机。当前 wiki 中，这一主题既出现在 [[SM6]] 的 `2017` 中文正式目录，也贯穿 [[RM6]] 从 `2012` 英文正式目录到后续演示稿、SeT 目录的连续资料链，重点落在二次配电环网柜的 `ATS`、联锁和配电终端控制实现上。 ## Key Details",

    "markdown": "---\ntitle: \"配柜智能监测\"\ntype: concept\ntags: [monitoring, switchgear, diagnostics]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[配柜智能监测]] 是 [[SmartHVX]] 智能型新增的一类状态监测能力，目标是比传统辅助开关或纯视频方案更准确地识别开关柜内的机械异常。资料重点提到前倾检测和横梁变形监测。\n\n## Key Details\n- 可监测断路器在开关柜内是否前倾，降低主回路连接不良风险。\n- 可识别蛮力操作造成的横梁等部件变形。\n- 它与 [[主动运维]] 配合，用于更早发现机械安装或运行异常。\n\n## Related\n- [[SmartHVX]]\n- [[主动运维]]\n- [[二次元件智能监测]]\n",

    "markdown": "---\ntitle: \"金属封闭开关设备\"\ntype: concept\ntags: [switchgear, medium-voltage, equipment-category]\nsources: [dnf7-metal-clad-switchgear-technical-instruction-2010, dnf7-chinese-product-catalog-2011, dnf7-chinese-selection-manual-2017, dnf7-english-selection-manual-2017, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, gma-12kv-medium-voltage-gas-insulated-switchgear-catalog-2018, gma-medium-voltage-primary-gas-insulated-switchgear-v1-5, gm-airset-medium-voltage-primary-gas-insulated-switchgear-v1-1, mvnex-medium-voltage-metal-clad-switchgear, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wi-g-27-5kv-railway-gas-insulated-switchgear-catalog-2018, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, wsg-feature-highlights-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018, fbx-catalogue-2020, fbx-medium-voltage-switchgear-catalog-2018, premset-12kv-compact-modular-vacuum-switchgear-catalog-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[金属封闭开关设备]] 是 DNF7、GMA、GM AirSeT、GHA、[[WSG]]、[[WIG]]、MVnex、[[PIX]]、[[PIX550]] 和 [[PIX500]] 都涉及的中压开关设备类别，核心特征是把带电中压元件纳入金属外壳、隔室或密封气室体系中。[[DNF7]] 文档用这一类别承接安全隔离、运行连续性和标准化功能单元设计；[[GMA]] 在金属封闭基础上采用 SF6 气体绝缘；[[GMAirSeT]] 则采用干燥空气/环保气体绝缘；[[GHA]]、[[WSG]] 和 [[WIG]] 补充了气体绝缘金属封闭路线的高电压等级、企业标准和铁道应用口径；[[MVnex]]、PIX、PIX550 和 PIX500 均属于铠装/金属封闭方向。\n\n## Key Details\n- DNF7 依据 GB/T 3906-2020 与 IEC 62271-200:2021 描述为户内交流金属封闭开关设备。\n- `DNF7 Metal-Clad Switchgear Technical Instruction` 说明 DNF7 在更早的英文工程口径中就已具备四隔室结构、`LSC2B`、`PM partition class`、顶部泄压、前门闭门操作和可抽出式 `HVX / FP` 方案，是这一路线较早的选型层资料。\n- `DNF7 Chinese Product Catalog 2011` 说明这套 DNF7 金属封闭选型口径在中国市场还存在更早目录层：它把产品写成 `40.5kV` 铠装移开式交流金属封闭开关设备，围绕 `2500A`、`FP / HVX-O`、典型方案、基础安装和防内部电弧设计组织。\n- `DNF7 Chinese Selection Manual 2017` 说明这套 DNF7 金属封闭选型口径到 `2017` 时已经被完整转写为中文工程手册：除四隔室、`HVX / FP` 和 `31.5kA(1s)` 内燃弧能力外，还把五防闭锁、柜前关门操作、`KYN28 / KYN61` 结构以及安装基础图纸写成了本地化交付口径。\n- `DNF7 English Selection Manual 2017` 表明这套较早的 DNF7 金属封闭选型口径在 `2017` 时点并未消失，而是继续以英文手册形式服务中国市场，只是品牌页和公司介绍升级到了较新的施耐德企业口径。\n- GMA 被描述为金属封闭、SF6 气体绝缘、预装结构且通过型式试验的开关设备。\n- `2018.12` 的 `GMA12kV` 中文目录把这条 GMA 金属封闭口径进一步落到中国工程页：明确 `12kV`、`420/510/600/750/800mm` 柜宽代码、`CB-C / CB-B / BC-CB / D / M / BB-PT` 柜型代码，以及操作模拟面板、主接线方案和基础槽钢示意图。\n- GM AirSeT 被描述为金属封闭、干燥空气绝缘、预装结构且通过型式试验的开关设备。\n- GHA 被描述为最高 40.5kV 的气体绝缘开关柜，带密封压力系统气室、金属封闭电缆连接隔室和可拆卸低压柜。\n- GHA 2018 目录按 IEC/EN 62271-200 给出 PM partition class；带断路器的 GHA loss of service continuity category 为 LSC2。\n- WS-G 企业标准依据 GB 3906-2006 和 IEC 62271-200:2003 口径组织，覆盖 12kV~40.5kV、单母线/双母线/母线分段系统。\n- WS-G 标准给出 LSC2A 运行连续性类别，隔室包括断路器隔室、母线隔室和电缆隔室。\n- WS-G 充气箱由不锈钢板焊接，基架由耐腐蚀钢板铆接制成，并要求充气隔室具备压力释放装置。\n- WS-G 2024 版依据 GB/T 3906 和 IEC 62271-200:2011 口径组织，继续保持 LSC2A，但把出厂状态、零表压绝缘和高海拔出厂试验写入更细的标准条款。\n- WS-G 40.5kV 图片页展示了柜体截面，并强调带电中压部件位于充气密封气室内、每个气室具备检测与独立泄压装置。\n- WS-G 2018.09 产品目录补充了更早的模块、低压箱、电缆连接、尺寸重量和土建基础图口径，并把靠墙安装、柜前维护和独立式安装选择写成具体工程特征。\n- WS-G 2024.01 产品目录补充了金属封闭柜的功能模块、单母线/双母线主接线、外锥/内锥电缆连接、低压箱组合、柜体尺寸重量和订货资料要求。\n- WS-G 操作说明书补充了金属封闭柜运行侧的控制元件、手动操作面板、IDIS/VDS 显示和机械联锁要求。\n- WS-G 2014 产品介绍展示了单母线和双母线结构，列出断路器室、母线室、B-Link、控制面板、出线模块、电压互感器、电缆室和可拆卸低压箱等结构单元。\n- 2014 材料还给出单母线/双母线接线方案、母线辅助模块、内锥/外锥电缆连接和中国运行实例。\n- WSG 特点图片页补充了更碎但偏实施层的金属封闭柜信息：2000A 及以下进出线/馈线柜宽 ≤600mm，母联/提升合柜宽 ≤800mm，电缆安装高度 750mm，且更换 CT 时无需拆除电缆。\n- WI-G 操作说明书把铁道用设备描述为金属封闭、SF6 绝缘、通过型式试验、通过抗内部电弧故障试验，并设计用于户内安装。\n- WI-G 的典型柜体包括断路器柜、母线联络柜、母线电压互感器、母线避雷器和母线接地开关等方案。\n- `2018.10` 的 WI-G 产品目录进一步补充了这类铁道用金属封闭柜的工程边界：`27.5/2×27.5kV` 单母线、主回路 `IP65`、操作机构 `IP2X`、前接线内锥系统、靠墙安装和柜前完成操作维护。\n- `FBX catalogue 2020` 把 [[FBX]] 记录为另一类金属封闭、`SF6` 绝缘、预装式中压开关设备，面向 `24kV` 及以下二次配电。\n- FBX 的功能单元围绕 `C/T1/T2/R/Sb/M` 展开，覆盖进出线、熔断器变压器保护、真空断路器保护、母线分段和计量。\n- FBX 同时强调单个不锈钢密封气箱内的多单元集成、较大的电缆室、前部操作界面和可带/不带操作走廊的安装方式。\n- `2018.04` 的 FBX 中文目录进一步补充了 [[ALink]] 扩展结构、远方控制 `0~4` 级、系统联锁矩阵和扩展安装空间要求，体现这类金属封闭紧凑柜的早期工程实现口径。\n- `Premset 12 kV` 目录把 [[Premset]] 纳入另一类金属封闭中压设备路线：以 [[屏蔽式固体绝缘]] 主回路、`PM` 金属隔板、`LSC2A`、主回路 `IP67` 和 `25kA x 1s A-FLR` 为特征。\n- Premset 的柜体围绕 `375mm` 标准宽度与 `750mm` 宽扩展计量/进线单元组织，系统深度 `1135mm`，电缆联接高度 `700mm`。\n- 它既不同于典型 `SF6` 气体绝缘路线，也不同于以空气净距为主的常规空气绝缘路线，更强调固体绝缘屏蔽、通用扁平联接系统和免维护联接界面。\n- MVnex 被描述为应用于高压/中压与中压/中压变电站的户内金属封闭开关设备，开关柜为移开式金属铠装型。\n- PIX 中文目录将产品定义为铠装移开式户内交流金属封闭开关设备，覆盖 PIX-12kV、PIX-24kV、PIX-M 和 PIX-Gen。\n- PIX550 目录将产品定义为中置式金属封闭开关设备，是 PIX 旗下 12kV、550mm 宽的小型化分支。\n- PIX500 目录将产品定义为铠装式金属封闭开关设备，是 PIX 旗下 12kV、500mm 宽的小型化分支。\n- PIX V8 目录依据 GB/T 3906-2020 和 IEC 62271-200:2021 组织参数，并明确 PIX 系列为 LSC2B、PM 级隔室分隔的金属封闭开关设备。\n- DNF7 采用 LSC2B 运行连续性类别，目标是在打开某一高压隔室时保持其他隔室继续带电运行的可能性。\n- 高压隔室间采用 PM 级可靠接地金属隔板。\n- 典型隔室包括母线室、手车室、电缆室和低压室。\n- 设备功能单元可覆盖进线/馈线、母线分段/隔离、母线提升、母线电压测量和计量。\n\n## Related\n- [[DNF7]]\n- [[MVnex]]\n- [[PIX]]\n- [[PIX500]]\n- [[PIX550]]\n- [[SmartPIX]]\n- [[GMA]]\n- [[GMAirSeT]]\n- [[GHA]]\n- [[WSG]]\n- [[WIG]]\n- [[FBX]]\n- [[Premset]]\n- [[ALink]]\n- [[屏蔽式固体绝缘]]\n- [[金属铠装开关设备]]\n- [[气体绝缘开关柜]]\n- [[内部电弧防护]]\n- [[机械联锁]]\n- [[HVX]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[金属封闭开关设备]] 是 DNF7、GMA、GM AirSeT、GHA、[[WSG]]、[[WIG]]、MVnex、[[PIX]]、[[PIX550]] 和 [[PIX500]] 都涉及的中压开关设备类别，核心特征是把带电中压元件纳入金属外壳、隔室或密封气室体系中。[[DNF7]] 文档用这一类别承接安全隔离、运行连续性和标准化功能单元设计；[[GMA]] 在金属封闭基础上采用 SF6 气体绝缘；[[GMAir",

    "markdown": "---\ntitle: \"金属铠装开关设备\"\ntype: concept\ntags: [switchgear, metal-clad, medium-voltage]\nsources: [mvnex-12kv-air-insulated-switchgear-catalog-2017, mvnex-medium-voltage-metal-clad-switchgear, pix-50ka-catalogue-en, pix-12kv-24kv-air-insulated-switchgear-catalog-2016, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[金属铠装开关设备]] 是 [[金属封闭开关设备]] 的一种更强调隔室分隔、移开式部件和人员安全的开关柜形态。[[MVnex]] 文档把其描述为移开式金属铠装型中压开关柜，由低压室、断路器室、母线室和电缆室四个完全独立的隔室组成；[[PIX]] 英文目录则以 LSC2B-PM 和金属隔板强调类似的隔室化安全逻辑。\n\n## Key Details\n- MVnex 属于户内式、金属封闭、移开式金属铠装型开关设备。\n- 标准型四个独立隔室包括低压室、断路器室、母线室和电缆室。\n- 可抽出部件包括 [[HVX]] 真空断路器或 CVX 接触器。\n- 文档强调完善的机械和电气联锁，用于防止误操作。\n- MVnex 标准型外壳防护等级为 IP4X，隔室间为 IP2X。\n- `MVnex 12kV Air-Insulated Switchgear Catalog 2017` 进一步说明 MVnex 的中国正式目录层已经把标准型、`550` 紧凑型、`500` 超紧凑型和 `Smart` 智能型统一纳入同一金属铠装平台，并给出更完整的一次方案与土建安装实现。\n- PIX 高压部分分为母线室、电缆室和开关设备室，采用 PM 级金属隔板，并按 IEC 62271-200 定义为 LSC2B-PM。\n- `PIX 12kV 24kV Air-Insulated Switchgear Catalog 2016` 说明中国正式目录层已经完整写出 PIX 的四隔室、五防联锁、活门、二次插头联锁、泄压装置、主要元件参数和基础安装页。\n- PIX 中文目录直接将 PIX 定义为铠装移开式户内交流金属封闭开关设备，并给出断路器室、母线隔室、电缆隔室和继电器仪表隔室四个独立功能隔室。\n- PIX550 目录说明设备按 GB3906 和 IEC 62271-200 中的铠装式金属封闭开关设备设计，柜体由四个单独隔室和中置式可抽出手车组成。\n- PIX500 采用金属铠装式设计，主回路固定联接，功能隔室相对独立，配置 HVX 固封式断路器和三工位开关；`2016-11-23` 的正确命名中文样本副本进一步说明它是一条独立于 PIX550 中置手车方案的小型化固定主回路分支。\n\n## Related\n- [[MVnex]]\n- [[PIX]]\n- [[PIX500]]\n- [[PIX550]]\n- [[空气绝缘开关设备]]\n- [[金属封闭开关设备]]\n- [[HVX]]\n- [[内部电弧防护]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[金属铠装开关设备]] 是 [[金属封闭开关设备]] 的一种更强调隔室分隔、移开式部件和人员安全的开关柜形态。[[MVnex]] 文档把其描述为移开式金属铠装型中压开关柜，由低压室、断路器室、母线室和电缆室四个完全独立的隔室组成；[[PIX]] 英文目录则以 LSC2B-PM 和金属隔板强调类似的隔室化安全逻辑。 ## Key Details",

    "markdown": "---\ntitle: \"防跳继电器\"\ntype: concept\ntags: [protection, control, relay]\nsources: [hvx-manual]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[防跳继电器]] 是 HVX 二次装置中的控制保护部件，用于避免断路器在持续收到合闸和分闸指令时反复跳跃动作。说明书中将其称为 K01，并明确其用途是阻止持续的合、分闸。\n\n## Key Details\n- 如果断路器同时持续收到合闸和分闸指令，防跳继电器会使其在合闸后返回分闸位置并保持。\n- 这是 HVX 二次控制回路中的重要防误动设计。\n\n## Related\n- [[HVX]]\n",

    "markdown": "---\ntitle: \"AS12AS24\"\ntype: entity\ntags: [product, switch, medium-voltage, air-insulated, schneider-electric]\nsources: [as12-as24-medium-voltage-switch-catalog, as12-medium-voltage-switch-brochure-2016, sc6-medium-voltage-switch-component-catalog-2017]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[AS12AS24]] 是 [[施耐德电气]] 面向 `12/24kV` 二次配电空气绝缘开关柜场景提供的一组中压开关核心元件。当前已入库资料把它写成柜厂可集成的开关平台，而不是完整柜体产品线：它通过 `IS / QS / DS / CS / ES` 功能分支、`SF6` 密闭压力系统、永磁旋弧灭弧结构和一组保护/自动化附件，去支撑进出线、熔断器组合、双电源、PT 柜和隔离开关+断路器柜等不同功能；到 `2017` 的 [[SC6]] 目录中，这条路线又收敛为更聚焦 `12kV` 与 `SIC / SQC` 的后续版本。\n\n## Key Details\n- 已入库目录封面标题为 `中压开关 AS12/AS24 可靠核“芯” 灵活便捷`，PDF 元数据日期为 `2010-03-18`，修改时间为 `2010-11-24`。\n- `AS12中压开关 产品简介` 说明到 `2016.09` 时，这条路线在中国市场已出现聚焦 `AS12` 的两页折页层：参数收束到 `12kV 630A`，但仍保留 `IS / QS / CS / DS / ES` 全套功能、`375mm / 500mm` 宽度选择和 `AS12-ES` 隔离开关断路器组合。\n- 产品定位不是整柜，而是“空气绝缘开关柜的核心元件”；资料明确写到柜体由国内开关柜制造商制造。\n- 功能类型包括 `IS`、`QS`、`DS`、`CS`、`ES`，分别覆盖负荷开关柜、熔断器组合柜、双电源快速合闸柜、PT/中低压变压器柜和隔离开关+断路器柜。\n- 额定参数主口径为 `12kV / 24kV`、`630A`；短时耐受电流常规为 `20kA/3s`，`AS12` 可选 `25kA/1s`。\n- 开关本体采用 `SF6` 绝缘与灭弧，气室相对压力 `0.4 bar`，符合 IEC 密闭压力系统，资料写年泄漏率 `<0.05%`。\n- 永磁旋弧灭弧是其技术核心，资料强调低操作过电压、触头磨损小和较长电气寿命；主开关机械寿命 `5000` 次，接地开关 `2000` 次。\n- 安全设计包括三位置开关、天然联锁、同轴机械指示、观察窗、柜门联锁和事故泄压朝柜后释放。\n- 操作机构分为 `CIT`、`CI1`、`CI2`、`CS` 等，覆盖手动/电动、快速分合闸、储能、分励脱扣和熔断器联动等差异。\n- 可选附件体系较完整，包括 `Fusarc CF` 熔断器、`Amp 21D` 数字电流表、`Flair 22D` 故障指示器、`Talus 200I` 远程终端、钥匙闭锁和 `Sepam` 综合保护。\n- `2017` 的 [[SC6]] 目录可视为这条平台的后续收敛资料：如果把现有链条连起来，更接近 `2010 AS12/AS24 多电压平台 -> 2016 AS12 单型号折页 -> 2017 SC6 收敛版` 的连续演进，而不是互不相关的三个对象。\n- 因此更适合把 [[AS12AS24]] 理解为施耐德早期“二次空气绝缘柜体 + SF6 开关核心 + 附件生态”的平台，而不是后续 [[SM6]]、[[RM6]]、[[FBX]] 那类整柜目录的简单前身。\n\n## Related\n- [[施耐德电气]]\n- [[空气绝缘开关设备]]\n- [[机械联锁]]\n- [[数字化中压运维]]\n- [[SC6]]\n- [[SM6]]\n- [[RM6]]\n- [[FBX]]\n",
    "preview": "## Summary [[AS12AS24]] 是 [[施耐德电气]] 面向 `12/24kV` 二次配电空气绝缘开关柜场景提供的一组中压开关核心元件。当前已入库资料把它写成柜厂可集成的开关平台，而不是完整柜体产品线：它通过 `IS / QS / DS / CS / ES` 功能分支、`SF6` 密闭压力系统、永磁旋弧灭弧结构和一组保护/自动化附件，去支撑进出线、熔断器组合、双电源、PT 柜和隔离开关+断路器柜等不同功能；到 `2017",

    "markdown": "---\ntitle: \"BMM\"\ntype: entity\ntags: [device, monitoring-unit, breaker]\nsources: [3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[BMM]] 是文档中提到的断路器监测单元，用于采集 [[SmartHVX]] 智能型中的配柜、线圈和电机相关监测信息。它是连接二次元件与本地显示/主动运维链路的重要设备单元。\n\n## Key Details\n- 文档把 BMM 标为“断路器监测单元”。\n- 它主要出现在智能型方案中，与 [[二次元件智能监测]] 和配柜监测能力直接相关。\n- 它与 [[PMBEasy]] 的本地显示链路形成配合。\n\n## Related\n- [[SmartHVX]]\n- [[PMBEasy]]\n- [[二次元件智能监测]]\n- [[配柜智能监测]]\n",

    "markdown": "---\ntitle: \"CAS36\"\ntype: entity\ntags: [product, ring-main-unit, medium-voltage, schneider-electric]\nsources: [cas-36-ring-main-unit-catalog-2008]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[CAS36]] 是 [[施耐德电气]] 在 `2008.02` 英文目录中出现的一条早期 `Ring Main Unit` 产品对象。当前可抽取到的资料页数有限，尚不足以恢复完整工程参数，但已经足够确认它在施耐德产品叙事中承担的是中压配电环网柜 / RMU 角色，并突出供电连续性、安全、可升级和监测控制能力。\n\n## Key Details\n- 目录封面直接写出 `CAS 36 Ring Main Unit`，尾标文档号为 `AMTED304013EN`。\n- 资料时间口径为 `02/2008`，是当前知识库中出现较早的施耐德 RMU 目录层之一。\n- 目录隶属于 `Power distribution networks` 叙事，而不是单一附件或运维手册。\n- 导言页强调 `better service continuity`、`increased personnel and equipment safety`、`guaranteed upgradeability`、`efficient monitoring and control`。\n- 当前已抽取正文不足以确认完整额定参数、功能单元或尺寸表，因此它更适合作为产品谱系和叙事层记录，而非精确工程选型页。\n- 与后续 [[RM6]]、[[FBX]]、[[SM6]] 相比，[[CAS36]] 更像施耐德在二次配电 RMU / 环网柜方向上的早期英文目录对象，而不是这些路线的直接旧版本同名替代。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[DVCAS]]\n- [[RM6]]\n- [[FBX]]\n- [[SM6]]\n",

    "markdown": "---\ntitle: \"DNF7\"\ntype: entity\ntags: [product, switchgear, medium-voltage, air-insulated]\nsources: [dnf7-metal-clad-switchgear-technical-instruction-2010, dnf7-chinese-product-catalog-2011, dnf7-chinese-selection-manual-2017, dnf7-english-selection-manual-2017, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[DNF7]] 是施耐德电气的户内交流 [[金属封闭开关设备]] / 空气绝缘中压开关柜对象。当前 wiki 中它已经形成一条五层资料链：`2010.12 / 2011-01-04` 的英文 `Technical Instruction` 记录了 DNF7 在 `36kV / 40.5kV` 系统中的结构、抽出式方案和一次选型口径；`2011.06` 的中文产品目录把这套路线较早地落到中国市场目录层，口径集中在 `40.5kV`、`2500A`、`FP / HVX-O`、典型方案和基础安装；`2017-08-16` 的中文选型手册再把它本地化为更完整的工程资料，补入 `KYN28 / KYN61`、中文标准、一次方案和土建安装页；`2017-08-21` 的英文选型手册延续同一技术骨架，但把公司介绍与品牌页更新到 `2016/2017` 口径；`2025-04-10` 中文样本则把叙事推进到更当代的 `40.5kV` 数字化中压配电场景，补入在线监测、主动运维和智能化方案。因此更适合把 DNF7 理解为“40.5kV 级空气绝缘金属封闭开关柜平台，其资料从早期工程技术说明，经早期中文目录层与 `2017` 中英文选型层，演进到后期中文数字化样本”。\n\n## Key Details\n- 额定电压为 40.5kV，额定频率为 50/60Hz。\n- 额定短路开断电流覆盖 25kA 和 31.5kA，额定短时耐受电流为 25kA/31.5kA 4s。\n- 主母线最大额定电流可达 3150A，3150A 配置需要强制风冷。\n- 柜体标准尺寸为宽 1200mm、高 2400mm、深 2750mm，加深柜最大深度为 3400mm。\n- 典型功能单元包括进线/馈线、母线分段/隔离、母线提升、母线电压测量和计量。\n- 结构上分为母线室、手车室、电缆室和低压室，高压隔室之间采用可靠接地的金属隔板。\n- 更早的英文手册把 DNF7 直接写成适用于 `36kV` 和 `40.5kV` 系统的 air insulated metal-clad switchgear，并给出 `LSC2B`、`PM partition class`、`IP4X`、可选 `IP41`、`1200(1400) x 2505 x 2400 mm` 和最大 `1800kg` 这组早期工程口径。\n- 该手册还说明 DNF7 可配置可抽出式 `HVX` 真空断路器或 `FP` 气体绝缘断路器，相同额定值下 switching technology 可互换，并存在 `Middle Rolling` 和 `Floor Rolling` 两种 withdrawable 形式。\n- `DNF7 Chinese Product Catalog 2011` 说明到 `2011` 时，DNF7 在中国市场已有一份更早的中文目录层：封面写成 `DNF 7 40.5kV 中压空气绝缘开关柜`，主参数仍是 `2500A`、`25/31.5kA`、`1300 x 2760 x 2500 mm`，并围绕 `FP` 与 `HVX-O`、典型方案、基础安装和公司在华渠道网络展开。\n- `DNF7 Chinese Selection Manual 2017` 说明到 `2017` 时，这套 DNF7 技术路线已经被完整本地化为中文工程选型资料：明确写出 `40.5kV(GB) / 36kV(IEC)`、`KYN28 / KYN61`、`1200mm / 1400mm` 柜宽、五防闭锁、三高压隔室独立释压通道、一次方案页以及基础框架和配电室布置要求。\n- `DNF7 English Selection Manual 2017` 说明到 `2017` 时，这套 DNF7 技术路线仍以英文选型手册形式在中国市场流通：技术主体基本沿用较早英文说明，但公司介绍已更新为 `2016` 财年 `24.7 billion Euros`、全球 `160,000+` 员工、中国 `26,000` 员工和“over 30 years”在华品牌口径。\n- 智能化方案覆盖温度在线监测、断路器特性在线监测、视频在线监测、弧光保护、剩余电寿命在线监测和 [[PMBox]] 主动运维。\n\n## Related\n- [[施耐德电气]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n- [[HVX]]\n- [[SmartHVX]]\n- [[EcoStruxure]]\n- [[PMBox]]\n- [[PMBEasy]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[DNF7]] 是施耐德电气的户内交流 [[金属封闭开关设备]] / 空气绝缘中压开关柜对象。当前 wiki 中它已经形成一条五层资料链：`2010.12 / 2011-01-04` 的英文 `Technical Instruction` 记录了 DNF7 在 `36kV / 40.5kV` 系统中的结构、抽出式方案和一次选型口径；`2011.06` 的中文产品目录把这套路线较早地落到中国市场目录层，口径集中在 ",

    "markdown": "---\ntitle: \"DVCAS\"\ntype: entity\ntags: [product, switchgear, wind-farm, secondary-distribution, gas-insulated]\nsources: [dvcas-wind-farm-secondary-distribution-switchgear-catalog-2007]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[DVCAS]] 是 [[施耐德电气]] 体系内一条面向风电场集电网和风机箱变的 `36kV` 中压二次配电开关柜对象。当前资料显示它采用 `SF6` 密封气箱、模块化 `I / D / 0 / T` 功能组合和紧凑化结构，重点解决风机塔筒门洞受限、故障快速隔离、远方恢复供电和风电场高可用性问题。\n\n## Key Details\n- 目录封面将其写为 `DVCAS Switchgears for transformer substations in wind farms`，并注明 `36 kV` 与 `SECONDARY DISTRIBUTION SWITCHGEAR`。\n- 应用边界聚焦风电场集电网、风机箱变和 `36kV / HV` 升压站之间的中压侧连接。\n- 资料强调设备可以通过 `600 mm` 宽门洞，适合安装在风机塔筒内部。\n- 适用海拔写为 `2000 m` 以内。\n- 总参数口径为 `36kV`、`630A`、`20kA / 3s`、短路开断 `20kA`、峰值关合 `50kA`、`IAC AFL 20kA / 1s`、高压隔室 `IP67`、低压与机构隔室 `IP3X`、`SF6 0.3 bar @ 20℃`。\n- 模块体系包括 `D` 变压器保护单元、`I` 进线三工位开关单元、`0` 出线提升单元和 `T` 带接地开关的提升单元，并支持 `NE / LE / RE / DE` 扩展方式。\n- `D` 单元采用真空断路器，资料中写为 `Evolis CAS`，并配置 `VIP-35` 自供电继电器与零序保护。\n- `I` 单元可选 `48Vdc` 电动机构、`230Vac` 充电整流和 `Flair` 故障指示器，用于远方故障隔离与逐步恢复供电。\n- 它与后续 [[RM6]]、[[FBX]] 这类更通用二次配电 RMU 的关系，更适合理解为“风电专用早期分支”，而不是同名旧版本。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[CAS36]]\n- [[RM6]]\n- [[FBX]]\n",
    "preview": "## Summary [[DVCAS]] 是 [[施耐德电气]] 体系内一条面向风电场集电网和风机箱变的 `36kV` 中压二次配电开关柜对象。当前资料显示它采用 `SF6` 密封气箱、模块化 `I / D / 0 / T` 功能组合和紧凑化结构，重点解决风机塔筒门洞受限、故障快速隔离、远方恢复供电和风电场高可用性问题。 ## Key Details",

    "path": "wiki\\entities\\EcoStruxure.md",
    "markdown": "---\ntitle: \"EcoStruxure\"\ntype: entity\ntags: [platform, iot, architecture]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, smart-hvx-product-pmb-introduction, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, gma-nrjed311328en-1017, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, gha-nrjcat18789en-0318]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[EcoStruxure]] 是施耐德电气在文档中反复强调的物联网架构。它被描述为由互联互通的产品、边缘控制以及应用分析与服务构成的整体框架，而 [[PMBEasy]] 和 [[PMBox]] 都被放在边缘控制/主动运维叙事中。\n\n## Key Details\n- 文档用 EcoStruxure 解释施耐德如何把产品连接、监测、分析和服务串起来。\n- [[SmartHVX]] 和 [[PMBEasy]] 被纳入这一数字化配电叙事之中。\n- Smart HVX & PMBox 演示稿明确把 [[PMBox]] 定位为 EcoStruxure Power 架构与平台的边缘控制层产品。\n- DNF7 样本说明 [[DNF7]] 可接入 EcoStruxure 架构与平台，并通过边缘控制、千里眼资产顾问等能力支撑寿命评估、风险预警和资产健康诊断。\n- 英文 GMA 目录把 [[GMA]] 描述为 ready for IoT，可集成 Smart Grid，并通过 EcoStruxure ready solutions 支撑 protection、metering、condition monitoring 和 remote monitoring。\n- GHA 2018 目录把 [[GHA]] 描述为 ready for IoT，并把 Substation Monitoring Device、HMI、Easergy P3/Sepam/MiCOM、VAMP、TH110、CL110、SCADA 和云端/移动应用纳入 EcoStruxure ready solutions。\n- PIX V8 目录把 [[SmartPIX]] 接入 EcoStruxure 架构与平台，并通过千里眼资产顾问支撑资产健康矩阵、预测性维护和全生命周期数据分析。\n\n## Related\n- [[施耐德电气]]\n- [[DNF7]]\n- [[GMA]]\n- [[GHA]]\n- [[PIX]]\n- [[SmartPIX]]\n- [[SmartHVX]]\n- [[PMBEasy]]\n- [[PMBox]]\n",
    "preview": "## Summary [[EcoStruxure]] 是施耐德电气在文档中反复强调的物联网架构。它被描述为由互联互通的产品、边缘控制以及应用分析与服务构成的整体框架，而 [[PMBEasy]] 和 [[PMBox]] 都被放在边缘控制/主动运维叙事中。 ## Key Details",

    "markdown": "---\ntitle: \"FBX\"\ntype: entity\ntags: [product, gas-insulated-switchgear, medium-voltage]\nsources: [fbx-medium-voltage-switchgear-catalog-2017, fbx-medium-voltage-switchgear-catalog-2018, fbx-catalogue-2020]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[FBX]] 是 [[施耐德电气]] 目录中的中压 [[气体绝缘开关柜]] 产品线，面向 `24kV` 及以下二次配电场景。与 [[GMA]]、[[GHA]]、[[WSG]] 等现有产品线相比，当前资料中的 FBX 更强调 `630A / 20kA`、紧凑尺寸、变压器保护单元、`LSC2A` 连续性和寿命期内免补气。现有 wiki 已记录 `2017.10`、`2018.04` 和 `2020.05` 三版 `SCDOC1544` 目录：`2017` 版更突出风机塔筒内安装、可再生能源和传统远控/故障隔离叙事，`2018` 版更突出 [[ALink]] 扩展、联锁和远控等级，`2020` 版则进一步补强 [[EcoStruxure]] 接入与在线监测扩展能力。\n\n## Key Details\n- 当前已入库的三份主要目录同属 `SCDOC1544` 体系，末页日期分别为 `2017.10`、`2018.04` 和 `2020.05`。\n- FBX 主要应用于公共配电、工业、基础设施和可再生能源等二次配电场景。\n- 额定电压覆盖 `12kV` 和 `24kV`，额定电流为 `630A`，主要短路/内部电弧口径围绕 `20kA` 级展开。\n- 采用 `SF6` 绝缘，导电主回路位于不锈钢密封气箱中，`20℃` 额定压力约 `0.03MPa`。\n- 目录强调主回路设计寿命 `30` 年，寿命期内免维护、无需补气。\n- 产品分为 `FBX-C` 紧凑型和 `FBX-E` 可扩展型；`FBX-C` 把 6 个以下功能单元集成在单个气箱中，`FBX-E` 支持左右扩展，另有单侧扩展变体线索。\n- `FBX-E` 通过 [[ALink]] 实现相邻柜体扩展，目录强调扩展时无需现场气体处理；`2018.04` 版还明确给出大于 `450mm` 的扩展安装空间要求。\n- 功能单元包括 `C` 进出线、`T1` 负荷开关-熔断器组合变压器保护、`T2` 真空断路器线路/变压器保护、`R` 直接进线、`Sb` 母线分段和 `M` 计量单元。\n- `T1` 单元强调上下游双接地开关、熔断器撞针动作触发三相分闸、面板熔断翻牌和机械联动。\n- `T2` 单元采用固定式真空断路器，带具有关合能力的接地开关，可选自供电保护继电器，适合变压器保护和风场场景。\n- 目录给出 `LSC2A` 工作连续性，说明可在带或不带操作走廊的配电室使用。\n- 防护等级包括主回路 `IP67`、熔断器隔室 `IP65` 可选 `IP67`、操作机构和低压隔室 `IP3X`、电缆隔室门开启状态 `IP2XC` 和柜体 `IK07`。\n- 内部电弧口径包括 `C/T1/T2/R` 的 `AFL 16kA 或 20kA / 1s`，以及 `M1~M4` 的 `AF 16kA 或 20kA / 1s`。\n- 使用条件包括常规海拔 `1000m`、环境温度 `-5℃ ~ +40℃`，可选低温 `-25℃` 和减额到 `+55℃`。\n- 目录给出丰富的尺寸重量表，例如 `FBX-C` 三功能单元柜宽约 `1000mm`，高 `1380mm`，深 `752mm`。\n- `2017.10` 版目录比后续版本更突出可再生能源场景：简介页直接写到 `FBX-E` 可凭紧凑尺寸安装在风机塔筒内，并把地下安装、地面安装和风塔内安装并列为典型安装语境。\n- `2018.04` 版目录主要提供远方控制 `0~4` 级、`VDS-HR`、`VDS-LR`、`VPIS` 和可选 `IVIS` 等传统远控/带电检测口径。\n- `2017.10` 版还把 `Flair` 故障指示器、进线电动操作和远方故障隔离/恢复供电叙事写得更直接，同时在标准页保留了一个应被视作模板遗留的异常：页面正文出现“`RM6-S开关柜满足以下标准和法规的要求`”字样，但全文产品主体仍然是 FBX。\n- `2020.05` 版则新增更明确的 [[EcoStruxure]] 章节，说明 FBX 可接入 `Easergy T300`、`SMD` 智能监测终端、`TH110-R` 测温、`PD110` 局放监测和 `VPIS` 带电显示。\n- 可持续发展章节说明约 `90%` 金属材料可回收，`SF6` 约占设备总重 `0.5%`，可在寿命期终回收再利用。\n\n## Related\n- [[施耐德电气]]\n- [[ALink]]\n- [[气体绝缘开关柜]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n- [[数字化中压运维]]\n- [[EcoStruxure]]\n- [[气室监测]]\n- [[GMA]]\n- [[GHA]]\n- [[WSG]]\n",

    "path": "wiki\\entities\\FLUSARC.md",
    "markdown": "---\ntitle: \"FLUSARC\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, gas-insulated, wind-power]\nsources: [wind-energy-solutions-2018, flusarc-40-5kv-sf6-insulated-medium-voltage-switchgear-catalog-2016]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[FLUSARC]] 是 [[施耐德电气]] 一条面向 `40.5kV` 中压二次配电站和风电场预装式变电站的 `SF6` 绝缘中压开关柜路线。当前资料链已经形成“`2016.07` 独立正式目录 -> `2018.10` 风电行业总册”两层：前者提供工程参数、功能单元、联锁和安装口径，后者补充其在风场连接系统中的应用场景定位。\n\n## Key Details\n- `2016.07` 正式目录把它写成 `FLUSARC 40.5 kV SF6 绝缘中压开关柜`，适用于 `40.5kV` 中压二次配电站和风电场中压/低压预装式变电站。\n- 设备采用 `SF6` 气体绝缘和真空断路器；所有带电部件密封在充有 `SF6` 的不锈钢气箱内，并通过压力表连续监测气箱压力。\n- 目录给出的核心口径是 `40.5kV`、`630A`、工频耐压 `95/110kV`、雷电冲击 `185/215kV`、`20kA / 3s`、`AFLR 20kA / 1s`。\n- 环境与防护边界包括主回路 `IP67`、操作机构/电缆室 `IP3X / IP4X`、最大海拔 `2000m`、腐蚀等级 `C4` 和 `20℃` 时 `SF6 0.03MPa` 相对压力。\n- 目录强调在正常条件下可至少 `30` 年良好运行且无需重新充气，整个寿命期内基本免维护。\n- 功能单元体系包括 `C` 负荷开关馈线单元、`RE` 直接进线单元、`CB` 真空断路器馈线单元和 `L` 侧面联络单元，可按需求组合并继续扩展。\n- 断路器单元使用三工位隔离/接地开关，机械寿命口径为：负荷开关与接地开关 `1000` 次、真空断路器 `10000` 次。\n- 电缆连接采用前置插拔式套管，支持全绝缘或半绝缘终端、双电缆进线或电缆加避雷器方案。\n- `2018.10` 风电总册则把它进一步放进风场连接系统叙事，强调适用于系统标称电压最高至 `35kV` 的场内连接和风机变压器保护，并说明可覆盖海上和陆上风机应用。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[机械联锁]]\n- [[气室监测]]\n- [[FBX]]\n- [[DVCAS]]\n- [[WSG]]\n",
    "preview": "## Summary [[FLUSARC]] 是 [[施耐德电气]] 一条面向 `40.5kV` 中压二次配电站和风电场预装式变电站的 `SF6` 绝缘中压开关柜路线。当前资料链已经形成“`2016.07` 独立正式目录 -> `2018.10` 风电行业总册”两层：前者提供工程参数、功能单元、联锁和安装口径，后者补充其在风场连接系统中的应用场景定位。 ## Key Details",

    "path": "wiki\\entities\\FOX.md",
    "markdown": "---\ntitle: \"FOX\"\ntype: entity\ntags: [product, switchgear, core-unit, gas-insulated, schneider-electric]\nsources: [fox-medium-voltage-switchgear-core-unit-catalog-2016]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[FOX]] 是 [[施耐德电气]] 在 `2016.03` 时点面向二次配电环网柜集成场景提供的一条“中压开关柜核心元件”路线。它不是完整整柜产品线，而是 `12kV` 以下 `SF6` 气体绝缘开关设备核心模块，由施耐德提供带电主回路和功能单元，电缆室与低压间则交由合作伙伴完成。\n\n## Key Details\n- 目录封面直接写明其为 `FOX 中压开关柜核心元件 12kV 气体绝缘开关设备`，末页尾标为 `SCDOC1608 / 2016.03`。\n- 产品定位为 `12kV`、`630A` 的中压开关柜核心元件，可作为环网单元或最终用户配电单元。\n- 柜型分为 `FOX-NE` 紧凑型和 `FOX-DE` 可扩展/模块化型；`FOX-DE` 可从左右两侧扩展，适合电网公司和工业领域。\n- 功能单元体系包括 `I / Q / B / O / IC`：其中 `Q` 为负荷开关-熔断器变压器保护，`B` 为真空断路器保护单元。\n- 技术参数核心口径为 `12kV`、工频耐压 `42kV`、雷电冲击 `75kV`、母线 `630A`、短时耐受 `20kA / 4s`、峰值耐受 `50kA`、`B` 型柜短路开断 `20kA`。\n- 绝缘路线为 `SF6` 气体绝缘，`20℃` 时额定充气压力 `0.03MPa`。\n- 资料强调 `30` 年使用寿命、寿命期内主回路免维护、状态模拟图清晰可见和询问式机械联锁防误操作。\n- 制造边界写得很明确：施耐德提供核芯元件，电缆室和低压间由合作伙伴生产。\n- 另有一个文件名写作 `SCDOC1608_web - FOX.pdf` 的副本，内容与当前 `2016.03` 目录一致，可视为同版 `web` 导出件。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[机械联锁]]\n- [[AS12AS24]]\n- [[SC6]]\n- [[FBX]]\n- [[RM6]]\n",
    "preview": "## Summary [[FOX]] 是 [[施耐德电气]] 在 `2016.03` 时点面向二次配电环网柜集成场景提供的一条“中压开关柜核心元件”路线。它不是完整整柜产品线，而是 `12kV` 以下 `SF6` 气体绝缘开关设备核心模块，由施耐德提供带电主回路和功能单元，电缆室与低压间则交由合作伙伴完成。 ## Key Details",

    "path": "wiki\\entities\\GHA.md",
    "markdown": "---\ntitle: \"GHA\"\ntype: entity\ntags: [product, gas-insulated-switchgear, medium-voltage]\nsources: [gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[GHA]] is a [[施耐德电气]] medium-voltage [[气体绝缘开关柜]] platform described as gas-insulated switchgear with a vacuum circuit-breaker up to 40.5kV. In the current wiki it complements [[GMA]] and [[GMAirSeT]] by extending the gas-insulated switchgear knowledge base into a higher-voltage, [[BLink]]-based product family with [[IDIS]] gas compartment monitoring, [[IVIS]] voltage detection, [[EcoStruxure]] ready monitoring, and internal-arc protection options.\n\n## Key Details\n- Product positioning: gas-insulated switchgear with vacuum circuit-breaker up to 40.5kV.\n- System variants include IEC single-busbar and double-busbar arrangements, GHA Rail, and GHA ANSI.\n- General IEC ratings in the 2018 catalog cover 12/17.5/24/36/38/40.5kV, rated short-time current 40kA, rated peak withstand current 100kA, rated busbar current 2500A with higher values up to 4000A on request, and branch current up to 2500A.\n- GHA Rail is a railway-derived single-busbar branch with nominal voltage 25/25-0-25kV and rated voltage 27.5/27.5-0-27.5kV.\n- GHA ANSI is UL and CSA certified for ANSI applications, with ratings up to 38kV, 2500A and 40kA.\n- [[BLink]] is the core GHA busbar-connection feature, allowing erection, extension, panel disassembly, and panel movement without gas handling at site.\n- Gas-filled compartments are presented as a sealed pressure system according to IEC/EN 62271-1, with maintenance-free behavior across service life; the older presentation states leakage rate `<< 0.1 % p.a.`.\n- [[IDIS]] monitors each gas compartment with pressure sensors and green/yellow/red status LEDs, and can send a common remote gas warning group signal.\n- [[IVIS]] provides integrated voltage detection for voltage presence, isolation verification, and phase comparison.\n- Cable connection options include outer-cone connections up to 36kV and inner-cone connections up to 40.5kV.\n- Fully insulated busbar-system connections are described up to 2500A via inner-cone plug-in systems.\n- [[ILIS]] supports detection, analysis, and turn-off of internal arc faults with an approximately 100ms total turn-off time claim.\n- Internal Arc Classification is listed as 40kA/1s; IAC AFL is standard in the catalog and IAC AFLR is available for rear access.\n- [[EcoStruxure]] ready content connects GHA with nearby control, Substation Monitoring Device, HMI, protection/metering/condition monitoring, Easergy P3/Sepam/MiCOM, VAMP arc mitigation, TH110 and CL110 monitoring.\n- Environmental content states that GHA contains SF6 in sealed pressure vessels, supports SF6 recovery through self-sealing valves, and has a 90% potential recyclability ratio by weight excluding packaging.\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[BLink]]\n- [[IDIS]]\n- [[IVIS]]\n- [[ILIS]]\n- [[EcoStruxure]]\n- [[气室监测]]\n- [[内部电弧防护]]\n- [[金属封闭开关设备]]\n- [[GMA]]\n- [[GMAirSeT]]\n",

    "markdown": "---\ntitle: \"GMA\"\ntype: entity\ntags: [product, gas-insulated-switchgear, medium-voltage]\nsources: [gma-12kv-medium-voltage-gas-insulated-switchgear-catalog-2018, gma-medium-voltage-primary-gas-insulated-switchgear-v1-5, gma-nrjed311328en-1017, gha-gas-insulated-switchgear-presentation-vers-06-englisch]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[GMA]] 是施耐德电气的中压一次 [[气体绝缘开关柜]] 产品线，资料将其描述为 SF6 气体绝缘单母线系统的一次配电设备。与 40.5kV 空气绝缘 [[DNF7]] 不同，GMA 主要覆盖 12/24kV 场景，强调紧凑、模块化、可扩展、密封气室和现场无需气体操作；与 [[GMAirSeT]] 相比，GMA 的关键差异是采用 SF6 而不是干燥空气/环保气体；与 [[GHA]] 相比，当前 GMA 资料更偏 12/24kV 紧凑一次配电口径，而 GHA 资料扩展到最高 40.5kV。\n\n## Key Details\n- 主要应用领域包括基础设施、政府机关、电子行业、交通行业和高端商建。\n- 额定电压为 12/24kV，额定频率为 50Hz。\n- 主母线额定电流不超过 2000A，分支母线额定电流不超过 1250A。\n- 额定短时耐受电流为 31.5/25kA，额定短路持续时间为 4s。\n- 断路器机械寿命为 20000 次，断路器等级为 M2-E2-C2，额定短路开断次数为 50 次。\n- 典型柜型包括断路器柜、母联柜、隔离提升柜、隔离柜、直连柜和 PT 柜。\n- 气室为符合 IEC 62271-1 和 GB/T 11022 的密封压力系统，每个充气隔室通过压力表监控，可选报警接点输出以实现远程监测。\n- `2018.12` 的中文 `12kV` 目录层把 GMA 进一步收敛到主母线 `1250A`、分支母线 `630/1250A`、`25/31.5kA`、机械寿命 `10000` 次，并明确写出 `CB-C / CB-B / BC-CB / D / M / BB-PT` 柜型代码与 `420/510/600/750/800mm` 柜宽代码。\n- 英文 2017 目录扩展了国际版参数视角：GMA 可覆盖 12/15/17.5/24kV、最高 2500A 和 31.5kA，并强调 450mm 宽馈线柜、IoT/Smart Grid ready、remote monitoring 和 [[EcoStruxure]] ready solutions。\n- GMA 当前已经形成更清楚的版本链：`2017` 英文国际版偏 `24kV / 2500A` 与 IoT 叙事，`2018.12` 中文目录偏 `12kV / 1250A` 的中国工程目录层，`2023 V1.5` 中文目录则扩展为 `12/24kV`、主母线 `≤2000A` 的后续中国目录层。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[GMAirSeT]]\n- [[GHA]]\n- [[EcoStruxure]]\n- [[气室监测]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n- [[DNF7]]\n",

    "path": "wiki\\entities\\GMAirSeT.md",
    "markdown": "---\ntitle: \"GM AirSeT\"\ntype: entity\ntags: [product, gas-insulated-switchgear, dry-air, sf6-free, medium-voltage]\nsources: [gm-airset-medium-voltage-primary-gas-insulated-switchgear-v1-1, gma-air-c4c-digital-implement-20191204]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[GMAirSeT]] 是施耐德电气的环保中压一次 [[气体绝缘开关柜]] 产品线，资料将其描述为采用干燥空气/环保气体绝缘的单母线一次配电设备。它与 [[GMA]] 的模块化、插接式、密封气室和固体绝缘母线设计相近，但用环保气体替代 SF6，以降低温室气体和寿命期末气体处理负担。\n\n## Key Details\n- 主要应用领域包括基础设施、政府机关、电子行业、交通行业和高端商建。\n- 额定电压为 12kV，额定频率为 50Hz。\n- 主母线额定电流不超过 2000A，分支母线额定电流不超过 1250A。\n- 额定短时耐受电流为 31.5kA，额定峰值耐受电流为 80kA，短路持续时间为 4s。\n- 断路器机械寿命为 20000 次，断路器等级为 M2-E2-C2，额定短路开断次数为 50 次。\n- 环保气体额定充气压力约 0.04MPa，年漏气率不超过 0.05%，充气隔室防护等级为 IP67。\n- 柜型代码包括 CB、BS、BC、BR、DS、DI、M2/M3/M4 和 PT。\n- GMA Air C4C Digital 材料补充了数字化实施视角，包括 IED 保护/计量/状态监测、断路器电气监测、[[气室监测]]、电缆侧温升和 [[局部放电监测]]。\n\n## Related\n- [[施耐德电气]]\n- [[气体绝缘开关柜]]\n- [[GMA]]\n- [[气室监测]]\n- [[局部放电监测]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n",
    "preview": "## Summary [[GMAirSeT]] 是施耐德电气的环保中压一次 [[气体绝缘开关柜]] 产品线，资料将其描述为采用干燥空气/环保气体绝缘的单母线一次配电设备。它与 [[GMA]] 的模块化、插接式、密封气室和固体绝缘母线设计相近，但用环保气体替代 SF6，以降低温室气体和寿命期末气体处理负担。 ## Key Details",

    "path": "wiki\\entities\\HVX.md",
    "markdown": "---\ntitle: \"HVX\"\ntype: entity\ntags: [product, vacuum-circuit-breaker]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, hvx-manual, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, mvnex-medium-voltage-metal-clad-switchgear, pix-50ka-catalogue-en, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[HVX]] 是施耐德电气在中压领域的真空断路器系列，也是 [[SmartHVX]] 的基础平台。结合产品样本与说明书来看，HVX 不只是一个“高可靠平台”标签，而是一套面向中国市场开发、覆盖 12kV、24kV 和 40.5kV 的模块化中压真空断路器产品体系。\n\n## Key Details\n- HVX 适用于主流空气绝缘开关设备，可广泛应用于石油化工、配电系统、交通运输、工矿企业等领域。\n- 说明书显示 HVX 面向 12kV、24kV、40.5kV 三个主要电压等级，并给出不同开断能力、额定电流和安装形式的型号组合。\n- 关键结构设计包括 [[真空灭弧室]]、[[全固封极柱]] 和电动底盘车。\n- 二次装置能力包括合分闸脱扣器、欠压/过流脱扣器、辅助开关、[[防跳继电器]]、储能电机和闭锁电磁铁。\n- [[SmartHVX]] 在 HVX 基础上增加了 [[温度智能监测]]、[[配柜智能监测]] 和 [[二次元件智能监测]] 等智能能力。\n- DNF7 样本把 HVX 作为 [[DNF7]] 进线、馈线和母线分段等功能单元中的主开关设备，并给出 40.5kV 相关参数。\n- MVnex 样本把 HVX 固封式真空断路器作为 [[MVnex]] 标准型、550 和 500 方案中的核心断路器平台。\n- PIX 英文目录把 HVX embedded pole 作为 [[PIX]] 17.5kV/50kA/4000A 空气绝缘开关柜的核心断路器平台，并说明其面向重工业、油气、矿业和发电等应用。\n- PIX 中文目录进一步说明 HVX 适用于 PIX 型开关设备及其他主流 [[空气绝缘开关设备]]；HVX 12kV 额定短路开断电流覆盖 25/31.5/40/50kA，HVX 24kV 覆盖 25/31.5/40kA。\n- PIX550 目录把 HVX 固封式真空断路器手车作为 [[PIX550]] 的核心开关设备，参数为 12kV、1250A、≤31.5kA、机械寿命 30000 次。\n- PIX500 目录把 HVX 固封式断路器作为 [[PIX500]] 的核心开关设备，参数为 12kV、≤1250A、≤31.5kA、机械寿命 30000 次。\n\n## Related\n- [[DNF7]]\n- [[MVnex]]\n- [[PIX]]\n- [[PIX500]]\n- [[PIX550]]\n- [[SmartHVX]]\n- [[施耐德电气]]\n- [[真空灭弧室]]\n- [[全固封极柱]]\n- [[防跳继电器]]\n- [[温度智能监测]]\n",
    "preview": "## Summary [[HVX]] 是施耐德电气在中压领域的真空断路器系列，也是 [[SmartHVX]] 的基础平台。结合产品样本与说明书来看，HVX 不只是一个“高可靠平台”标签，而是一套面向中国市场开发、覆盖 12kV、24kV 和 40.5kV 的模块化中压真空断路器产品体系。 ## Key Details",

    "markdown": "---\ntitle: \"iRIO\"\ntype: entity\ntags: [device, monitoring, remote-terminal, wind-power]\nsources: [wind-energy-solutions-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[iRIO]] 是 [[施耐德电气]] 风能解决方案资料中用于风机监控的智能终端对象。它更像风机侧或站端的轻量监测采集节点，用于接入开关状态、告警和环境量，并通过 Web、无线或消息方式输出告警和状态。\n\n## Key Details\n- 资料将其写成“风力发电机组监控 iRIO智能终端”。\n- 监测对象包括中压、低压开关状态信号、柜门信号、告警信号和温湿度。\n- 能力口径包括可接 `16` 个 `DI/DO`、`16` 个 `AI`。\n- 内置 Web 服务器，支持多种 Internet 协议和通信规约。\n- 支持无线传输，并可通过 email、SMS 发送报警信息。\n\n## Related\n- [[施耐德电气]]\n- [[PLSCADA]]\n- [[数字化中压运维]]\n",

    "markdown": "---\ntitle: \"Link150\"\ntype: entity\ntags: [device, gateway, networking]\nsources: [3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[Link150]] 是文档方案链路中的智能网关组件，用于把 [[ZBRN32]] 等前端采集单元连接到更高层的显示或云端系统。它体现了 [[SmartHVX]] 方案不仅有传感器和断路器，还有完整的接入网络。\n\n## Key Details\n- 文档中它被放在 ZBRN32 数据接收器之后。\n- 它服务于本地服务器、云端显示与运维系统的接入链路。\n\n## Related\n- [[SmartHVX]]\n- [[ZBRN32]]\n- [[千里眼]]\n",

    "markdown": "---\ntitle: \"MVnex\"\ntype: entity\ntags: [product, metal-clad-switchgear, medium-voltage, air-insulated]\nsources: [mvnex-12kv-air-insulated-switchgear-catalog-2017, mvnex-medium-voltage-metal-clad-switchgear, pix-50ka-catalogue-en]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[MVnex]] 是施耐德电气的中压 [[金属铠装开关设备]] 产品族，资料将其定义为应用于高压/中压和中压/中压变电站中压部分的户内式金属封闭开关设备。它属于 `12kV` [[空气绝缘开关设备]]、移开式/中置式开关柜路线，与 `17.5kV/50kA` [[PIX]]、`40.5kV` [[DNF7]]、`SF6` 绝缘 [[GMA]] 和干燥空气绝缘 [[GMAirSeT]] 并列构成当前 wiki 的开关柜产品图谱。当前来源已经形成 `2017.05` 中国正式目录与 `2019.08.16` 样本层的两层资料链：前者更偏产品参数、柜型方案和土建安装，后者更偏产品族概览与样本化表达。\n\n## Key Details\n- 产品族包括 MVnex 标准产品、MVnex 550 紧凑型、MVnex 500 超紧凑型和 Smart MVnex 智能型。\n- 标准产品参数可达 12kV、4000A、40kA，柜宽包括 650mm、800mm 和 1000mm。\n- MVnex 550 柜宽为 550mm，最高参数为 12kV、1250A、31.5kA。\n- MVnex 500 柜宽为 500mm，最高参数为 12kV、1250A、31.5kA，主回路固定连接，支持靠墙安装。\n- 标准型由低压室、断路器室、母线室和电缆室四个独立隔室组成，外壳防护等级为 IP4X，隔室间为 IP2X。\n- 标准型使用 [[HVX]] 固封式真空断路器，接触器柜可使用 CVX 接触器。\n- `MVnex 12kV Air-Insulated Switchgear Catalog 2017` 说明到 `2017` 时，MVnex 已有 `ECATA944` 口径的中国正式目录：不仅系统化给出标准型、`550`、`500` 和 `Smart` 四个分支，还补入 `2016` 财年施耐德中国公司口径、详细一次方案、基础框架和配电室布置页。\n- Smart MVnex 提供温度在线监测、弧光在线检测、主动运维智能单元和千里眼云平台/移动运维。\n\n## Related\n- [[施耐德电气]]\n- [[金属铠装开关设备]]\n- [[空气绝缘开关设备]]\n- [[金属封闭开关设备]]\n- [[PIX]]\n- [[HVX]]\n- [[内部电弧防护]]\n- [[数字化中压运维]]\n- [[局部放电监测]]\n- [[千里眼]]\n",
    "preview": "## Summary [[MVnex]] 是施耐德电气的中压 [[金属铠装开关设备]] 产品族，资料将其定义为应用于高压/中压和中压/中压变电站中压部分的户内式金属封闭开关设备。它属于 `12kV` [[空气绝缘开关设备]]、移开式/中置式开关柜路线，与 `17.5kV/50kA` [[PIX]]、`40.5kV` [[DNF7]]、`SF6` 绝缘 [[GMA]] 和干燥空气绝缘 [[GMAirSeT]] 并列构成当前 wiki 的开",

    "id": "entities/PIX",
    "label": "PIX",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\PIX.md",
    "markdown": "---\ntitle: \"PIX\"\ntype: entity\ntags: [product, switchgear, air-insulated, medium-voltage]\nsources: [pix-50ka-catalogue-en, pix-12kv-24kv-air-insulated-switchgear-catalog-2016, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[PIX]] 是施耐德电气的高性能中压 [[空气绝缘开关设备]] 和铠装移开式户内交流 [[金属封闭开关设备]]。英文目录将其描述为 `17.5kV`、`50kA`、`4000A`、带 [[HVX]] embedded pole 的空气绝缘开关柜；中文资料则已经形成 `2016 -> 2019 -> V8` 的目录链，覆盖 `PIX-12kV`、`PIX-24kV`、`PIX-M` 接触器柜、`PIX-Gen` 发电机出口断路器柜、[[PIX550]]、[[PIX500]] 和 [[SmartPIX]]，逐步补齐中国市场的型号、一次方案、安装订货、认证和数字化口径。\n\n## Key Details\n- 产品定位面向公共和工业中压配电，应用包括重工业、油气、采矿/矿物/金属、发电和船舶。\n- 技术参数覆盖 12kV 和 17.5kV，额定短路开断电流 50kA，额定短路持续时间 3s，最大母线额定电流 4000A。\n- 中文目录显示 PIX-12kV 覆盖 7.2kV/12kV，额定电流 630A~4000A；PIX-Gen 可达 5000A/6300A 和 63kA。\n- `PIX 12kV 24kV Air-Insulated Switchgear Catalog 2016` 说明到 `2016` 时，施耐德中国市场已经有 `SCDOC1842` 口径的正式目录：它完整覆盖 `12/24kV`、`PIX-M`、`PIX-Gen`、应用实例和基础安装页，并保留 `2014` 财年公司介绍与更早市场口径。\n- PIX-24kV 额定电流 630A~4000A，额定短路开断电流 20kA~40kA，额定短路峰值耐受电流最高 100kA。\n- V8 目录把主参数表扩展为 7.2/12/24kV：7.2/12kV 内部电弧等级为 AFLR 50kA/1s，24kV 为 AFLR 40kA/1s。\n- V8 目录补充 Green Premium、PCCC 产品认证和中国质量认证中心产品碳足迹认证，并把 PIX 定位为数字化中压配电产品。\n- 柜体高压部分由母线室、电缆室和开关设备室组成，采用 PM 级金属隔板，并符合 LSC2B-PM。\n- 中文目录把柜体描述为断路器室、母线隔室、电缆隔室和继电器仪表隔室四个独立功能隔室，各隔室间防护等级达到 IP2X。\n- 功能单元包括 F 馈线/进线、BS 母线分段、BR 母线提升、BME 母线计量与接地，以及 FC 接触器馈线。\n- 中文目录的一次方案代号还覆盖 D 隔离柜、M 专用计量柜、P 电压测量柜、T 站用变压器柜和 S 避雷器柜等。\n- [[内部电弧防护]] 口径为 IAC AFLR 50kA/1s，并可通过 VAMP 或 Easergy P3/P5 集成弧光传感器实现主动弧光保护。\n- 数字化能力包括 Easergy TH110 温度监测、Easergy CL110 环境监测、Substation Monitoring Device、HMI、SCADA/Services 远程连接、云端应用和移动报警。\n- 中文目录中的主要部件包括 [[HVX]] 真空断路器、VAH 高容量户内真空断路器、CVX 真空接触器-熔断器组合电器、ESW 接地开关和 MiCOM 综合继电保护装置。\n- PIX550 是 PIX 旗下尺寸最小的 12kV 中置式金属封闭开关设备，柜宽 550mm，额定电流 ≤1250A，短时耐受/开断能力 ≤31.5kA。\n- PIX500 是 PIX 产品家族的 500mm 小型化分支，采用固定联接主回路、HVX 固封式断路器和三工位开关，额定电流 ≤1250A，短时耐受/开断能力 ≤31.5kA。\n- `2026-06-09` 补入的 `PIX500铠装式金属封闭开关设备_中文样本.pdf` 是现有 PIX500 来源页的正确命名同版副本，元数据日期为 `2016-11-23`，说明此前文件名误写为 `PIX550` 的副本不会改变 `PIX500` 分支的归档判断。\n- Smart PIX 是 PIX 的智能化解决方案，能力包括 PMB/PMB Easy、无线测温、断路器特性监测、配柜监测、一键顺控、局放在线监测、剩余电寿命、视频监测、弧光保护和环境温湿度监测。\n\n## Related\n- [[施耐德电气]]\n- [[PIX500]]\n- [[PIX550]]\n- [[SmartPIX]]\n- [[空气绝缘开关设备]]\n- [[金属铠装开关设备]]\n- [[金属封闭开关设备]]\n- [[HVX]]\n- [[内部电弧防护]]\n- [[温度智能监测]]\n- [[数字化中压运维]]\n- [[EcoStruxure]]\n",
    "preview": "## Summary [[PIX]] 是施耐德电气的高性能中压 [[空气绝缘开关设备]] 和铠装移开式户内交流 [[金属封闭开关设备]]。英文目录将其描述为 `17.5kV`、`50kA`、`4000A`、带 [[HVX]] embedded pole 的空气绝缘开关柜；中文资料则已经形成 `2016 -> 2019 -> V8` 的目录链，覆盖 `PIX-12kV`、`PIX-24kV`、`PIX-M` 接触器柜、`PIX-Gen` ",

    "path": "wiki\\entities\\PIX500.md",
    "markdown": "---\ntitle: \"PIX500\"\ntype: entity\ntags: [product, compact-switchgear, armored, air-insulated]\nsources: [pix500-catalogue-armored-metal-enclosed-switchgear]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[PIX500]] 是 [[PIX]] 产品家族的 500mm 小型化 [[空气绝缘开关设备]]，正文资料将其称为“最新加入 PIX 产品家族的尺寸最小的空气绝缘中压成套开关设备”。它与 [[PIX550]] 同属小型化分支，但采用固定联接主回路、[[HVX]] 固封式断路器和三工位开关，面向 12kV 三相交流单母线及单母线分段系统。\n\n## Key Details\n- 柜宽 500mm，高 2250mm，深 1400mm，重量约 400kg~700kg；后背电缆进出线时深度可增加到 1600mm。\n- 开关柜参数为 12kV、50Hz、额定电流 ≤1250A、额定短时耐受电流 ≤31.5kA/4s、额定峰值耐受电流 ≤80kA。\n- HVX 断路器参数为 12kV、额定电流 ≤1250A、额定短路开断电流 ≤31.5kA，机械寿命 30000 次。\n- 柜体分为仪表室、母线室和电缆室三个独立隔室，隔室间防护等级 IP2X。\n- 主回路采用固定联接，三工位开关位于断路器上部，具备工作、隔离和接地位置，状态可在柜前观察。\n- 母线室和电缆室上方设泄压装置，用于内部故障电弧时释放压力和气体。\n- 柜前仅需 1m 维护通道，目录宣称可减少 30% 配电室土建成本。\n- `2026-06-09` 补入的正确命名中文样本副本把这条资料链进一步坐实为 `PIX500` 而非 `PIX550`，并补强了 `2016-11-23` 元数据日期以及 `2015` 财年公司介绍口径。\n\n## Related\n- [[PIX]]\n- [[PIX550]]\n- [[HVX]]\n- [[施耐德电气]]\n- [[空气绝缘开关设备]]\n- [[金属封闭开关设备]]\n- [[金属铠装开关设备]]\n- [[内部电弧防护]]\n",

    "markdown": "---\ntitle: \"PIX550\"\ntype: entity\ntags: [product, compact-switchgear, metal-enclosed, air-insulated]\nsources: [pix550-catalogue]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[PIX550]] 是 [[PIX]] 产品族中的小型化 12kV 中置式 [[金属封闭开关设备]]，目录称其为 PIX 旗下尺寸最小的成套配电设备。它通过 550mm 柜宽、柜前维护选项、靠墙/背靠背/面对面安装能力和 [[HVX]] 固封式真空断路器手车，服务商业及工业建筑、房地产、数据中心等有小型化需求的变电场所。\n\n## Key Details\n- 适用于 12kV 三相交流 50Hz 单母线及单母线分段系统。\n- 外形尺寸为 550mm 宽、2250mm 高、1400mm 深，重量约 400kg~700kg。\n- 开关柜参数为 12kV、50Hz、额定电流 ≤1250A、额定短时耐受电流 ≤31.5kA/4s。\n- HVX 断路器参数为 12kV、1250A、额定短路开断电流 ≤31.5kA、额定短路电流持续时间 4s、机械寿命 30000 次。\n- 柜体包含仪表室、断路器室、母线室和电缆室四个隔室；除仪表室外，其他三个高压室均有泄压通道。\n- 五防联锁覆盖防止带负荷推拉手车、防止误分误合断路器、防止接地开关闭合时关合断路器、防止误入带电隔室和防止带电误合接地开关。\n- 柜体宽度为 550mm 时仅适用于 1250A、31.5kA 及以下参数，但可与其他参数和宽度的 [[PIX]] 直接拼柜。\n- 与 [[PIX500]] 相比，PIX550 保留中置式可抽出手车和四隔室结构；PIX500 则采用 500mm 柜宽、固定联接主回路和三工位开关。\n- `2026-06-09` 补入的 `PIX550.pdf` 与现有来源文件 `PIX550 catalogue.pdf` 为完全相同的重命名副本，进一步确认当前页面对应的是单一 `2016.09` 中文目录层，而不是新的 PIX550 版本。\n\n## Related\n- [[PIX]]\n- [[PIX500]]\n- [[HVX]]\n- [[施耐德电气]]\n- [[空气绝缘开关设备]]\n- [[金属封闭开关设备]]\n- [[金属铠装开关设备]]\n- [[内部电弧防护]]\n",

    "markdown": "---\ntitle: \"PLSCADA\"\ntype: entity\ntags: [software, scada, monitoring, wind-power]\nsources: [wind-energy-solutions-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[PLSCADA]] 是 [[施耐德电气]] 风能解决方案资料中用于中心变电站综合自动化和风场集中监控的软件对象。资料把它定位为对现场电气设备进行完整监测与控制、并可与其他系统接入集成的监控平台。\n\n## Key Details\n- 用途是对现场电气设备进行完整监测与控制，以提高系统可靠性和可用性。\n- 可接入其他系统和设备，形成完整全面的系统解决方案。\n- 资料强调其具备高可靠性、卓越时间响应、冗余架构和模块化可扩展能力。\n- 宣传口径包括“交钥匙”方案、仿真功能和设备预防性维护。\n- 在风场场景中，它承担远程控制、监视、事件顺序记录和电能质量分析的系统中心角色。\n\n## Related\n- [[施耐德电气]]\n- [[数字化中压运维]]\n- [[iRIO]]\n",

  {
    "id": "entities/PMBEasy",

    "path": "wiki\\entities\\PMBEasy.md",
    "markdown": "---\ntitle: \"PMB Easy\"\ntype: entity\ntags: [product, predictive-maintenance, edge-control]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, 3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page, pmb-easy-brochure, pmb-easy-johnson-v1, smart-hvx-product-pmb-introduction]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[PMBEasy]] 是施耐德为 [[SmartHVX]] 设计的主动运维智能单元，全称 Predictive Maintenance Box Easy。结合现有三份来源，它既是 Smart HVX 方案中的本地显示与边缘分析节点，也是一个有明确型号、屏幕尺寸、接口和安装要求的独立产品。\n\n## Key Details\n- 资料介绍了单柜版与全站版两种安装形态。\n- 单柜版安装在开关柜低压室门板上，提供 3.5 寸或 7 寸显示方案。\n- 全站版采用 10 寸多点触摸屏，一台主机最多可显示 40 台断路器。\n- 它与 [[主动运维]]、状态监测和本地/远程运维分析直接相关。\n- 第二份方案总览进一步强调，PMB Easy 在 Smart HVX 体系中承担“就地显示本柜或整个变电站设备信息”的角色，并与 [[BMM]] 等监测单元直接衔接。\n- PMB Easy 产品样本进一步说明，它支持标准测温型与智能型两种 Smart HVX 应用场景。\n- 文档给出了 3 个典型物料号：`HMISTU655`、`HMIGXU3512`、`HMIPSOH552D1801`，分别对应 3.5 英寸单机版、7 英寸单机版和 10.1 英寸全站版。\n- 设备统一采用 `24V` 直流供电，并提供 USB、串口、RS485、以太网等接口组合。\n- 样本建议将设备安装在可打开的柜门上，以便操作与后期维护。\n- 2019 年版本的演示稿与 PDF 样本在部署方式和功能边界上保持一致，可视为对现有 PMB Easy 知识的交叉印证。\n- Smart HVX & PMBox 演示稿再次确认 PMB Easy 单柜版/全站版边界，并把它与站室级 [[PMBox]] 区分开。\n\n## Related\n- [[SmartHVX]]\n- [[施耐德电气]]\n- [[EcoStruxure]]\n- [[主动运维]]\n- [[PMBox]]\n- [[BMM]]\n- [[千里眼]]\n- [[ZBRN32]]\n- [[Link150]]\n",
    "preview": "## Summary [[PMBEasy]] 是施耐德为 [[SmartHVX]] 设计的主动运维智能单元，全称 Predictive Maintenance Box Easy。结合现有三份来源，它既是 Smart HVX 方案中的本地显示与边缘分析节点，也是一个有明确型号、屏幕尺寸、接口和安装要求的独立产品。 ## Key Details",

  {
    "id": "entities/PMBox",
    "label": "PMBox",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\PMBox.md",
    "markdown": "---\ntitle: \"PMBox\"\ntype: entity\ntags: [product, edge-control, predictive-maintenance, asset-management]\nsources: [smart-hvx-product-pmb-introduction, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[PMBox]] 是施耐德在 [[EcoStruxure]] Power 架构下的边缘控制层产品，资料称其部署在配电现场，通过集成互联互通层设备信息进行数据建模与分析。相较于专门面向 [[SmartHVX]] 的 [[PMBEasy]]，PMBox 的范围更偏站室级资产管理、状态监测和预测性维护。\n\n## Key Details\n- 文档把 PMBox 称为“主动运维专家”，强调优化配电资产全生命周期管理。\n- 核心能力分为资产管理、状态监测和预测性维护三类。\n- 状态监测覆盖电气参量、设备状态参量、元件状态、环境温湿度、微机保护信息和历史数据追溯。\n- 预测性维护包括基于负载电流的温升算法、[[局部放电监测]]/分析、分合闸线圈、储能电气寿命预估和设备整体健康状态管理。\n- 界面能力包括首页关键运维信息视图、间隔分页、智能断路器分页和历史数据查询。\n- 应用架构中，PMBox 可通过 Ethernet、Modbus、hard wire 和 wireless 等方式接入智能网关、采集器、保护装置、局放监测、Smart HVX 与温湿度传感器。\n- DNF7 样本把 PMBox 放入 [[DNF7]] 智能化方案，作为面向中压智能配电和一线运维人员的主动运维专家。\n\n## Related\n- [[EcoStruxure]]\n- [[主动运维]]\n- [[数字化中压运维]]\n- [[DNF7]]\n- [[SmartHVX]]\n- [[PMBEasy]]\n- [[局部放电监测]]\n- [[Link150]]\n- [[ZBRN32]]\n- [[BMM]]\n",
    "preview": "## Summary [[PMBox]] 是施耐德在 [[EcoStruxure]] Power 架构下的边缘控制层产品，资料称其部署在配电现场，通过集成互联互通层设备信息进行数据建模与分析。相较于专门面向 [[SmartHVX]] 的 [[PMBEasy]]，PMBox 的范围更偏站室级资产管理、状态监测和预测性维护。 ## Key Details",
    "group": 1,

  {
    "id": "entities/Premset",
    "label": "Premset",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\Premset.md",
    "markdown": "---\ntitle: \"Premset\"\ntype: entity\ntags: [product, switchboard, solid-insulated, medium-voltage]\nsources: [premset-product-brochure-2012, premset-ip41-option-installation-instructions-2017, premset-12kv-compact-modular-vacuum-switchgear-catalog-2018, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[Premset]] 是 [[施耐德电气]] 的 `12kV` 紧凑型模块化真空开关设备产品线。现有 wiki 已覆盖其 `2012.06` 早期产品手册、`2017.12` `IP41` 安装说明、`2018.10` 中文产品目录和 `2020.06` 更新版产品目录，因此现在可以看到四层口径：`2012` 手册偏 [[屏蔽式固体绝缘]] 与智能电网卖点，`2017` 文件偏 `IP41` 与排气安装，`2018` 目录提供基础工程参数，`2020` 目录则把工程参数链延续到新的智能化配置与应用场景叙事。\n\n## Key Details\n- `2012.06` 的早期产品手册把 Premset 描述为中压配电新一代技术，强调它融合 `AIS` 与 `GIS` 开发经验形成 `2SIS`，并从智能电网、低维护、无 `SF6`、模块化和前置电缆联接角度进行宣传。\n- 该手册给出一组更简化的基础口径：`12kV`、母排电流 `630A`、短路开断 `25kA`、峰值 `65kA`、`75/85kV` `BIL`、`42/48kV` 工频耐受、外壳 `IP3X`，以及尺寸 `375 x 1600 x 900 mm (1000mm)`。\n- 手册还给出“占地面积减少 `50%`”“使用寿命增加 `30%`”“不使用加压气体”“全球运行中压功能单元超过 `4000000`”等早期市场口径。\n- `2018.10` 中文目录文档号为 `SCDOC1738`，封面标题为“屏蔽式全绝缘系统 / Premset 12 kV 紧凑型模块化真空开关设备”。\n- `2020.06` 中文目录文档号更新为 `SCDOC1783`，说明 Premset 在中文样本体系中已经进入新一版正式目录，而不是 `2018.10` 目录的简单改名副本。\n- Premset 的主要功能单元覆盖进线/馈线、母线分段、母线提升、线路保护、母线 `PT` 柜，以及计量和测量。\n- 典型柜型包括 `D06H`、`D12H`、`I06T`、`I12H`、`G06`、`G12`、`M06S`、`M06A`、`M12S`、`M12A`。\n- 基础额定参数为 `12kV`、`50/60Hz`、母线电流 `630A / 1250A`，绝缘等级包括 `42kV` 工频耐受和 `75kV` 雷电冲击耐受，隔离断口间更高。\n- 额定短时耐受电流和持续时间给出 `20kA x 4s`、`25kA x 3s`、`25kA x 4s`、`31.5kA x 4s`。\n- 断路器开断能力为 `E2` 级：`25kA 50次` 或 `31.5kA 30次`；断路器机械寿命 `10000次`，负荷开关 `10000次`，接地开关 `3000次`。\n- 目录强调具备 [[屏蔽式固体绝缘]] 的所有开关、断路器和计量单元标准宽度均为 `375mm`（`630A`），部分空气绝缘计量或进线计量单元为 `750mm` 宽。\n- 系统深度 `1135mm`，柜体本体高度 `1550mm`，电缆联接高度 `700mm`。\n- 内燃弧性能给出 `25kA x 1s A-FLR`，并说明存在底部泄压和顶部泄压两种布置。\n- 运行条件包括 `PM` 金属隔板、`LSC2A` 运行连续性、外壳 `IP3X`、隔室之间 `IP2X`、主回路和全部高压部件 `IP67`（`M06A` 除外）以及 `IK07`。\n- 环境适应性口径包括常规海拔至 `5000m`、运行温度 `-25℃ ~ +40℃`，以及“浸水后可连续服务 `48小时`（仅限固体绝缘柜型）”。\n- 联接系统强调 `2SIS` 屏蔽式固体绝缘母线和电缆接口、通用扁平联接系统，以及前下/后上/后下多方向布置。\n- 电缆测试章节说明可无需操作主开关或拆除电缆接头，直接从柜前执行主回路电缆测试，并通过专用接地排与五防联锁保证安全。\n- `2020.06` 目录沿用上述核心参数口径，但把数字化配置显著展开：引入 `Easergy T300`、`SMD`、`Easergy P3/P5`、`Sepam`、`VIP 400/410`、`Flair 22D/23DM`、`TH110-R`、`SC110/150/160`、`HU250`、`PS100/PS50`、`VPIS`、`VD23`、`EcoStruxure Power Device` 和 `eSetup Easergy Pro`。\n- `2020.06` 目录还更清楚地定义了柜型代码：`I` 为负荷开关柜，`D` 为断路器柜，`G` 为直连或提升柜，`M` 为计量柜；`06` 代表 `630A`，`12` 代表 `1250A`，`T` 代表 `CIT` 机构，`H` 代表 `OCO` 机构；`M` 柜末位 `A` 为空气绝缘、`S` 为固体绝缘。\n- 与 `2018.10` 相比，`2020.06` 目录补强了环境与安装边界：外壳 `IP4X` 和 `IP32~IP42` 可定制、防震 `IEC 62271-210 0.33g` / `ASCE 7-10` 等级口径、`IEC 60068-2-52` 严酷等级 5 盐雾口径，以及 `5000m` 海拔和固体绝缘柜型浸水后 `48小时` 连续服务说明。\n- 应用叙事也从 `2012` 的“智能电网就绪”进一步落到商业楼宇、工业、配电网络、中低压环网、中压分布式电源、水务、管廊、电网核心供电区域和海事 `DNV-GL` 认证场景。\n- 已入库的 `2017.12` `IP41 option` 安装说明补充了 `C` / `C-MAX` 柜型、`Bottom Exhaust / Top Exhaust` 四种配置、`IP41` 附件包、螺钉回收、安全要求和 `P7M18009` 操作手册引用。\n- 顶部排气版 `IP41` 安装件仅适用于 `Internal Arc outside the room version`。\n- `IP41` 安装说明本身存在版本标识差异：文件名含 `REV01`，封面/内页为 `Rev.00`，末页为 revision `01`。\n\n## Related\n- [[施耐德电气]]\n- [[屏蔽式固体绝缘]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n",
    "preview": "## Summary [[Premset]] 是 [[施耐德电气]] 的 `12kV` 紧凑型模块化真空开关设备产品线。现有 wiki 已覆盖其 `2012.06` 早期产品手册、`2017.12` `IP41` 安装说明、`2018.10` 中文产品目录和 `2020.06` 更新版产品目录，因此现在可以看到四层口径：`2012` 手册偏 [[屏蔽式固体绝缘]] 与智能电网卖点，`2017` 文件偏 `IP41` 与排气安装，`201",

    "markdown": "---\ntitle: \"RM6\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, gas-insulated, medium-voltage]\nsources: [rm6-o-cable-branch-box-brochure-2008, rm6-24kv-medium-voltage-distribution-catalog-2012, rm6-offer-presentation-life-is-on-201801update, rm6-sf6-insulated-ring-main-unit-and-compact-switchgear-catalog-2018, rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018, rm6-set-medium-voltage-switchgear-catalog-2022, rm6-set-medium-voltage-switchgear-catalog-2025, rm6-s-operation-maintenance-instructions-2021, rm-airset-eco-gas-insulated-ring-main-unit-2020]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[RM6]] 是 [[施耐德电气]] 的 `12~24kV` [[气体绝缘开关柜]] / 环网柜产品系列，面向中压二次配电场景。当前 wiki 中它已经形成从 `2008` [[RM6O]] 电缆分支箱折页、`2012` 英文正式目录、`2018.05` 中文演示稿、`2018.10` 中文正式目录、`2018.10` [[RM6S]] / [[RM6SPlus]] 子系列目录、`2021` [[RM6S]] 运维手册到 `2022.02`、`2025.02` [[RM6SeT]] 目录的连续资料链，同时还有与之并行但不互相替代的环保气体分支 [[RMAirSeT]]。\n\n## Key Details\n- `2008.12` 的 [[RM6O]] 折页说明 RM6 模块架构很早就被延伸到 `SF6` 绝缘 [[电缆分支箱]] 场景：支持一进二出、三出或更多出线、双电缆接入、`Flair 22D`、机械联锁和主母线扩展。\n- 这份 `RM6-O` 资料也补进了 RM6 路线更早的工程边界：不锈钢 `SF6` 金属封闭气室、额定压力 `1.2Bar`、设计寿命超过 `30` 年、带电部件免维护，以及后部/下部泄压的土建安装口径。\n- `2012` 英文正式目录已经把 RM6 明确写成 `RM6 24 kV Medium Voltage Distribution`，说明这条线在 `2018` 中文演示稿之前就已具备成熟的正式产品目录层。\n- 这份最早目录已经形成 `I / B / D / Q / IC / BC / O / Mt` 的功能体系，说明 RM6 早期正式口径与后续演示稿、SeT 目录之间存在可追踪的结构连续性。\n- `2012` 目录已把 `PM class`、断路器/负荷开关 `LSC2B`、熔断器组合 `LSC2A`、`A-FL up to 20 kA 1 s on request` 和可选 `AFLR 20 kA 1 s` 写入工程边界。\n- `Automatic transfer systems`、bus tie coupling、source changeover 和 `Easergy T200 I` 在 `2012` 目录中已正式出现，说明 RM6 的自动投切与远方控制能力早于 `2018` 中文演示稿。\n- `2012` 目录还已包含 `VPIS / VDS`、`Flair`、`VIP 40 / VIP 400`、`Fusarc CF`、motorization、key locking 与 `DNV` marine application，说明 RM6 早期就兼具保护、附件和特定场景应用口径。\n- 演示稿称 RM6 在全球 `50` 多个国家已有超过 `1,700,000` 个功能单元应用，并以“20 多年不断发展与调整”强调成熟度。\n- `2018.10` 中文正式目录把 RM6 进一步落成中国市场工程目录层：尾标为 `SCDOC1043-MV`，章节完整覆盖设备特性、附件、电网远程控制、中压电缆头、户外开关站、安装、订购表和方案页。\n- 这份 `2018.10` 目录把 `-40℃ ~ 40℃`、海拔 `≤1000m`、`SF6气室 IP67`、熔断器室 `IP67`、外壳 `IP4X`、`20℃下 SF6充气压力 0.2Bar`、年泄漏率 `0.01%/年` 和气室不锈钢板厚 `2mm` 写成正式工程边界。\n- 功能与柜型口径在 `2018.10` 目录中明确写为 `I / B / D / Q / IC / BC / O / Pt / Mt` 和 `NE / RE / LE / DE`，并通过订购表把 `12kV 20kA/4S`、`12kV 20kA/3S`、`12kV 25kA/1S`、`24kV 20kA/1S`、`24kV 20kA/3S` 等能力落到正式选型层。\n- 与 `2018.05` 演示稿不同，`2018.10` 中文正式目录中的 `ATS` 控制器明确写为 `T200 I`，并给出 `TR < 2 s`、`T1 0s~200s`、`T2 0s~30分钟` 以及自动/半自动模式；因此 `T200C` 更适合视作演示稿中的场景化表述，而非统一替代该目录口径。\n- `2018.10 / SCDOC1739` 的 `RM6-S/RM6-S Plus` 目录说明，RM6 路线在同一时期还存在一条更窄的 `12kV` 子系列：`RM6-S` 保持 `630A` 并通过侧部扩展，`RM6-S Plus` 则升级到 `1250A`、顶部扩展和 `CB / B / G / CBBr / M / PT` 功能体系。\n- 这份子系列目录还把 `RM6-S` 的 [[ALink]] 侧扩、`RM6-S Plus` 的顶部固体母线拼柜、`0.03 MPa @ 20℃`、`AFL 16/20/25/31.5kA 1s` 和远程控制 `0~4` 级正式写入工程口径，说明它不应简单并入通用 `RM6` 演示稿或后续 [[RM6SeT]] 目录。\n- 核心电气口径覆盖 `12kV` 与 `24kV`；`I/B/O` 功能单元额定电流 `630A`，`Q/D` 功能单元额定电流 `200A`。\n- 绝缘水平包括 `12kV` 对地工频 `42kV`、断口 `48kV`、冲击 `95/110kV`，以及 `24kV` 对地工频 `65kV`、断口 `79kV`、冲击 `125/145kV`。\n- 防护等级为 `IP4X`，短时耐受能力为 `12kV 20kA 4s`、`24kV 20kA 3s`，内部燃弧能力为 `20kA 1s`。\n- 文档把 RM6 描述为全绝缘、紧凑型方案，强调带电部件位于不锈钢 `SF6` 气箱内、可触摸、年泄漏率 `<0.01%`，并给出 `IPX7 20kV` 水下通电 `30` 分钟口径。\n- 功能单元体系包括 `I / IC` 负荷开关与联络开关、`B / BC / D` 断路器单元、`Q` 熔断器组合电器、`Mt` 中压计量和 `O` 电缆提升。\n- `B / BC / D` 断路器单元覆盖线路保护、母联和变压器馈线保护，强调自供电保护、远程控制和“两步从合闸位到接地位”的简化操作。\n- 保护继电器和保护装置路线包括 `VIP45`、`VIP400`、`VIP410` 和 `Sepam`，其中 `VIP410` 支持双电源供电、灵敏接地保护、`Modbus RS485` 通信和远程控制。\n- 柜型体系给出 `58` 种标准柜型，包含紧凑不可扩展、紧凑可扩展、左扩、右扩、双扩和 `2/3` 功能自由组合柜；资料称自由组合柜型配置数量可达 `600`。\n- 文档还单独列出针对轨道交通的不可扩展共箱方案 `NE-IQI+T`、`NE-QIQI+T`、`NE-IIQI+T` 和 `NE-IQIQI+T`。\n- 自动化与附件体系覆盖 `VD23` 电压检测、`VPIS/VDS`、`Flair 22D/23DV` 故障指示器、电流表、电操机构、程序锁、电缆室门连锁、电磁锁、压力开关和 `ATS` 双电源自动投切。\n- `ATS` 方案强调双重机械/电气联锁、手动优先、故障闭锁、`RS485` 与以太网通信，以及小于 `10s` 的自动投切目标。\n- `Smart RMU` 章节则把 RM6 延伸到 `Easergy T300`、低功耗电压/电流传感器、温湿度传感器、`TH110`、UHF 局放、`wifi`、`Webserver` 和移动运维。\n- `2022.02` 的 [[RM6SeT]] 目录把 RM6 路线进一步工程化：给出主回路 `40` 年寿命、`3mm 304` 不锈钢气箱、气箱 `IP67`、电缆室 `IP43`、`IK07`、`1~6` 功能共箱、`A-link` 扩展、`C/F/V/D/PT` 功能体系，以及 `Easergy P1`、`PD110`、`TH110-R`、`CL110`、`SMD` 和 `Easergy T300` 组成的数字化状态监测与自动化能力。\n- 相比 `2018` 演示稿，`RM6 SeT` 目录还明确了若干边界：`PT` 和 `M` 柜不能共箱，只能通过可扩展柜连接；内部电弧 `A FLR 20kA 1s` 为可选项；`V` 真空断路器可支持自动重合闸顺序 `O - 0.3s - CO - 3 min - CO`。\n- `2025.02` 的 [[RM6SeT]] 修订目录继续沿用 RM6 SeT 主结构和数字化栈，但把 `Cr / Vr / M` 模块显式写进目录，并在部分 `12kV` 参数表中补入 `25kA` 短时耐受、`63kA` 峰值耐受等更高能力选项。\n- [[RM6S]] 手册则从另一侧补充 RM6 路线的历史边界：对象是 `12kV` `SF6` 气体绝缘金属封闭开关设备，功能单元代号为 `OE / I / Q / B / IC`，并围绕 `Flair2XD`、`VPIS-V2`、`T200I`、`VD23`、电缆试验、`0.03 MPa @ 20℃` 充气压力和压力表绿色工作区给出操作维护要求。\n\n- `2020.07` 的 [[RMAirSeT]] 资料说明 RM 路线还存在一条环保气体分支：采用 `GWP < 1` 环保气体绝缘、真空灭弧和 `SVI` 并联真空开断，保留 `IP67` 气箱、`1~6` 功能单元自由组合、`NE/LE/RE/DE` 扩展与 `C/F/V/B` 功能体系。\n- 相比 [[RM6SeT]]，[[RMAirSeT]] 更像 `12kV`、`20kA`、环保气体 + 真空灭弧的平行 RMU 路线，而不是简单改名或完整替代；其数字化配置继续围绕 `Easergy T300`、`PMBOX`、`PD110`、`TH110-R`、`VT/LPVT` 和 `CT/LVCT` 展开。\n## Related\n- [[施耐德电气]]\n- [[RM6O]]\n- [[RM6S]]\n- [[RM6SPlus]]\n- [[RM6SeT]]\n- [[RMAirSeT]]\n- [[气体绝缘开关柜]]\n- [[电缆分支箱]]\n- [[自动投切]]\n- [[内部电弧防护]]\n- [[数字化中压运维]]\n- [[FBX]]\n",

    "markdown": "---\ntitle: \"RM6O\"\ntype: entity\ntags: [product, cable-branch-box, gas-insulated, medium-voltage]\nsources: [rm6-o-cable-branch-box-brochure-2008]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[RM6O]] 是 [[施耐德电气]] 基于 [[RM6]] 模块架构推出的 `3~24kV` `SF6` 绝缘 [[电缆分支箱]] 产品分支。当前知识库里，它由一份 `2008.12` 中文折页定义，重点不在完整环网柜方案，而在配网电缆分支、扩展馈线、双电缆接入和安装土建边界。\n\n## Key Details\n- 封面产品名称为 `RM6-O系列电缆分支箱`，尾标为 `SCDOC723-MV / 2008.12`。\n- 产品定位是以全绝缘、全密封方式替代配网架空线中的大量分支接线，在某些场合可替代环网柜。\n- 额定参数覆盖 `12kV` 与 `24kV`，额定电流 `630A`。\n- `12kV` 口径给出 `20/25kA` 开断与 `25kA` 短时耐受，`24kV` 口径给出 `20kA` 开断与 `20kA` 短时耐受。\n- 结构采用 `1~4` 个集成紧凑功能单元和 `1` 个不锈钢 `SF6` 金属封闭气室，气室额定压力 `1.2Bar`。\n- 资料写明运行设计寿命超过 `30` 年，带电部件免维护，满足 `sealed pressure system` 口径。\n- 配置支持一进二出、三出或更多出线，且每路进出线均可接双电缆。\n- 每路进出线配置电压指示器，可选 `Flair 22D`，可选单孔或三孔底板。\n- 每路进线可选电动操作和辅助接点，预留配网自动化接口。\n- 可通过主母线扩展附件扩展出线，但扩展后主母线额定电流不能超过 `630A`。\n\n## Related\n- [[RM6]]\n- [[电缆分支箱]]\n- [[施耐德电气]]\n",
    "preview": "## Summary [[RM6O]] 是 [[施耐德电气]] 基于 [[RM6]] 模块架构推出的 `3~24kV` `SF6` 绝缘 [[电缆分支箱]] 产品分支。当前知识库里，它由一份 `2008.12` 中文折页定义，重点不在完整环网柜方案，而在配网电缆分支、扩展馈线、双电缆接入和安装土建边界。 ## Key Details",

  {

    "markdown": "---\ntitle: \"RM6-S\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, gas-insulated, medium-voltage]\nsources: [rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018, rm6-s-operation-maintenance-instructions-2021]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[RM6S]] 是 [[施耐德电气]] `RM6` 路线中的一个更早、且更偏 `12kV` 的 [[气体绝缘开关柜]] / 环网柜对象。当前 wiki 中它已经形成 `2018.10` 正式目录与 `2021` 操作维护手册两层资料链：前者补入 `630A` 级产品目录、侧部扩展和 `ALink`，后者补入 `OE / I / Q / B / IC` 功能单元操作、[[机械联锁]]、`Flair2XD`、`VPIS-V2`、`T200I`、`VD23`、电缆试验和 `SF6` 压力维护规则。\n\n## Key Details\n- `2018.10 / SCDOC1739` 目录把 `RM6-S/RM6-S Plus` 写成正式产品族，其中 `RM6-S` 保持 `630A` 级别，并通过侧部扩展实现不同柜子之间的拼接。\n- 同一目录说明两台 `RM6-S` 开关柜之间的母线连接由特有 [[ALink]] 装置实现，扩展安装时无需现场气体处理，但需要预留大于 `450mm` 的额外安装空间。\n- 目录中的 `RM6-S` 功能体系集中在 `I / Q / B / O / IC / B/CB / M`，并保留 `O - 0.3s - CO - 180s - CO` 这组快速自动重合闸操作顺序。\n- 封面把 RM6-S 定义为 `12kV SF6 Gas-Insulated Switchboards`。\n- 文档代码体系包括 `SAS0.463.171-00`、`AMTNoT132-02` 和侧边 `2021/2` 修订标记，同时保留 `2010` 版权年份，说明它是沿用较早平台的后续维护版手册。\n- 操作说明书围绕 `OE / I / Q / B / IC` 五类功能单元展开，是 RM6 较早的一套功能代号体系。\n- 手册把机械联锁、电动操作、可视接地和电缆试验中的联锁解除边界写得很具体，说明 RM6-S 的运行安全很依赖标准化操作流程。\n- `Flair 21D / 22D / 23DV` 被作为故障电流指示模块写入手册；其中 `22D / 23DV` 可接入 `VPIS-V2` 输出并需要 `24Vdc~48Vdc` 外部供电。\n- `VPIS-V2` 章节说明其内置三相带电指示、符合 `IEC 61958`，但单独不能用来确认系统已经失电；核相器型号为 `V2-VPI62421`。\n- `VD23` 被定义为接收 `VPIS-V2` 输入的电压检测继电器，支持自动校准、过压/欠压和相序检测，并通过 `R1 / R2` 继电器逻辑工作。\n- `T200I` 章节说明 RM6-S 具备较明确的数字输入、数字输出和模拟输入测试边界，体现出较早期配网自动化/远方控制接口。\n- `SF6` 气箱在 `20℃` 时的相对充气压力为 `0.03 MPa`，正常寿命期内无需补气；只有压力表指针位于绿色区域时才能操作负荷开关。\n- 退役示例 `RM6-S-NE I-I-Q (12kV - 630A)` 给出总重 `310.392 kg`，其中 `SF6 2.450 kg / 0.79%`，说明手册还覆盖寿命期末回收边界。\n\n## Related\n- [[施耐德电气]]\n- [[RM6]]\n- [[RM6SPlus]]\n- [[RM6SeT]]\n- [[ALink]]\n- [[气体绝缘开关柜]]\n- [[机械联锁]]\n- [[数字化中压运维]]\n",

    "group": 0,

  {

    "path": "wiki\\entities\\RM6SeT.md",
    "markdown": "---\ntitle: \"RM6 SeT\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, gas-insulated, medium-voltage]\nsources: [rm6-set-medium-voltage-switchgear-catalog-2022, rm6-set-medium-voltage-switchgear-catalog-2025]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[RM6SeT]] 是 [[施耐德电气]] `SeT` 系列中的 `24kV` 及以下 [[气体绝缘开关柜]] / 环网柜产品线，面向中压二次配电场景。当前 wiki 中它已经形成 `2022.02 -> 2025.02` 的正式目录版本链：两版都体现出相对早期 [[RM6]] 更工程化的一代口径，包括主回路 `40` 年寿命、`3mm 304` 不锈钢气箱、`1~6` 功能共箱、[[ALink]] 扩展、`Easergy P1` 保护，以及围绕 [[EcoStruxure]] 的完整数字化方案；而 `2025.02` 版又进一步把 `Cr / Vr / M` 模块和部分 `12kV 25kA / 63kA` 能力口径写得更明确。\n\n## Key Details\n- RM6 SeT 产品目录将其定义为 `24kV` 及以下气体绝缘开关设备，并强调“鲁棒性设计、全能型架构、数字化”。\n- 主回路寿命期口径为 `40` 年以上，寿命期内免维护、无需补气，气箱采用 `3mm 304` 不锈钢。\n- 基础绝缘与电流参数覆盖 `12kV / 24kV`、母线 `630A`、短时耐受 `20kA`、峰值耐受 `50kA`。\n- 防护等级更完整：气箱 `IP67`，电缆室 `IP43`，机构室与低压间 `IP4X`，隔室间 `IP2X`，机械冲击等级 `IK07`。\n- 功能体系覆盖 `C` 负荷开关、`F` 负荷开关-熔断器组合电器、`V` 真空断路器、`D` 提升柜和 `PT` 辅助电源/母线电压测量柜。\n- `V` 功能真空断路器给出 `20kA` 开断能力、`M2 10000` 次机械寿命、`E2` 电寿命和自动重合闸顺序 `O - 0.3s - CO - 3 min - CO`。\n- `F` 功能组合电器给出 `31.5kA` 开断能力，并把变压器保护熔断器方案纳入正式选型口径。\n- 柜列支持 `1~6` 功能共箱，并支持 `NE / LE / RE / DE` 扩展方式；扩展通过 [[ALink]] 完成，无需气体处理。\n- `PT` 和 `M` 柜不能共箱、只能单元式，是 RM6 SeT 自由组合的明确边界。\n- 数字化能力覆盖 `Easergy T300`、`Easergy P1`、`VT/LPVT`、`CT/LVCT`、`TH110-R`、`PD110`、`CL110`、`PS100/PS50` 和 `SMD`。\n- 文档还把 RM6 SeT 放入双电源自动切换、闭环配电网、自动重合闸和移动运维场景中。\n- `2025.02` 修订目录延续了上述主骨架，但把 `Cr` 负荷开关母线柜、`Vr` 断路器母线柜和 `M` 计量柜更明确地纳入模块说明与参数页。\n- `2025.02` 的部分参数表新增 `20/25kA` 短时耐受与 `50/63kA` 峰值耐受组合，说明 RM6 SeT 在部分 `12kV` 柜型上补入了更高短路能力选项；`24kV` 侧仍保持 `20kA / 50kA` 主口径。\n\n## Related\n- [[施耐德电气]]\n- [[RM6]]\n- [[气体绝缘开关柜]]\n- [[ALink]]\n- [[自动投切]]\n- [[数字化中压运维]]\n- [[内部电弧防护]]\n- [[FBX]]\n",
    "preview": "## Summary [[RM6SeT]] 是 [[施耐德电气]] `SeT` 系列中的 `24kV` 及以下 [[气体绝缘开关柜]] / 环网柜产品线，面向中压二次配电场景。当前 wiki 中它已经形成 `2022.02 -> 2025.02` 的正式目录版本链：两版都体现出相对早期 [[RM6]] 更工程化的一代口径，包括主回路 `40` 年寿命、`3mm 304` 不锈钢气箱、`1~6` 功能共箱、[[ALink]] 扩展、`Ea",

  {

    "label": "RM6-S Plus",

    "color": "#2196F3",
    "path": "wiki\\entities\\RM6SPlus.md",
    "markdown": "---\ntitle: \"RM6-S Plus\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, gas-insulated, medium-voltage]\nsources: [rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[RM6SPlus]] 是 [[施耐德电气]] `RM6-S` 路线中的升级分支，定位为 `12kV` 二次配电用、`1250A` 顶部扩展的 [[气体绝缘开关柜]] / 环网柜对象。当前知识库里它主要来自一份 `2018.10` 正式目录：核心不是运维说明，而是 `CB / B / G / CBBr / M / PT` 功能体系、`1250A / 31.5kA` 进线与母联单元、顶部扩展和固体母线拼柜边界。\n\n## Key Details\n- 目录直接把 `RM6-S Plus` 定义为 `RM6-S` 的升级版：额定电流由 `630A` 提升到 `1250A`，柜间拼接由侧部扩展改为顶部扩展。\n- 主功能单元写为 `CB / B / G / CBBr / M / PT`。\n- `CB` 功能单元为 `1250A 31.5kA` 真空断路器进线/出线单元，额定操作顺序为 `O - 0.3s - CO - 180s - CO`。\n- `B` 功能单元为 `630A 25kA` 线路与变压器保护单元，支持快速自动重合闸顺序 `O - 0.3s - CO - 180s - CO`。\n- `CBBr` 功能单元为 `1250A` 断路器母联方案，三工位隔离开关和母线提升位于同一气箱内，并可与进线柜实现机械闭锁。\n- `G` 为 `1250A` 隔离柜，接地开关可选，并可与进线断路器柜闭锁，避免带负载开合隔离开关。\n- `PT` 功能单元带三工位隔离开关，可位于母线任何位置，包括边柜和中间柜。\n- 顶部拼柜可采用特定固体母线装置实现，不需要现场气体处理，也不需要为扩展额外预留安装空间。\n- 目录把 `Sepam40` 作为 `CB` 进线柜标准配置，把 `Sepam20` 作为 `B` 出线柜标准配置。\n\n## Related\n- [[施耐德电气]]\n- [[RM6]]\n- [[RM6S]]\n- [[气体绝缘开关柜]]\n- [[ALink]]\n",
    "preview": "## Summary [[RM6SPlus]] 是 [[施耐德电气]] `RM6-S` 路线中的升级分支，定位为 `12kV` 二次配电用、`1250A` 顶部扩展的 [[气体绝缘开关柜]] / 环网柜对象。当前知识库里它主要来自一份 `2018.10` 正式目录：核心不是运维说明，而是 `CB / B / G / CBBr / M / PT` 功能体系、`1250A / 31.5kA` 进线与母联单元、顶部扩展和固体母线拼柜边界。 #",

    "id": "entities/RMAirSeT",
    "label": "RM AirSeT",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\RMAirSeT.md",
    "markdown": "---\ntitle: \"RM AirSeT\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, gas-insulated, eco-gas, medium-voltage]\nsources: [rm-airset-eco-gas-insulated-ring-main-unit-2020]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[RMAirSeT]] 是 [[施耐德电气]] RM 路线中采用环保气体绝缘和真空灭弧的 `12kV` [[气体绝缘开关柜]] / 环网柜分支。当前资料更适合把它理解为与 [[RM6]] / [[RM6SeT]] 并行的环保气体 RMU 平台，而不是 [[GMAirSeT]] 那种一次配电平台，也不是 RM6 SeT 的简单改名版本。\n\n## Key Details\n- 封面核心卖点包括 `GWP < 1`、全生命周期碳足迹减低、不燃。\n- 结构上保留 RMU 典型组合逻辑：最多 `6` 个功能单元，自由组合，并以 `NE / LE / RE / DE` 表示不扩展、左扩展、右扩展和双扩展。\n- 功能单元写为 `C` 三工位负荷开关、`F` 负荷开关-熔断器组合电器、`V` 上隔离真空断路器、`B` 下隔离真空断路器，并提到 `PT`、计量柜和母联等扩展对象。\n- 文档把 `SVI` 并联真空开断技术作为关键差异点之一，说明环保气体路线并未放弃真空开断叙事。\n- 技术参数页给出 `12kV`、`20kA` 短路开断、`20kA / 4s` 短时耐受、`50kA` 峰值耐受、`A-FLR 20kA 1s` 和 `IP4X / IP67`。\n- 气体年泄漏率为 `≤0.025%`，额定充气压力为 `0.4 bar`。\n- 额定电流口径包括 `C` 单元 `630A`、`F` 单元 `125A`、`V/B` 单元 `630A`；`V/B` 机械寿命 `10000` 次，`C/F` 机械寿命 `5000` 次。\n- 外形尺寸以 `420mm x 850mm x 2000mm` 级单元柜为主，深度可选 `780mm`，部分一二次融合/PT 柜宽度为 `600mm`。\n- 使用环境边界为 `-25℃ ~ +40℃`、高湿度工况和常规海拔 `1000m`，更高海拔需咨询施耐德。\n- 数字化配置直接列出 `Easergy T300`、`HMI`、`PMBOX`、`PD110`、`TH110-R`、`VT/LPVT`、`CT/LVCT` 和 `Modbus`。\n- 文档强调实时感知、IT/OT 融合、资产预警和预测性资产管理，说明 [[RMAirSeT]] 不只是环保替代，也承担数字化运维入口角色。\n\n## Related\n- [[施耐德电气]]\n- [[RM6]]\n- [[RM6SeT]]\n- [[GMAirSeT]]\n- [[气体绝缘开关柜]]\n- [[数字化中压运维]]\n- [[内部电弧防护]]\n",

    "markdown": "---\ntitle: \"SC6\"\ntype: entity\ntags: [product, switch, component, medium-voltage, air-insulated, schneider-electric]\nsources: [sc6-medium-voltage-switch-component-catalog-2017]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[SC6]] 是施耐德在 `2017` 时点面向二次配电空气绝缘柜体集成场景提供的中压开关元件资料对象。现有来源显示，它不是完整柜体产品线，而是更早 [[AS12AS24]] 平台在中国市场上的单型号、`12kV` 收敛版目录，继续采用 `SF6` 开关本体并围绕 `SIC / SQC` 功能展开。\n\n## Key Details\n- 当前已入库目录的文件名写作“AS12中压开关 产品目录”，但正文封面真实题名为 `SC6`，尾页文件号为 `SCDOC1158-MV`，时间口径为 `2017.09`。\n- 产品定位延续了“空气绝缘开关柜的核心元件”这一边界，柜体仍由国内开关柜制造商完成。\n- 当前目录把口径收敛到 `12kV`、`630A`、`20kA/4s`、`50kA` 峰值耐受和 `50kA` 短路关合。\n- 功能类型集中为 `SIC` 和 `SQC`，不再像更早 [[AS12AS24]] 目录那样展开 `IS / QS / DS / CS / ES` 全套分支。\n- 绝缘与灭弧继续采用 `SF6 0.4 bar` 密闭压力系统，资料写年泄漏率 `<0.05%`。\n- 附件生态保留 `Fusarc CF`、`Easergy Amp 21D`、`Easergy Flair 22D`、`Talus 200I`、压力表和 `VPIS-V2` 等较早期配置。\n- 技术页仍出现“`AS12` 开关使用 `SF6` 气体作为绝缘和灭弧介质”的表述，因此更适合把 [[SC6]] 视为 [[AS12AS24]] 的后续收敛资料，而不是完全独立的新平台。\n\n## Related\n- [[施耐德电气]]\n- [[AS12AS24]]\n- [[空气绝缘开关设备]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[SC6]] 是施耐德在 `2017` 时点面向二次配电空气绝缘柜体集成场景提供的中压开关元件资料对象。现有来源显示，它不是完整柜体产品线，而是更早 [[AS12AS24]] 平台在中国市场上的单型号、`12kV` 收敛版目录，继续采用 `SF6` 开关本体并围绕 `SIC / SQC` 功能展开。 ## Key Details",

  {

    "markdown": "---\ntitle: \"SM6\"\ntype: entity\ntags: [product, switchgear, ring-main-unit, air-insulated, medium-voltage]\nsources: [sm6-air-insulated-switchgear-catalog-2012, sm6-24kv-medium-voltage-switchgear-catalog-2017, sm6-product-introduction-and-digital-content-2019, smd-and-sensors-for-sm6-training-v2]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[SM6]] 是 [[施耐德电气]] 在中压二次配电环网柜范围内的一条独立产品线。当前 wiki 中它已经形成 `2012` 英文正式目录、`2017` 中文 `24kV` 正式目录、`2018.10` `SMD` 培训稿与 `2019-03-27` 中文产品/数字化演示稿四层资料链：`2012` 目录把它写成最高 `36 kV` 的模块化空气绝缘开关柜，`2017` 目录把中国市场正式口径收敛到 `24 kV` 以下并补齐选型/订货与自动化方案，`2019` 资料则把市场叙事聚焦到 `7.2~24kV` 环网柜和 `Smart SM6`，而 `2018` 培训稿进一步补齐 `SMD / TH110 / CL110` 的实施层。因此更适合把它理解为“空气绝缘柜体 + `SF6` 开关隔室 + 数字化监测层”的边界型环网柜平台。\n\n## Key Details\n- `2012` 英文正式目录的封面题名为 `SM6 Modular units Air insulated switchgear up to 36 kV`，PDF 元数据日期为 `2012-07-10`，说明 [[SM6]] 至少存在一个更早、更正式的最高 `36 kV` 目录口径。\n- 这份目录把产品定义为采用 `SF6 or vacuum breaking technology` 的模块化柜型体系，并写有 `30 years life span`，同时声称全球安装超过 `1,100,000` 台 `SM6` 柜体。\n- 目录明确列出 `IM / IMC / IMB`、`PM`、`QM / QMC / QMB`、`CRM / CVM`、`DM1 / DM2`、`DMV / DMVL`、`CM / CM2`、`GBC-A / GBC-B`、`NSM`、`GIM / GEM / GBM / GAM / TM / SM` 等完整功能单元谱系。\n- `2012` 目录还给出更清晰的结构与安全口径：`PI` 绝缘隔板、`LSC2A`、`IP3X`、`VPIS`、前方闭门操作、联锁、`anti-reflex` 手柄，以及 `24 kV` 的 `A-FL / A-FLR` 与 `36 kV` 的 `A-FL` 内部电弧等级。\n- 这份正式目录再次确认了 SM6 的关键边界：虽然封面写的是空气绝缘开关柜，但 active parts integrated in an `SF6-filled, sealed for life` unit，因此不应把它写成纯无气体绝缘路线。\n- `2017` 中文 `24kV` 正式目录号为 `SCDOC064-MV`，封面写作“中压开关柜 SM6 悉心守护 享受无忧 6～24kV 产品目录”，把中国市场正式口径落到 `24 kV` 以下的二次变电站和工矿配电站应用。\n- 这份目录在柜型上补齐 `IM / IMC / IMB / IMP / QM / QMC / CRM / DM1-A / DM1-D / DM1-S / DMV / CM / CM2 / GBC-A / GBC-B / NSM-C / GBM / GAM2 / TM` 等中文工程命名，并给出 `375-750 mm` 宽、`1600 mm` 高、`1030 mm` 深、前接线和 `IP4X` 的实际安装口径。\n- `2017` 目录给出 `7.2 / 12 / 24 kV`、`630 / 1250 A`、`20 kA / 4s` 或 `25 kA / 1s`、`LSC2A`、`PI`、`IAC A-FLR 20 kA / 1s` 等正式中文参数，并把 `QM/QMC`、`DM1-A/DM1-D` 的 `12 kV 25 kA / 24 kV 20 kA` 分断能力写得更具体。\n- 它还补上较早期自动化和监测层：`Sepam 20/40/80`、`VIP`、`Easergy T200 S`、`Flair 22D`、`Amp 21D` 和双电源自动转换设备，说明 `Smart SM6` 之前 SM6 已有一套更传统的配网自动化口径。\n- 已入库资料是一份 `20` 页中文演示稿，封面口径为 `SM6 7.2~24kV 空气绝缘环网柜`。\n- 环网柜分类页把 `SM6`、`RM6/FBX` 和 [[Premset]] 并列，说明施耐德在二次配电环网柜上至少同时保留空气绝缘、气体绝缘和固体绝缘三条不同叙事路线。\n- 文档前半部分先用“金属封闭开关设备”页面解释防护、绝缘、载流、控制、隔离、保护、计量和监测功能，再把 SM6 放回中压二次配电网络语境。\n- 进出线柜页给出 `IM 375`、`IM 500`、`NSM-C 1000` 和 `IMC 500` 等柜型线索，服务于双馈线、主进线带备用线或发电机场景。\n- 负荷/隔离开关柜页说明开关间隔内装三工位负荷开关，且“充有六氟化硫（SF6）气体为绝缘介质”；母线间隔可左右扩展，操作机构间隔可选电动操作机构，电缆间隔为正面连接。\n- 续页把该路线的结构卖点写成三位置设计、天然联锁、位置显示、传动机构直接可靠、`1.4 bar` 气包和 `0.01%` 泄漏率。\n- 保护柜页给出 `QM375/500`、`QMC625`、`DM1-A750` 等柜型，并把保护对象分为 `SF1 / SFset` 断路器、`SF6` 灭弧和负荷开关熔断器组合电器。\n- 断路器柜页同样强调开关间隔充 `SF6` 且符合密闭压力系统标准，可安装 `SFset / SF1` 断路器。\n- 两种断路器对比页给出清晰分工：`SF1` 配 `Sepam` 综合保护、标准电流互感器、需要辅助电源，适用 `630A` 和 `1250A`；`SFset` 为真空断路器型，配专用传感元件和 `VIP400` 电子继电器，不需要辅助电源，适用 `630A`。\n- 测量柜页列出 `CM2500`、`GBC-B750`、`GBC-A750`；专用柜页列出 `GAM23750`、`IMB 375`、`GBM 375`、`DM1-D 750` 等特殊用途柜型。\n- `Smart SM6` 是这份资料的另一半核心价值：它把 `Easergy T300`、`SCADA / DMS`、`101/104`、Local HMI 和现场传感器接到同一配网监控架构。\n- 监测对象重点落在主母排搭接点与电缆搭接处温升、电缆室局放，以及母线室/电缆室环境温湿度；对应器件分别写成 `TH110 / TH110-R / TH110-S`、`PD110` 和 `CL110`。\n- `SMD and Sensors for SM6 training v2` 则把 `Smart SM6` 从“监测对象列表”推进到“实施与版本层”：`SMD` 架构可接 `zigbee / PT100 / DI / relays`，输出到 Local HMI、Nearby HMI、`Modbus TCP`、`Facility Expert` 告警链路和 `Facility Hero` 移动告警。\n- 同一培训稿还补出 `SMD V3 -> V4 -> V4.1 -> V5` 的版本链，以及 `Thermal Connect App`、`NFC tag`、batch pairing、`Easergy P3/P5` 兼容等部署信息，说明 SM6 路线的数字化叙事不只停留在传感器命名层。\n- 培训稿中的 `partial discharges sensor` 仅出现在 `2019` wireless sensors roadmap 中，因此当前更适合作为施耐德计划方向记录，而不是回写成当时 SM6 已正式具备的统一标配。\n- 因此，[[SM6]] 与 [[RM6]] / [[FBX]] 的差别不只是介质命名：RM6/FBX 更强调紧凑 `SF6` RMU 与目录化参数，而 SM6 的资料链更突出从 `36 kV` 模块化正式目录，到 `24 kV` 中文正式目录，再到中国市场柜型谱系和 `Smart SM6` 在线监测扩展的连续演进。\n\n## Related\n- [[施耐德电气]]\n- [[空气绝缘开关设备]]\n- [[数字化中压运维]]\n- [[温度智能监测]]\n- [[局部放电监测]]\n- [[SMD]]\n- [[RM6]]\n- [[FBX]]\n- [[Premset]]\n",
    "preview": "## Summary [[SM6]] 是 [[施耐德电气]] 在中压二次配电环网柜范围内的一条独立产品线。当前 wiki 中它已经形成 `2012` 英文正式目录、`2017` 中文 `24kV` 正式目录、`2018.10` `SMD` 培训稿与 `2019-03-27` 中文产品/数字化演示稿四层资料链：`2012` 目录把它写成最高 `36 kV` 的模块化空气绝缘开关柜，`2017` 目录把中国市场正式口径收敛到 `24 kV`",

    "id": "entities/SmartHVX",
    "label": "Smart HVX",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\SmartHVX.md",
    "markdown": "---\ntitle: \"Smart HVX\"\ntype: entity\ntags: [product, medium-voltage, smart-device]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, 3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page, smart-hvx-product-introduction-v3-4, smart-hvx-product-pmb-introduction, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[SmartHVX]] 是基于 [[HVX]] 真空断路器开发的智能中压断路器产品线。资料将其定义为通过物联网和传感器技术实现全面感知、状态监测和运维优化的中压设备。\n\n## Key Details\n- 产品分为基础测温型、标准测温型和智能型三种方案。\n- 三种方案都以 [[温度智能监测]] 为基础，并可选母排或电缆测温。\n- 智能型进一步增加 [[配柜智能监测]]、[[二次元件智能监测]] 和可选的 [[PMBEasy]] 单柜版本地显示。\n- 标准测温型和智能型支持与“千里眼”系统及 [[PMBEasy]] 对接。\n- 从方案拓扑看，Smart HVX 还依赖 [[ZBRN32]]、[[Link150]]、[[BMM]] 等接入或监测单元来完成本地与云端运维链路。\n- V3.4 产品介绍补充了销售价值口径：可靠性、运维效率和运维成本分别由监测预警、停电试验替代/支撑、以及 [[千里眼]] 远程运维来支撑。\n- 同一份 V3.4 材料中同时出现“可靠性提高 1 倍”和“可靠性高出 50%”两种口径，后续需要核对其统计基准。\n- Smart HVX & PMBox 演示稿把 Smart HVX 作为 [[PMBEasy]] 和 [[PMBox]] 可接入/可展示的智能断路器对象之一。\n- DNF7 样本把 Smart HVX 用于 [[DNF7]] 智能开关设备中的断路器特性在线监测，包括分合闸线圈、储能电机、分合闸时间和速度监测。\n\n## Related\n- [[HVX]]\n- [[DNF7]]\n- [[PMBEasy]]\n- [[PMBox]]\n- [[千里眼]]\n- [[ZBRN32]]\n- [[Link150]]\n- [[BMM]]\n- [[温度智能监测]]\n- [[测温技术对比]]\n- [[配柜智能监测]]\n- [[二次元件智能监测]]\n",
    "preview": "## Summary [[SmartHVX]] 是基于 [[HVX]] 真空断路器开发的智能中压断路器产品线。资料将其定义为通过物联网和传感器技术实现全面感知、状态监测和运维优化的中压设备。 ## Key Details",

  {
    "id": "entities/SmartPIX",
    "label": "SmartPIX",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\SmartPIX.md",
    "markdown": "---\ntitle: \"SmartPIX\"\ntype: entity\ntags: [product, smart-switchgear, digital-operations, medium-voltage]\nsources: [pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[SmartPIX]] 是 [[PIX]] 产品族在 V8 目录中呈现的智能化解决方案，把传统空气绝缘开关设备接入 [[EcoStruxure]] 架构与平台。它强调通过边缘控制、寿命评估、风险预警和千里眼资产顾问服务，实现中压开关柜的状态检修、预测性维护和资产健康诊断。\n\n## Key Details\n- 作为互联互通产品，Smart PIX 可接入 EcoStruxure 架构与平台。\n- 边缘控制层软硬件包含寿命评估、风险预警等功能。\n- 应用、分析与服务层通过施耐德千里眼资产顾问服务支撑电气资产全生命周期数据分析与健康诊断。\n- 能力清单包括 PMB/PMB Easy、嵌入式无线测温、断路器特性监测、配柜监测、断路器手车/接地开关电动操作、一键顺控、局放在线监测、剩余电寿命、视频在线监测、弧光保护和环境温湿度监测。\n- V8 目录把 Smart PIX 放在“数字化中压配电产品”的总体叙事中，目标是提升供电连续性、运维效率和数字体验。\n\n## Related\n- [[PIX]]\n- [[EcoStruxure]]\n- [[数字化中压运维]]\n- [[温度智能监测]]\n- [[PMBEasy]]\n- [[PMBox]]\n- [[千里眼]]\n- [[局部放电监测]]\n- [[内部电弧防护]]\n",
    "preview": "## Summary [[SmartPIX]] 是 [[PIX]] 产品族在 V8 目录中呈现的智能化解决方案，把传统空气绝缘开关设备接入 [[EcoStruxure]] 架构与平台。它强调通过边缘控制、寿命评估、风险预警和千里眼资产顾问服务，实现中压开关柜的状态检修、预测性维护和资产健康诊断。 ## Key Details",

  {
    "id": "entities/SMD",
    "label": "SMD",
    "type": "entity",
    "color": "#2196F3",
    "path": "wiki\\entities\\SMD.md",
    "markdown": "---\ntitle: \"SMD\"\ntype: entity\ntags: [product, monitoring, digitalization, substation]\nsources: [pix-50ka-catalogue-en, gha-nrjcat18789en-0318, fbx-catalogue-2020, sm6-product-introduction-and-digital-content-2019, smd-and-sensors-for-sm6-training-v2, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020, rm6-set-medium-voltage-switchgear-catalog-2022, rm6-set-medium-voltage-switchgear-catalog-2025]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[SMD]] 是施耐德资料中反复出现的站室级监测设备对象，全称 `Substation Monitoring Device`。在较早目录里它常以数字化选件名出现，而 `SMD and Sensors for SM6 training v2` 则把它展开为能接入 `TH110`、`CL110`、`PT100`、继电器和 `DI` 的监测/告警平台，并给出 `V3 -> V4 -> V4.1 -> V5` 的功能与实施路线。\n\n## Key Details\n- 培训稿明确把 `SMD` 写成 `Substation Monitoring Device`，并与 `TH110`、`CL110` 一起作为核心对象。\n- 架构页显示其输入可来自 `zigbee` 传感器、`PT100`、`DI` 和 relay 信息，输出面向 local lights、Local HMI、Nearby HMI、`Modbus TCP` 和 `Facility Expert` 的 `SMS` 告警链路。\n- `SMD V3` 的能力覆盖 thermal monitoring、environmental monitoring、dry transformer monitoring、CB monitoring、substation alarming、local and remote monitoring、nearby control。\n- 热监测对象包括 cable、busbar、CB、withdrawable connections 和 transformer connection；环境监测对象对应 `CL110`；干式变压器监测通过 `PT100`；断路器监测则借助 relay 信息。\n- 热算法页给出 `Standard Monitoring`、`Advanced Monitoring`、phase comparison、discrepancy monitoring 和基于实时负荷的 threshold 调整思路，说明 `SMD` 不只是数据转发器，也带有一定分析逻辑。\n- 远程告警页补出 `Facility Hero` mobile application、email/SMS alarm notification、`Scada` 和 service platform 接口，显示其定位处于本地监测与远方运维之间。\n- 配置流程区分 `Level 1.1` 与 `Level 1.2`：前者围绕 `Thermal Connect App`、`NFC tag`、`Android telephone` 和传感器位置定义；后者强调逐只配对、生成 local file 和在 SMD software 中建项目。\n- 版本链在线索上较完整：`V4` 标注 `November 2018`，新增 batch pairing、automatic channel generation、`Easergy P3/P5 compatibility` 和 new relay `Modbus mapping`；`V4.1` 标注 `January 2019`，新增模板化配置与柜位复制；`V5` 则作为 `end of April` roadmap 提到 oil transformer monitoring、ANSI adaptation、double busbar 和 double cubicle。\n- `partial discharges sensor` 只出现在 `Wireless sensors roadmap for 2019` 中，因此当前更适合作为规划线索记录，而不是默认写成 `SMD V3` 已成熟内建功能。\n- 在产品谱系上，`SMD` 不只服务 [[SM6]]：PIX、GHA、FBX、Premset、RM6 SeT 等资料都把它列入 [[EcoStruxure]] 或数字化中压运维扩展能力，说明它是施耐德跨多条中压产品线复用的监测平台对象。\n\n## Related\n- [[施耐德电气]]\n- [[数字化中压运维]]\n- [[温度智能监测]]\n- [[局部放电监测]]\n- [[SM6]]\n- [[FBX]]\n- [[GHA]]\n- [[Premset]]\n- [[RM6SeT]]\n- [[EcoStruxure]]\n",
    "preview": "## Summary [[SMD]] 是施耐德资料中反复出现的站室级监测设备对象，全称 `Substation Monitoring Device`。在较早目录里它常以数字化选件名出现，而 `SMD and Sensors for SM6 training v2` 则把它展开为能接入 `TH110`、`CL110`、`PT100`、继电器和 `DI` 的监测/告警平台，并给出 `V3 -> V4 -> V4.1 -> V5` 的功能与实",
