    "path": "wiki\\overview.md",
    "markdown": "---\ntitle: \"Overview\"\ntype: synthesis\ntags: []\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, 3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page, hvx-manual, pmb-easy-brochure, pmb-easy-johnson-v1, smart-hvx-product-introduction-v3-4, smart-hvx-product-pmb-introduction, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, gma-medium-voltage-primary-gas-insulated-switchgear-v1-5, gm-airset-medium-voltage-primary-gas-insulated-switchgear-v1-1, gma-air-c4c-digital-implement-20191204, gma-nrjed311328en-1017, mvnex-medium-voltage-metal-clad-switchgear, mvnex-12kv-air-insulated-switchgear-catalog-2017, pix-50ka-catalogue-en, pix-12kv-24kv-air-insulated-switchgear-catalog-2016, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, wsg-wig-smart-switchgear-2019, wsg-feature-highlights-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018, fbx-catalogue-2020, fbx-medium-voltage-switchgear-catalog-2018, fbx-medium-voltage-switchgear-catalog-2017, flusarc-40-5kv-sf6-insulated-medium-voltage-switchgear-catalog-2016, fox-medium-voltage-switchgear-core-unit-catalog-2016, premset-ip41-option-installation-instructions-2017, premset-12kv-compact-modular-vacuum-switchgear-catalog-2018, premset-product-brochure-2012, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020, rm6-o-cable-branch-box-brochure-2008, rm6-24kv-medium-voltage-distribution-catalog-2012, rm6-offer-presentation-life-is-on-201801update, rm6-sf6-insulated-ring-main-unit-and-compact-switchgear-catalog-2018, rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018, rm6-set-medium-voltage-switchgear-catalog-2022, rm6-set-medium-voltage-switchgear-catalog-2025, rm6-s-operation-maintenance-instructions-2021, rm-airset-eco-gas-insulated-ring-main-unit-2020, sm6-air-insulated-switchgear-catalog-2012, sm6-24kv-medium-voltage-switchgear-catalog-2017, sm6-product-introduction-and-digital-content-2019, smd-and-sensors-for-sm6-training-v2, trihal-series-resin-cast-dry-transformer-catalog, as12-as24-medium-voltage-switch-catalog, sc6-medium-voltage-switch-component-catalog-2017, dnf7-metal-clad-switchgear-technical-instruction-2010, dnf7-chinese-product-catalog-2011, dnf7-chinese-selection-manual-2017, dnf7-english-selection-manual-2017, gma-12kv-medium-voltage-gas-insulated-switchgear-catalog-2018, cas-36-ring-main-unit-catalog-2008, dvcas-wind-farm-secondary-distribution-switchgear-catalog-2007, wind-energy-solutions-2018]\nlast_updated: 2026-06-09\n---\n\n# Overview\n\n当前 wiki 的首个来源是 [[SmartHVX]] 产品样本，它把 [[施耐德电气]] 的中压断路器能力包装为一个面向 [[数字化中压运维]]、数字化配电和 [[主动运维]] 的解决方案。资料显示，[[HVX]] 是机械与电气基础平台，而 [[温度智能监测]]、[[配柜智能监测]]、[[二次元件智能监测]] 和 [[PMBEasy]] 则构成智能化增量价值。\n\n从产品组合上看，当前知识库已经有一个清晰结构：基础测温型解决就地温度可视化，标准测温型补上本地/远程接入能力，智能型进一步覆盖机械状态和二次元件健康。整体叙事依附于 [[EcoStruxure]] 架构，强调通过状态监测、边缘显示和趋势分析提升可靠性、运维效率与成本效益。\n\n第二份来源《方案总览》补充了更清楚的方案拓扑视图，明确了 [[ZBRN32]]、[[Link150]]、[[BMM]]、[[千里眼]] 与 [[PMBEasy]] 在 Smart HVX 体系中的位置。现在 wiki 对 Smart HVX 的理解已经从“单一产品能力说明”扩展到“带本地显示、云端显示和接入链路的整体运维方案”。\n\n第三份来源《HVX说明书》则把知识重心进一步下探到 [[HVX]] 平台本体，补充了额定电压等级、模块化型号、[[真空灭弧室]]、[[全固封极柱]]、二次装置、订货表和外形尺寸等工程信息。现在 wiki 既有 Smart HVX 的智能化方案视角，也开始具备 HVX 设备本体的选型与结构认知。\n\n第四份来源《PMB Easy样本》则把 [[PMBEasy]] 从“Smart HVX 方案里的一个模块”升级成了独立设备对象，补充了单机版/全站版定位、具体物料号、接口、电源、柜宽适配和安装开孔尺寸。现在 wiki 对 Smart HVX 体系的理解已经形成三层：[[HVX]] 设备平台层、[[PMBEasy]] 边缘运维层，以及以 [[千里眼]] 为代表的远程展示层。\n\n第五份来源《PMB Easy 演示稿》与 PMB Easy PDF 样本高度重合，更多起到交叉验证作用，确认了 PMB Easy 的功能边界、部署方式和安装建议，而没有引入明显相反信息。\n\n第六份来源《Smart HVX 产品介绍 V3.4》把前述知识重新组织成销售与应用叙事，补充了 [[测温技术对比]]、可靠性承诺、状态检修效率依据、[[千里眼]] 运维工时对比和典型配电房方案。它让 wiki 对 Smart HVX 的理解从“有哪些模块”进一步扩展到“这些模块如何支撑可靠性、效率和降本的商业论证”。\n\n第七份来源《Smart HVX & PMBox 介绍》进一步把 [[PMBEasy]] 与 [[PMBox]] 区分开：PMB Easy 更贴近 Smart HVX 的单柜/全站断路器显示和主动运维，PMBox 则是 [[EcoStruxure]] Power 边缘控制层的站室级产品，覆盖资产管理、状态监测、预测性维护、3D 站室视图、局部放电分析和历史数据查询。\n\n第八份来源《DNF7 户内交流金属封闭开关设备》把知识库从断路器和运维单元扩展到完整中压开关柜层。[[DNF7]] 是 40.5kV 户内交流 [[金属封闭开关设备]]，强调 LSC2B 运行连续性、PM 级金属隔板、IAC AFLR 31.5kA/1s [[内部电弧防护]]、[[HVX]] 真空断路器，以及接入 [[EcoStruxure]]、[[PMBox]]、[[PMBEasy]] 和千里眼资产顾问的智能化方案。\n\n第九份来源《GMA 中压一次气体绝缘开关柜 产品目录 V1.5》补充了另一条开关柜产品线：[[GMA]] 是 12/24kV 中压一次 [[气体绝缘开关柜]]，采用 SF6 密封气室、固体绝缘母线、模块化扩展和插接式快速安装。它与 DNF7 并列扩展了 wiki 的开关柜知识边界：DNF7 偏 40.5kV 空气绝缘，GMA 偏 12/24kV 气体绝缘紧凑方案。\n\n第十份来源《GM AirSeT 中压一次气体绝缘开关柜 产品目录 V1.1》进一步细化了气体绝缘路线的环保分支。[[GMAirSeT]] 与 GMA 在柜型结构和模块化方案上高度相似，但采用干燥空气/环保气体替代 SF6，面向碳达峰、碳中和和低 GWP 诉求，同时保留 IAC AFLR 31.5kA/1s、IP67 气室和现场无需气体操作等工程特征。\n\n第十一份来源《GMA Air C4C Digital Implement》不是新产品目录，而是数字化实施清单。它补充了 GMA Air / GM AirSeT 的具体监测对象：IED 保护与计量、断路器电气特性、[[气室监测]]、电缆侧温升、RFID/Zigbee、TH110/TH110-R/CL110/SD20 传感器线索，以及 [[局部放电监测]]。\n\n第十二份来源《GMA Gas-insulated Switchgear Catalog 2017》补充了英文国际版 GMA 目录视角，给出 up to 24kV、2500A、31.5kA 的更宽参数范围，并强调 450mm 宽馈线柜、IAC AFL 1s 标配/AFLR 可选、sealed pressure system、IoT/Smart Grid ready 和 [[EcoStruxure]] ready solutions。它与中文 GMA 目录在额定电流范围上存在版本/市场口径差异，后续选型时需要按具体目录版本确认。\n\n第十三份来源《MVnex 中压金属铠装开关柜》补充了 12kV 空气绝缘 [[金属铠装开关设备]] 路线。[[MVnex]] 产品族覆盖标准型、550 紧凑型、500 超紧凑型和 Smart MVnex 智能型：标准型可达 4000A、40kA，550/500 面向配电室小型化，Smart MVnex 则把 TH110、Easergy P3、VAMP、主动运维智能单元和 [[千里眼]] 组合成智能中压开关柜方案。\n\n第十四份来源《PIX 50kA Catalogue EN》进一步补强了 [[空气绝缘开关设备]] 路线。[[PIX]] 目录给出 17.5kV、50kA、4000A 和 [[HVX]] embedded pole 的高性能口径，采用 LSC2B-PM 隔室结构，内部电弧能力达到 IAC AFLR 50kA/1s，并把 Easergy P3/P5、VAMP、TH110、CL110、Substation Monitoring Device、HMI、SCADA/Services 和云端应用组合进 [[EcoStruxure]] ready 的数字化运维链路。它与 [[MVnex]] 不是冲突关系，而是同属空气绝缘/金属铠装方向下不同参数段和应用场景的产品分支。\n\n第十五份来源《PIX 户内交流金属封闭开关设备 产品目录》把 [[PIX]] 的中文市场口径补齐：PIX 被定义为铠装移开式户内交流 [[金属封闭开关设备]]，覆盖 PIX-12kV、PIX-24kV、PIX-M 接触器柜和 PIX-Gen 发电机出口断路器柜。中文目录显示，PIX-12kV 可覆盖 630A~4000A、20kA~50kA，PIX-Gen 可达 5000A/6300A 和 63kA；PIX-24kV 覆盖 630A~4000A、20kA~40kA。它还补充了四隔室结构、五防联锁、泄压通道、[[HVX]]、VAH、CVX、ESW、MiCOM、一次方案代号、订货资料和安装基础要求。与英文 PIX 目录相比，中文目录更像工程选型和订货安装手册，英文目录更偏国际版高性能/数字化宣传口径。\n\n第十六份来源《PIX550 中置式金属封闭开关设备 产品目录》把 [[PIX]] 产品族的小型化分支单独展开。[[PIX550]] 是 PIX 旗下尺寸最小的 12kV 中置式 [[金属封闭开关设备]]，柜宽 550mm，额定电流 ≤1250A，短时耐受/开断能力 ≤31.5kA，配装 [[HVX]] 固封式真空断路器手车。它的价值不在高短路电流，而在小型化、柜前维护、靠墙/背靠背/面对面安装和与其他 PIX 柜直接拼柜，适合商业及工业建筑、房地产、数据中心等配电空间敏感场景。\n\n第十七份来源《PIX 500 铠装式金属封闭开关设备 产品目录》需要特别注意文件名与正文不一致：最初入库副本的文件名含 PIX550，但正文真实标题是 [[PIX500]]。`2026-06-09` 又补入了一份正确命名的 `PIX500铠装式金属封闭开关设备_中文样本.pdf`，其 PDF 元数据日期为 `2016-11-23`，与此前副本同源，进一步坐实这条来源应稳定归档到 [[PIX500]] 而非 [[PIX550]]。PIX500 是 [[PIX]] 家族 500mm 柜宽的小型化 [[空气绝缘开关设备]]，同样面向 12kV、≤1250A、≤31.5kA，但与 [[PIX550]] 的中置式可抽出手车不同，PIX500 采用固定联接主回路、[[HVX]] 固封式断路器和三工位开关，三工位开关具备工作、隔离、接地位置并可在柜前观察。它的叙事更强调替代传统 XGN、减少 30% 配电室土建成本、柜前 1m 维护通道、无 SF6，以及适用于预装式变电站、有轨电车和基础设施场景。\n\n第十八份来源《PIX 户内交流金属封闭开关设备 产品目录 V8》是一个更接近当前产品族总览的修订版。它把 [[PIX]] 从早期 12/24kV 中文目录扩展为 7.2/12/24kV 综合口径，按 GB/T 3906-2020 和 IEC 62271-200:2021 给出参数表：7.2/12kV 内部电弧等级为 AFLR 50kA/1s，24kV 为 AFLR 40kA/1s；12kV 发电机出口断路器柜参数仍可到 6300A/63kA。V8 同时把绿色认证、Green Premium、PCCC、碳足迹、核电、海事、WMTS 电源切换和 [[SmartPIX]] 统一纳入 PIX 叙事。尤其是 Smart PIX 章节，把 PMB/PMB Easy、嵌入式无线测温、断路器特性监测、配柜监测、一键顺控、局放、剩余电寿命、视频、弧光和环境温湿度监测整合到 [[EcoStruxure]] 与千里眼资产顾问的数字化运维链路中。\n\n第十九份来源《WIG 高铁智能开关柜》把知识库从产品目录进一步拉到行业系统集成场景。[[WIG]] 资料围绕 [[数字化变电站]] 展开，强调 IEC 61850、过程层/间隔层/站控层、合并智能单元、保护测控装置、光交换机、网关、辅助监控后台和保护测控后台。其 [[智能监测显示终端]] 把一次回路模拟图、带电显示、断路器机械特性、储能电机、三工位电机、SF6 密度/温度、避雷器、开关柜温度和自动加热除湿控制集中显示，并通过 MODBUS 向监控网络提供遥测/遥信。该资料还明确了多厂家边界：[[成都交大运达]] 偏保护测控，[[常州帕斯菲克]] 偏视窗/后台，[[深圳昇伟电子科技]] 偏智能监测显示终端。需要注意的是，系统图里“Modbus-RTU 转 IEC61580”很可能是 IEC 61850 的笔误，后续工程引用应核对原图纸。\n\n第二十份来源《GHA Gas Insulated Switchgear Presentation Vers 06 English》补充了施耐德另一条 [[气体绝缘开关柜]] 路线。[[GHA]] 被定位为最高 40.5kV、带真空断路器的气体绝缘开关柜，可覆盖单母线和双母线方案；与 [[GMA]] 当前 12/24kV 资料和 [[GMAirSeT]] 环保气体资料相比，GHA 更突出高电压等级、[[BLink]] 无现场气体处理母线连接、[[IDIS]] 气体密度信息系统和 [[ILIS]] 内部故障电弧检测。该资料还补充了外锥/内锥电缆连接、全绝缘母线系统最高 2500A、IAC AFLR 40kA/1s 和抗震选项。由于旧版 PPT 的表格抽取存在碎片化，当前只把能明确抽取的参数写入 wiki，完整选型表仍需后续目录来源复核。\n\n第二十一份来源《GHA Gas-insulated Switchgear Catalog 2018》把上一份旧演示稿中的 [[GHA]] 信息校正为正式目录口径。该目录给出 12/17.5/24/36/38/40.5kV 总额定参数，短时电流 40kA，峰值耐受电流 100kA，母线和支路最高 2500A，母线更高值可按需到 4000A；同时把 IEC 单母线、IEC 双母线、GHA Rail 和 GHA ANSI 分支放在同一产品族内。数字化方面，GHA 被描述为 ready for IoT，并通过 [[EcoStruxure]] ready solutions 连接 Substation Monitoring Device、HMI、Easergy P3/Sepam/MiCOM、VAMP、TH110、CL110、[[IDIS]] 和 [[IVIS]]。需要注意的是，[[BLink]] 峰值电流在旧 PPT 中为 104kA，而 2018 catalog 为 100kA，后续工程引用应优先查具体项目/订货文件。\n\n第二十二份来源《WS-G 交流气体绝缘金属封闭开关设备 企业标准》把气体绝缘柜知识从产品目录扩展到企业标准口径。[[WSG]]/KGN23 被定义为 50Hz、12kV~40.5kV 的户内交流 [[气体绝缘开关柜]] 和 [[金属封闭开关设备]]，适用于单母线、双母线或母线分段系统；标准给出 630A~4000A 主母线电流、25/31.5/40kA 短时耐受、IP65 充气箱、LSC2A、SF6 年漏气率 ≤0.1%、[[气室监测]] 和 [[内部电弧防护]] 等工程约束。它与 [[GHA]] 同样覆盖到 40.5kV 气体绝缘路线，但当前资料性质不同：GHA 页面来自国际产品目录，WS-G 页面来自中国企业标准，因此后续选型应按具体项目、版本和型号体系核对。\n\n第二十三份来源《WS-G 交流气体绝缘金属封闭开关设备 企业标准 2024》把上一份 2015 版 WS-G 标准更新为厦门公司 2024 版口径。新版继续把 [[WSG]] 定义为 12kV~40.5kV 的户内交流 [[气体绝缘开关柜]]，但引用标准更新到 GB/T 3906/IEC 62271-200:2011 和 GB/T 11022/IEC 62271-1:2017，特殊使用海拔提高到 5500m，主母线和馈线额定电流口径变为 630A~3150A，并补充 [[IDIS]] 低气压/最低功能压力阈值、零表压绝缘试验、电缆试验回路电压、背对背电容器组开合试验和高海拔出厂耐压要求。当前应把 2015 与 2024 两版视为版本化资料：2015 版保留 4000A 主母线代码，2024 版最高额定电流代码到 3150A，后续引用参数时需要标注标准号。\n\n第二十四份来源《WI-G 铁道用气体绝缘金属封闭开关设备 操作说明书》把 [[WIG]] 从高铁智能化演示稿进一步落到一次设备操作维护口径。说明书确认 WI-G 是铁道用 31.5kV [[气体绝缘开关柜]]，母线/出线额定电流 ≤2500A，短路开断电流 ≤31.5kA，短时耐受 ≤31.5kA/4s；结构上包含真空灭弧室断路器室、三工位开关母线室、内锥型电缆连接、[[BLink]] 母线连接、[[IDIS]] 绝缘气体监测和 [[IVIS]]/插入式 VDS 电压检测。它还把 WIG 的维护边界说清楚：SF6 密封压力系统正常寿命期无需补气，高压开关元件免维护，但柜体至少两年目视检查一次，并按操作次数和周期进行润滑、局放、二次元件、B-Link/堵头和整柜更换判断。\n\n第二十五份来源《WS-G 40.5kV 气体绝缘开关柜图片页》补充了一个更偏应用宣传的 WS-G 截面图和参数框。图片把 [[WSG]] 放在“海上风电35kV开关设备”语境中，强调 GIS 在耐腐蚀、恶劣环境、供电连续性、操作安全和维护工作量方面的价值；参数给出 40.5kV、95kV 工频耐受、185kV 雷电冲击、40kA/3s、100kA 峰值、4000A 双母线和 IAC 40kA/1s。该来源还把 [[BLink]] 标为母线连接专利技术，并说明带电中压部件位于充气密封气室内，每个气室具备机械或电气检测和独立泄压。由于图片底部被头像遮挡，安装扩展和 4500m 高海拔相关表述只作为待核对线索，不作为完整结论。\n\n第二十六份来源《WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜 产品目录》把前面 WS-G 标准和图片页串成更完整的产品目录口径。目录确认 [[WSG]] 面向公共/工业配电网、基础设施、采矿、冶金、石油化工、燃油燃气、铁路供电、集装箱基地和船舶行业，给出 12~40.5kV、最高 3150A、最高 40kA 开断、单母线/双母线系统和 IAC 40kA/1s。它尤其补强了 [[BLink]]：相邻柜母线可在现场无气体处理条件下安装、扩展、更换和拆卸；同时补充了 [[气室监测]] 压力阈值、VDS 带电显示、外锥/内锥电缆连接、低压箱高度、柜体尺寸重量、主接线方案、发货文件和订货资料要求。当前 WS-G 的主要版本差异仍是 2015 标准与图片页保留 4000A 主母线/双母线口径，而 2024 企业标准和 2024.01 产品目录给出 3150A 常规产品口径。\n\n第二十七份来源《WS-G 气体绝缘金属封闭开关设备 操作说明书》把 [[WSG]] 从标准/目录进一步拉到运行操作层。该说明书编号为 `KSGA0.463.150-03`，封面说明 WS-G 是 up to 40.5kV 的气体绝缘金属封闭开关设备；恢复页给出 12/17.5/24/36/40.5kV、母线和出线柜 ≤2500A、短路开断 ≤31.5kA、短时耐受 ≤31.5kA/4s 的操作手册口径。更重要的是，它补充了 [[IDIS]] 作为每台柜标准配置、[[IVIS]]/VDS 带电检测、首次投运前相位检查、手动操作面板和 [[机械联锁]] 规则：断路器、隔离开关、接地开关、手柄插孔和联锁杆必须按位置关系限制误操作。该源 PDF 本身损坏并截断，当前只恢复前 31 页；目录显示完整说明书还有断路器操作、隔离/接地开关操作、开关柜操作、维护和附录等后续章节，因此本次入库只代表可恢复页面。\n\n第二十八份来源《WS-G 40.5kV及以下气体绝缘开关柜 2014产品介绍》补充了更早的苏州中文演示口径。该材料把 [[WSG]] 放在 12~40.5kV 中压配电应用中，列出石油化工、工业、基建、供电、冶金、海运、交通和风场等行业；历史参数以 2500A 自然冷却、31.5kA/4s 和内部电弧 31.5kA/1s 为主，并把特殊型海拔写为 4000m。它对 [[BLink]]、[[气室监测]]、内锥/外锥电缆连接、可拆卸低压箱和 [[机械联锁]] 的说明与后续目录互相印证，但参数上明显早于 2024 资料。该来源还记录了 2006-2014 年广州地铁、成都地铁、武汉地铁、哈尔滨地铁、兰新二线、神华项目、福建中景石化、九江石化、青海盐湖集团和风电并网移动式变电站等运行实例，说明 WS-G 在轨交、石化、盐湖、煤化工和新能源并网场景中已有应用。\n\n第二十九份来源《WSG-WIG 智能开关柜》把 [[WSG]] 和 [[WIG]] 从一次设备参数进一步推到智能在线监测项目层。该 2019.2 演示稿先梳理状态在线监测在智能变电站中的地位、ABB iVD4/GE iVB/Huadian iVEP 等竞争情况，以及 NB/T 42044-2014、GB/T 2900.20-2016 和 DL/T 403-2016 等智能开关设备标准动态；随后把 WIG 工厂简易系统框图、[[智能监测显示终端]] 和项目清单展开。它对 [[温度智能监测]]、[[气室监测]]、[[局部放电监测]]、弧光监测、避雷器阻性电流、三工位视频、断路器机械特性和电寿命监测给出更工程化的边界：例如 WSG 主母线/内锥/外锥测温安装点，SF6 密度/微水的温度、压力、密度、露点参数，TEV+超声波局放方案，以及弧光加过流闭锁可 5~7ms 动作。需要注意的是，该来源包含供应商、参考价格和开发计划，属于 2019 年项目阶段口径，不能直接替代正式产品目录或当前采购状态；其中 `IEC61580` 仍应视为疑似 `IEC 61850` 笔误。\n\n第三十份来源《WS-G 40.5kV 气体绝缘开关柜植入要点图片页》补充了一种更偏销售沟通的单页摘要视角。它不提供完整额定参数，而是用 15 条短句集中强调 [[WSG]] 的植入卖点：与柜体同品牌的断路器真空灭弧室和三工位开关、断路器与隔离/接地三工位开关 10000 次机械寿命、三相共箱结构、[[BLink]] 主母线连接下的单柜移出无需气体处理且不影响相邻柜、2000A 及以下 600mm/800mm 柜宽、25/31.5/40kA 持续 1 秒的内部电弧能力、50 次 / 25kA 或 31.5kA 的开断次数、无需电源的气体密度表，以及 750mm 电缆安装高度和更换 CT 无需拆缆的维护便利性。最需要保留的版本差异是它把气体年泄漏率写为 `<0.01%/年`，明显严于前面标准、目录和 2014 材料中常见的 `<0.1%/年` 口径，因此应视为宣传页单独说法，而不是直接覆盖正式标准参数。\n\n第三十一份来源《WS-G 12~40.5kV 交流金属封闭气体绝缘开关柜 产品目录 2018》把当前 [[WSG]] 资料链中的产品目录版本再向前补了一步。它是 `SCDOC1541 / 2018.09` 的早期目录，仍然强调“安全、可靠、环保”和“简单、创新、经济”，但常规产品口径还停留在 `40.5kV / 2500A / 31.5kA / 1000m`。这份目录对 [[BLink]]、[[IDIS]]、`DXN8B` 标准 VDS 和可选 [[IVIS]] 的说明比 2024 资料更细，也保留了单母线/双母线尺寸重量表、土建基础图、靠墙安装、柜前维护、外锥仅至 `36kV` 与内锥适用于 `35kV` 电网等早期工程选型细节。与 `2024.01` 目录、`2024` 企业标准和 `2015` 企业标准对照后，可以更清楚地看到 WS-G 版本链条：2014 演示稿偏中国市场宣传和案例，2015 企业标准偏标准化参数与试验，2018 目录偏工程选型且常规到 `2500A/31.5kA`，2024 目录与 2024 标准则把常规口径推进到 `3150A/40kA/5500m`。\n\n第三十二份来源《FBX catalogue 2020》补充了施耐德另一条更偏二次配电的 [[气体绝缘开关柜]] 路线。[[FBX]] 被目录定义为 `24kV` 及以下设备，当前资料主口径为 `630A / 20kA`，并分成 `FBX-C` 紧凑型和 `FBX-E` 可扩展型；功能单元围绕 `C` 进出线、`T1` 熔断器变压器保护、`T2` 真空断路器保护、`R` 直接进线、`Sb` 母线分段和 `M` 计量展开。与 [[GMA]] 的 12/24kV 一次配电路线、[[GHA]]/[[WSG]] 的更高电压或更高电流口径相比，FBX 更突出 `LSC2A`、主回路 `30` 年寿命期内免维护、单个气箱内多功能单元紧凑集成、`AFL/AF 16kA 或 20kA / 1s` 内部电弧等级，以及 `Easergy T300`、`SMD`、`TH110-R`、`PD110`、`VPIS` 等 [[EcoStruxure]] 与在线监测扩展能力。它同时补上了另一组工程边界：常规海拔 `1000m`、主回路 `IP67`、`20℃` 额定气压约 `0.03MPa`、金属材料约 `90%` 可回收且 `SF6` 约占总重 `0.5%` 可回收再利用。\n\n第三十三份来源《FBX 中压开关柜产品目录》把 [[FBX]] 的版本链再向前补了一步。它是同一 `SCDOC1544` 的 `2018.04` 中文目录，核心额定口径与 `2020.05` 版基本一致，仍然围绕 `24kV` 及以下、`630A / 20kA`、`FBX-C / FBX-E`、`LSC2A`、`AFL/AF 16/20kA 1s` 和主回路 `30` 年免维护展开；但这份更早目录更强调 [[ALink]] 扩展、远方控制 `0~4` 级、联锁状态矩阵、`VDS-HR / VDS-LR / VPIS / IVIS` 和扩展安装空间要求，而尚未像 `2020.05` 版那样单独展开 [[EcoStruxure]]、`Easergy T300`、`SMD`、`TH110-R` 和 `PD110`。因此，FBX 当前可以清楚地看成一条“2018 偏传统工程与扩展实现、2020 增补数字化监测叙事”的连续版本链，而不是两份互相矛盾的目录。\n\n第三十四份来源《FBX 中压开关柜产品目录 2017》则继续把这条资料链向前推到 `2017.10`。它同样属于 `SCDOC1544` 体系，核心工程口径已经与 `2018.04` 和 `2020.05` 十分接近：`24kV` 及以下、`630A / 20kA`、`FBX-C / FBX-E`、`LSC2A`、主回路 `30` 年寿命、`SF6 0.03MPa @ 20℃`、主回路 `IP67` 和 `AFL/AF 16/20kA 1s`。但这份更早目录的特点更鲜明地落在可再生能源和现场安装语境上：简介页直接写出 `FBX-E` 可凭紧凑尺寸穿过狭窄门洞安装在风机塔筒内，并把地下安装、地面安装和风塔内安装并列为典型场景；使用章节则更直接地把 `Flair` 故障指示器、进线开关电动操作和远方故障隔离/恢复供电写成应用逻辑。与此同时，标准页保留了一个需要版本化看待的异常：页面正文出现“`RM6-S开关柜满足以下标准和法规的要求`”字样，但全文产品主体、功能单元、末页尾标和安装页都明确属于 FBX，应视为模板遗留而非产品归属变化。因此，FBX 当前更适合被整理成 `2017` 偏可再生能源与安装场景、`2018` 偏扩展实现与传统远控、`2020` 偏数字化监测叙事的三层连续版本链。\n\n第三十四份来源《PREMSET Installation instructions IP41 option》与前面的产品目录类资料不同，它是一份窄范围安装说明，而不是参数总览。在当时，这份来源只告诉我们 [[Premset]] 至少存在 `C` 与 `C-MAX` 两类柜型、`Bottom Exhaust` 与 `Top Exhaust` 两种排气方向，以及一个 `IP41` 选件安装包；其中顶部排气仅适用于 `Internal Arc outside the room version`。文档重点是套件构成、螺钉与铆钉装配、柜列连续性处理、`NFPA 70E / CSA Z462` 安全要求和 `P7M18009` 操作手册引用，而没有给出额定电压、电流或绝缘介质。因此这份来源更适合作为“安装与安全边界”补充，而不是单独用来定义 Premset 的完整产品参数。\n\n第三十五份来源《Premset 12 kV紧凑型模块化真空开关设备产品目录》终于把 [[Premset]] 的产品本体补齐。它把 Premset 明确放在一条不同于 [[气体绝缘开关柜]] 与 [[空气绝缘开关设备]] 的技术路线中：[[屏蔽式固体绝缘]]。目录给出 `12kV`、`630/1250A`、`20kA x 4s / 25kA x 3s / 25kA x 4s / 31.5kA x 4s`、断路器 `E2` 级 `25kA 50次 / 31.5kA 30次`、`375mm` 标准单元宽度、部分 `750mm` 宽计量/进线单元、系统深度 `1135mm`、主回路 `IP67`、`PM` 金属隔板、`LSC2A` 和 `25kA x 1s A-FLR` 内燃弧等级。它尤其突出固体绝缘与屏蔽带来的几组差异化边界：主回路与高压部件可做到 `IP67`，相间净距不暴露在大气中以降低内部故障概率，部分固体绝缘柜型浸水后可连续服务 `48小时`，并通过通用扁平联接系统和 `2SIS` 接口实现前下/后上/后下多方向联接与免维护界面。与之前的 `IP41` 安装说明对照后，可以把 Premset 视为“2018.10 目录定义产品路线，2017.12 安装说明补充 `IP41` 与排气实现细节”的组合，而不是互相冲突的两份文件。\n\n第三十六份来源《Premset 产品手册》把 [[Premset]] 的时间线再向前推进到 `2012.06`。这份手册不是后续 `2018.10` 目录的参数重排，而是更早的市场与方案化叙事：它把 Premset 描述为融合 `AIS` 与 `GIS` 经验后形成的 `2SIS` 固体绝缘并屏蔽技术，强调智能电网就绪、馈线自动化、集成智能计量、资产监控、本地/远程控制、无 `SF6`、前置 `700mm` 电缆联接、占地面积可减少 `50%` 和寿命增加 `30%` 等卖点。它也给出一组更简化的早期参数口径：`12kV`、`630A`、`25kA`、峰值 `65kA`、`75/85kV BIL`、`42/48kV` 工频耐受、`IP3X` 外壳，以及 `375 x 1600 x 900 mm (1000mm)` 尺寸。\n\n第三十七份来源《Premset 样本 2020》把 [[Premset]] 从“已经有完整工程目录的固体绝缘产品”进一步推进到 `2020.06` 版正式样本。它保留 `2018.10` 目录中的核心参数骨架：`12kV`、`630/1250A`、`20kA x 4s / 25kA x 3s / 25kA x 4s / 31.5kA x 4s`、`25kA x 1s A-FLR`、`375mm` 标准单元宽度、`IP67` 主回路和 `2SIS` 屏蔽式全绝缘路线，但把叙事重点明显转向数字化与复杂场景应用。目录号更新为 `SCDOC1783`，并把 `Easergy T300`、`SMD`、`Easergy P3/P5`、`Sepam`、`VIP 400/410`、`Flair 22D/23DM`、`TH110-R`、`SC110/150/160`、`HU250`、`PS100/PS50`、`VPIS`、`VD23`、`EcoStruxure Power Device` 和 `eSetup Easergy Pro` 直接写入可选系统架构；同时更清楚地解释 `I/D/G/M`、`06/12`、`T/H` 和 `M` 柜 `A/S` 的柜型代码，并补充 `IP4X` / `IP32~IP42`、抗震、盐雾、`5000m` 海拔、浸水 `48小时`、海事 `DNV-GL` 和水务/管廊/核心供电区域等更完整边界。\n\n这说明 Premset 当前已形成清楚的四段版本链：`2012` 手册偏技术突破与智能电网宣传，`2017` 安装说明偏 `IP41` 和排气装配，`2018` 目录补齐基础工程参数，`2020` 目录则把工程口径延续到更成熟的施耐德数字化配置与应用场景叙事。\n\n第三十八份来源《RM6 24 kV Medium Voltage Distribution Catalogue 2012》把 [[RM6]] 的资料链一口气向前推进到正式英文目录层。它不是后续 `2018` 中文演示稿的翻译件，而是一份带 `AMTED398032EN / 05-2012` 尾标的完整 RMU 产品目录，已经把这条线写成 `sealed pressure system`、`PM class`、断路器/负荷开关 `LSC2B`、熔断器组合 `LSC2A`、`A-FL up to 20kA 1s on request` 的正式工程路线。更关键的是，`Automatic transfer systems`、bus tie coupling、source changeover、generator override 和 `Easergy T200 I` 在这一层就已出现，说明 RM6 的自动投切和远方控制并不是到 `2018` 中文演示稿才临时加上的市场化叙事；同一目录还已经纳入 `VPIS / VDS`、`Flair`、`VIP 40 / VIP 400`、`Fusarc CF`、wall mounting、可分离电缆头边界，以及 `DNV` marine application。\n\n第三十九份来源《RM6 12~24kV 气体绝缘环网柜》则把这条 RM6 路线从正式英文目录推进到中国市场更场景化的演示层。它与 [[FBX]] 一样属于施耐德 `24kV` 及以下的 [[气体绝缘开关柜]] 路线，但叙事重点明显不同：RM6 更强调 `12~24kV` 环网柜、`630A` 主功能单元、`20kA` 级短路能力、`58` 种标准柜型、`1~5` 功能单元组合、轨道交通共箱方案，以及 `ATS`、`T200C`、`Easergy T300`、`Flair 22D/23DV`、`VD23` 和 `VPIS` 组成的配网自动化链路。它把“二次配电 GIS”从以柜型目录为主的产品表达，进一步扩展到“环网节点 + 双电源备投 + Smart RMU + 移动运维”的场景化表达。\n\n与这份 `2018.05` 演示稿并行的，还有《RM6 SF6绝缘环网柜和紧凑型开关柜 产品目录》这层 `2018.10 / SCDOC1043-MV` 中文正式目录。它不再主打 `Smart RMU` 营销叙事，而是把 RM6 的工程边界、附件和订购层写得更扎实：`SF6气室 IP67`、熔断器室 `IP67`、外壳 `IP4X`、`20℃下 0.2Bar`、年泄漏率 `0.01%/年`、气室不锈钢板厚 `2mm`，以及 `I / B / D / Q / IC / BC / O / Pt / Mt`、`NE / RE / LE / DE`、中压电缆头、户外开关站、安装页和订购表。尤其需要保留的一条版本差异是自动投切控制器：演示稿偏 `T200C` 场景化表达，而正式目录页明确写成 `T200 I`，并给出 `TR < 2 s`、`T1 0s~200s`、`T2 0s~30分钟` 和自动/半自动模式，因此两者应视为同年不同资料层并存，而不是互相覆盖。\n\n第四十份来源《RM6 SeT 中压开关柜》则把这条 RM6 路线从演示级材料推进到 `2022.02` 正式目录阶段。它保留了 `12~24kV`、`630A`、`20kA` 级二次配电环网柜骨架，但明显补强了工程边界：`3mm 304` 不锈钢气箱、主回路 `40` 年寿命、气箱 `IP67`、电缆室 `IP43`、`IK07`、`1~6` 功能共箱、`PT/M` 不可共箱、`A-link` 侧扩、可选 `A FLR 20kA 1s`，以及 `Easergy P1`、`PD110`、`TH110-R`、`CL110`、`SMD`、`PS100/PS50`、`Easergy T300` 构成的完整数字化状态监测和配网自动化体系。\n\n第四十一份来源《RM6 SeT 中压开关柜 2025》说明 RM6 SeT 在 `2022.02` 之后又经历了一次正式目录修订。新版没有推翻既有技术主线，仍保留 `40` 年寿命、`3mm 304` 不锈钢气箱、`IP67/IP43/IK07`、`1~6` 功能共箱、`A-link` 和 `Easergy P1 + Easergy T300 + PD110/TH110-R/CL110/SMD/PS100/PS50` 这套数字化方案；但它把 `Cr / Vr / M` 更明确地纳入模块说明，并在部分 `12kV` 参数表中出现 `25kA` 短时耐受和 `63kA` 峰值耐受口径，说明 RM6 SeT 已不能再简单视为单一 `20kA / 50kA` 版本。\n\n第四十二份来源《RM6-S 操作说明书》则把 RM6 路线再往“现场运行维护”方向补了一层。它不是目录而是 `12kV` 运维手册，保留更早的一套 `OE / I / Q / B / IC` 功能代号，重点记录手动/电动操作、联锁、可视接地、`Flair2XD` 故障指示、`VPIS-V2` 带电显示、`VD23` 电压检测继电器、`T200I` 二次控制测试、电缆试验和 `SF6 0.03MPa @ 20℃` 压力维护边界。它说明 RM6 不只有面向宣传和工程选型的版本链，也存在面向投运、试验和退役的较早期现场手册体系。\n\n围绕同一 RM6 路线，另一份《RM6-S/RM6-S Plus 中压配电 12 kV 以下气体绝缘开关设备 产品目录》则补出一层 `2018.10 / SCDOC1739` 的正式子系列目录。它和上面的 `RM6` 通用目录层并不相同，而是把对象收窄到 `12kV` 二次配电 GIS：`RM6-S` 保持 `630A`、侧部扩展和 [[ALink]] 母线连接；`RM6-S Plus` 则升级到 `1250A`、顶部扩展、`CB / B / G / CBBr / M / PT` 功能体系，以及 `1250A 31.5kA` 进线/母联和 `630A 25kA` 出线保护口径。它还把 `0.03MPa @ 20℃`、`AFL 16/20/25/31.5kA 1s`、远程控制 `0~4` 级、`MiCOM P114S / SEG WIC1` 与 `Sepam20/40` 这些边界写成正式目录内容，因此更适合被理解为 `RM6 -> RM6-S / RM6-S Plus -> RM6SeT` 之间的一层独立分支，而不是直接并入后续 `RM6SeT`。\n\n第四十三份来源《RM AirSeT环保气体绝缘环网柜》把 RM 路线再分出一条更明确的环保气体支线。它不是 [[GMAirSeT]] 那种一次配电平台，也不能简单并入 [[RM6SeT]] 当作改名版本；更稳妥的理解是施耐德在 `12kV` 二次配电 GIS / RMU 上并行布局的一条 `GWP < 1` 环保气体 + 真空灭弧路线，功能单元写成 `C / F / V / B`，支持 `1~6` 单元自由组合和 `NE / LE / RE / DE` 扩展。资料同时给出 `IP67` 气箱、`20kA / 4s`、`A-FLR 20kA 1s`、`≤0.025%` 年泄漏率、`0.4 bar` 充气压力，以及 `Easergy T300`、`PMBOX`、`PD110`、`TH110-R`、`VT/LPVT`、`CT/LVCT` 这组数字化配置，说明环保气体叙事已经进入施耐德 RMU 末端配电场景。\n\n第四十三份来源《SM6模块化空气绝缘开关柜产品目录 2012》把 [[SM6]] 从后续中文演示稿的市场化叙事，向前补成一条更正式的英文目录版本链。它把 SM6 定义为最高 `36 kV` 的 modular air insulated switchgear，并明确给出 `30 years life span`、`PI` 隔板、`LSC2A`、`IP3X`、`VPIS`、前方闭门操作、联锁、`anti-reflex` 手柄，以及 `24 kV` 下 `A-FL / A-FLR`、`36 kV` 下 `A-FL` 的内部电弧分类。更关键的是，这份目录反复说明开断和接地有源部分位于 `SF6-filled, sealed for life` 单元中，因此把 SM6 的边界说得更清楚：它确实属于 [[空气绝缘开关设备]] 叙事，但并不是 [[PIX500]] 那类纯无气体绝缘路线，而是“空气绝缘柜体 + `SF6` 或真空开断核心”的模块化平台。目录同时给出完整功能单元谱系 `IM / IMC / IMB / PM / QM / QMC / QMB / CRM / CVM / DM1 / DM2 / DMV / DMVL / CM / GBC / NSM / GIM / GEM / GBM / GAM / TM / SM`，并把 `Easergy T200`、`Sepam`、`VIP`、`PowerMeter` 纳入较早期监控与保护体系。\n\n第四十四份来源《SM6中压开关柜24kV产品目录》把 [[SM6]] 从 `2012` 英文正式目录推进到中国市场的正式中文工程口径。它的封面写作“中压开关柜 SM6 悉心守护 享受无忧 6～24kV 产品目录”，尾页文件号为 `SCDOC064-MV / 2017.08`，适用范围收敛到 `24 kV` 以下的二次变电站和工矿配电站。与 `2012` 目录相比，这份目录更强调中国本地标准、应用方案和订货体系：柜体尺寸收敛为 `375-750 mm` 宽、`1600 mm` 高、`1030 mm` 深，主要柜型写成 `IM / IMC / IMB / IMP / QM / QMC / CRM / DM1-A / DM1-D / DM1-S / DMV / CM / CM2 / GBC-A / GBC-B / NSM-C / GBM / GAM2 / TM`，额定参数写成 `7.2 / 12 / 24 kV`、`630 / 1250 A`、`20 kA / 4s` 或 `25 kA / 1s`、`LSC2A / PI / IP4X` 和 `IAC A-FLR 20 kA / 1s`。它同样明确开关与接地核心位于 `SF6` 密闭压力系统内，但又在中文工程体系中补足了 `SF1 / SFset / Rollarc 400 / 400D`、`Sepam 20/40/80`、`VIP`、`Easergy T200 S`、`Flair 22D`、`Amp 21D`、`NSM-C` 双电源进线和自动转换方案，说明在 `Smart SM6` 之前，SM6 已经拥有一套更传统的远方监控、故障指示、电流显示和备自投叙事。\n\n第四十五份来源《SM6 7.2~24kV 空气绝缘环网柜》把施耐德中压环网柜图谱再补出一条与 [[RM6]] / [[FBX]] / [[Premset]] 并列的产品线。封面和分类页把 [[SM6]] 写成 `7.2~24kV` [[空气绝缘开关设备]] / 环网柜，并与 `RM6/FBX`、`Premset` 同列；但具体柜体页又明确负荷/隔离开关柜和断路器柜的开关间隔充 `SF6` 作为绝缘介质，说明它不是 [[PIX500]] 那种纯空气绝缘、无 `SF6` 路线，更适合作为“空气绝缘柜体 + `SF6` 开关隔室”的边界型二次配电 RMU 平台来理解。资料同时补入 `IM / IMC / NSM-C` 进出线、`QM / QMC / DM1-A` 保护柜、`CM / GBC` 测量柜和 `GAM / IMB / GBM / DM1-D` 专用柜等柜型线索，以及 `Smart SM6` 监测层：`Easergy T300`、`101/104`、Local HMI、`TH110 / TH110-R / TH110-S` 温升监测、`PD110` 电缆室局放和 `CL110` 环境温湿度。\n\n第四十六份来源《SMD and Sensors for SM6 training v2》则把上一份 `SM6` 资料中的数字化层继续往实施和版本管理方向展开。它不再把 `SMD` 仅仅当作目录里的一个名词，而是明确写成 [[SMD]] = `Substation Monitoring Device`，并给出输入侧 `zigbee / PT100 / DI / relays`、输出侧 Local HMI / Nearby HMI / `Modbus TCP` / `Facility Expert` 告警、移动侧 `Facility Hero` 的完整链路。培训稿还把 `TH110`、`CL110`、`SMD V3` 功能清单、`Thermal Connect App + NFC tag` 配对流程，以及 `V4 / V4.1 / V5` 版本演进放在一起，说明施耐德在 `2018~2019` 时点已经把中压数字化运维从“加几个传感器”推进到“有软件版本、有批量配对、有模板化配置”的交付层。需要保留的边界是：其中 partial discharge sensor、double busbar、double cubicle、`CL110 in free location` 等只出现在 roadmap 中，不能回写成当时已全面量产的既有能力。\n\n第四十七份来源《Trihal系列树脂浇注干式变压器产品目录》把当前知识库的边界从“中压开关柜与其数字化运维”进一步扩展到了施耐德的变压器侧。它不是开关柜目录，而是一份 `2016-05-10` 元数据日期的干式变压器总目录：既讲 [[Trihal]] 的树脂浇注工艺、`E3/C3/F1`、局放 `<5pC`、`10kV` 侧 `95kV` 雷电冲击和 `IP00/IP21/IP44` 外壳路线，也落到 `SCB10/11/12/13`、`SCBH15` 与 `SC10` `35kV` 级配电/电力变压器参数、温控器、强迫风冷增容 `50%`、通风公式和最小安全距离。它还说明施耐德在中国通过施耐德（苏州）变压器有限公司实现了“从中压开关、变压器到低压终端配电”的本地化综合优化配电方案，因此当前 wiki 不再只是开关设备图谱，而开始具备中压配电系统级视角。需要保留的边界是：Trihal 目录里出现的 `IP00/IP21/IP44`、`E3/C3/F1`、局放、风冷和通风安全距离，属于 [[干式变压器]] 路线的工程约束，不能迁移成开关柜的一般参数。\n第四十八份来源《AS12/AS24中压开关产品目录》则把施耐德中压二次配电图谱再向前补了一层“核心元件”视角。它不是 [[SM6]]、[[RM6]]、[[FBX]] 这类完整柜体或环网柜目录，而是一份 `2010-03-18` 元数据日期的中压开关目录：资料明确写到 [[AS12AS24]] 是“空气绝缘开关柜的核心元件”，柜体由国内开关柜制造商完成，施耐德提供 `IS / QS / DS / CS / ES` 功能分支、`12/24kV` `630A` 主口径、`SF6 0.4 bar` 密闭压力系统、永磁旋弧灭弧技术，以及 `Fusarc CF`、`Amp 21D`、`Flair 22D`、`Talus 200I`、`Sepam` 这一整组附件和自动化生态。它带来的关键边界是：虽然它属于 [[空气绝缘开关设备]] 场景，但开关本体并不是纯无气体绝缘路线，而是“空气绝缘柜体中的 `SF6` 开关核心”；因此它更像施耐德在中国二次配电市场面向柜厂集成的一条早期平台，而不能直接当作后续整柜产品线的同义版本。\n\n第四十九份来源《SC6中压开关元件产品目录》把这条“核心元件”路线再向后推进到 `2017`。这份资料最重要的不是新增一个完全独立的新产品，而是明确保留“文件名写 AS12、正文题名写 SC6”这一版本边界：它仍然服务于空气绝缘柜体集成场景，仍采用 `SF6 0.4 bar` 密闭压力系统，但把更早 [[AS12AS24]] 的 `12/24kV`、`IS / QS / DS / CS / ES` 多功能平台收敛为 `12kV`、`630A`、`20kA/4s`、`SIC / SQC` 的单型号资料，并保留 `Fusarc CF`、`Easergy Amp 21D`、`Easergy Flair 22D`、`Talus 200I`、`VPIS-V2` 等较早期附件生态。技术页里仍出现“`AS12` 开关使用 `SF6` 气体作为绝缘和灭弧介质”的文字，也进一步说明 `SC6` 更像这条平台在中国市场上的后期收敛版，而不是与 [[AS12AS24]] 无关的新路线。\n\n第五十份来源《DNF7 Metal-Clad Switchgear Technical Instruction》把 [[DNF7]] 的资料链向前补到 `2010.12 / 2011-01-04` 的英文技术说明层。它不是现有 `2025-04-10` 中文样本的重复件，而是更早的工程/选型口径：文档把 DNF7 明确写成适用于 `36kV / 40.5kV` 系统的 air insulated metal-clad switchgear，采用四隔室结构、`LSC2B`、`PM partition class`、顶部泄压和前门闭门操作，并可配置可抽出式 `HVX` 真空断路器或 `FP` 气体绝缘断路器。它还给出 `Middle Rolling / Floor Rolling` 两种 withdrawable 形式、`AFLR 31.5kA/1s`、外壳 `IP4X` 可选 `IP41`、标准尺寸 `1200(1400) x 2505 x 2400 mm`、最大 `1800kg`，以及进线/馈线、计量/测量、母联/母线上升等一次方案页。与 `2025` 中文样本对照后，可以把 DNF7 看成一条已经形成“早期英文技术说明 -> 后期中文数字化样本”的连续版本链：前者偏结构、抽出式方案和工程选型，后者偏 `40.5kV` 场景、安全防护和在线监测。\n\n第五十一份来源《DNF7 English Selection Manual 2017》则把这条 DNF7 资料链补出中间一层。它的元数据日期是 `2017-08-21`，但技术主体与前一份早期英文说明高度同源，仍围绕 `36kV / 40.5kV`、四隔室、`LSC2B / PM`、`HVX / FP` 和 `Middle Rolling / Floor Rolling` 展开，因此不适合当作新平台。它真正新增的是品牌和公司介绍层的时间推进：文档使用 `2016` 财年 `24.7 billion Euros`、全球 `160,000+` 员工、中国 `26,000` 员工和“over 30 years”在华表述，同时文末仍保留 `ONEXXXX 2010.12` 尾标。更稳妥的理解方式，是把它视为“较早 DNF7 技术骨架在 `2017` 时点的英文再包装选型手册”，既不覆盖 `2010/2011` 的工程技术说明，也不覆盖 `2025` 的中文数字化样本。\n\n第五十二份来源《DNF7 Chinese Selection Manual 2017》则把这条 DNF7 版本链再补成一份更完整的中文工程层资料。它的元数据日期是 `2017-08-16`，比前一份英文手册更早几天，但并不是另一个技术平台；更准确地说，它把同一套 DNF7 技术骨架本地化成了中国市场正式选型手册。资料明确写出 `40.5kV(GB)` 与 `36kV(IEC)`、`HVX / FP` 可互换、`KYN28 / KYN61` 两种主流结构、`1200mm / 1400mm` 柜宽、五防闭锁、三高压隔室独立释压通道、`31.5kA(1s)` 内燃弧能力，以及一整套中文工程页：标准、结构描述、整柜参数、一次方案、配电室布置、基础框架和外形尺寸重量。与 `2017-08-21` 英文手册相比，它更像“同一时期的中文本地化交付版本”；与 `2025` 中文样本相比，它则明显更偏传统工程选型与安装资料，而非数字化运维叙事。\n\n第五十三份来源《DNF7 Chinese Product Catalog 2011》则把 DNF7 的中国市场资料链再向前补出一层更早目录。它的元数据日期是 `2011-06-27`，末页文件号为 `SCDOC1542 / 2011.06`，封面写成 `DNF 7 40.5kV 中压空气绝缘开关柜 产品目录`。这份目录与 `2017` 中文手册并不相同：它的主参数口径仍是 `2500A` 而不是 `3150A`，柜体尺寸写成 `1300 x 2760 x 2500 mm`，并以 `FP` 型 `SF6` 断路器和 `HVX-O` 真空断路器为主，重点展开产品结构、手车结构、主要元器件参数、典型方案和基础安装。与此同时，它保留了 `2010` 财年 `196亿欧元`、全球 `110,000+` 员工、中国 `22,000` 员工以及在华 `77` 个办事处等更早公司口径。更稳妥的理解方式，是把它视为 DNF7 在中国市场的更早产品目录层，而不是与 `2017` 中文工程手册相互冲突的数据源。\n\n这也让当前施耐德中压产品图谱更完整了：[[DNF7]] 形成了 `2010.12 / 2011-01-04` 英文技术说明、`2011.06` 中文产品目录、`2017-08-16` 中文工程选型手册、`2017-08-21` 英文选型手册与 `2025-04-10` 中文数字化样本的五层资料链，代表 `40.5kV` 空气绝缘金属封闭开关柜平台；其中 `2011` 中文资料更偏早期中国目录层，`2017` 中文资料更偏工程交付层，`2017` 英文资料更偏品牌/选型层，`2025` 中文资料则推进到数字化运维层。[[AS12AS24]] / [[SC6]] 则构成“空气绝缘柜体中的 `SF6` 开关核心元件”这条更底层平台线，[[SM6]] 形成 `2012` 英文正式目录、`2017` 中文 `24kV` 正式目录、`2019` 中国市场演示稿和 `2018~2019` `SMD` 实施层的资料链；与此同时，[[CAS36]]、[[RM6]] / [[RM6S]] / [[RM6SeT]] / [[RMAirSeT]] / [[FBX]] 共同覆盖施耐德二次配电环网柜 / RMU 谱系，其中 [[CAS36]] 提供 `2008` 早期英文目录层，[[RM6]] 已补成 `2012` 英文正式目录、`2018` 中文演示稿、`2021` 运维手册与 `2022/2025` SeT 目录的连续版本链，说明 `Automatic transfer systems`、`Easergy T200 I`、`PM class / LSC2B` 这类工程边界在较早正式目录层就已存在；[[SM6]] 偏空气绝缘柜体 + `SF6` 开关隔室，并从 `Easergy T200 / Flair 22D / Amp 21D` 这类早期自动化层演进到 `Smart SM6` 在线监测，[[RMAirSeT]] 与 [[FBX]] 则代表紧凑型气体绝缘 RMU 的环保分支与平行产品族。[[GMA]] / [[GMAirSeT]] 更偏一次配电气体绝缘路线，[[GHA]] / [[WSG]] / [[WIG]] 延伸到更高电压等级或专用场景，而 [[Premset]] 则代表不同于传统 GIS / AIS 的 [[屏蔽式固体绝缘]] 分支。\n\n第五十四份来源《MVnex 12kV Air-Insulated Switchgear Catalog 2017》则把 [[MVnex]] 的资料链向前补出一层更早的中国正式目录。它的元数据日期是 `2017-05-23`，末页文件号为 `ECATA944 / 2017.05`，不是现有 `2019-08-16` MVnex 样本的重复件，而是更早、更完整的目录层。资料已经把 `MVnex` 标准型、`MVnex 550`、`MVnex 500` 和 `Smart MVnex` 放在同一产品族下：标准型给出 `12kV`、`630~4000A`、`25/31.5/40kA`、`63/80/100kA` 和 `650/800/1000mm` 柜宽；`550` 柜明确到 `1250A / 31.5kA` 与 `550mm` 柜宽；`500` 柜明确到 `500mm`、主回路固定联接、`1m` 柜前通道；`Smart MVnex` 也已经具备温度、局放、断路器机械特性在线监测、电动底盘车、移动运维与环境监测系统叙事。与后续 `2019` 样本相比，这份 `2017` 目录更偏产品参数、柜型方案和土建安装页，而 `2019` 资料则更像较晚的产品族概览/样本层。\n\n第五十五份来源《PIX 12kV 24kV Air-Insulated Switchgear Catalog 2016》则把 [[PIX]] 的中国资料链再向前补出一层更早正式目录。它的元数据日期是 `2016-03-11`，末页文件号为 `SCDOC1842 / 2016.03`，不是现有 `2019-08-16` 中文目录的重复件，而是更早的中国市场正式产品目录。资料已经完整覆盖 `PIX-12kV`、`PIX-24kV`、`PIX-M` 接触器柜和 `PIX-Gen` 发电机出口断路器柜：`12kV` 侧给出 `7.2/12kV`、`630A~4000A`、`20kA~50kA`，`PIX-Gen` 可达 `5000A/6300A` 与 `63kA`；`24kV` 侧给出 `630A~4000A`、`20kA~40kA` 和最高 `100kA` 峰值耐受。它还比后续中文目录更明确地保留了较早企业背景层：施耐德 `2014` 财年 `250亿欧元`、全球 `170,000+` 员工、中国 `28,000` 员工、`45` 个办事处和 `30` 家工厂。更稳妥的理解方式，是把这份资料视为 PIX 在中国市场的 `2016` 正式目录层，而把现有 `2019` 中文目录视为较晚的更新目录、`V8` 视为进一步修订扩展版。\n\n第五十六份来源《GMA12kV中压气体绝缘开关柜 产品目录》则把 [[GMA]] 的中文资料链再向前补出一层更窄的中国目录层。它的 PDF 元数据日期是 `2018-12-21`，末页时间口径为 `2018.12`，不是现有 `2023 V1.5` 中文目录的重复件。与后者相比，这份资料只聚焦 `12kV`：主母线 `1250A`、分支母线 `630/1250A`、`25/31.5kA`、峰值 `63/80kA`、断路器机械寿命 `10000` 次、`IAC 31.5kA/1s`，并明确把 `CB-C / CB-B / BC-CB / D / M / BB-PT` 柜型代码和 `420/510/600/750/800mm` 柜宽代码写成工程页。同时它补进了更完整的操作模拟面板、压力表监测、主接线方案、空间要求和基础槽钢示意图，因此更适合视为 `2017` 英文国际版与 `2023 V1.5` 中文目录之间的一层中国市场 `12kV` 正式目录资料：英文版给到 `24kV / 2500A` 与 IoT 叙事，`2018.12` 中文版偏 `12kV / 1250A` 工程目录层，`2023 V1.5` 再扩展回 `12/24kV` 和更宽的产品叙事。\n\n第五十七份来源《WI-G 27.5kV 铁道用气体绝缘开关柜 产品目录》则把 [[WIG]] / WI-G 的资料链从“智能监测演示稿 + 操作说明书”补成更完整的产品目录体系。它的 PDF 元数据日期是 `2018-10-17`，末页文件号为 `SCDOC1543 / 2018.10`，不是现有 `2020` 操作说明书的重复件，而是一份更早的铁道用目录层。与操作说明书偏 `31.5kV` 设备运行维护不同，这份目录把铁路牵引供电应用口径写得更直接：额定电压 `27.5/2×27.5kV`，最高电压 `31.5kV`，母线与出线额定工作电流 `≤2500A`，额定短路开断电流 `≤31.5kA`，`IAC 31.5kA/1s`，主回路 `IP65`。它还系统展开了断路器模块、母线辅助模块、前接线内锥电缆系统、[[BLink]] 母线连接、[[IVIS]] 电压检测、气体状态显示器/压力传感器监测、尺寸重量、标准靠墙安装和土建空间分布图，因此更适合理解为 WI-G 在中国市场的 `2018` 工程目录层，而把 `2020` 操作说明书视为同一设备族后续的运行维护层。\n\n第五十八份来源《CAS 36 Ring Main Unit Catalogue 2008》则把施耐德二次配电环网柜 / RMU 图谱再向前补出一层更早的英文目录背景。当前可抽取到的页数较少，尚不足以重建完整参数表，因此它的价值不在于补入额定电流、短路电流或柜型细节，而在于把 `CAS 36 Ring Main Unit` 这一命名明确落到 `02/2008` 的目录页上，并通过 `better service continuity`、`increased personnel and equipment safety`、`guaranteed upgradeability`、`efficient monitoring and control` 这组导言语句，说明施耐德在后续 [[RM6]]、[[FBX]]、[[SM6]] 等更完整资料之前，已经存在一条清晰的环网柜产品叙事。更稳妥的处理方式，是把 [[CAS36]] 视为施耐德 RMU / 二次配电气体绝缘路线的早期英文目录层，而不是把它强行并入后续任一产品线的同名旧版本。\n\n第五十九份来源《DVCAS Switchgears for Transformer Substations in Wind Farms》则把这条更早的环网柜 / RMU 叙事补成一份真正可用于工程理解的风电专用目录。它的元数据时间落在 `2007-11`，末页尾标为 `01-2007`，主体由 MESA 路线承接，并明确写出其为 Schneider Electric 成员企业。资料把 [[DVCAS]] 直接限定在风电场 `36kV` 集电网、风机箱变和升压站之间的中压侧场景，给出 `36kV`、`630A`、`20kA / 3s`、`20kA` 开断、`50kA` 峰值关合、`IAC AFL 20kA / 1s`、高压隔室 `IP67`、`SF6 0.3 bar` 和 `2000m` 海拔边界，同时把设备可穿过 `600mm` 门洞这一风机塔筒安装约束写得非常明确。更重要的是，它已经形成完整的模块化骨架：`D` 保护单元、`I` 进线三工位开关单元、`0` 出线提升单元、`T` 带接地开关提升单元，以及 `NE / LE / RE / DE` 扩展形式；继保和自动化层则围绕 `VIP-35` 自供电继电器、`Flair` 故障指示器、`48Vdc` 电动机构和远方故障隔离恢复供电展开。更稳妥的理解方式，是把 [[DVCAS]] 视为施耐德早期偏风电集电网的专用二次配电 GIS / RMU 分支，而把 [[CAS36]] 看作同一时期更简化的命名/产品叙事页。\n\n第六十份来源《风能解决方案》则把前面分散在 [[FBX]]、[[DVCAS]]、[[WSG]]、[[DNF7]]、[[Trihal]] 和监控方案页中的风电线索，重新组织成一份 `2018.10` 的系统级风电总册。它不再聚焦某一款开关柜，而是把施耐德风电方案拆成风机系统、风场连接、并网电站、电力监控与视频安防四层：风机系统里既有低压导电轨、低压配电柜、UPS、PLC 和 HMI，也把 [[Premset]]、[[Trihal]] 纳入塔筒/机组主回路叙事；风场连接层则把“开关设备宽度小于 `60cm`、可通过塔筒门”的要求抽象成通用风电安装边界，并把预装箱变可选设备写成 `RM6 / FBX / FLUSARC`；并网电站层则把 [[WSG]]、[[DNF7]]、[[HVX]] 和 `FP 40.5kV SF6` 断路器放进同一页风电升压站方案。更重要的是，它补入了两个此前知识库里没有的系统对象：[[FLUSARC]] 作为 `40.5kV` 风场连接环网设备，和 [[PLSCADA]] / [[iRIO]] 作为风场集中监控与风机侧智能终端。更稳妥的理解方式，是把这份资料视为施耐德 `2018` 时点的行业方案总览，而不是用它去覆盖各产品独立目录中的更细工程参数。\n第六十一份来源《FLUSARC 40.5 kV SF6 绝缘中压开关柜》则把 [[FLUSARC]] 从《风能解决方案》里的一页场景化介绍，补成了可独立选型的 `2016.07 / SCDOC1545` 正式目录层。它把这条路线直接限定为 `40.5kV` 中压二次配电站和风电场预装式变电站用 `SF6` 绝缘中压开关柜，给出 `630A`、`20kA / 3s`、`AFLR 20kA / 1s`、主回路 `IP67`、`20℃ 0.03MPa`、最大海拔 `2000m`、至少 `30` 年无需重新充气等完整工程口径，并把 `C / RE / CB / L` 功能单元、机械联锁矩阵、前置电缆连接、基础安装和运输吊装页一并补齐。更稳妥的理解方式，是把 `2016` 目录视为 [[FLUSARC]] 的正式产品层，把 `2018` 风电总册视为其行业方案应用层；前者用于参数和安装边界，后者用于风场连接语境，而不是相互覆盖。\n第六十二份来源《FOX中压开关柜核心元件产品目录》则把施耐德二次配电 GIS 叙事再向“核芯单元供货”方向补出一层不同于完整整柜目录的路线。它不是 [[FBX]]、[[RM6]] 或 [[FLUSARC]] 那种整柜产品目录，而是 `2016.03 / SCDOC1608` 的 `12kV` 以下 `SF6` 气体绝缘开关设备核心元件目录：施耐德提供带电主回路和功能单元，合作伙伴再补足电缆室和低压间。资料把 [[FOX]] 明确写成 `12kV`、`630A`、`20kA / 4s`、`50kA`、`0.03MPa @ 20℃` 的环网单元/最终用户配电核心模块，并给出 `I / Q / B / O / IC` 功能单元、`FOX-NE` 紧凑型和 `FOX-DE` 可扩展型、`30` 年寿命期内主回路免维护，以及询问式机械联锁边界。更稳妥的理解方式，是把它与 [[AS12AS24]]、[[SC6]] 并列看作“柜厂集成用核心元件”路线，但在绝缘路径上属于二次配电气体绝缘，而不是空气绝缘柜体中的开关核心。\n\n第六十三份来源《RM6-O 电缆分支箱 产品简介》则把 [[RM6]] 路线再向前补出一条更早、也更偏末端分支接线的产品分支。它的 PDF 元数据日期是 `2008-12-10`，尾标为 `SCDOC723-MV / 2008.12`，不是后续 `RM6` 正式目录或演示稿的重复件，而是一份独立的 [[RM6O]] 电缆分支箱折页。资料明确把它写成 `3~24kV` `SF6` 绝缘 [[电缆分支箱]]，用途是替代配网架空线中的大量分支接线；技术上则采用 `1~4` 个集成紧凑功能单元加 `1` 个不锈钢 `SF6` 金属封闭气室，额定气压 `1.2Bar`，设计寿命超过 `30` 年，带电部件免维护并满足 `sealed pressure system` 口径。它还给出一进二出、三出或更多出线、每路双电缆接入、`Flair 22D`、单孔/三孔底板、电动操作辅助接点和机械联锁，以及靠墙安装、升高座和内燃弧泄压的土建边界。更稳妥的理解方式，是把它视为施耐德 RM6 模块架构在 `2008` 时点向电缆分支箱方向伸出的一个早期产品分支，而不是把它混同为后续 RM6 环网柜整柜目录。\n\n当前来源之间的主要核对点是可靠性宣传口径：多数资料使用“可靠性提高 1 倍”，但 V3.4 后部页面也出现“可靠性高出 50%”的表达。HVX 说明书中的施耐德公司介绍来自更早时间点，因此企业规模数字与 2020 年样本不同，应按时间差异理解。`SM6` 资料还带来一个术语边界：封面写“空气绝缘环网柜”，而柜体页明确使用 `SF6` 绝缘开关间隔，后续引用时需要区分柜体级分类与开关间隔绝缘介质。后续如果再导入更细的二次回路资料、PMB Easy 详细手册或云端运维资料，可以重点比对控制回路、接入数量限制、安装边界和趋势分析输出是否一致。\n",
    "preview": "# Overview 当前 wiki 的首个来源是 [[SmartHVX]] 产品样本，它把 [[施耐德电气]] 的中压断路器能力包装为一个面向 [[数字化中压运维]]、数字化配电和 [[主动运维]] 的解决方案。资料显示，[[HVX]] 是机械与电气基础平台，而 [[温度智能监测]]、[[配柜智能监测]]、[[二次元件智能监测]] 和 [[PMBEasy]] 则构成智能化增量价值。 从产品组合上看，当前知识库已经有一个清晰结构：基础测",
    "group": 1,
    "value": 73
  },

    "path": "wiki\\concepts\\ALink.md",
    "markdown": "---\ntitle: \"ALink\"\ntype: concept\ntags: [busbar, gas-insulated-switchgear, fbx]\nsources: [fbx-medium-voltage-switchgear-catalog-2018, fbx-catalogue-2020, rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018, rm6-set-medium-voltage-switchgear-catalog-2022]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[ALink]] 是施耐德中压二次配电 [[气体绝缘开关柜]] 路线中用于相邻柜体功能扩展的母线连接装置。在当前 wiki 里，它最早由 [[FBX]] 可扩展型 `FBX-E` 目录明确命名；新补入的 [[RM6SeT]] 目录也把 `A-link` 作为 RM6 SeT 侧面扩展的关键结构，因此它不再只局限于 FBX 单一路线。\n\n## Key Details\n- `FBX-E` 可向左侧或右侧扩展，目录明确说明两台开关柜之间的母线连接由特有 `A-Link` 装置实现。\n- 扩展连接时无需任何现场气体处理，这是 FBX 可扩展路线的核心安装卖点之一。\n- 目录说明定位偏差由球形静触头与可径向、轴向调节的移动连接触头补偿。\n- 绝缘密封依靠按电压等级设计的硅橡胶锥形密封绝缘体实现。\n- 一体化导向销用于保证开关柜母线轴向对齐，机械挡块用于确保螺栓装配。\n- `2018.04` 目录明确要求扩展安装时预留大于 `450mm` 的额外安装空间。\n- `2020.05` 目录延续了 A-Link 扩展结构，同时把 FBX 叙事进一步延展到 [[EcoStruxure]] 与在线监测选项。\n- `2018.10` 的 `RM6-S/RM6-S Plus` 目录说明，两台 `RM6-S` 开关柜的母线连接同样由特有 `A-Link` 装置实现；但 `RM6-S Plus` 已改为顶部扩展和特定固体母线装置，这说明 ALink 在 RM6 路线中主要对应侧部扩展的 `RM6-S` 分支。\n- `RM6 SeT` 目录说明扩展可通过 `A-link` 在左侧或右侧完成，扩展时无须气体处理、无须特殊工具，也无须为地基做特殊准备。\n- RM6 SeT 的 `NE / LE / RE / DE` 扩展定义表明，ALink 已成为施耐德紧凑型二次配电 RMU / GIS 平台上的通用扩展思路之一。\n- ALink 仍不应与 [[GHA]]、[[WSG]]、[[WIG]] 资料中的 [[BLink]] 直接混同；后者主要出现在更高电压或不同产品平台中。\n\n## Related\n- [[FBX]]\n- [[RM6S]]\n- [[RM6SPlus]]\n- [[RM6SeT]]\n- [[BLink]]\n- [[气体绝缘开关柜]]\n- [[金属封闭开关设备]]\n",
    "preview": "## Summary [[ALink]] 是施耐德中压二次配电 [[气体绝缘开关柜]] 路线中用于相邻柜体功能扩展的母线连接装置。在当前 wiki 里，它最早由 [[FBX]] 可扩展型 `FBX-E` 目录明确命名；新补入的 [[RM6SeT]] 目录也把 `A-link` 作为 RM6 SeT 侧面扩展的关键结构，因此它不再只局限于 FBX 单一路线。 ## Key Details",

    "path": "wiki\\concepts\\BLink.md",
    "markdown": "---\ntitle: \"BLink\"\ntype: concept\ntags: [busbar, gas-insulated-switchgear, gha, wsg]\nsources: [gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-2014-06-27-product-presentation, wsg-feature-highlights-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[BLink]] is the named busbar-link technology emphasized in [[GHA]] documentation and also shown in [[WIG]] operation drawings. It connects gas-insulated panels while avoiding or reducing gas-handling work around the busbar interface, which makes extension, disassembly, dismantling, and panel-row work simpler for a [[气体绝缘开关柜]] installation.\n\n## Key Details\n- B-link is described as the distinctive GHA feature behind the phrase \"the switchgear with B-link\".\n- It enables on-site assembly and extension without gas handling outside the manufacturer's site.\n- It allows a switchgear panel to be moved within the switchboard row without gas handling.\n- The 2018 catalog describes B-link as IP65 and maintenance-free, like the gas-filled compartments.\n- The busbar connection uses single-pole insulation with a robust silicone-rubber insulator.\n- The arrangement is earthed and safe against contact voltage.\n- Type-test statements in the deck include 40.5kV / BIL 185kV for the B-link arrangement.\n- The older presentation states the screw-type contact was type-tested at 40kA for 3s and 104kA peak current.\n- The 2018 catalog states the current-carrying B-link connections were checked at 40kA for 3s and 100kA peak current, creating a small version/documentation difference to verify before engineering use.\n- The WI-G operation manual labels B-Link as the busbar connection in both the inner-cone cable-connection breaker cubicle and bus-coupler cubicle drawings.\n- WI-G maintenance planning lists B-Link as an item to inspect every six years to confirm whether replacement is needed.\n- A WS-G 40.5kV image page labels B-LINK as a patented busbar-connection technology for the 40.5kV gas-insulated switchgear.\n- The 2024.01 WS-G catalog describes B-link as the connection between adjacent panel busbars; it is maintenance-free, uses earthed silicone-rubber insulation, and allows on-site installation, extension, replacement, and disassembly without gas handling.\n- The WS-G catalog also notes that the silicone-rubber insulation parts are factory-installed and partial-discharge tested, the installation is visually checkable on site, and busbar resistance can be measured by section or by panel after disassembly.\n- The 2018 WS-G catalog already described B-link with most of the same core claims: factory-installed silicone-rubber insulation parts, factory partial-discharge testing, visible on-site installation, no gas handling during extension or replacement, and the ability to create an insulating distance after dismantling for resistance measurement by busbar section.\n- A 2014 WS-G presentation gives an earlier Chinese-market explanation of B-link: installation, extension, switch replacement, and end-of-life dismantling require no SF6 filling or evacuation on site.\n- The 2014 WS-G presentation says high-performance silicone-rubber busbar links separately insulate each phase, and records abnormal-surface insulation tests including 44.5kV partial-discharge <=2pC and 100kV power-frequency withstand wording.\n- A WS-G feature-highlight image adds the operational claim that if any panel in the lineup needs to be removed, B-Link allows removal and reinsertion without gas handling and without affecting adjacent panels, minimizing busbar outage time.\n\n## Related\n- [[GHA]]\n- [[WSG]]\n- [[WIG]]\n- [[气体绝缘开关柜]]\n- [[金属封闭开关设备]]\n- [[气室监测]]\n",

    "path": "wiki\\concepts\\IDIS.md",
    "markdown": "---\ntitle: \"IDIS\"\ntype: concept\ntags: [gas-monitoring, gas-insulated-switchgear]\nsources: [gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, qavxm-031-2024-wsg-enterprise-standard, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[IDIS]] is the gas-density / gas-status information system described for [[GHA]], [[WSG]] and [[WIG]]. It turns [[气室监测]] into a visual and remote-signaling function by combining compartment sensors or density switches with a traffic-light display and remote warning contacts.\n\n## Key Details\n- IDIS is presented as a gas-density information system rather than a generic pressure gauge.\n- Each gas-filled compartment is autonomous and monitored separately.\n- The older presentation describes a temperature-compensated gas density switch; the 2018 catalog describes a pressure sensor whose electrical signals are retransmitted to the IDIS display.\n- The indication supports green OK, yellow pre-warning, and red main-warning levels.\n- The system avoids gas pipes within a panel or between panels.\n- The display uses green/yellow/red visual indicators for compartment status.\n- The catalog states that any warning level can be signalled remotely as a common gas warning group signal for the whole switchgear.\n- The WS-G 2024 enterprise standard adds IDIS pressure-threshold notes for low-pressure alarm and minimum functional pressure.\n- The WI-G operation manual describes a temperature-compensated IDIS system whose LED signals come from up to three gas-density switches.\n- WI-G routes IDIS signals through communication wiring to remote-control or I&C systems.\n- WI-G uses green for ready for operation, yellow for pressure-drop pre-warning, and red for pressure-drop main warning.\n- WI-G gives IDIS reference values at 31.5kV: rated filling pressure 0.06MPa, pre-warning 0.05MPa, and main warning 0.03MPa.\n- The WS-G operation manual states that each panel is equipped with IDIS as standard for insulating-gas monitoring.\n- The WS-G manual describes IDIS as a temperature-compensated gas-density information system that sends up to three gas-density switch signals through colored LEDs.\n- The WS-G manual states that IDIS can pass signals to remote-control or I&C systems through communication relays on the rear side.\n- The WS-G manual uses green for ready for operation, yellow for pressure-drop pre-warning, and yellow/red for pressure-drop main warning.\n- WS-G pressure references in the manual are 0.03/0.015/0.01MPa for 12/24kV up to 1250A, 0.05/0.03/0.01MPa for 12/24kV above 1250A, 0.05/0.03/0.01MPa for 36kV, and 0.06/0.05/0.03MPa for 40.5kV.\n- The 2018 WS-G catalog already described IDIS as the front-mounted display for independently monitored gas compartments, with one display able to connect up to three pressure sensors and transmit alarm contacts remotely.\n\n## Related\n- [[GHA]]\n- [[WSG]]\n- [[WIG]]\n- [[IVIS]]\n- [[气室监测]]\n- [[气体绝缘开关柜]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[IDIS]] is the gas-density / gas-status information system described for [[GHA]], [[WSG]] and [[WIG]]. It turns [[气室监测]] into a visual and remote-signaling function by combining compartment sensors or density",

    "markdown": "---\ntitle: \"ILIS\"\ntype: concept\ntags: [arc-protection, gas-insulated-switchgear, gha]\nsources: [gha-gas-insulated-switchgear-presentation-vers-06-englisch]\nlast_updated: 2026-06-04\n---\n\n## Summary\n[[ILIS]] is the GHA internal-fault detection system for [[内部电弧防护]]. In the presentation it is framed as an option for detecting, analyzing, and turning off internal arc faults inside [[GHA]], complementing the switchgear's IAC AFLR withstand classification.\n\n## Key Details\n- ILIS is described as a system for detecting internal faults.\n- The release logic combines a protection-relay current criterion with internal-arc detection.\n- The discrimination threshold is stated as `>= 1 kA`.\n- The total turn-off time is stated as approximately 100ms.\n- The option is presented alongside GHA internal-arc classification and pressure-relief design.\n\n## Related\n- [[GHA]]\n- [[内部电弧防护]]\n- [[气体绝缘开关柜]]\n- [[数字化中压运维]]\n",

  {
    "id": "concepts/IVIS",

    "path": "wiki\\concepts\\IVIS.md",
    "markdown": "---\ntitle: \"IVIS\"\ntype: concept\ntags: [voltage-detection, gas-insulated-switchgear, gha, wsg]\nsources: [gha-nrjcat18789en-0318, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[IVIS]] is the integrated voltage detection system described for [[GHA]], [[WSG]] and [[WIG]]. It supports zero-voltage verification, voltage-presence indication, and phase comparison in a [[气体绝缘开关柜]] cubicle equipped with capacitive voltage dividers.\n\n## Key Details\n- IVIS can be installed optionally in GHA switchgear cubicles with capacitive voltage dividers.\n- The system is used to ascertain operating voltage presence, isolation from power supply, and phase comparison.\n- The display indicates the capacitive decoupled voltage of each primary conductor phase.\n- IVIS continuously checks the response conditions for unambiguous voltage-present/absent indication and repeat-test conditions according to IEC/EN 61243-5.\n- The catalog describes IVIS as maintenance-free, weather-proof encapsulated, requiring no auxiliary voltage, and not requiring repeat tests using mobile equipment.\n- The WI-G operation manual also places IVIS under the voltage detection system (VDS) chapter and states that it satisfies IEC 61243-5.\n- WI-G describes IVIS as integrated with a display unit, requiring no external auxiliary supply, sealed as one unit, weather-resistant, maintenance-free, and capable of long-term live-state monitoring.\n- WI-G also documents an alternative plug-in voltage detection system and notes that phase checking is required before first energization.\n- The WS-G operation manual places IVIS under the voltage detection system chapter and states that it satisfies IEC 61243-5.\n- The WS-G manual describes IVIS as an integrated voltage detection system with a display unit for checking the presence or absence of operating voltage.\n- The WS-G manual states that IVIS needs no external auxiliary power, is sealed in one unit, weather-resistant, maintenance-free, and supports long-term live-state monitoring.\n- The WS-G manual also describes a plug-in VDS according to IEC 61243-5 and requires phase checking before first energization.\n- The 2018 WS-G catalog shows the earlier product-catalog split between standard DXN8B VDS and optional IVIS, indicating that IVIS was a selectable smart voltage-detection upgrade rather than the default catalog configuration.\n\n## Related\n- [[GHA]]\n- [[WSG]]\n- [[WIG]]\n- [[气体绝缘开关柜]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[IVIS]] is the integrated voltage detection system described for [[GHA]], [[WSG]] and [[WIG]]. It supports zero-voltage verification, voltage-presence indication, and phase comparison in a [[气体绝缘开关柜]] cubicle",

  {
    "id": "concepts/主动运维",
    "label": "主动运维",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\主动运维.md",
    "markdown": "---\ntitle: \"主动运维\"\ntype: concept\ntags: [maintenance, predictive, operations]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, 3-smart-hvx-intelligent-medium-voltage-circuit-breaker-solution-overview-single-page, pmb-easy-brochure, smart-hvx-product-pmb-introduction, mvnex-medium-voltage-metal-clad-switchgear, wsg-wig-smart-switchgear-2019]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[主动运维]] 是这份资料最核心的价值主张之一，意图把断路器运维从被动巡检转向状态监测、趋势分析和预警驱动。[[PMBEasy]] 是 Smart HVX 场景中的主要落地载体，而 [[PMBox]] 则把主动运维扩展到站室级资产管理、状态监测和预测性维护。\n\n## Key Details\n- 资料把关键指标监测、状态预警和趋势分析作为主动运维的主要组成部分。\n- 该能力服务于巡检、运行、故障隔离和资产管理等场景。\n- 其实现依赖 [[温度智能监测]]、[[配柜智能监测]] 和 [[二次元件智能监测]] 等数据源。\n- 新导入的方案总览补充了主动运维的落地链路：本地侧以 [[PMBEasy]] 显示与分析为主，远程侧可接入 [[千里眼]] 云端运维系统。\n- PMB Easy 产品样本进一步把主动运维具体化为五类关键监测对象：触臂温度、配柜状态、分合闸线圈、储能电机和整体健康趋势。\n- Smart HVX & PMBox 演示稿补充了 [[PMBox]] 的三类能力：资产管理、状态监测和预测性维护。\n- Smart MVnex 也把主动运维智能单元作为智能中压开关柜方案的一部分，用于实时数据显示和风险预警。\n- WSG-WIG 智能开关柜演示稿从项目论证角度说明，状态在线监测可长期连续监测断路器重要参数，支撑趋势分析、寿命预测、故障先兆判断和状态检修/主动检修。\n- 同一演示稿称智能开关柜状态在线监测可提高 1 倍运维效率，并指出国家电网例行停电试验项目中约一半内容可通过 Smart 智能化监测功能实现。\n\n## Related\n- [[PMBEasy]]\n- [[PMBox]]\n- [[MVnex]]\n- [[千里眼]]\n- [[SmartHVX]]\n- [[WSG]]\n- [[WIG]]\n- [[温度智能监测]]\n- [[配柜智能监测]]\n- [[二次元件智能监测]]\n",
    "preview": "## Summary [[主动运维]] 是这份资料最核心的价值主张之一，意图把断路器运维从被动巡检转向状态监测、趋势分析和预警驱动。[[PMBEasy]] 是 Smart HVX 场景中的主要落地载体，而 [[PMBox]] 则把主动运维扩展到站室级资产管理、状态监测和预测性维护。 ## Key Details",
    "group": 1,
    "value": 27

  {
    "id": "concepts/二次元件智能监测",
    "label": "二次元件智能监测",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\二次元件智能监测.md",
    "markdown": "---\ntitle: \"二次元件智能监测\"\ntype: concept\ntags: [monitoring, secondary-components, diagnostics]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, wsg-wig-smart-switchgear-2019]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[二次元件智能监测]] 指对分合闸线圈和储能电机等二次元件进行非侵入式健康监测。文档强调它独立于原有控制保护系统，不影响原有二次回路，并支持本地与远程的人机界面显示。\n\n## Key Details\n- 监测对象包括合分闸线圈波形、储能电机储能电流波形和健康指数。\n- 支持历史操作数据趋势分析，以识别潜在风险并避免操作失败。\n- 这是 [[SmartHVX]] 智能型与基础测温型、标准测温型的关键差异之一。\n- WSG-WIG 智能开关柜演示稿把断路器机械特性、分合闸线圈电流电压、储能电机电流电压、储能时间、控制回路特性、机械动作次数和 I2t 累加值纳入在线监测对象。\n- 该演示稿说明线圈电流监测可计算操动机构启动时间、线圈通电时间等，用于判断铁芯空行程、弹簧卡涩、匝间短路等故障线索。\n\n## Related\n- [[SmartHVX]]\n- [[WSG]]\n- [[WIG]]\n- [[配柜智能监测]]\n- [[主动运维]]\n",
    "preview": "## Summary [[二次元件智能监测]] 指对分合闸线圈和储能电机等二次元件进行非侵入式健康监测。文档强调它独立于原有控制保护系统，不影响原有二次回路，并支持本地与远程的人机界面显示。 ## Key Details",
    "group": 1,
    "value": 23
  },
  {
    "id": "concepts/全固封极柱",
    "label": "全固封极柱",

    "path": "wiki\\concepts\\全固封极柱.md",
    "markdown": "---\ntitle: \"全固封极柱\"\ntype: concept\ntags: [component, insulation, medium-voltage]\nsources: [hvx-manual]\nlast_updated: 2026-06-03\n---\n\n## Summary\n[[全固封极柱]] 是 HVX 说明书中强调的关键绝缘设计。它通过固封技术把 [[真空灭弧室]]、一次回路和绝缘拉杆封装在环氧树脂极柱内，以实现一次导电回路与外部环境隔离。\n\n## Key Details\n- 文档把它定位为提升外部环境适应性的关键设计。\n- 该设计用于支持断路器在较恶劣环境下正常运行。\n\n## Related\n- [[HVX]]\n- [[真空灭弧室]]\n",
    "preview": "## Summary [[全固封极柱]] 是 HVX 说明书中强调的关键绝缘设计。它通过固封技术把 [[真空灭弧室]]、一次回路和绝缘拉杆封装在环氧树脂极柱内，以实现一次导电回路与外部环境隔离。 ## Key Details",

  {
    "id": "concepts/内部电弧防护",
    "label": "内部电弧防护",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\内部电弧防护.md",
    "markdown": "---\ntitle: \"内部电弧防护\"\ntype: concept\ntags: [safety, arc-flash, switchgear]\nsources: [dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, gma-medium-voltage-primary-gas-insulated-switchgear-v1-5, gm-airset-medium-voltage-primary-gas-insulated-switchgear-v1-1, gma-nrjed311328en-1017, mvnex-medium-voltage-metal-clad-switchgear, pix-50ka-catalogue-en, pix-catalogue-indoor-ac-metal-enclosed-switchgear, pix550-catalogue, pix500-catalogue-armored-metal-enclosed-switchgear, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-2014-06-27-product-presentation, wsg-wig-smart-switchgear-2019, wsg-feature-highlights-image, fbx-catalogue-2020, premset-12kv-compact-modular-vacuum-switchgear-catalog-2018, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020, rm6-offer-presentation-life-is-on-201801update, rm6-set-medium-voltage-switchgear-catalog-2022, rm-airset-eco-gas-insulated-ring-main-unit-2020]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[内部电弧防护]] 是中压开关柜文档中反复出现的人员安全主题，指开关设备在内部故障电弧情况下对人员和设备提供经验证的保护能力。[[DNF7]] 采用 IAC AFLR 31.5kA/1s 作为内部电弧类别口径；[[GMA]] 和 [[GMAirSeT]] 也强调通过 IAC 耐内部电弧故障试验，参数达到 31.5kA/1s；[[PIX]] 英文目录和 V8 中文目录进一步给出 IAC AFLR 50kA/1s；[[GHA]] 资料补充了 IAC AFLR 40kA/1s 与 [[ILIS]] 主动检测/切除方案；[[WSG]] 企业标准和 [[WIG]] 操作说明书则把内部电弧风险控制、压力释放和操作安全写入标准/运行维护口径。\n\n## Key Details\n- DNF7 文档将内部电弧类别标为 IAC AFLR，其中 A 表示授权人员，F/L/R 分别表示正面、侧面和后面可触及方向。\n- 最大电弧故障电流为 31.5kA，电弧故障持续时间为 1s。\n- DNF7 的母线室、手车室和电缆室上方均设有压力释放装置。\n- GMA 文档把完善联锁和可靠抗内部燃弧设计作为运行人员安全要点。\n- GM AirSeT 延续 GMA 的联锁与抗内部燃弧设计，并明确内部故障电弧等级为 IAC AFLR 31.5kA 1s。\n- 英文 GMA 目录说明 GMA cubicles 标配 IAC AFL 25kA 或 31.5kA 1s，AFLR 为可选项。\n- MVnex 标准型资料给出抗内部电弧等级 40kA 1s，并说明每个隔室均设有向上排气的泄压通道。\n- 文档同时提到 VAMP 电弧光保护系统，可通过检测弧光并测量故障电流来快速跳开断路器。\n- PIX 目录把 IAC AFLR 50kA/1s 作为人员和设备保护卖点，并可通过 VAMP 光学传感器或 Easergy P3/P5 集成光学传感器快速切除故障。\n- PIX V8 主参数表明确 7.2/12kV 最大电弧故障电流为 50kA、持续 1s、等级 AFLR；24kV 最大电弧故障电流为 40kA、持续 1s、等级 AFLR。\n- PIX 中文目录未给出 IAC AFLR 数值，但强调断路器室、母线室和电缆室上方均设泄压装置，用于释放内部故障电弧产生的压力和气体。\n- PIX550 同样未给出 IAC AFLR 数值，但说明断路器室、母线室和电缆室上方均设泄压装置，柜间侧板设计形成 6mm 空气层以减少柜间电弧故障影响。\n- PIX500 未给出 IAC AFLR 数值，但说明母线室和电缆室上方均设泄压装置，柜间侧板设计形成 6mm 空气层以减少柜间电弧故障影响。\n- GHA 资料列出 IAC AFLR up to 40kA 1s，并说明内部故障电弧可向后/向上泄压，也可选排气通道。\n- GHA 的 [[ILIS]] 用保护继电器电流判据和内部电弧检测判据组合触发，判别门槛为 `>= 1 kA`，总切除时间约 100ms。\n- GHA 2018 目录把 IAC 40kA/1s 纳入总额定参数，说明所有柜体标准满足 IAC AFL 1s，后部可接近场景可选 IAC AFLR。\n- GHA 2018 目录未明确复现 ILIS 名称，但在 [[EcoStruxure]] ready solutions 中补充 Easergy P3 集成弧光检测、VAMP125 单机弧光保护和可扩展弧光检测系统。\n- WS-G 标准要求通过绝缘距离或导体绝缘覆层、可靠联锁、阻燃绝缘材料、压力释放装置和压力释放通道限制内部故障发生和蔓延。\n- WS-G 标准给出内部电弧耐受能力 AFL 25/1、31.5/1、40/1 kA/s，注释说明可选 AFLR。\n- WS-G 标准将内部电弧试验列为强制型式试验项目，试验方法按 GB 3906-2006 中 6.106 执行。\n- WS-G 40.5kV 图片页给出抗内部电弧等级 IAC 40kA/1s，并说明每个气室具有独立泄压装置。\n- WS-G 2024.01 产品目录把通过 IAC 内部电弧故障试验列为人员安全卖点，参数可达 40kA/1s，并说明每个充气室有后部释放的泄压装置且可选附加泄压通道。\n- WS-G 2014 产品介绍把“通过 31.5kA/1s 内部电弧故障试验”作为安全可靠卖点，并强调高压带电部分全封闭、外壳接地、可触摸且没有意外打开气室的可能性。\n- WSG-WIG 智能开关柜演示稿补充主动弧光监测方案：检测弧光故障中突然增加的光强，结合过流闭锁触发跳闸，整套母线保护动作时间可达 5~7ms，并可显示弧光发生点位置。\n- WSG 特点图片页把母线室、断路器室和电缆室的抗内部电弧故障能力统一写为 25kA、31.5kA 或 40kA、持续 1 秒，并把这项能力作为“提供型式试验报告”的卖点之一。\n- WI-G 说明书把“通过抗内部电弧故障试验”列为产品特征。\n- WI-G 说明书提示，在内部电弧故障时通过泄压通道确保 IEC 62271-200 规定的人员安全。\n- `FBX catalogue 2020` 给出另一组更低参数段的内部电弧口径：`C/T1/T2/R` 单元为 `AFL 16kA 或 20kA / 1s`，`M1~M4` 计量单元为 `AF 16kA 或 20kA / 1s`。\n- FBX 目录把室内安装、顶排气和通道尺寸与内部电弧能力一起说明，体现这类紧凑型二次配电 GIS 对泄压路径和房间布置的依赖。\n- `Premset 12 kV` 目录给出 `25kA x 1s A-FLR` 的四周内燃弧防护口径，并说明已进行 `20kA` 和 `25kA` 内燃弧型式试验。\n- Premset 同时给出两种泄压方式：底部泄压进入深度至少 `550mm` 电缆沟，或顶部泄压进入顶部通道；靠后墙安装时，后部与墙距离至少 `100mm`。\n- 已入库的 `IP41 option` 安装说明还能与之互证顶部排气版本存在，并额外说明某些顶部排气 `IP41` 配置仅适用于 `Internal Arc outside the room version`。\n- `Premset 样本 2020` 延续 `25kA x 1s A-FLR` 口径，并把顶排弧/底排弧、后进线结构、后墙间距和最低 `500mm` 安装维护间距一起写入土建与安装页，说明该产品的内部电弧防护已经与现场布置条件强绑定。\n- `RM6` 演示稿给出气箱与电缆室 `20kA 1s` 的内部燃弧能力，并把安全泄压阀门、天然联锁、可视接地和动态模拟指示作为人员安全卖点。\n- `RM6 SeT` 目录进一步说明内部电弧并非所有基础柜型默认分类，而是提供 `A FL` / `A FLR 20kA 1s` 可选项；同时在土建页给出防内燃弧电站的天花板高度、泄压空间和底部泄压安装边界。\n- 内部电弧防护偏向开关柜本体的被动防护，弧光保护系统则偏向主动检测与快速切除故障。\n\n- `RM AirSeT` 技术参数明确给出 `A-FLR 20kA 1s`，说明施耐德环保气体 RMU 分支在 `12kV` 侧也保留了面向前/侧/后的内部电弧防护口径；它与 `RM6` 演示稿的 `20kA 1s` 和 `RM6 SeT` 的可选 `A FL/A FLR 20kA 1s` 构成同一路线的连续安全边界。\n## Related\n- [[DNF7]]\n- [[MVnex]]\n- [[PIX]]\n- [[PIX500]]\n- [[PIX550]]\n- [[SmartPIX]]\n- [[GMA]]\n- [[GMAirSeT]]\n- [[GHA]]\n- [[WSG]]\n- [[WIG]]\n- [[FBX]]\n- [[RM6]]\n- [[RM6SeT]]\n- [[RMAirSeT]]\n- [[Premset]]\n- [[ILIS]]\n- [[屏蔽式固体绝缘]]\n- [[金属封闭开关设备]]\n- [[气体绝缘开关柜]]\n- [[HVX]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[内部电弧防护]] 是中压开关柜文档中反复出现的人员安全主题，指开关设备在内部故障电弧情况下对人员和设备提供经验证的保护能力。[[DNF7]] 采用 IAC AFLR 31.5kA/1s 作为内部电弧类别口径；[[GMA]] 和 [[GMAirSeT]] 也强调通过 IAC 耐内部电弧故障试验，参数达到 31.5kA/1s；[[PIX]] 英文目录和 V8 中文目录进一步给出 IAC AFLR 50kA/1s；[",

  {
    "id": "concepts/局部放电监测",

    "markdown": "---\ntitle: \"局部放电监测\"\ntype: concept\ntags: [partial-discharge, insulation, monitoring]\nsources: [gma-air-c4c-digital-implement-20191204, smart-hvx-product-pmb-introduction, mvnex-medium-voltage-metal-clad-switchgear, wsg-wig-smart-switchgear-2019, smd-and-sensors-for-sm6-training-v2]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[局部放电监测]] 是用于识别开关柜绝缘状态异常的状态监测能力。GMA Air 数字化实施材料把 partial discharge monitoring of switchgear 列为数字化监测对象，PMBox 资料也把局部放电分析放在站室级预测性维护能力中。\n\n## Key Details\n- GMA Air C4C Digital 材料将局部放电监测作为开关柜数字化 readiness 的一部分。\n- [[PMBox]] 页面中的预测性维护能力包括局部放电分析。\n- MVnex 550 和 MVnex 500 的智能化能力中也提到局放在线监控。\n- 该能力与温度、气室、断路器特性等监测共同支撑 [[数字化中压运维]]。\n- WSG-WIG 智能开关柜演示稿把开关柜局放纳入项目清单，对比脉冲电流法和暂态对地电压 TEV+超声波方案；TEV+超声波方案被描述为非侵入式、适合现场改造，并可在预警后由专业局放检测设备复核。\n- 同一演示稿说明 TEV 传感器建议安装于 GIS 开关柜前门板，超声波传感器建议安装于 GIS 开关柜内但位于气箱外，主机可安装于低压室。\n- `SMD and Sensors for SM6 training v2` 没有把局放传感器写成既有 `SMD V3` 功能，而是只在 `Wireless sensors roadmap for 2019` 中把 partial discharges sensor 作为“next”方向提出。\n- 这份培训稿同时把 ambient air PD 与 `corona effect / surface discharge`、humidity、condensation 和 pollution 联系起来，因此当前更适合把它视为施耐德在 `2018~2019` 时点对局放传感器的规划线索，而不是已在 SM6 培训稿内完成标准化部署的既有能力。\n\n## Related\n- [[PMBox]]\n- [[MVnex]]\n- [[气体绝缘开关柜]]\n- [[GMAirSeT]]\n- [[WSG]]\n- [[WIG]]\n- [[数字化中压运维]]\n- [[SMD]]\n",
    "preview": "## Summary [[局部放电监测]] 是用于识别开关柜绝缘状态异常的状态监测能力。GMA Air 数字化实施材料把 partial discharge monitoring of switchgear 列为数字化监测对象，PMBox 资料也把局部放电分析放在站室级预测性维护能力中。 ## Key Details",

  {
    "id": "concepts/屏蔽式固体绝缘",
    "label": "屏蔽式固体绝缘",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\屏蔽式固体绝缘.md",
    "markdown": "---\ntitle: \"屏蔽式固体绝缘\"\ntype: concept\ntags: [insulation, switchgear, medium-voltage]\nsources: [premset-product-brochure-2012, premset-12kv-compact-modular-vacuum-switchgear-catalog-2018, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[屏蔽式固体绝缘]] 是当前 wiki 中由 [[Premset]] 明确引入的一条中压开关柜绝缘路线。它既不同于以 `SF6` 或环保气体为主介质的 [[气体绝缘开关柜]]，也不同于主要依赖空气净距的 [[空气绝缘开关设备]]；其核心是通过相间固体绝缘与屏蔽，把电场与外部环境隔离，从而降低内部故障概率并压缩柜体尺寸。\n\n## Key Details\n- Premset 目录把产品封面直接定义为“屏蔽式全绝缘系统”。\n- `2012.06` 手册进一步说明这一路线来自 `AIS` 与 `GIS` 产品开发经验的融合，并将其称为固体绝缘并屏蔽技术 `2SIS`。\n- 联接章节将这一路线写成 `2SIS`（带屏蔽式固体绝缘技术）的电缆和母线联接系统。\n- 目录强调所有电场与外部环境隔离，因此联接系统可实现“完全免维护和免维修”。\n- 内燃弧章节说明，正因为相间净距不暴露在大气中，内部故障电弧概率显著降低。\n- 主回路和所有高压部件可达到 `IP67`（`M06A` 计量柜除外），说明固体绝缘路线具备较强的环境隔离能力。\n- 目录还给出“浸水后可连续服务 `48小时`（仅限固体绝缘柜型）”这一环境适应性卖点。\n- 手册还强调这一路线不含 `SF6`，因此不存在气体泄漏管理问题，且有助于延长寿命并降低全寿命周期维护负担。\n- 这一路线与 `375mm` 标准宽度、通用扁平联接系统、前下/后上/后下多方向布置和模块化柜列拼接共同构成 Premset 的紧凑化方案。\n- `2020.06` 目录进一步把这一路线落到结构层：嵌入式电流互感器、模块化母线系统、集成空气绝缘接地开关、屏蔽式电缆附件、可选 `LVPT` 和无线无源温度传感器 `TH110-R` 都被放进同一技术平台叙事。\n- `2020.06` 目录还补充了更明确的环境边界：外壳 `IP4X`、部分配置 `IP32~IP42`，固体绝缘柜型浸水后可连续服务 `48小时`，`5000m` 以下无需额外预防措施。\n- 当前来源仍主要覆盖 Premset 的 `12kV` 中文目录；后续如再出现更多产品线资料，再判断这是否是施耐德更广泛复用的中压技术平台。\n\n## Related\n- [[Premset]]\n- [[气体绝缘开关柜]]\n- [[空气绝缘开关设备]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n",
    "preview": "## Summary [[屏蔽式固体绝缘]] 是当前 wiki 中由 [[Premset]] 明确引入的一条中压开关柜绝缘路线。它既不同于以 `SF6` 或环保气体为主介质的 [[气体绝缘开关柜]]，也不同于主要依赖空气净距的 [[空气绝缘开关设备]]；其核心是通过相间固体绝缘与屏蔽，把电场与外部环境隔离，从而降低内部故障概率并压缩柜体尺寸。 ## Key Details",

    "markdown": "---\ntitle: \"干式变压器\"\ntype: concept\ntags: [transformer, dry-type, medium-voltage]\nsources: [trihal-series-resin-cast-dry-transformer-catalog]\nlast_updated: 2026-06-08\n---\n\n## Summary\n[[干式变压器]] 是不以液体介质作为主绝缘和冷却介质的变压器路线。当前知识库中的 [[Trihal]] 目录把这一路线具体化为树脂浇注高压绕组、铜箔低压绕组、`IP00/IP21/IP44` 外壳、局部放电控制、`E3/C3/F1` 试验、防火与通风安装边界，并覆盖从 `30kVA` 配电变压器到 `25000kVA`、`35kV` 级电力变压器的参数范围。\n\n## Key Details\n- 当前资料中的干式变压器以树脂浇注为核心工艺，高压侧采用铜带或绝缘铜线绕制并真空浇注，低压侧采用铜箔绕制和热固性环氧预浸布绝缘。\n- 文档把“无任何液体介质”和较好的防火性能作为安装与安全边界的重要前提。\n- 认证与试验边界突出 `E3`、`C3`、`F1`，并把较 `C2-E2` 更严苛的环境/气候试验作为卖点。\n- 电气试验包括例行的绕组电阻、变比与矢量组、阻抗电压、负载损耗、空载损耗、空载电流、工频耐压和感应耐压，以及局部放电测量。\n- 资料给出局放保证 `<5pC`；`C2` 试验页还写出标准要求 `≤10pC`、Trihal 试验结果 `<2pC`。\n- 型式试验和特殊试验可覆盖雷电冲击、温升、短路和噪声水平测量；标准试验水平汇总写出系统最高电压 `12/24/40.5kV` 对应雷电冲击 `95/125/170kV`。\n- 冷却方式分自然风冷 `AN` 与强迫风冷 `AF`；一般情况下强迫风冷可临时增容 `50%`，但会受到电缆截面、断路器额定值、通风和风机寿命限制。\n- 温度控制器被当作安全运行的第一层保护，可显示绕组温度、控制风机、输出故障/超温/跳闸信号，并通过 `RS232/485` 传送状态。\n- 外壳路线包括无外壳 `IP00`、常见户内 `IP21` 和户外 `IP44`；其中 `IP44` 会带来冷却能力下降。\n- 安装边界包括海拔 `≤1000m`、环境温度 `-25°C ~ +40°C`、最小安全距离、自然/强迫通风公式和 `PBT` 封闭母线连接等实现要求。\n\n## Related\n- [[Trihal]]\n- [[施耐德电气]]\n",
    "preview": "## Summary [[干式变压器]] 是不以液体介质作为主绝缘和冷却介质的变压器路线。当前知识库中的 [[Trihal]] 目录把这一路线具体化为树脂浇注高压绕组、铜箔低压绕组、`IP00/IP21/IP44` 外壳、局部放电控制、`E3/C3/F1` 试验、防火与通风安装边界，并覆盖从 `30kVA` 配电变压器到 `25000kVA`、`35kV` 级电力变压器的参数范围。 ## Key Details",
    "group": 1,

    "markdown": "---\ntitle: \"数字化中压运维\"\ntype: concept\ntags: [digitalization, medium-voltage, operations]\nsources: [2-smart-hvx-intelligent-medium-voltage-circuit-breaker, smart-hvx-product-introduction-v3-4, smart-hvx-product-pmb-introduction, dnf7-indoor-ac-metal-enclosed-switchgear-2025-4-10, gma-air-c4c-digital-implement-20191204, gma-nrjed311328en-1017, mvnex-medium-voltage-metal-clad-switchgear, pix-50ka-catalogue-en, pix-indoor-ac-metal-enclosed-switchgear-v8-breaker-parameter-revision, wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, gha-nrjcat18789en-0318, wsg-wig-smart-switchgear-2019, fbx-catalogue-2020, sm6-24kv-medium-voltage-switchgear-catalog-2017, sm6-product-introduction-and-digital-content-2019, smd-and-sensors-for-sm6-training-v2, premset-product-brochure-2012, premset-12kv-compact-modular-vacuum-switchgear-catalog-2020, rm6-offer-presentation-life-is-on-201801update, rm6-set-medium-voltage-switchgear-catalog-2022, rm6-s-operation-maintenance-instructions-2021, rm-airset-eco-gas-insulated-ring-main-unit-2020, wind-energy-solutions-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[数字化中压运维]] 可以视为这份样本试图推销的总体方向：把中压断路器和配电站室资产从传统一次设备升级为可连接、可监测、可分析的智能资产。[[SmartHVX]]、[[PMBEasy]]、[[PMBox]] 和 [[EcoStruxure]] 共同构成了这一方向的产品化表达。\n\n## Key Details\n- 文档用可靠性、效率和成本三个维度来包装数字化运维收益。\n- 实现路径包括边缘显示、远程接入、趋势分析和可选云端运维。\n- V3.4 产品介绍把该价值链进一步量化：部分停电试验项目可由智能监测支撑，千里眼远程运维示例给出年工时从约 121 小时降至约 59.5 小时的对比。\n- Smart HVX & PMBox 演示稿把该方向扩展到站室级资产管理、3D 站室视图、局部放电分析、历史数据追溯和多设备接入。\n- DNF7 样本把数字化运维进一步落到完整开关柜系统，覆盖 [[金属封闭开关设备]] 本体、[[内部电弧防护]]、温度在线监测、断路器特性监测、视频监测、弧光保护、剩余电寿命监测和 [[PMBox]] 主动运维。\n- GMA Air 数字化实施材料把该方向具体化为 IED 保护/计量/状态监测、断路器电气监测、[[气室监测]]、电缆侧温升、RFID/Zigbee 和 [[局部放电监测]]。\n- 英文 GMA 目录补充了更早的数字化定位：GMA ready for IoT，可集成 Smart Grid，并支持 remote monitoring、nearby control、substation monitoring、protection、metering 和 condition monitoring。\n- MVnex 样本把 Smart MVnex 定位为智能中压开关柜，组合温度在线监测、弧光在线检测、主动运维智能单元和 [[千里眼]] 云平台/移动运维。\n- PIX 英文目录把 [[EcoStruxure]] ready solutions 落到 connected products：Easergy P3/P5、VAMP 弧光保护、TH110、CL110、Substation Monitoring Device、HMI、SCADA/Services、云端应用和移动报警共同构成现场到远程的运维链路。\n- PIX V8 目录把 [[SmartPIX]] 定位为可接入 [[EcoStruxure]] 的智能化解决方案，组合 PMB/PMB Easy、无线测温、断路器特性监测、配柜监测、一键顺控、局放在线监测、剩余电寿命、视频监测、弧光保护和环境温湿度监测。\n- WIG 高铁智能开关柜演示稿把数字化运维放进 [[数字化变电站]] 架构，强调 IEC 61850、过程层/间隔层/站控层、保护测控后台、辅助监控后台、合并智能单元和 [[智能监测显示终端]]。\n- WSG-WIG 智能开关柜演示稿把数字化中压运维进一步落为项目开发清单：在线监测对象覆盖温度、SF6 密度/微水、局放、弧光、避雷器、三工位视频、断路器机械特性和断路器电寿命，并把智能元件随高压开关设备试验作为技术原则。\n- GHA 2018 目录把 [[GHA]] 纳入 [[EcoStruxure]] ready solutions，组合 nearby control、Substation Monitoring Device、HMI、Easergy P3/Sepam/MiCOM、VAMP 弧光检测、TH110、CL110、[[IDIS]] 和 [[IVIS]]，形成从一次设备到监测/保护/控制的运维链路。\n- `FBX catalogue 2020` 说明数字化运维并不只属于高电流或高电压产品族；[[FBX]] 这类 `24kV` 及以下二次配电柜也可选 `Easergy T300`、`SMD`、`TH110-R`、`PD110` 和 `VPIS`。\n- FBX 目录把监测对象落在主母线/连接点测温、局部放电、带电显示和馈线远方控制等边界上，说明紧凑型 GIS 同样可以接入 [[EcoStruxure]] 架构。\n- `SM6中压开关柜24kV产品目录` 则补出 `Smart SM6` 之前的一层更传统数字化口径：`Easergy T200 S` 负责远程监控与分合闸控制，兼容 `SCADA` 并提供 `Modbus`、`DNP3.0 level 2`、`IEC 870-5-101`；`Flair 22D` 负责故障电流指示，`Amp 21D` 负责自供电电流显示，`Sepam 20/40/80` 与 `VIP` 负责保护与控制。\n- `2019-03-27` 的 `Smart SM6` 页面把数字化叙事下探到施耐德 [[SM6]] 环网柜：监测对象聚焦主母排与电缆搭接温升、电缆室局放，以及母线室/电缆室环境温湿度。\n- 这套结构围绕 `Easergy T300`、`SCADA / DMS`、`101/104`、Local HMI、`TH110 / TH110-R / TH110-S`、`PD110` 和 `CL110` 展开，说明施耐德在空气绝缘环网柜路线上同样采用“一次柜体 + 二次监测 + 配网接入”的数字化表达。\n- `SMD and Sensors for SM6 training v2` 又把这条叙事推进到实施层：[[SMD]] 直接接入 `zigbee` 传感器、`PT100`、`DI` 和继电器，向 local lights、Local HMI、Nearby HMI、`Modbus TCP` 与 `Facility Expert` 告警链路输出状态。\n- 同一培训稿还给出 `Facility Hero` 移动告警、`SMD V3 -> V4 -> V4.1 -> V5` 版本演进，以及 `Thermal Connect App`、`NFC tag`、batch pairing、`Easergy P3/P5` 兼容等部署步骤，说明数字化中压运维不只是一组器件清单，也包含软件版本、配对流程和交付方法。\n- `Premset 产品手册` 补充了更早一代“智能电网就绪”叙事：Premset 被描述为可支持馈线自动化、集成智能计量、资产监控、集成电源投切、本地控制与远程控制的中压配电架构。\n- 这份 `2012.06` 手册虽然没有出现后期的 `EcoStruxure` 命名，但已经体现了标准通信协议、智能电子设备、无线/GSM/GPRS/以太网通信网络和配网自动化的产品化方向。\n- `Premset 样本 2020` 把这条叙事从高层宣传推进到可配置的产品级方案：目录中已明确出现 `Easergy T300`、`SMD`、`Easergy P3/P5`、`Sepam`、`VIP 400/410`、`Flair 22D/23DM`、`TH110-R`、`SC110/150/160`、`HU250`、`PS100/PS50`、`VPIS` 和 `VD23`。\n- 这说明 Premset 在 `2020` 时点已不仅是“支持智能电网”的概念型产品，而是可直接接入馈线自动化、资产管理、双电源/发电机/母联备投、无线/`2G/4G`/光纤以太网通信和 `IEC 60870-101/104`、`MODBUS`、`IEC 61850` 协议体系的中压配电平台。\n- `RM6` 演示稿则把数字化中压运维进一步下探到环网柜和配网自动化层：`Smart RMU` 由 `Easergy T300`、低功耗电压/电流传感器、温湿度传感器、`TH110`、UHF 局放、`wifi`、`Webserver` 和移动运维组成。\n- RM6 资料同时把 `ATS`、`T200C`、`Flair 22D/23DV`、`VD23` 和 `VPIS` 串成一条“故障检测 + 电压检测 + 自动投切 + 远方三遥”的配网自动化链路，说明数字化叙事不只存在于站室级中压开关柜，也可以落到 `12~24kV` 二次配电环网柜。\n- `RM6 SeT` 目录把这条链进一步正规化到目录级能力：`Easergy T300`、`VT/LPVT`、`CT/LVCT`、`TH110-R`、`PD110`、`CL110`、`PS100/PS50`、`SMD` 和 [[EcoStruxure]] / `Asset Advisor` / `ADMS` 共同组成从测量、监测到应用分析的完整结构。\n- 与早期 RM6 演示稿相比，RM6 SeT 还明确写出 `IEC 60870-101/104`、`MODBUS`、`IEC61850` 和 `IEC61131-3`，说明这条二次配电环网柜路线已经进入更成熟的一二次融合与开放协议阶段。\n- `RM6-S` 操作说明书则补出这条路线更早期、也更本地化的一层：`Flair 21D / 22D / 23DV` 故障电流指示、`VPIS-V2` 带电显示与核相、`VD23` 电压检测继电器，以及 `T200I` 的数字输入/输出和模拟输入测试，共同构成没有云平台叙事但已有故障检测、带电判断和远方控制边界的前一代 RMU 二次系统。\n\n- `RM AirSeT` 资料把数字化中压运维继续下沉到环保气体 RMU：以 `Easergy T300`、`HMI`、`PMBOX`、`PD110`、`TH110-R`、`VT/LPVT`、`CT/LVCT` 为核心，围绕状态感知、远方接入、资产预警和预测性资产管理组织卖点。\n- `风能解决方案` 则把数字化叙事再向系统级风场运维扩展：以 [[PLSCADA]] 作为中心变电站综合自动化与集中监控软件，以 [[iRIO]] 作为风机侧智能终端，并辅以 `ION7650` 电能质量监测、`PowerLogic` 仪表、`MiCOM/Sepam` 综保、`DLR/LOM` 智能接入管理和视频安防，形成从风机、风场到升压站的统一监控链路。\n## Related\n- [[DNF7]]\n- [[MVnex]]\n- [[PIX]]\n- [[SmartPIX]]\n- [[WIG]]\n- [[WSG]]\n- [[GHA]]\n- [[FBX]]\n- [[SM6]]\n- [[RM6]]\n- [[RM6S]]\n- [[RM6SeT]]\n- [[RMAirSeT]]\n- [[Premset]]\n- [[数字化变电站]]\n- [[智能监测显示终端]]\n- [[GMA]]\n- [[SmartHVX]]\n- [[PMBEasy]]\n- [[PMBox]]\n- [[SMD]]\n- [[PLSCADA]]\n- [[iRIO]]\n- [[EcoStruxure]]\n- [[主动运维]]\n- [[千里眼]]\n- [[测温技术对比]]\n- [[气室监测]]\n- [[局部放电监测]]\n- [[IDIS]]\n- [[IVIS]]\n",
    "preview": "## Summary [[数字化中压运维]] 可以视为这份样本试图推销的总体方向：把中压断路器和配电站室资产从传统一次设备升级为可连接、可监测、可分析的智能资产。[[SmartHVX]]、[[PMBEasy]]、[[PMBox]] 和 [[EcoStruxure]] 共同构成了这一方向的产品化表达。 ## Key Details",

    "path": "wiki\\concepts\\数字化变电站.md",
    "markdown": "---\ntitle: \"数字化变电站\"\ntype: concept\ntags: [digital-substation, iec-61850, automation]\nsources: [wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, wsg-wig-smart-switchgear-2019]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[数字化变电站]] 指信息采集、传输、处理和输出过程完全数字化的变电站。WIG 演示稿把它描述为设备智能化、通信网络化和运行管理自动化的系统，并按 IEC 61850 思路划分为过程层、间隔层和站控层。\n\n## Key Details\n- 过程层由模拟量采集终端、合并单元和实现开关输入/输出的智能单元构成。\n- 间隔层主要由保护装置和测控装置组成。\n- 站控层主要包括监控、远动和故障信息子系统。\n- 一次设备智能化包括数字输出的电子式互感器、智能开关或配智能终端的传统开关。\n- 二次设备网络化通过通信网络交换模拟量、开关量和控制命令等信息，目标是减少控制电缆并提高抗干扰能力。\n- 在线状态监测使设备状态可视化，并支撑状态检修和故障诊断。\n- 2019.2 WSG-WIG 演示稿把一次设备状态监测明确称为变电站自动化系统的有机组成部分，用来长期连续监测断路器重要参数并支撑可靠性和运维成本目标。\n\n## Related\n- [[WIG]]\n- [[WSG]]\n- [[智能监测显示终端]]\n- [[数字化中压运维]]\n- [[气室监测]]\n- [[温度智能监测]]\n",

    "path": "wiki\\concepts\\智能监测显示终端.md",
    "markdown": "---\ntitle: \"智能监测显示终端\"\ntype: concept\ntags: [monitoring, hmi, smart-switchgear]\nsources: [wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, wsg-wig-smart-switchgear-2019]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[智能监测显示终端]] 是 WIG 高铁智能开关柜方案中的多功能监测和显示装置，用于汇聚一次回路模拟图、带电显示、开关状态、断路器机械特性、气室状态、避雷器状态、温度和加热除湿等信息。它以彩色液晶显示，并通过 MODBUS 协议向计算机监控网络提供遥测、遥信数据。\n\n## Key Details\n- 显示对象包括一次回路模拟图、带电显示器、开关状态和弹簧储能状态。\n- 断路器相关监测包括机械特性、分合闸次数、分合闸回路电流、储能电机电压、储能电机回路电流和储能次数。\n- 三工位开关相关监测包括三工位电机回路电流和隔离刀操作次数。\n- 气室相关监测包括 SF6 密度和 SF6 温度。\n- 其他监测包括避雷器泄漏电流、雷击次数、自动加热除湿控制和温度控制。\n- 通讯通过 MODBUS 协议向监控网络提供遥测和遥信数据。\n- 2019.2 WSG-WIG 演示稿进一步把终端放入项目清单，说明它可配合环境温湿度、高压带电、开关位置、储能电机、断路器机械特性、三工位电机、避雷器、SF6 密度/微水、局放、三工位视频、母线及电缆头温度和断路器电寿命等监测对象。\n\n## Related\n- [[WIG]]\n- [[WSG]]\n- [[数字化变电站]]\n- [[气室监测]]\n- [[温度智能监测]]\n- [[数字化中压运维]]\n- [[深圳昇伟电子科技]]\n",
    "preview": "## Summary [[智能监测显示终端]] 是 WIG 高铁智能开关柜方案中的多功能监测和显示装置，用于汇聚一次回路模拟图、带电显示、开关状态、断路器机械特性、气室状态、避雷器状态、温度和加热除湿等信息。它以彩色液晶显示，并通过 MODBUS 协议向计算机监控网络提供遥测、遥信数据。 ## Key Details",

  {
    "id": "concepts/机械联锁",
    "label": "机械联锁",
    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\机械联锁.md",
    "markdown": "---\ntitle: \"机械联锁\"\ntype: concept\ntags: [safety, interlocking, switchgear]\nsources: [wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, rm6-s-operation-maintenance-instructions-2021]\nlast_updated: 2026-06-05\n---\n\n## Summary\n[[机械联锁]] 是中压开关柜通过机构位置、手柄、插孔、联锁杆和锁定件限制错误操作顺序的安全设计。[[WSG]] 操作说明书把它作为预防误操作的核心条件；[[WIG]] 操作说明书也把机械联锁写入运行安全边界；[[RM6S]] 手册则进一步展示了联锁如何细化到不同功能单元和电缆试验场景。\n\n## Key Details\n- WS-G 说明书强调，只有使用完整的联锁装置才能达到预防开关设备误操作。\n- 操作人员应核对销售合同和开关柜一次系统图是否与联锁系统一致。\n- 在断路器合闸状态下，隔离开关和接地开关的联锁杆被锁住。\n- 联锁杆只能打开隔离开关或接地开关中的一个操作插孔，或者把两个插孔全部锁住。\n- 隔离开关或接地开关手柄只能在其终端位置拔出。\n- 在隔离开关或接地开关手柄未拔出且操作插孔打开时，断路器合闸按钮按不动，或断路器合闸脉冲会被切断。\n- 对有两个联锁杆的开关柜，两个联锁杆不能同时打开，且联锁杆是否被锁住取决于隔离开关和接地开关状态。\n- WS-G 说明书还描述了可选弹子锁机械锁定，用于配置电机驱动的隔离开关或接地开关，实现手动与电动操作之间的联锁。\n- WS-G 2014 产品介绍把馈线接地开关的合分与断路器自动机械联锁作为友好操作界面的一部分。\n- 2014 材料还用“问答式强制性闭锁”描述防止可能误操作的操作逻辑。\n- WI-G 操作说明书同样把机械联锁作为防误操作边界，强调运行操作必须按指定顺序执行。\n- RM6-S 目录索引单独列出 `Q`、`B` 和 `IC` 功能单元联锁章节，说明不同功能单元具有不同的联锁规则。\n- RM6-S 电缆试验章节说明，试验时需要下压联锁滑片以模拟电缆室门解锁并打开接地开关；在这种条件下负荷开关不再受联锁保护，因此手册专门给出警告并说明可选附加联锁机构。\n\n## Related\n- [[WSG]]\n- [[WIG]]\n- [[RM6S]]\n- [[气体绝缘开关柜]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n",
    "preview": "## Summary [[机械联锁]] 是中压开关柜通过机构位置、手柄、插孔、联锁杆和锁定件限制错误操作顺序的安全设计。[[WSG]] 操作说明书把它作为预防误操作的核心条件；[[WIG]] 操作说明书也把机械联锁写入运行安全边界；[[RM6S]] 手册则进一步展示了联锁如何细化到不同功能单元和电缆试验场景。 ## Key Details",

  {
    "id": "concepts/气体绝缘开关柜",

    "type": "concept",
    "color": "#FF9800",
    "path": "wiki\\concepts\\气体绝缘开关柜.md",
    "markdown": "---\ntitle: \"气体绝缘开关柜\"\ntype: concept\ntags: [switchgear, gas-insulated, medium-voltage]\nsources: [gma-12kv-medium-voltage-gas-insulated-switchgear-catalog-2018, gma-medium-voltage-primary-gas-insulated-switchgear-v1-5, gm-airset-medium-voltage-primary-gas-insulated-switchgear-v1-1, gma-air-c4c-digital-implement-20191204, gma-nrjed311328en-1017, gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wi-g-27-5kv-railway-gas-insulated-switchgear-catalog-2018, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, wsg-feature-highlights-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018, fbx-catalogue-2020, fbx-medium-voltage-switchgear-catalog-2018, fbx-medium-voltage-switchgear-catalog-2017, flusarc-40-5kv-sf6-insulated-medium-voltage-switchgear-catalog-2016, fox-medium-voltage-switchgear-core-unit-catalog-2016, rm6-24kv-medium-voltage-distribution-catalog-2012, rm6-offer-presentation-life-is-on-201801update, rm6-sf6-insulated-ring-main-unit-and-compact-switchgear-catalog-2018, rm6-s-rm6-s-plus-medium-voltage-distribution-gas-insulated-switchgear-catalog-2018, rm6-set-medium-voltage-switchgear-catalog-2022, rm6-s-operation-maintenance-instructions-2021, rm-airset-eco-gas-insulated-ring-main-unit-2020, cas-36-ring-main-unit-catalog-2008, dvcas-wind-farm-secondary-distribution-switchgear-catalog-2007]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[气体绝缘开关柜]] 是以气体介质承担主要绝缘功能的中压开关柜类别。[[GMA]] 文档中的气体绝缘路线以 SF6 密封气室、固体绝缘母线、金属封闭结构和模块化扩展为核心；[[GMAirSeT]] 则保留相近结构但采用干燥空气/环保气体，以回应低 GWP、碳中和和寿命期末免气体处理诉求。[[GHA]]、[[WSG]] 和 [[WIG]] 资料共同补充了更高电压等级或专用场景的气体绝缘金属封闭路线。\n\n## Key Details\n- GMA 的所有带电中压元件置于密封充气隔室内，母线采用固体绝缘技术。\n- `2018.12` 的中文 `GMA12kV` 目录进一步把这一路线收敛到 `12kV`、主母线 `1250A`、分支母线 `630/1250A`，并给出 `420/510/600/750/800mm` 柜宽和 `CB-C / CB-B / BC-CB / D / M / BB-PT` 柜型代码。\n- GM AirSeT 同样把带电中压元件置于密封充气隔室内，但绝缘介质为干燥空气/环保气体。\n- 密封气室使中压元件不易受腐蚀性气体、污垢、灰尘和小动物影响。\n- GMA 在安装和维护时无需任何气体处理，使用寿命结束时按回收数据表处理可循环材料。\n- GM AirSeT 进一步强调寿命期末无需额外气体处理，避免 SF6 类温室气体处置问题。\n- GMA 的充气隔室防护等级为 IP67。\n- 每个充气隔室可通过温度补偿压力表监测，压力表有正常、报警和闭锁区域指示。\n- GMA Air 数字化实施材料进一步把 [[气室监测]] 拆成气体密度、气体温度和气体湿度监测。\n- 英文 GMA 目录把 gas-filled compartments 描述为 sealed pressure system，强调整个寿命期无需检查或补充绝缘气体。\n- GHA 被描述为最高 40.5kV 的气体绝缘开关柜，支持单母线和双母线方案，采用真空断路器。\n- GHA 2018 目录给出 12/17.5/24/36/38/40.5kV、40kA 短时电流、100kA 峰值耐受电流、母线/支路 2500A 的总额定参数，母线更高值可按需到 4000A。\n- GHA 的 gas-filled compartments 同样采用 sealed pressure system 口径，资料明确引用 IEC/EN 62271-1；旧演示稿还给出泄漏率 `<< 0.1 % p.a.`。\n- GHA 目录明确气室由铬镍钢制成，整寿命期免维护、无需补气，且安装、扩展、更换和拆除时不需要现场气体处理。\n- GHA 的 [[BLink]] 使柜体安装、扩展、拆卸和柜列内移动可以避免现场气体处理。\n- GHA 的 [[IDIS]] 把每个气室的气体密度状态转换为交通灯式就地显示和远程信号。\n- GHA 含 SF6 气体，目录强调通过自密封阀回收 SF6，并给出不含包装按重量计 90% 的潜在可回收率。\n- WS-G 企业标准将设备定义为 12kV~40.5kV、50Hz 的户内交流气体绝缘金属封闭开关设备，适用于单母线、双母线或母线分段系统。\n- WS-G 的母线隔室和断路器隔室均充 SF6，电缆隔室为可触及隔室，其他隔室为不可触及隔室。\n- WS-G 标准要求每个充气隔室设置带温度补偿的 SF6 密度监视装置，具备低气压报警和最低功能压力报警。\n- WS-G 标准给出 SF6 年漏气率 ≤0.1%、气室湿度 250μL/L 和充气箱 IP65 等约束。\n- WS-G 2024 版标准把特殊使用条件海拔提高到 5500m，并把最高额定电流代码收敛到 3150A。\n- WS-G 2024 版标准新增零表压绝缘试验，说明气体绝缘柜还存在低气压/零表压工况下的绝缘验证要求。\n- WS-G 40.5kV 图片页把 GIS 价值概括为耐腐蚀、适应恶劣环境、供电连续性高、操作者安全保护高和维护工作量少。\n- WS-G 40.5kV 图片页明确其海上风电 35kV 应用语境，并给出双母线 4000A、IAC 40kA/1s 和 [[BLink]] 口径。\n- WS-G 2018.09 产品目录则给出更早的常规目录口径：12~40.5kV、最高 2500A、最高 31.5kA 开断、靠墙安装、柜前维护、标准 DXN8B VDS、可选 IVIS，以及 1000m 安装高度。\n- WS-G 2024.01 产品目录从产品族角度补充了 12~40.5kV、最高 3150A、最高 40kA 开断、单母线/双母线系统和柜前安装维护口径。\n- WS-G 目录强调带电中压部件位于充气密封气室中，不受大气侵蚀、污垢、灰尘和小动物影响，并把 [[BLink]] 作为避免现场气体处理的扩展安装关键。\n- WS-G 操作说明书确认气箱按 IEC 62271-200 设计成密封压力系统，绝缘气体为符合 IEC 60376 的 SF6，在正常寿命期和 IEC 60694 正常操作条件下不需要补充绝缘气体。\n- WS-G 操作说明书还把 [[IDIS]]、[[IVIS]]/VDS 和 [[机械联锁]] 纳入运行操作边界。\n- WS-G 2014 产品介绍从演示材料角度补充了 12~40.5kV、特殊型海拔 4000m、密封气室全寿命免维护、现场安装/扩展/拆卸无需充放气、气体泄漏率 <0.1% p.a. 和自封阀回收再利用口径。\n- 2014 材料还用 40.5kV JYN1-35 空气绝缘柜与 WS-G SF6 气体绝缘柜尺寸对比突出 GIS 体积小和运行经济性。\n- WSG 特点图片页进一步补充三相共箱式结构、主母线侧/电缆侧电压互感器与避雷器布置、无源气体密度表、750mm 电缆安装高度和 CT 更换无需拆缆等偏工程实施的卖点。\n- 同一图片页把气体年泄漏率写为 <0.01%/年，较现有标准与目录常见的 <0.1%/年 更严格，应保留为来源差异而非统一参数。\n- WI-G 操作说明书把设备定位为铁道用气体绝缘金属封闭开关设备，额定电压 31.5kV、母线/出线电流 ≤2500A、短路开断电流 ≤31.5kA。\n- `2018.10` 的 WI-G 产品目录则把铁路应用口径写得更清楚：额定电压 `27.5/2×27.5kV`，最高电压 `31.5kV`，采用单母线系统、前接线内锥电缆连接、标准靠墙安装和 [[BLink]] 母线连接。\n- WI-G 同样采用 SF6 密封压力系统、真空灭弧室、[[BLink]]、[[IDIS]] 和 [[IVIS]]，更强调运行操作、联锁和维护计划。\n- `FBX catalogue 2020` 补充了更偏二次配电的气体绝缘路线：[[FBX]] 面向 `24kV` 及以下、`630A`、`20kA` 级应用，分为 `FBX-C` 紧凑型和 `FBX-E` 可扩展型。\n- FBX 同样采用 `SF6` 密封压力系统，`20℃` 额定气压约 `0.03MPa`，主回路设计寿命 `30` 年，寿命期内无需补气。\n- FBX 目录给出 `LSC2A`、主回路 `IP67`、熔断器隔室 `IP65` 可选 `IP67`，并记录 `AFL/AF 16kA 或 20kA / 1s` 的内部电弧口径。\n- `2017.10` 的更早一份 FBX 中文目录说明，这条路线在中国市场正式目录层一开始就已经把可再生能源和风机塔筒安装写进产品叙事：`FBX-E` 可凭紧凑尺寸通过狭窄门洞安装在风机塔筒内，同时配合 `Flair` 故障指示器、电动操作和远方故障隔离恢复供电逻辑。\n- FBX 还把 `Easergy T300`、`SMD`、`TH110-R`、`PD110` 和 `VPIS` 纳入可选数字化扩展，说明气体绝缘柜路线也可下探到配电末端的在线监测与远程接入。\n- `2018.04` 的另一份 FBX 中文目录说明，这条路线在后续早期版本中更突出 [[ALink]] 扩展、远方控制等级和联锁逻辑，而尚未像 `2020.05` 版那样系统展开 [[EcoStruxure]] 章节。\n- `FLUSARC 40.5 kV` `2016.07` 目录补入一条更偏 `40.5kV` 风电连接与二次配电站场景的 `SF6` 绝缘路线：`630A`、`20kA / 3s`、`AFLR 20kA / 1s`、主回路 `IP67`、`20℃ 0.03MPa`、最大海拔 `2000m`，并强调至少 `30` 年无需重新充气。\n- `FOX` `2016.03` 目录则补入一条更偏柜厂集成场景的 `12kV` 气体绝缘核心模块路线：不是完整整柜，而是由施耐德提供核芯元件、合作伙伴补足电缆室和低压间的 `SF6` 气体绝缘开关设备，技术口径集中在 `12kV`、`630A`、`20kA / 4s`、`50kA` 和 `0.03MPa @ 20℃`。\n- `2012` 英文 `RM6` 正式目录说明，施耐德在二次配电 GIS / RMU 路线上很早就已形成 `sealed pressure system`、`PM class`、断路器/负荷开关 `LSC2B` 与熔断器组合 `LSC2A` 的正式工程口径。\n- `RM6` 演示稿补入施耐德另一条更成熟的环网柜型二次配电 GIS 路线：覆盖 `12~24kV`、`630A` 主功能单元和 `20kA` 级短路能力，强调全绝缘、可触摸、不锈钢 `SF6` 气箱、年泄漏率 `<0.01%`、`IP4X` 和 `20kA 1s` 内部燃弧口径。\n- `2018.10` 的 RM6 中文正式目录把这条二次配电 GIS 路线进一步落到正式工程边界：`SF6气室 IP67`、熔断器室 `IP67`、外壳 `IP4X`、`20℃下 0.2Bar` 充气压力、年泄漏率 `0.01%/年`、气室不锈钢板厚 `2mm`，并通过订购表把 `12kV 20kA/4S`、`12kV 25kA/1S`、`24kV 20kA/1S/3S` 等能力写成正式选型项。\n- 这份 `2012` 目录还已把 `Automatic transfer systems`、`Easergy T200 I`、`VPIS / VDS`、`Flair`、`VIP 40 / VIP 400` 和 `DNV` marine application 纳入 RM6 资料，说明自动投切、远控和特定场景应用并不是后期才追加的能力层。\n- 与 [[FBX]] 相比，RM6 这组 `2018` 资料更突出环网节点、双电源备自投、`ATS`、轨道交通共箱方案和产品平台叙事；其中 `2018.05` 演示稿偏 `T200C`、`Smart RMU`、`Easergy T300` 的场景化表达，`2018.10` 正式目录则偏 `T200 I`、安装页和订购表的工程化表达。\n- `RM6 SeT` 目录则把这条 RMU / GIS 路线推进到更正式的工程目录阶段：`24kV` 及以下、气箱 `IP67`、电缆室 `IP43`、`IK07`、主回路 `40` 年寿命、`1~6` 功能共箱、`A-link` 无气体处理扩展，以及 `PD110/TH110-R/CL110/SMD/Easergy T300` 数字化配置。\n- `RM6-S` 操作说明书则补充这条路线更早的 `12kV` 运维边界：文档继续采用 `SF6` 密封压力系统，给出 `20℃` 时相对充气压力 `0.03MPa`、压力表绿色可操作区、海拔高于 `1000m` 的专用压力表以及“寿命期内通常无需补气”的维护口径。\n- `2018.10` 的 `RM6-S/RM6-S Plus` 目录进一步说明，这条 RM6 子系列属于更窄的 `12kV` 二次配电 GIS 分支：`RM6-S` 为 `630A` 侧部扩展方案，`RM6-S Plus` 升级到 `1250A` 顶部扩展，内部电弧能力可到 `AFL 31.5kA 1s`，并保留 `0.03MPa @ 20℃` 的密封压力系统口径。\n- 这说明施耐德在二次配电 GIS 领域至少存在两种互相关联但叙事重心不同的目录对象：[[FBX]] 更像标准化产品族目录，[[RM6]] / [[RM6SeT]] 更像围绕环网柜、扩展、自动投切和 Smart RMU 组织起来的平台型路线。\n- `CAS 36 Ring Main Unit` 这份 `2008.02` 英文目录虽然当前抽取得到的页数有限、尚未看到完整参数表，但它已经明确使用 `Ring Main Unit` 命名并强调供电连续性、安全、可升级和监测控制。结合其归档位置与后续产品链，可以把 [[CAS36]] 保守视作施耐德二次配电 RMU / GIS 叙事中的更早目录层，而不是后续 [[RM6]]、[[FBX]]、[[SM6]] 的直接同版前身。\n- `DVCAS Switchgears for transformer substations in wind farms` 则把这一早期 RMU / GIS 方向补成更完整的风电专用工程目录：`36kV`、`630A`、`20kA / 3s`、`IAC AFL 20kA / 1s`、高压隔室 `IP67`、`SF6 0.3 bar`、`I / D / 0 / T` 模块和 `NE / LE / RE / DE` 扩展方式都被明确写出，并且把应用边界直接限定在风电场集电网、风机箱变、`600mm` 门洞通过和 `2000m` 海拔以内。更稳妥的理解是把 [[DVCAS]] 视为施耐德体系里一条偏风电集电网的早期专用二次配电 GIS / RMU 分支。\n\n- `RM AirSeT` `2020.07` 资料说明施耐德在 `12kV` RMU / GIS 路线中已有环保气体版本：[[RMAirSeT]] 采用环保气体绝缘、真空灭弧、`GWP < 1`、`IP67` 气箱、`20kA/4s`、`A-FLR 20kA 1s`，并继续保留 `1~6` 功能单元自由组合、`NE/LE/RE/DE` 扩展和 `Easergy T300` 等二次配电叙事。\n- 这也让施耐德当前 GIS 路线可以更清楚地分成两组环保分支：[[GMAirSeT]] 偏 `12kV` 一次配电柜型平台，[[RMAirSeT]] 偏 `12kV` 二次配电环网柜 / RMU 平台。\n## Related\n- [[GMA]]\n- [[GMAirSeT]]\n- [[GHA]]\n- [[WSG]]\n- [[WIG]]\n- [[FBX]]\n- [[RM6]]\n- [[RM6S]]\n- [[RM6SPlus]]\n- [[RM6SeT]]\n- [[RMAirSeT]]\n- [[CAS36]]\n- [[DVCAS]]\n- [[FLUSARC]]\n- [[FOX]]\n- [[自动投切]]\n- [[ALink]]\n- [[BLink]]\n- [[IDIS]]\n- [[IVIS]]\n- [[机械联锁]]\n- [[气室监测]]\n- [[局部放电监测]]\n- [[金属封闭开关设备]]\n- [[内部电弧防护]]\n- [[DNF7]]\n",
    "preview": "## Summary [[气体绝缘开关柜]] 是以气体介质承担主要绝缘功能的中压开关柜类别。[[GMA]] 文档中的气体绝缘路线以 SF6 密封气室、固体绝缘母线、金属封闭结构和模块化扩展为核心；[[GMAirSeT]] 则保留相近结构但采用干燥空气/环保气体，以回应低 GWP、碳中和和寿命期末免气体处理诉求。[[GHA]]、[[WSG]] 和 [[WIG]] 资料共同补充了更高电压等级或专用场景的气体绝缘金属封闭路线。 ## Key ",

    "markdown": "---\ntitle: \"气室监测\"\ntype: concept\ntags: [gas-insulated-switchgear, monitoring, sensor]\nsources: [gma-12kv-medium-voltage-gas-insulated-switchgear-catalog-2018, gma-air-c4c-digital-implement-20191204, gma-nrjed311328en-1017, wig-high-speed-rail-smart-switchgear-jiaoda-yunda-protection-pasific-window, gha-gas-insulated-switchgear-presentation-vers-06-englisch, gha-nrjcat18789en-0318, q320500-ksga-09-2015-wsg-enterprise-standard, qavxm-031-2024-wsg-enterprise-standard, wi-g-27-5kv-railway-gas-insulated-switchgear-catalog-2018, wi-g-railway-gas-insulated-switchgear-operation-instructions, wsg-40-5kv-gas-insulated-switchgear-image, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2024, wsg-gas-insulated-metal-enclosed-switchgear-operation-instructions, wsg-2014-06-27-product-presentation, wsg-wig-smart-switchgear-2019, wsg-12-40-5kv-ac-metal-enclosed-gas-insulated-switchgear-catalog-2018]\nlast_updated: 2026-06-09\n---\n\n## Summary\n[[气室监测]] 是 [[气体绝缘开关柜]] 的关键状态监测主题，用来确认密封充气隔室是否处于可运行状态。GMA Air 数字化实施材料把气体密度、气体温度和气体湿度列为监测对象，产品目录则强调压力表、报警区和闭锁区等就地监控方式；[[GHA]]、[[WSG]] 和 [[WIG]] 资料进一步补充了 [[IDIS]] 这种气体密度信息系统。\n\n## Key Details\n- GMA Air C4C Digital 材料列出 gas density monitoring、gas temperature monitoring 和 gas humidity monitoring。\n- GMA 与 GM AirSeT 产品目录都说明每个充气隔室可通过带温度补偿的压力表进行监控。\n- `2018.12` 的 `GMA12kV` 中文目录把就地监测口径写得更具体：额定充气压力 `0.03MPa`、报警压力 `0.02MPa`、最低功能闭锁压力 `0.01MPa`、年漏气率 `0.05%`，并给出无报警接点与带报警接点两种压力表图示。\n- 带报警接点输出的压力表可用于远程监测。\n- 气室监测与 [[GMAirSeT]] 的干燥空气/环保气体路线直接相关，也适用于 [[GMA]] 的 SF6 气室管理。\n- 英文 GMA 目录补充了 sealed pressure system 口径：整个服务寿命内无需检查或补充绝缘气体。\n- WIG 高铁智能开关柜演示稿把 SF6 密度、SF6 温度和气室状态列入 [[智能监测显示终端]] 的监测对象，但未给出完整柜型和气体绝缘参数。\n- GHA 的 [[IDIS]] 为每个自主气室提供单独监测；旧演示稿描述温度补偿气体密度开关，2018 目录描述压力传感器与独立 IDIS 显示。\n- IDIS 用绿色、黄色和红色进行交通灯式状态显示，并支持远方总报警信号。\n- GHA 资料强调系统内部不需要在柜内或柜间布置气体管路。\n- WS-G 标准要求每个充气隔室设置带温度补偿功能的 SF6 密度监视装置。\n- WS-G 标准把低气压报警和最低功能压力报警作为充气隔室监测要求，并给出不同电压/电流段的报警压力和最低功能压力。\n- WS-G 标准要求用微量水分检测仪测量充气隔室气体状态，气室内 SF6 湿度应符合 250μL/L 限值。\n- WS-G 2024 版明确给出 [[IDIS]] 低气压报警 0.015MPa/0.03MPa 以及最低功能压力 0.01MPa 的注释口径。\n- WS-G 2024.01 产品目录按 12~24kV、36kV 和 40.5kV 列出额定充气压力、预警压力和报警压力；其中 40.5kV 为额定 0.060MPa、预警 ≤0.050MPa 且 >0.030MPa、报警 ≤0.030MPa。\n- WS-G 2018.09 产品目录已经使用 IDIS + 压力传感器架构来监测各独立气室，并说明一个 IDIS 显示器最多可连接三个压力传感器，报警可通过接点远传。\n- 2018 目录给出的 12~24kV、36kV 和 40.5kV 额定充气压力、预警压力和报警压力口径，与后续 2024.01 目录基本一致。\n- WS-G 操作说明书确认每台柜标准配置 IDIS，并把绿色、黄色、黄红组合分别对应运行准备、压力降低预警和压力降低主报警。\n- WS-G 操作说明书说明在压力降低或发生故障时应联系服务中心；主报警时还应切断气室电源。\n- WS-G 2014 产品介绍以气体密度继电器和气体密度显示仪描述监测方案，强调无气体管路连接、温度补偿、压力数值显示、报警接点远传和自监视。\n- 2014 材料还强调每个气室有各自的压力监视系统，气体泄漏率 <0.1% p.a.，气室装有自封阀用于寿命期末气体回收和再利用。\n- 2019.2 WSG-WIG 演示稿把 SF6 密度和微水在线监测扩展为项目开发对象：母线室与断路器室监测温度、压力、密度和微水，并通过温度、压力计算密度。\n- 该演示稿给出密度/微水监测精度线索：露点 +/-3K、密度 +/-0.35g/L、压力 +/-10mbar，并说明密度监测已用于常规合同，微水监测仍需样机测试。\n- `2018.10` 的 WI-G 产品目录说明每台柜标准配置气体状态显示器，每个气室由压力传感器单独监测，一个显示器最多连接三个压力传感器，且每个充气室具有独立泄压装置。\n- WI-G 操作说明书说明 SF6 气箱为密封压力系统，正常使用寿命期间不需要补充绝缘气体。\n- WI-G 的 IDIS 额定充气压力为 0.06MPa，压力降低预报警为 0.05MPa，主报警为 0.03MPa。\n- WI-G 的 IDIS 可通过彩色 LED 和远程信号继电器状态把气室状态传给遥控或 I&C 系统。\n- WS-G 40.5kV 图片页说明每个气室均有机械或电气检测装置，并分别具有独立的泄压装置。\n\n## Related\n- [[气体绝缘开关柜]]\n- [[GHA]]\n- [[WSG]]\n- [[IDIS]]\n- [[IVIS]]\n- [[GMAirSeT]]\n- [[GMA]]\n- [[WIG]]\n- [[智能监测显示终端]]\n- [[数字化中压运维]]\n",
    "preview": "## Summary [[气室监测]] 是 [[气体绝缘开关柜]] 的关键状态监测主题，用来确认密封充气隔室是否处于可运行状态。GMA Air 数字化实施材料把气体密度、气体温度和气体湿度列为监测对象，产品目录则强调压力表、报警区和闭锁区等就地监控方式；[[GHA]]、[[WSG]] 和 [[WIG]] 资料进一步补充了 [[IDIS]] 这种气体密度信息系统。 ## Key Details",
    "group": 3,
